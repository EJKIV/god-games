<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games — What you have learned</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04020a; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
  canvas { display: block; }
  #backBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; background: rgba(212,175,55,0.10); border: 1px solid #D4AF37;
    color: #f0e8d0; font-family: monospace; font-size: 14px;
    letter-spacing: 0.15em; cursor: pointer; border-radius: 4px;
  }
  #backBtn:hover { background: rgba(212,175,55,0.22); transform: translateX(-50%) translateY(-1px); }
  body.manga-mode #backBtn {
    background:#D4AF37;
    border:3px solid #0a0a0a;
    color:#0a0a0a;
    border-radius:4px;
    box-shadow:6px 6px 0 rgba(0,0,0,0.48);
    font-weight:bold;
  }
  body.manga-mode #backBtn:hover {
    background:#fff1b8;
    transform:translateX(-50%) translateY(-1px);
    box-shadow:7px 8px 0 rgba(0,0,0,0.48);
  }
  @media (max-height: 460px) {
    #backBtn {
      bottom: 12px;
      padding: 8px 20px;
      font-size: 12px;
      letter-spacing: 0.12em;
    }
    body.manga-mode #backBtn {
      border-width: 2px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.48);
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="backBtn">RETURN TO THE WORLD  ↵</button>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// olympus-clues.html — the toad's secret journal. Reached by jumping onto
// the mushroom that appears at the base of Mt. Olympus when in toad form
// on the hub. Interprets the current mythic omen and stores uncovered clues.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!MANGA_ON) render();
});

const GOLD = '#D4AF37';
const MANGA_ON = localStorage.getItem('godgames_manga') === '1';
document.body.classList.toggle('manga-mode', MANGA_ON);

document.getElementById('backBtn').addEventListener('click', () => { location.href = 'index.html'; });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 't' || e.key === 'T' || e.key === 'Enter') {
    location.href = 'index.html';
  }
});

function render() {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() / 1000;
  const art = window.GodGames && GodGames.MangaArt;
  drawClueBackdrop(W, H, t, art);

  // Journal state — current omen, uncovered fragments, and early finds.
  const M = window.GodGames && window.GodGames.Mysteries;
  const journal = M && typeof M.journalState === 'function'
    ? M.journalState()
    : { earned: [], early: [], current: null, future: null, complete: false, codeword: 'ZEUS' };
  const current = journal.current || (!journal.complete ? journal.prologue : null);
  const steps = buildJournalSteps(M, journal, current);
  const layout = journalLayout(W, H);

  drawJournalSurface(layout.board, art, t);
  drawJournalHeader(layout, journal, current, art, t);
  drawPathRail(layout.path, steps, journal, current, layout.pathHorizontal);
  drawCurrentOmenPanel(layout.main, journal, current, steps, art, layout.veryShort);
  drawFragmentLedger(layout.ledger, journal, current, art, layout.veryShort);
  drawJournalFooter(layout, journal, current);

  drawCluesDebugOverlay(layout.board);

  if (MANGA_ON) requestAnimationFrame(render);
}

function drawClueBackdrop(W, H, t, art) {
  const mangaBackdrop = MANGA_ON && art && typeof art.drawScene === 'function'
    && art.drawScene(ctx, 'clues', 0, 0, W, H, { focusX: 0.56, focusY: 0.50 });
  if (mangaBackdrop) {
    if (art.overlay) art.overlay(ctx, W, H, {
      top: 'rgba(0,0,0,0.12)',
      mid: 'rgba(0,0,0,0.06)',
      bottom: 'rgba(0,0,0,0.74)',
    });
    if (art.mangaAtmosphere) art.mangaAtmosphere(ctx, W, H, { halftoneAlpha: 0.10, scanAlpha: 0.08, vignette: 0.54 });
    return;
  }

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#04071a');
  sky.addColorStop(0.55, '#0e1438');
  sky.addColorStop(1, '#1a2654');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 220; i++) {
    const sx = ((i * 137) % W);
    const sy = (((i * 89) % (H * 0.55)));
    const b = Math.sin(t * 1.6 + i) * 0.35 + 0.65;
    ctx.globalAlpha = b * 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(20,26,58,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.78);
  const mpts = [[0,0.78],[0.10,0.62],[0.22,0.70],[0.34,0.55],[0.46,0.65],[0.58,0.58],[0.70,0.66],[0.82,0.56],[0.95,0.66],[1,0.72]];
  for (const [px, py] of mpts) ctx.lineTo(px * W, py * H);
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(42,50,88,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.30, H);
  ctx.lineTo(W * 0.45, H * 0.70);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.55, H * 0.70);
  ctx.lineTo(W * 0.70, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(245,248,255,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.465, H * 0.59);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.535, H * 0.59);
  ctx.lineTo(W * 0.518, H * 0.63);
  ctx.lineTo(W * 0.50, H * 0.59);
  ctx.lineTo(W * 0.482, H * 0.63);
  ctx.closePath();
  ctx.fill();

  const aura = ctx.createRadialGradient(W * 0.5, H * 0.52, 4, W * 0.5, H * 0.52, H * 0.18);
  aura.addColorStop(0, `rgba(255,240,180,${0.32 + Math.sin(t * 2) * 0.08})`);
  aura.addColorStop(0.4, 'rgba(212,175,55,0.12)');
  aura.addColorStop(1, 'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, W, H);
}

function journalLayout(W, H) {
  const side = Math.max(14, Math.min(46, W * 0.045));
  const bottomReserve = H < 460 ? 86 : 108;
  const boardW = Math.max(320, Math.min(1060, W - side * 2));
  const boardH = Math.max(276, Math.min(620, H - bottomReserve - 22));
  const boardX = (W - boardW) / 2;
  const boardY = Math.max(16, Math.min(66, (H - boardH - bottomReserve) * 0.48));
  const compact = boardW < 810 || boardH < 440;
  const veryShort = boardH < 340;
  const pad = veryShort ? 12 : (compact ? 16 : 24);
  const headerH = veryShort ? 40 : (compact ? 56 : 78);
  const gap = veryShort ? 6 : 12;
  const innerX = boardX + pad;
  const innerY = boardY + pad;
  const innerW = boardW - pad * 2;
  const innerH = boardH - pad * 2;
  const header = { x: innerX, y: innerY, w: innerW, h: headerH };

  if (compact) {
    const pathH = veryShort ? 38 : 58;
    const minMainH = veryShort ? 102 : 138;
    const ledgerH = Math.max(48, Math.min(veryShort ? 52 : 92, innerH - headerH - pathH - minMainH - gap * 3));
    const path = { x: innerX, y: header.y + headerH + gap, w: innerW, h: pathH };
    const mainY = path.y + pathH + gap;
    const mainH = Math.max(minMainH, innerY + innerH - mainY - ledgerH - gap);
    const ledger = { x: innerX, y: mainY + mainH + gap, w: innerW, h: Math.max(42, innerY + innerH - (mainY + mainH + gap)) };
    return { board: { x: boardX, y: boardY, w: boardW, h: boardH }, header, path, main: { x: innerX, y: mainY, w: innerW, h: mainH }, ledger, compact, veryShort, pathHorizontal: true };
  }

  const railW = Math.min(240, Math.max(212, innerW * 0.25));
  const ledgerH = Math.min(150, Math.max(124, innerH * 0.25));
  const path = { x: innerX, y: header.y + headerH + gap, w: railW, h: innerH - headerH - gap };
  const main = { x: innerX + railW + gap, y: header.y + headerH + gap, w: innerW - railW - gap, h: innerH - headerH - ledgerH - gap * 2 };
  const ledger = { x: main.x, y: main.y + main.h + gap, w: main.w, h: ledgerH };
  return { board: { x: boardX, y: boardY, w: boardW, h: boardH }, header, path, main, ledger, compact, veryShort, pathHorizontal: false };
}

function buildJournalSteps(M, journal, current) {
  const steps = [];
  if (journal && journal.prologue) steps.push(journal.prologue);
  const sourceClues = M && Array.isArray(M.clues) ? M.clues : [];
  for (const c of sourceClues) {
    const decorated = M && typeof M.findClue === 'function' ? M.findClue(c.id) : c;
    if (decorated && !steps.some(step => step.id === decorated.id)) steps.push(decorated);
  }
  if (!steps.length && current) steps.push(current);
  return steps;
}

function drawJournalSurface(board, art, t) {
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, board.x, board.y, board.w, board.h, {
      paper: 'rgba(238,228,198,0.97)',
      bottom: 'rgba(156,137,103,0.97)',
      accent: GOLD,
      lineWidth: 5,
      toneAlpha: 0.15,
      shadow: 'rgba(0,0,0,0.58)',
    });
  } else {
    ctx.fillStyle = 'rgba(8,7,7,0.95)';
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.w, board.h, 12);
    ctx.fill();
    const inner = ctx.createLinearGradient(0, board.y, 0, board.y + board.h);
    inner.addColorStop(0, 'rgba(50,39,25,0.86)');
    inner.addColorStop(1, 'rgba(18,12,18,0.92)');
    ctx.fillStyle = inner;
    ctx.beginPath();
    ctx.roundRect(board.x + 8, board.y + 8, board.w - 16, board.h - 16, 8);
    ctx.fill();
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.w, board.h, 12);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = MANGA_ON ? 0.22 : 0.15;
  ctx.strokeStyle = MANGA_ON ? '#0a0a0a' : GOLD;
  ctx.lineWidth = 1;
  for (let i = 0; i < 11; i++) {
    const x = board.x + 34 + i * (board.w - 68) / 10;
    ctx.beginPath();
    ctx.moveTo(x, board.y + 18);
    ctx.lineTo(x + Math.sin(t + i) * 4, board.y + board.h - 18);
    ctx.stroke();
  }
  for (let i = 0; i < 6; i++) {
    const y = board.y + 36 + i * (board.h - 72) / 5;
    ctx.beginPath();
    ctx.moveTo(board.x + 18, y);
    ctx.lineTo(board.x + board.w - 18, y + Math.cos(t * 0.7 + i) * 3);
    ctx.stroke();
  }
  ctx.restore();
}

function drawJournalHeader(layout, journal, current, art, t) {
  const h = layout.header;
  const titleSize = layout.veryShort ? 15 : (layout.compact ? 20 : 27);
  const subSize = layout.veryShort ? 10 : 12;
  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
  ctx.fillText('WHAT YOU HAVE LEARNED', h.x, h.y + 13);
  if (MANGA_ON && art && art.inkText) {
    art.inkText(ctx, "TOAD'S OLYMPUS JOURNAL", h.x, h.y + titleSize + (layout.veryShort ? 17 : 20), {
      align: 'left',
      font: `900 ${titleSize}px "Impact", "Arial Black", sans-serif`,
      fill: '#fff1b8',
      shadow: GOLD,
      shadowBlur: 6,
      strokeWidth: layout.veryShort ? 3 : 4,
    });
  } else {
    ctx.font = `bold ${titleSize}px serif`;
    ctx.fillStyle = GOLD;
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = 9;
    ctx.fillText("TOAD'S OLYMPUS JOURNAL", h.x, h.y + titleSize + (layout.veryShort ? 17 : 20));
    ctx.shadowBlur = 0;
  }
  if (!layout.veryShort) {
    ctx.font = `${MANGA_ON ? 'bold' : 'italic'} ${subSize}px ${MANGA_ON ? 'monospace' : 'serif'}`;
    ctx.fillStyle = MANGA_ON ? 'rgba(35,22,12,0.78)' : 'rgba(230,210,160,0.72)';
    const status = journal.complete && !current
      ? `the ${journal.codeword || 'ZEUS'} invocation is assembled`
      : 'the toad sees what the human cannot';
    ctx.fillText(status, h.x, h.y + h.h - 6);
  }

  const count = Math.max(0, Math.min(4, journal.solvedCount || 0));
  const meterX = h.x + h.w - (layout.compact ? 118 : 176);
  const meterY = h.y + (layout.veryShort ? 5 : 10);
  const slotW = layout.compact ? 21 : 32;
  const letters = String(journal.codeword || 'ZEUS').split('');
  for (let i = 0; i < 4; i++) {
    const x = meterX + i * (slotW + 6);
    const solved = i < count;
    ctx.fillStyle = solved ? (MANGA_ON ? '#fff1b8' : 'rgba(212,175,55,0.20)') : (MANGA_ON ? 'rgba(255,248,220,0.32)' : 'rgba(0,0,0,0.26)');
    ctx.strokeStyle = solved ? GOLD : (MANGA_ON ? 'rgba(10,10,10,0.38)' : 'rgba(212,175,55,0.34)');
    ctx.lineWidth = solved ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(x, meterY, slotW, layout.veryShort ? 22 : 30, 4);
    ctx.fill();
    ctx.stroke();
    ctx.font = `bold ${layout.veryShort ? 12 : 16}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = solved ? (MANGA_ON ? '#0a0a0a' : GOLD) : (MANGA_ON ? 'rgba(10,10,10,0.36)' : 'rgba(220,200,150,0.42)');
    ctx.fillText(solved ? letters[i] : '?', x + slotW / 2, meterY + (layout.veryShort ? 16 : 21));
  }
  ctx.restore();

  if (MANGA_ON && art && art.drawSharedWalker && !layout.veryShort) {
    art.drawSharedWalker(ctx, {
      x: h.x + h.w - 42,
      y: h.y + h.h - 7,
      facing: -1,
      walkPhase: t * 4.2,
      vx: 40,
      form: 'toad',
    }, { scale: layout.compact ? 0.52 : 0.68, shadowAlpha: 0.22 });
  }
}

function drawPathRail(rect, steps, journal, current, horizontal) {
  const accent = MANGA_ON ? '#0a0a0a' : GOLD;
  const tight = horizontal && rect.h < 50;
  drawInsetPanel(rect, tight ? '' : 'CLUE PATH', accent);

  const lead = tight ? 48 : 23;
  const trail = tight ? 20 : 23;
  const usable = horizontal ? Math.max(1, rect.w - lead - trail) : Math.max(1, rect.h - 62);
  const count = Math.max(1, steps.length);
  const start = horizontal ? rect.x + lead : rect.y + 46;
  const gap = count > 1 ? usable / (count - 1) : 0;
  const nodeR = horizontal ? Math.min(15, Math.max(10, rect.h * 0.22)) : 17;

  ctx.save();
  ctx.lineWidth = 2;
  ctx.strokeStyle = MANGA_ON ? 'rgba(10,10,10,0.42)' : 'rgba(212,175,55,0.36)';
  ctx.beginPath();
  if (horizontal) {
    ctx.moveTo(start, rect.y + rect.h * 0.50);
    ctx.lineTo(start + usable, rect.y + rect.h * 0.50);
  } else {
    ctx.moveTo(rect.x + 29, start);
    ctx.lineTo(rect.x + 29, start + usable);
  }
  ctx.stroke();

  for (let i = 0; i < steps.length; i++) {
    const step = steps[i];
    const x = horizontal ? start + i * gap : rect.x + 29;
    const y = horizontal ? rect.y + rect.h * 0.50 : start + i * gap;
    drawPathNode(x, y, nodeR, step, clueStepState(step, journal, current), i, horizontal, rect);
  }
  ctx.restore();
}

function drawPathNode(x, y, r, step, state, index, horizontal, bounds) {
  const stateColor = {
    current: GOLD,
    resolved: '#84d68a',
    early: '#cc88ff',
    final: '#ff88cc',
    locked: MANGA_ON ? 'rgba(10,10,10,0.34)' : 'rgba(210,190,150,0.38)',
    available: GOLD,
  }[state] || GOLD;
  const label = step && step.id === 'clue.toad' ? 'TOAD' : (step && step.letter ? step.letter : String(index));
  ctx.save();
  ctx.fillStyle = MANGA_ON ? '#fff6d6' : 'rgba(6,4,10,0.92)';
  if (state === 'locked') ctx.fillStyle = MANGA_ON ? 'rgba(255,248,220,0.52)' : 'rgba(6,4,10,0.58)';
  ctx.strokeStyle = stateColor;
  ctx.lineWidth = state === 'current' ? 3.2 : 2;
  ctx.shadowColor = state === 'current' && !MANGA_ON ? GOLD : 'transparent';
  ctx.shadowBlur = state === 'current' && !MANGA_ON ? 10 : 0;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.textAlign = 'center';
  ctx.font = `bold ${label === 'TOAD' ? Math.max(8, r * 0.55) : Math.max(11, r * 0.72)}px monospace`;
  ctx.fillStyle = state === 'locked' ? (MANGA_ON ? 'rgba(10,10,10,0.44)' : 'rgba(220,200,150,0.50)') : (MANGA_ON ? '#0a0a0a' : stateColor);
  ctx.fillText(label, x, y + 4);

  const realm = step && step.id === 'clue.toad' ? 'first hop' : String(step && (step.realm || step.targetGame) || 'sealed');
  ctx.font = `bold ${horizontal ? 9 : 10}px monospace`;
  ctx.fillStyle = state === 'current' ? (MANGA_ON ? '#6d3f14' : GOLD) : (MANGA_ON ? 'rgba(35,22,12,0.62)' : 'rgba(235,220,180,0.58)');
  if (horizontal) {
    if (bounds.h >= 50) {
      const maxW = Math.max(46, bounds.w / Math.max(5, step ? 5 : 1) - 6);
      ctx.fillText(ellipsize(realm, maxW), x, y + r + 14);
    }
  } else {
    ctx.textAlign = 'left';
    ctx.fillText(ellipsize(realm, bounds.w - 58), x + r + 10, y - 2);
    ctx.font = '9px monospace';
    const status = state === 'current' ? 'read now' : (state === 'resolved' ? 'fulfilled' : (state === 'early' ? 'early' : 'sealed'));
    ctx.fillStyle = MANGA_ON ? 'rgba(35,22,12,0.50)' : 'rgba(235,220,180,0.46)';
    ctx.fillText(status, x + r + 10, y + 12);
  }
  ctx.restore();
}

function clueStepState(step, journal, current) {
  if (!step) return 'locked';
  if (journal.complete && !current && step.order === 4) return 'final';
  if (current && step.id === current.id) return 'current';
  if (step.resolved) return 'resolved';
  if (step.foundEarly) return 'early';
  if (step.unlocked) return 'available';
  return 'locked';
}

function drawCurrentOmenPanel(rect, journal, current, steps, art, veryShort) {
  drawInsetPanel(rect, current ? 'CURRENT OMEN' : 'INVOCATION READY', current && current.foundEarly ? '#cc88ff' : GOLD);
  const final = journal.complete && !current;
  const active = final
    ? {
        title: 'THE WORD HAS FORMED',
        realm: 'Olympus',
        actionVerb: 'speak',
        riddle: `Carry ${journal.codeword || 'ZEUS'} back to the mountain and speak the thunderer's name where the storm gathers.`,
        journalNudge: 'The fragments are no longer directions. They are the key.',
        mythBasis: 'Zeus is the Olympian king who overthrew the Titans and rules through the thunderbolt.',
      }
    : (current || steps[0] || {});
  const pad = veryShort ? 14 : 18;
  const x = rect.x + pad;
  let y = rect.y + (veryShort ? 32 : 42);
  const w = rect.w - pad * 2;
  const kicker = [active.realm, active.actionVerb].filter(Boolean).join(' / ').toUpperCase();
  const titleFont = MANGA_ON ? `900 ${veryShort ? 17 : 22}px Georgia, serif` : `bold ${veryShort ? 17 : 22}px serif`;
  const bodyFont = MANGA_ON ? `bold ${veryShort ? 13 : 16}px Georgia, serif` : `italic ${veryShort ? 13 : 16}px serif`;
  const noteFont = `bold ${veryShort ? 10 : 12}px monospace`;

  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
  ctx.fillText(kicker || 'OLYMPUS', x, y);
  y += veryShort ? 20 : 25;
  ctx.font = titleFont;
  ctx.fillStyle = MANGA_ON ? '#0a0a0a' : '#f4e8c4';
  ctx.fillText(ellipsize(active.title || 'AN OMEN', w), x, y);
  y += veryShort ? 20 : 27;
  ctx.font = bodyFont;
  ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.94)';
  const bodyMax = veryShort ? 2 : Math.max(3, Math.floor((rect.y + rect.h - y - 42) / (veryShort ? 16 : 20)));
  const bodyLines = linesFor(active.riddle || active.text || '', w, bodyFont, bodyMax);
  bodyLines.forEach((line, i) => ctx.fillText(line, x, y + i * (veryShort ? 16 : 20)));
  y += bodyLines.length * (veryShort ? 16 : 20) + (veryShort ? 8 : 14);
  ctx.font = noteFont;
  ctx.fillStyle = MANGA_ON ? 'rgba(48,31,15,0.76)' : 'rgba(220,200,150,0.72)';
  if (!veryShort) {
    const note = active.journalNudge || active.mythBasis || active.purpose || '';
    const noteLines = linesFor(note, w, noteFont, 2);
    noteLines.forEach((line, i) => ctx.fillText(line, x, y + i * 15));
  }
  ctx.restore();

  if (MANGA_ON && art && art.inkText && !veryShort) {
    ctx.save();
    ctx.globalAlpha = 0.13;
    art.inkText(ctx, active.letter || '?', rect.x + rect.w - 52, rect.y + rect.h - 24, {
      align: 'center',
      font: '900 82px "Impact", "Arial Black", sans-serif',
      fill: '#0a0a0a',
      strokeWidth: 0,
    });
    ctx.restore();
  }
}

function drawFragmentLedger(rect, journal, current, art, veryShort) {
  const earned = journal.earned || [];
  drawInsetPanel(rect, 'UNCOVERED FRAGMENTS', earned.length ? GOLD : (MANGA_ON ? '#0a0a0a' : GOLD));
  const pad = veryShort ? 8 : 14;
  const bodyTop = rect.y + (veryShort ? 22 : 34);
  ctx.save();
  if (!earned.length) {
    ctx.font = MANGA_ON ? `bold ${veryShort ? 12 : 14}px Georgia, serif` : `italic ${veryShort ? 12 : 14}px serif`;
    ctx.fillStyle = MANGA_ON ? 'rgba(33,23,13,0.78)' : 'rgba(240,230,200,0.78)';
    wrapAndDraw((current && current.purpose) || 'Four fragments form the name that wakes the mountain.', rect.x + pad, bodyTop, rect.w - pad * 2, veryShort ? 15 : 18, 'left', veryShort ? 2 : 3);
    ctx.restore();
    return;
  }

  const count = veryShort ? Math.min(4, earned.length) : Math.min(3, earned.length);
  const visible = earned.slice(Math.max(0, earned.length - count));
  const gap = 8;
  const cardW = (rect.w - pad * 2 - gap * (visible.length - 1)) / visible.length;
  const cardH = Math.max(veryShort ? 26 : 36, rect.y + rect.h - bodyTop - pad);
  visible.forEach((clue, i) => {
    drawFragmentCard(rect.x + pad + i * (cardW + gap), bodyTop, cardW, cardH, clue, art, veryShort);
  });
  if (earned.length > visible.length && !veryShort) {
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = MANGA_ON ? 'rgba(35,22,12,0.56)' : 'rgba(235,220,180,0.52)';
    ctx.fillText(`${earned.length - visible.length} older mark(s) kept above`, rect.x + rect.w - pad, rect.y + 23);
  }
  ctx.restore();
}

function drawFragmentCard(x, y, w, h, clue, art, veryShort) {
  const accent = clue.foundEarly ? '#cc88ff' : (clue.resolved ? '#84d68a' : GOLD);
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, x, y, w, h, {
      paper: 'rgba(255,248,220,0.66)',
      bottom: 'rgba(218,200,160,0.66)',
      accent,
      lineWidth: 1.8,
      toneAlpha: 0.04,
      shadow: 'rgba(0,0,0,0.10)',
    });
  } else {
    ctx.fillStyle = 'rgba(2,0,6,0.34)';
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 6);
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.globalAlpha = 0.82;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'left';
  ctx.font = `bold ${veryShort ? 16 : 22}px monospace`;
  ctx.fillStyle = MANGA_ON ? '#0a0a0a' : accent;
  ctx.fillText(clue.letter || '?', x + 10, y + (veryShort ? 23 : 29));
  ctx.font = `bold ${veryShort ? 9 : 10}px monospace`;
  ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
  const status = clue.foundEarly ? 'FOUND EARLY' : (clue.resolved ? 'FULFILLED' : 'ACTIVE');
  ctx.fillText(status, x + 36, y + (veryShort ? 15 : 18));
  if (veryShort) {
    ctx.restore();
    return;
  }
  ctx.font = MANGA_ON ? `bold ${veryShort ? 11 : 13}px Georgia, serif` : `${veryShort ? 11 : 13}px serif`;
  ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.88)';
  const text = clue.foundEarly
    ? 'Kept, but the path still begins earlier.'
    : (clue.uncoveredText || clue.text || '');
  const lines = linesFor(text, w - 46, ctx.font, veryShort ? 1 : 2);
  lines.forEach((line, i) => ctx.fillText(line, x + 36, y + (veryShort ? 31 : 38) + i * (veryShort ? 13 : 15)));
  ctx.restore();
}

function drawJournalFooter(layout, journal, current) {
  if (layout.veryShort) return;
  const board = layout.board;
  ctx.save();
  ctx.textAlign = 'center';
  if (journal.complete && !current) {
    ctx.font = `bold ${layout.veryShort ? 11 : 13}px monospace`;
    ctx.fillStyle = MANGA_ON ? '#8f204f' : '#ff88cc';
    ctx.shadowColor = '#ff88cc';
    ctx.shadowBlur = MANGA_ON ? 0 : 6;
    ctx.fillText(`SPEAK ${journal.codeword || 'ZEUS'} ON THE MOUNTAIN`, board.x + board.w / 2, board.y + board.h - 12);
  } else if (journal.future && (journal.earned || []).length > 0 && !layout.veryShort) {
    ctx.font = 'italic 12px Georgia, serif';
    ctx.fillStyle = MANGA_ON ? 'rgba(67,32,79,0.80)' : 'rgba(204,136,255,0.76)';
    wrapAndDraw('A lower mark is still sealed until the current omen is answered.', board.x + board.w / 2, board.y + board.h - 15, board.w - 60, 16, 'center', 1);
  } else {
    ctx.font = '10px monospace';
    ctx.fillStyle = MANGA_ON ? 'rgba(30,20,12,0.58)' : 'rgba(180,180,180,0.46)';
    ctx.fillText('press T or ESC to return', board.x + board.w / 2, board.y + board.h - 12);
  }
  ctx.restore();
}

function drawInsetPanel(rect, label, accent) {
  const art = window.GodGames && GodGames.MangaArt;
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, rect.x, rect.y, rect.w, rect.h, {
      paper: 'rgba(255,248,220,0.58)',
      bottom: 'rgba(215,197,157,0.54)',
      accent,
      lineWidth: 2,
      toneAlpha: 0.04,
      shadow: 'rgba(0,0,0,0.11)',
    });
  } else {
    ctx.fillStyle = 'rgba(2,0,6,0.34)';
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 7);
    ctx.fill();
    ctx.strokeStyle = accent || GOLD;
    ctx.globalAlpha = 0.72;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  if (label) {
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'left';
    ctx.fillStyle = MANGA_ON ? 'rgba(35,22,12,0.68)' : 'rgba(255,213,74,0.64)';
    ctx.fillText(label, rect.x + 12, rect.y + 18);
  }
  ctx.restore();
}

function linesFor(text, maxW, font, maxLines) {
  ctx.save();
  ctx.font = font;
  const lines = wrap(text, maxW, maxLines);
  ctx.restore();
  return lines;
}

function ellipsize(text, maxW) {
  const raw = String(text || '');
  if (ctx.measureText(raw).width <= maxW) return raw;
  let out = raw;
  while (out.length > 1 && ctx.measureText(out + '...').width > maxW) out = out.slice(0, -1);
  return out.trim() + '...';
}

function domRectOnCanvas(el) {
  if (!el) return null;
  const cr = canvas.getBoundingClientRect();
  const br = el.getBoundingClientRect();
  if (!cr.width || !cr.height || !br.width || !br.height) return null;
  return {
    x: (br.left - cr.left) * canvas.width / cr.width,
    y: (br.top - cr.top) * canvas.height / cr.height,
    w: br.width * canvas.width / cr.width,
    h: br.height * canvas.height / cr.height,
  };
}

function drawCluesDebugOverlay(tablet) {
  const debug = window.GodGames && GodGames.Debug;
  if (!debug || typeof debug.draw !== 'function' || (typeof debug.collecting === 'function' && !debug.collecting())) return;
  const items = [];
  if (tablet) items.push(Object.assign({ role: 'visual', center: false, label: 'clue tablet', alpha: 0.42 }, tablet));
  const backRect = domRectOnCanvas(document.getElementById('backBtn'));
  if (backRect) items.push(Object.assign({ role: 'hotspot', center: false, label: 'return button', alpha: 0.62 }, backRect));
  debug.draw(ctx, { game: 'clue-journal', items });
}

function wrap(text, maxW, maxLines) {
  ctx.save();
  const words = String(text).split(' ');
  const out = []; let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      if (maxLines && out.length >= maxLines - 1) {
        out.push((line + ' ...').trim());
        line = '';
        break;
      }
      out.push(line); line = w;
    }
    else line = test;
  }
  if (line) out.push(line);
  ctx.restore();
  return out;
}
function wrapAndDraw(text, x, y, maxW, lh, align, maxLines) {
  ctx.textAlign = align || 'left';
  const lines = wrap(text, maxW, maxLines);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
}

render();
</script>
</body>
