<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games — What you have learned</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04020a; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
  canvas { display: block; }
  #backBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; background: rgba(212,175,55,0.10); border: 1px solid #D4AF37;
    color: #f0e8d0; font-family: monospace; font-size: 14px;
    letter-spacing: 0.15em; cursor: pointer; border-radius: 4px;
  }
  #backBtn:hover { background: rgba(212,175,55,0.22); transform: translateX(-50%) translateY(-1px); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="backBtn">RETURN TO THE WORLD  ↵</button>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// olympus-clues.html — the toad's secret journal. Reached by jumping onto
// the mushroom that appears at the base of Mt. Olympus when in toad form
// on the hub. Lists every clue earned + a masked riddle for the next.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

const GOLD = '#D4AF37';

document.getElementById('backBtn').addEventListener('click', () => { location.href = 'index.html'; });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 't' || e.key === 'T' || e.key === 'Enter') {
    location.href = 'index.html';
  }
});

// Mask a future-clue text into a vague riddle so we hint without spoiling.
// We keep the first few words intact (so it has a poetic shape) and replace
// the rest with em-dashes. Future clues earn their full text only after
// their mystery solves.
function maskRiddle(text) {
  if (!text) return '';
  const words = text.split(' ');
  const keep = Math.min(4, Math.max(2, Math.floor(words.length * 0.35)));
  const visible = words.slice(0, keep).join(' ');
  return visible + ' ——— ———— ————.';
}

function render() {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() / 1000;
  const tabW = Math.min(720, W * 0.82);
  const tabH = Math.min(440, H * 0.58);
  const tx = (W - tabW) / 2;
  const ty = Math.max(86, (H - tabH) * 0.52);

  // ── Backdrop: Mt. Olympus night sky ──────────────────────────────────
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#04071a');
  sky.addColorStop(0.55,'#0e1438');
  sky.addColorStop(1,   '#1a2654');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  // Stars
  for (let i = 0; i < 220; i++) {
    const sx = ((i * 137) % W);
    const sy = (((i * 89) % (H * 0.55)));
    const b = Math.sin(t * 1.6 + i) * 0.35 + 0.65;
    ctx.globalAlpha = b * 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Distant mountains silhouette
  ctx.fillStyle = 'rgba(20,26,58,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.78);
  const mpts = [[0,0.78],[0.10,0.62],[0.22,0.70],[0.34,0.55],[0.46,0.65],[0.58,0.58],[0.70,0.66],[0.82,0.56],[0.95,0.66],[1,0.72]];
  for (const [px, py] of mpts) ctx.lineTo(px * W, py * H);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  // Central peak — Olympus itself. Kept low and subdued so the clue tablet
  // reads as the foreground object across desktop and mobile viewports.
  ctx.fillStyle = 'rgba(42,50,88,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.30, H);
  ctx.lineTo(W * 0.45, H * 0.70);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.55, H * 0.70);
  ctx.lineTo(W * 0.70, H);
  ctx.closePath(); ctx.fill();
  // Snowcap
  ctx.fillStyle = 'rgba(245,248,255,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.465, H * 0.59);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.535, H * 0.59);
  ctx.lineTo(W * 0.518, H * 0.63);
  ctx.lineTo(W * 0.50, H * 0.59);
  ctx.lineTo(W * 0.482, H * 0.63);
  ctx.closePath(); ctx.fill();
  // Aura at the summit
  const aura = ctx.createRadialGradient(W * 0.5, H * 0.52, 4, W * 0.5, H * 0.52, H * 0.18);
  aura.addColorStop(0,   `rgba(255,240,180,${0.32 + Math.sin(t * 2) * 0.08})`);
  aura.addColorStop(0.4, `rgba(212,175,55,0.12)`);
  aura.addColorStop(1,   'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, W, H);

  // ── Stone tablet: clues earned ───────────────────────────────────────

  // Tablet background
  ctx.save();
  ctx.fillStyle = 'rgba(8,7,7,0.96)';
  ctx.beginPath(); ctx.roundRect(tx, ty, tabW, tabH, 12); ctx.fill();
  ctx.fillStyle = 'rgba(30,24,16,0.72)';
  ctx.beginPath(); ctx.roundRect(tx + 8, ty + 8, tabW - 16, tabH - 16, 8); ctx.fill();
  ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5;
  ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.roundRect(tx, ty, tabW, tabH, 12); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Title
  ctx.save();
  ctx.textAlign = 'center';
  const titleSize = Math.max(18, Math.min(26, tabW / 16.5));
  ctx.font = `bold ${titleSize}px serif`;
  ctx.fillStyle = GOLD;
  ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
  ctx.fillText('WHAT YOU HAVE LEARNED', W / 2, ty + titleSize + 12);
  ctx.shadowBlur = 0;
  ctx.font = 'italic 14px serif';
  ctx.fillStyle = 'rgba(220,200,150,0.7)';
  ctx.fillText('the toad sees what the human cannot', W / 2, ty + titleSize + 34);
  ctx.restore();

  // Clues earned — list them
  const M = window.GodGames && window.GodGames.Mysteries;
  const earned = M ? M.revealedClues() : [];
  const next   = M ? M.nextRiddle() : null;

  ctx.save();
  ctx.textAlign = 'left';
  let y = ty + 100;
  if (earned.length === 0) {
    ctx.font = 'italic 16px serif';
    ctx.fillStyle = 'rgba(240,230,200,0.78)';
    const empty = 'The toad sees only stone — no clues yet. Listen for whispers in the games.';
    wrapAndDraw(empty, tx + tabW / 2, y, tabW - 60, 22, 'center');
  } else {
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#ffd54a';
    ctx.fillText('CLUES EARNED', tx + 28, y);
    y += 22;
    ctx.font = '15px serif';
    ctx.fillStyle = 'rgba(240,230,200,0.95)';
    for (const c of earned) {
      // Bullet + clue text
      ctx.fillStyle = '#ffd54a';
      ctx.fillText('✦', tx + 28, y);
      ctx.fillStyle = 'rgba(240,230,200,0.92)';
      const lines = wrap(c.text, tabW - 80);
      lines.forEach((l, i) => ctx.fillText(l, tx + 50, y + i * 20));
      y += lines.length * 20 + 10;
    }
  }
  ctx.restore();

  // What remains — masked next riddle
  if (next && earned.length > 0) {
    ctx.save();
    ctx.textAlign = 'left';
    const rY = ty + tabH - 100;
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = '#cc88ff';
    ctx.fillText('WHAT REMAINS', tx + 28, rY);
    ctx.font = 'italic 14px serif';
    ctx.fillStyle = 'rgba(204,136,255,0.85)';
    const masked = maskRiddle(next.text);
    wrapAndDraw(masked, tx + 28, rY + 22, tabW - 56, 20, 'left');
    ctx.restore();
  } else if (earned.length >= 4) {
    // All chain clues earned — show the call-to-action.
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#ff88cc';
    ctx.shadowColor = '#ff88cc'; ctx.shadowBlur = 6;
    wrapAndDraw('SPEAK THE KING\'S NAME ON THE MOUNTAIN', W / 2, ty + tabH - 64, tabW - 56, 18, 'center');
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Footer hint
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(180,180,180,0.55)';
  ctx.fillText('press T or ESC to return to the world', W / 2, Math.min(H - 96, ty + tabH + 34));
  ctx.restore();

  requestAnimationFrame(render);
}

function wrap(text, maxW) {
  ctx.save();
  const words = String(text).split(' ');
  const out = []; let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) { out.push(line); line = w; }
    else line = test;
  }
  if (line) out.push(line);
  ctx.restore();
  return out;
}
function wrapAndDraw(text, x, y, maxW, lh, align) {
  ctx.textAlign = align || 'left';
  const lines = wrap(text, maxW);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
}

render();
</script>
</body>
</html>
