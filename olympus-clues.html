<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games — What you have learned</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04020a; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
  canvas { display: block; }
  #backBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; background: rgba(212,175,55,0.10); border: 1px solid #D4AF37;
    color: #f0e8d0; font-family: monospace; font-size: 14px;
    letter-spacing: 0.15em; cursor: pointer; border-radius: 4px;
  }
  #backBtn:hover { background: rgba(212,175,55,0.22); transform: translateX(-50%) translateY(-1px); }
  body.manga-mode #backBtn {
    background:#D4AF37;
    border:3px solid #0a0a0a;
    color:#0a0a0a;
    border-radius:4px;
    box-shadow:6px 6px 0 rgba(0,0,0,0.48);
    font-weight:bold;
  }
  body.manga-mode #backBtn:hover {
    background:#fff1b8;
    transform:translateX(-50%) translateY(-1px);
    box-shadow:7px 8px 0 rgba(0,0,0,0.48);
  }
  @media (max-height: 460px) {
    #backBtn {
      bottom: 12px;
      padding: 8px 20px;
      font-size: 12px;
      letter-spacing: 0.12em;
    }
    body.manga-mode #backBtn {
      border-width: 2px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.48);
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="backBtn">RETURN TO THE WORLD  ↵</button>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// olympus-clues.html — the mystery archive reached from the first hidden
// hub trigger. It reads the current mythic omen and stores uncovered signs.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!MANGA_ON) render();
});

const GOLD = '#D4AF37';
const MANGA_ON = localStorage.getItem('godgames_manga') === '1';
document.body.classList.toggle('manga-mode', MANGA_ON);

document.getElementById('backBtn').addEventListener('click', () => { location.href = 'index.html'; });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 't' || e.key === 'T' || e.key === 'Enter') {
    location.href = 'index.html';
  }
});

function render() {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() / 1000;
  const art = window.GodGames && GodGames.MangaArt;
  drawClueBackdrop(W, H, t, art);

  // Journal state — current omen, uncovered fragments, and early finds.
  const M = window.GodGames && window.GodGames.Mysteries;
  const journal = M && typeof M.journalState === 'function'
    ? M.journalState()
    : { earned: [], early: [], current: null, future: null, complete: false, codeword: 'ZEUS' };
  const current = journal.current || (!journal.complete ? journal.prologue : null);
  const wordReady = wordAssembled(journal);
  const layout = journalLayout(W, H);

  drawJournalSurface(layout.board, art, t);
  drawJournalHeader(layout, journal, art, wordReady);
  drawSealStrip(layout.seals, journal);
  drawCurrentOmenPanel(layout.active, journal, current, layout, wordReady);
  drawRecoveredMarks(layout.marks, journal, layout);
  drawJournalFooter(layout, journal, wordReady);

  drawCluesDebugOverlay(layout.board);

  if (MANGA_ON) requestAnimationFrame(render);
}

function drawClueBackdrop(W, H, t, art) {
  const mangaBackdrop = MANGA_ON && art && typeof art.drawScene === 'function'
    && art.drawScene(ctx, 'clues', 0, 0, W, H, { focusX: 0.56, focusY: 0.50 });
  if (mangaBackdrop) {
    if (art.overlay) art.overlay(ctx, W, H, {
      top: 'rgba(0,0,0,0.12)',
      mid: 'rgba(0,0,0,0.06)',
      bottom: 'rgba(0,0,0,0.74)',
    });
    if (art.mangaAtmosphere) art.mangaAtmosphere(ctx, W, H, { halftoneAlpha: 0.10, scanAlpha: 0.08, vignette: 0.54 });
    return;
  }

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#04071a');
  sky.addColorStop(0.55, '#0e1438');
  sky.addColorStop(1, '#1a2654');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < 220; i++) {
    const sx = ((i * 137) % W);
    const sy = (((i * 89) % (H * 0.55)));
    const b = Math.sin(t * 1.6 + i) * 0.35 + 0.65;
    ctx.globalAlpha = b * 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.fillStyle = 'rgba(20,26,58,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.78);
  const mpts = [[0,0.78],[0.10,0.62],[0.22,0.70],[0.34,0.55],[0.46,0.65],[0.58,0.58],[0.70,0.66],[0.82,0.56],[0.95,0.66],[1,0.72]];
  for (const [px, py] of mpts) ctx.lineTo(px * W, py * H);
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(42,50,88,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.30, H);
  ctx.lineTo(W * 0.45, H * 0.70);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.55, H * 0.70);
  ctx.lineTo(W * 0.70, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = 'rgba(245,248,255,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.465, H * 0.59);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.535, H * 0.59);
  ctx.lineTo(W * 0.518, H * 0.63);
  ctx.lineTo(W * 0.50, H * 0.59);
  ctx.lineTo(W * 0.482, H * 0.63);
  ctx.closePath();
  ctx.fill();

  const aura = ctx.createRadialGradient(W * 0.5, H * 0.52, 4, W * 0.5, H * 0.52, H * 0.18);
  aura.addColorStop(0, `rgba(255,240,180,${0.32 + Math.sin(t * 2) * 0.08})`);
  aura.addColorStop(0.4, 'rgba(212,175,55,0.12)');
  aura.addColorStop(1, 'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, W, H);
}

function journalLayout(W, H) {
  const side = Math.max(14, Math.min(50, W * 0.045));
  const bottomReserve = H < 460 ? 78 : 108;
  const boardW = Math.max(320, Math.min(1080, W - side * 2));
  const boardH = Math.max(270, Math.min(620, H - bottomReserve - 20));
  const boardX = (W - boardW) / 2;
  const boardY = Math.max(14, Math.min(66, (H - boardH - bottomReserve) * 0.48));
  const compact = boardW < 820 || boardH < 430;
  const veryShort = boardH < 340;
  const pad = veryShort ? 14 : (compact ? 18 : 28);
  const gap = veryShort ? 8 : 16;
  const headerH = veryShort ? 54 : (compact ? 70 : 88);
  const footerH = veryShort ? 0 : 26;
  const innerX = boardX + pad;
  const innerY = boardY + pad;
  const innerW = boardW - pad * 2;
  const innerH = boardH - pad * 2;
  const header = { x: innerX, y: innerY, w: innerW, h: headerH };
  const sealW = Math.min(compact ? 122 : 176, innerW * 0.36);
  const seals = {
    x: header.x + header.w - sealW,
    y: header.y + (veryShort ? 4 : 10),
    w: sealW,
    h: veryShort ? 30 : 38,
  };
  const bodyY = header.y + headerH + gap;
  const bodyH = Math.max(120, innerY + innerH - bodyY - footerH - (footerH ? gap : 0));

  if (compact) {
    const marksH = Math.max(veryShort ? 46 : 78, Math.min(veryShort ? 56 : 128, bodyH * (veryShort ? 0.24 : 0.34)));
    const activeH = Math.max(106, bodyH - marksH - gap);
    return {
      board: { x: boardX, y: boardY, w: boardW, h: boardH },
      header,
      seals,
      active: { x: innerX, y: bodyY, w: innerW, h: activeH },
      marks: { x: innerX, y: bodyY + activeH + gap, w: innerW, h: Math.max(42, bodyH - activeH - gap) },
      footer: { x: innerX, y: innerY + innerH - footerH, w: innerW, h: footerH },
      compact,
      veryShort,
    };
  }

  const marksW = Math.min(342, Math.max(292, innerW * 0.34));
  const activeW = innerW - marksW - gap;
  return {
    board: { x: boardX, y: boardY, w: boardW, h: boardH },
    header,
    seals,
    active: { x: innerX, y: bodyY, w: activeW, h: bodyH },
    marks: { x: innerX + activeW + gap, y: bodyY, w: marksW, h: bodyH },
    footer: { x: innerX, y: innerY + innerH - footerH, w: innerW, h: footerH },
    compact,
    veryShort,
  };
}

function drawJournalSurface(board, art, t) {
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, board.x, board.y, board.w, board.h, {
      paper: 'rgba(239,229,199,0.97)',
      bottom: 'rgba(164,145,108,0.96)',
      accent: GOLD,
      lineWidth: 3.4,
      toneAlpha: 0.07,
      shadow: 'rgba(0,0,0,0.50)',
    });
  } else {
    ctx.fillStyle = 'rgba(8,7,7,0.95)';
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.w, board.h, 10);
    ctx.fill();
    const inner = ctx.createLinearGradient(0, board.y, 0, board.y + board.h);
    inner.addColorStop(0, 'rgba(48,38,24,0.90)');
    inner.addColorStop(1, 'rgba(16,11,17,0.94)');
    ctx.fillStyle = inner;
    ctx.beginPath();
    ctx.roundRect(board.x + 7, board.y + 7, board.w - 14, board.h - 14, 7);
    ctx.fill();
    ctx.strokeStyle = GOLD;
    ctx.lineWidth = 1.35;
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(board.x, board.y, board.w, board.h, 10);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha = MANGA_ON ? 0.10 : 0.09;
  ctx.strokeStyle = MANGA_ON ? '#0a0a0a' : GOLD;
  ctx.lineWidth = 1;
  const cx = board.x + board.w * 0.56;
  const cy = board.y + board.h * 0.52;
  for (let i = 0; i < 5; i++) {
    const a = t * 0.05 + i * Math.PI * 0.42;
    const r = board.w * (0.13 + i * 0.045);
    ctx.beginPath();
    ctx.ellipse(cx, cy, r, r * 0.42, a, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = MANGA_ON ? 0.16 : 0.12;
  ctx.beginPath();
  ctx.moveTo(board.x + 24, board.y + 98);
  ctx.lineTo(board.x + board.w - 24, board.y + 98);
  ctx.stroke();
  ctx.restore();
}

function drawJournalHeader(layout, journal, art, wordReady) {
  const h = layout.header;
  const titleSize = layout.veryShort ? 18 : (layout.compact ? 23 : 31);
  const kickerFont = `bold ${layout.veryShort ? 9 : 10}px monospace`;
  const subtitleFont = `${MANGA_ON ? 'bold' : 'italic'} ${layout.veryShort ? 10 : 12}px ${MANGA_ON ? 'monospace' : 'serif'}`;
  const titleMaxW = Math.max(120, layout.seals.x - h.x - 16);
  const title = 'THE MOUNTAIN ARCHIVE';
  const titleY = h.y + (layout.veryShort ? 34 : 43);

  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = kickerFont;
  ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
  ctx.fillText('WHAT YOU HAVE LEARNED', h.x, h.y + 12);
  if (MANGA_ON && art && art.inkText) {
    const fitted = fitText(title, `900 ${titleSize}px "Impact", "Arial Black", sans-serif`, titleMaxW, titleSize, 15);
    art.inkText(ctx, title, h.x, titleY, {
      align: 'left',
      font: `900 ${fitted.size}px "Impact", "Arial Black", sans-serif`,
      fill: '#fff1b8',
      shadow: GOLD,
      shadowBlur: 5,
      strokeWidth: layout.veryShort ? 2.6 : 3.6,
    });
  } else {
    const fitted = fitText(title, `bold ${titleSize}px serif`, titleMaxW, titleSize, 15);
    ctx.font = `bold ${fitted.size}px serif`;
    ctx.fillStyle = GOLD;
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = 8;
    ctx.fillText(title, h.x, titleY);
    ctx.shadowBlur = 0;
  }
  if (!layout.veryShort) {
    ctx.font = subtitleFont;
    ctx.fillStyle = MANGA_ON ? 'rgba(35,22,12,0.76)' : 'rgba(230,210,160,0.72)';
    const subtitle = wordReady
      ? 'four recovered marks now read as one name'
      : 'each mark appears only when its myth answers back';
    ctx.fillText(ellipsize(subtitle, titleMaxW), h.x, h.y + h.h - 10);
  }
  ctx.restore();
}

function drawSealStrip(rect, journal) {
  const code = String(journal.codeword || 'ZEUS').toUpperCase().split('');
  const earned = earnedLetterSet(journal);
  const gap = rect.w < 140 ? 6 : 8;
  const slot = Math.min(rect.h, (rect.w - gap * (code.length - 1)) / Math.max(1, code.length));
  const startX = rect.x + rect.w - (slot * code.length + gap * (code.length - 1));
  ctx.save();
  for (let i = 0; i < code.length; i++) {
    const letter = code[i];
    const known = earned.has(letter);
    const x = startX + i * (slot + gap);
    const y = rect.y + (rect.h - slot) / 2;
    drawSealSlot(x, y, slot, letter, known);
  }
  ctx.restore();
}

function drawSealSlot(x, y, size, letter, known) {
  ctx.save();
  ctx.fillStyle = known
    ? (MANGA_ON ? '#fff1b8' : 'rgba(212,175,55,0.18)')
    : (MANGA_ON ? 'rgba(255,248,220,0.24)' : 'rgba(0,0,0,0.22)');
  ctx.strokeStyle = known ? GOLD : (MANGA_ON ? 'rgba(10,10,10,0.34)' : 'rgba(212,175,55,0.28)');
  ctx.lineWidth = known ? 1.8 : 1;
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, 5);
  ctx.fill();
  ctx.stroke();
  if (known) {
    ctx.font = `bold ${Math.max(12, size * 0.52)}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = MANGA_ON ? '#0a0a0a' : GOLD;
    ctx.fillText(letter, x + size / 2, y + size * 0.67);
  } else {
    ctx.globalAlpha *= 0.46;
    ctx.strokeStyle = MANGA_ON ? '#0a0a0a' : GOLD;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + size * 0.36, y + size * 0.50);
    ctx.lineTo(x + size * 0.64, y + size * 0.50);
    ctx.stroke();
  }
  ctx.restore();
}

function drawCurrentOmenPanel(rect, journal, current, layout, wordReady) {
  const active = wordReady ? finalArchiveEntry(journal) : archiveViewForClue(current || journal.prologue || {});
  drawSoftPanel(rect, { accent: wordReady ? '#8f204f' : GOLD });
  clipRect(rect, () => {
    const pad = layout.veryShort ? 14 : 20;
    const x = rect.x + pad;
    const w = rect.w - pad * 2;
    let y = rect.y + (layout.veryShort ? 24 : 32);
    const titleSize = layout.veryShort ? 17 : (layout.compact ? 21 : 26);
    const bodySize = layout.veryShort ? 13 : (layout.compact ? 15 : 17);
    const noteSize = layout.compact ? 10 : 11;
    const kicker = wordReady ? 'THE NAME IS WHOLE' : [active.realm, active.actionVerb].filter(Boolean).join(' / ').toUpperCase();

    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = `bold ${layout.veryShort ? 9 : 10}px monospace`;
    ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
    ctx.fillText(ellipsize(kicker || 'CURRENT INSCRIPTION', w), x, y);
    y += layout.veryShort ? 19 : 25;

    const titleFontBase = MANGA_ON ? `900 ${titleSize}px Georgia, serif` : `bold ${titleSize}px serif`;
    const fittedTitle = fitText(active.title || 'AN OMEN', titleFontBase, w, titleSize, layout.veryShort ? 14 : 18);
    ctx.font = MANGA_ON ? `900 ${fittedTitle.size}px Georgia, serif` : `bold ${fittedTitle.size}px serif`;
    ctx.fillStyle = MANGA_ON ? '#0a0a0a' : '#f4e8c4';
    ctx.fillText(ellipsize(active.title || 'AN OMEN', w), x, y);
    y += fittedTitle.size + (layout.veryShort ? 8 : 11);

    const bodyFont = MANGA_ON ? `bold ${bodySize}px Georgia, serif` : `italic ${bodySize}px serif`;
    ctx.font = bodyFont;
    ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.94)';
    const noteReserve = layout.veryShort ? 0 : 42;
    const maxBodyLines = Math.max(1, Math.floor((rect.y + rect.h - pad - y - noteReserve) / (bodySize + 5)));
    y = drawTextBlock(active.riddle || active.text || '', x, y, w, bodySize + 5, maxBodyLines, bodyFont, ctx.fillStyle);

    if (!layout.veryShort) {
      y += 12;
      const noteFont = `bold ${noteSize}px monospace`;
      ctx.font = noteFont;
      ctx.fillStyle = MANGA_ON ? 'rgba(48,31,15,0.72)' : 'rgba(220,200,150,0.70)';
      const note = active.journalNudge || active.mythBasis || active.purpose || '';
      drawTextBlock(note, x, y, w, noteSize + 4, 2, noteFont, ctx.fillStyle);
    }
    ctx.restore();
  });
}

function drawRecoveredMarks(rect, journal, layout) {
  drawSoftPanel(rect, { accent: GOLD });
  clipRect(rect, () => {
    const earned = journal.earned || [];
    const pad = layout.veryShort ? 12 : 16;
    let y = rect.y + (layout.veryShort ? 21 : 28);
    const titleFont = `bold ${layout.veryShort ? 9 : 10}px monospace`;
    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = titleFont;
    ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.72)';
    ctx.fillText('RECOVERED MARKS', rect.x + pad, rect.y + (layout.veryShort ? 15 : 18));

    if (!earned.length) {
      const empty = 'No marks have been recovered yet. The first inscription points toward Icarus.';
      const font = MANGA_ON ? `bold ${layout.veryShort ? 12 : 14}px Georgia, serif` : `italic ${layout.veryShort ? 12 : 14}px serif`;
      ctx.fillStyle = MANGA_ON ? 'rgba(33,23,13,0.72)' : 'rgba(240,230,200,0.72)';
      drawTextBlock(empty, rect.x + pad, y + 6, rect.w - pad * 2, layout.veryShort ? 15 : 18, layout.veryShort ? 2 : 3, font, ctx.fillStyle);
      ctx.restore();
      return;
    }

    if (layout.compact) {
      drawCompactMarkStrip(rect, earned, layout, y);
      ctx.restore();
      return;
    }

    const visible = earned.slice(-4);
    const gap = 10;
    const rowH = Math.max(62, Math.min(94, (rect.y + rect.h - pad - y - gap * (visible.length - 1)) / visible.length));
    for (let i = 0; i < visible.length; i++) {
      drawMarkRow(rect.x + pad, y + i * (rowH + gap), rect.w - pad * 2, rowH, visible[i], layout);
    }
    ctx.restore();
  });
}

function drawCompactMarkStrip(rect, earned, layout, y) {
  const pad = layout.veryShort ? 12 : 16;
  const visible = earned.slice(-4);
  const gap = 8;
  const availableW = rect.w - pad * 2;
  const tileW = (availableW - gap * (visible.length - 1)) / Math.max(1, visible.length);
  const tileH = Math.max(26, rect.y + rect.h - y - pad);
  for (let i = 0; i < visible.length; i++) {
    drawMarkTile(rect.x + pad + i * (tileW + gap), y, tileW, tileH, visible[i], layout);
  }
}

function drawMarkRow(x, y, w, h, clue, layout) {
  const accent = clue.foundEarly ? '#cc88ff' : (clue.resolved ? '#84d68a' : GOLD);
  drawSoftPanel({ x, y, w, h }, { accent, subtle: true });
  clipRect({ x, y, w, h }, () => {
    const badge = Math.min(42, h - 20);
    drawLetterBadge(x + 12, y + 10, badge, clue.letter || '?', accent);
    const tx = x + 12 + badge + 12;
    const tw = w - (tx - x) - 12;
    let ty = y + 21;
    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
    const status = markStatusLabel(clue, false);
    ctx.fillText(ellipsize(status, tw), tx, ty);
    ty += 17;
    const bodyFont = MANGA_ON ? 'bold 13px Georgia, serif' : '13px serif';
    ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.88)';
    drawTextBlock(markSummary(clue), tx, ty, tw, 16, Math.max(1, Math.floor((y + h - ty - 8) / 16)), bodyFont, ctx.fillStyle);
    ctx.restore();
  });
}

function drawMarkTile(x, y, w, h, clue, layout) {
  const accent = clue.foundEarly ? '#cc88ff' : (clue.resolved ? '#84d68a' : GOLD);
  drawSoftPanel({ x, y, w, h }, { accent, subtle: true });
  clipRect({ x, y, w, h }, () => {
    const badge = Math.min(layout.veryShort ? 24 : 30, h - 10);
    drawLetterBadge(x + 8, y + (h - badge) / 2, badge, clue.letter || '?', accent);
    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = `bold ${layout.veryShort ? 9 : 10}px monospace`;
    ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
    const status = markStatusLabel(clue, true);
    ctx.fillText(ellipsize(status, w - badge - 22), x + badge + 16, y + h * 0.58);
    ctx.restore();
  });
}

function drawLetterBadge(x, y, size, letter, accent) {
  ctx.save();
  ctx.fillStyle = MANGA_ON ? '#fff6d6' : 'rgba(6,4,10,0.84)';
  ctx.strokeStyle = accent || GOLD;
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.roundRect(x, y, size, size, 5);
  ctx.fill();
  ctx.stroke();
  ctx.font = `bold ${Math.max(13, size * 0.56)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillStyle = MANGA_ON ? '#0a0a0a' : accent || GOLD;
  ctx.fillText(letter, x + size / 2, y + size * 0.68);
  ctx.restore();
}

function drawJournalFooter(layout, journal, wordReady) {
  if (layout.veryShort || !layout.footer.h) return;
  const f = layout.footer;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = MANGA_ON ? 'rgba(30,20,12,0.56)' : 'rgba(180,180,180,0.44)';
  let text = 'press T or ESC to return';
  if (wordReady) text = 'the summit waits for the name';
  else if (journal.future && (journal.earned || []).length > 0) text = 'more ink waits below the surface';
  ctx.fillText(ellipsize(text.toUpperCase(), f.w), f.x + f.w / 2, f.y + Math.max(14, f.h - 7));
  ctx.restore();
}

function drawSoftPanel(rect, opts = {}) {
  const accent = opts.accent || GOLD;
  ctx.save();
  ctx.fillStyle = opts.subtle
    ? (MANGA_ON ? 'rgba(255,248,220,0.24)' : 'rgba(0,0,0,0.18)')
    : (MANGA_ON ? 'rgba(255,248,220,0.32)' : 'rgba(0,0,0,0.24)');
  ctx.strokeStyle = MANGA_ON ? 'rgba(10,10,10,0.62)' : 'rgba(212,175,55,0.46)';
  ctx.lineWidth = opts.subtle ? 1 : 1.2;
  ctx.beginPath();
  ctx.roundRect(rect.x, rect.y, rect.w, rect.h, opts.subtle ? 6 : 8);
  ctx.fill();
  ctx.stroke();
  ctx.globalAlpha *= opts.subtle ? 0.48 : 0.64;
  ctx.strokeStyle = accent;
  ctx.beginPath();
  ctx.moveTo(rect.x + 12, rect.y + rect.h - 8);
  ctx.lineTo(rect.x + rect.w - 12, rect.y + rect.h - 8);
  ctx.stroke();
  ctx.restore();
}

function archiveViewForClue(clue) {
  if (!clue || clue.id !== 'clue.toad') return clue || {};
  return Object.assign({}, clue, {
    title: 'THE FIRST SIGN POINTS TO ICARUS',
    riddle: 'Begin with the boy of wax. Seek the middle path he refused, then rise until the golden eye starts to burn.',
    text: 'Begin with the boy of wax. Seek the middle path he refused, then rise until the golden eye starts to burn.',
    journalNudge: 'The clue is not in winning. It is in repeating the mistake Daedalus warned against.',
  });
}

function finalArchiveEntry(journal) {
  return {
    title: 'THE CIRCLE CLOSES ABOVE',
    realm: 'Olympus',
    actionVerb: 'return',
    riddle: 'A king\'s name is complete. It belongs where thunder gathers, above the roads and outside every arena.',
    journalNudge: 'No altar asks for it. At the summit, names are answered when they are given to the air.',
  };
}

function markSummary(clue) {
  if (!clue) return '';
  if (clue.foundEarly) return 'Recovered early; earlier signs still govern the route.';
  return clue.uncoveredText || clue.text || clue.riddle || '';
}

function markStatusLabel(clue, compact) {
  if (clue && clue.foundEarly) return compact ? 'EARLY' : 'EARLY MARK';
  return compact ? 'RECOVERED' : 'MARK RECOVERED';
}

function earnedLetterSet(journal) {
  const out = new Set();
  for (const clue of journal.earned || []) {
    if (clue && clue.letter) out.add(String(clue.letter).toUpperCase());
  }
  return out;
}

function wordAssembled(journal) {
  const letters = String(journal.codeword || 'ZEUS').toUpperCase().split('');
  const earned = earnedLetterSet(journal);
  return letters.length > 0 && letters.every(letter => earned.has(letter));
}

function clipRect(rect, fn) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(rect.x, rect.y, rect.w, rect.h);
  ctx.clip();
  fn();
  ctx.restore();
}

function drawTextBlock(text, x, y, maxW, lh, maxLines, font, fill) {
  ctx.save();
  ctx.font = font;
  ctx.fillStyle = fill;
  ctx.textAlign = 'left';
  const lines = wrap(text, maxW, maxLines);
  lines.forEach((line, i) => ctx.fillText(line, x, y + i * lh));
  ctx.restore();
  return y + lines.length * lh;
}

function fitText(text, font, maxW, maxSize, minSize) {
  const family = String(font).replace(/\b\d+(?:\.\d+)?px\b/, '__SIZE__px');
  let size = maxSize;
  ctx.save();
  while (size > minSize) {
    ctx.font = family.replace('__SIZE__', String(size));
    if (ctx.measureText(String(text || '')).width <= maxW) break;
    size -= 1;
  }
  ctx.restore();
  return { size };
}

function ellipsize(text, maxW) {
  const raw = String(text || '');
  if (ctx.measureText(raw).width <= maxW) return raw;
  let out = raw;
  while (out.length > 1 && ctx.measureText(out + '...').width > maxW) out = out.slice(0, -1);
  return out.trim() + '...';
}

function domRectOnCanvas(el) {
  if (!el) return null;
  const cr = canvas.getBoundingClientRect();
  const br = el.getBoundingClientRect();
  if (!cr.width || !cr.height || !br.width || !br.height) return null;
  return {
    x: (br.left - cr.left) * canvas.width / cr.width,
    y: (br.top - cr.top) * canvas.height / cr.height,
    w: br.width * canvas.width / cr.width,
    h: br.height * canvas.height / cr.height,
  };
}

function drawCluesDebugOverlay(tablet) {
  const debug = window.GodGames && GodGames.Debug;
  if (!debug || typeof debug.draw !== 'function' || (typeof debug.collecting === 'function' && !debug.collecting())) return;
  const items = [];
  if (tablet) items.push(Object.assign({ role: 'visual', center: false, label: 'clue tablet', alpha: 0.42 }, tablet));
  const backRect = domRectOnCanvas(document.getElementById('backBtn'));
  if (backRect) items.push(Object.assign({ role: 'hotspot', center: false, label: 'return button', alpha: 0.62 }, backRect));
  debug.draw(ctx, { game: 'clue-journal', items });
}

function wrap(text, maxW, maxLines) {
  ctx.save();
  const words = String(text || '').trim().split(/\s+/).filter(Boolean);
  const out = [];
  let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      if (maxLines && out.length >= maxLines - 1) {
        out.push(ellipsize(line, maxW));
        ctx.restore();
        return out;
      }
      out.push(line);
      line = ctx.measureText(w).width > maxW ? ellipsize(w, maxW) : w;
    } else if (ctx.measureText(test).width > maxW) {
      if (maxLines && out.length >= maxLines - 1) {
        out.push(ellipsize(test, maxW));
        ctx.restore();
        return out;
      }
      out.push(ellipsize(test, maxW));
      line = '';
    } else {
      line = test;
    }
  }
  if (line && (!maxLines || out.length < maxLines)) out.push(line);
  ctx.restore();
  return out;
}
function wrapAndDraw(text, x, y, maxW, lh, align, maxLines) {
  ctx.textAlign = align || 'left';
  const lines = wrap(text, maxW, maxLines);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
}

render();
</script>
</body>
