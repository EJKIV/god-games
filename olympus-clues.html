<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games — What you have learned</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04020a; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
  canvas { display: block; }
  #backBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; background: rgba(212,175,55,0.10); border: 1px solid #D4AF37;
    color: #f0e8d0; font-family: monospace; font-size: 14px;
    letter-spacing: 0.15em; cursor: pointer; border-radius: 4px;
  }
  #backBtn:hover { background: rgba(212,175,55,0.22); transform: translateX(-50%) translateY(-1px); }
  body.manga-mode #backBtn {
    background:#D4AF37;
    border:3px solid #0a0a0a;
    color:#0a0a0a;
    border-radius:4px;
    box-shadow:6px 6px 0 rgba(0,0,0,0.48);
    font-weight:bold;
  }
  body.manga-mode #backBtn:hover {
    background:#fff1b8;
    transform:translateX(-50%) translateY(-1px);
    box-shadow:7px 8px 0 rgba(0,0,0,0.48);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="backBtn">RETURN TO THE WORLD  ↵</button>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// olympus-clues.html — the toad's secret journal. Reached by jumping onto
// the mushroom that appears at the base of Mt. Olympus when in toad form
// on the hub. Interprets the current mythic omen and stores uncovered clues.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  if (!MANGA_ON) render();
});

const GOLD = '#D4AF37';
const MANGA_ON = localStorage.getItem('godgames_manga') === '1';
document.body.classList.toggle('manga-mode', MANGA_ON);

document.getElementById('backBtn').addEventListener('click', () => { location.href = 'index.html'; });
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 't' || e.key === 'T' || e.key === 'Enter') {
    location.href = 'index.html';
  }
});

function render() {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() / 1000;
  const tabW = Math.min(760, W * 0.86);
  const tabH = Math.min(520, H * 0.66);
  const tx = (W - tabW) / 2;
  const ty = Math.max(72, Math.min((H - tabH) * 0.48, H - tabH - 96));

  const art = window.GodGames && GodGames.MangaArt;
  const mangaBackdrop = MANGA_ON && art && typeof art.drawScene === 'function'
    && art.drawScene(ctx, 'clues', 0, 0, W, H, { focusX: 0.56, focusY: 0.50 });
  if (mangaBackdrop) {
    if (art.overlay) art.overlay(ctx, W, H, {
      top: 'rgba(0,0,0,0.12)',
      mid: 'rgba(0,0,0,0.06)',
      bottom: 'rgba(0,0,0,0.74)',
    });
    if (art.mangaAtmosphere) art.mangaAtmosphere(ctx, W, H, { halftoneAlpha: 0.10, scanAlpha: 0.08, vignette: 0.54 });
  }

  // ── Backdrop: Mt. Olympus night sky ──────────────────────────────────
  if (!mangaBackdrop) {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0,   '#04071a');
  sky.addColorStop(0.55,'#0e1438');
  sky.addColorStop(1,   '#1a2654');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
  // Stars
  for (let i = 0; i < 220; i++) {
    const sx = ((i * 137) % W);
    const sy = (((i * 89) % (H * 0.55)));
    const b = Math.sin(t * 1.6 + i) * 0.35 + 0.65;
    ctx.globalAlpha = b * 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // Distant mountains silhouette
  ctx.fillStyle = 'rgba(20,26,58,0.85)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.78);
  const mpts = [[0,0.78],[0.10,0.62],[0.22,0.70],[0.34,0.55],[0.46,0.65],[0.58,0.58],[0.70,0.66],[0.82,0.56],[0.95,0.66],[1,0.72]];
  for (const [px, py] of mpts) ctx.lineTo(px * W, py * H);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();
  // Central peak — Olympus itself. Kept low and subdued so the clue tablet
  // reads as the foreground object across desktop and mobile viewports.
  ctx.fillStyle = 'rgba(42,50,88,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.30, H);
  ctx.lineTo(W * 0.45, H * 0.70);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.55, H * 0.70);
  ctx.lineTo(W * 0.70, H);
  ctx.closePath(); ctx.fill();
  // Snowcap
  ctx.fillStyle = 'rgba(245,248,255,0.58)';
  ctx.beginPath();
  ctx.moveTo(W * 0.465, H * 0.59);
  ctx.lineTo(W * 0.50, H * 0.52);
  ctx.lineTo(W * 0.535, H * 0.59);
  ctx.lineTo(W * 0.518, H * 0.63);
  ctx.lineTo(W * 0.50, H * 0.59);
  ctx.lineTo(W * 0.482, H * 0.63);
  ctx.closePath(); ctx.fill();
  // Aura at the summit
  const aura = ctx.createRadialGradient(W * 0.5, H * 0.52, 4, W * 0.5, H * 0.52, H * 0.18);
  aura.addColorStop(0,   `rgba(255,240,180,${0.32 + Math.sin(t * 2) * 0.08})`);
  aura.addColorStop(0.4, `rgba(212,175,55,0.12)`);
  aura.addColorStop(1,   'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.fillRect(0, 0, W, H);
  }

  // ── Stone tablet: clues earned ───────────────────────────────────────

  // Tablet background
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, tx, ty, tabW, tabH, {
      paper: 'rgba(238,228,198,0.96)',
      bottom: 'rgba(164,148,116,0.96)',
      accent: GOLD,
      lineWidth: 4.5,
      toneAlpha: 0.16,
      shadow: 'rgba(0,0,0,0.58)',
    });
    ctx.save();
    ctx.strokeStyle = 'rgba(10,10,10,0.32)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tx + 26, ty + 74);
    ctx.lineTo(tx + tabW - 26, ty + 74);
    ctx.stroke();
    ctx.restore();
  } else {
    ctx.save();
    ctx.fillStyle = 'rgba(8,7,7,0.96)';
    ctx.beginPath(); ctx.roundRect(tx, ty, tabW, tabH, 12); ctx.fill();
    ctx.fillStyle = 'rgba(30,24,16,0.72)';
    ctx.beginPath(); ctx.roundRect(tx + 8, ty + 8, tabW - 16, tabH - 16, 8); ctx.fill();
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5;
    ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.roundRect(tx, ty, tabW, tabH, 12); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Title
  ctx.save();
  ctx.textAlign = 'center';
  const titleSize = Math.max(18, Math.min(26, tabW / 16.5));
  if (MANGA_ON && art && art.inkText) {
    art.inkText(ctx, 'WHAT YOU HAVE LEARNED', W / 2, ty + titleSize + 12, {
      font: `900 ${titleSize + 3}px "Impact", "Arial Black", sans-serif`,
      fill: '#fff1b8',
      shadow: GOLD,
      shadowBlur: 8,
      strokeWidth: 4.5,
    });
  } else {
    ctx.font = `bold ${titleSize}px serif`;
    ctx.fillStyle = GOLD;
    ctx.shadowColor = GOLD; ctx.shadowBlur = 10;
    ctx.fillText('WHAT YOU HAVE LEARNED', W / 2, ty + titleSize + 12);
    ctx.shadowBlur = 0;
  }
  ctx.font = MANGA_ON ? 'bold 14px monospace' : 'italic 14px serif';
  ctx.fillStyle = MANGA_ON ? '#2f2114' : 'rgba(220,200,150,0.7)';
  ctx.fillText('the toad sees what the human cannot', W / 2, ty + titleSize + 34);
  ctx.restore();

  if (MANGA_ON && art && art.drawSharedWalker) {
    art.drawSharedWalker(ctx, {
      x: tx + tabW - 74,
      y: ty + 104,
      facing: -1,
      walkPhase: t * 4.2,
      vx: 40,
      form: 'toad',
    }, { scale: 0.78, shadowAlpha: 0.28 });
  }

  // Journal state — current omen, uncovered fragments, and early finds.
  const M = window.GodGames && window.GodGames.Mysteries;
  const journal = M && typeof M.journalState === 'function'
    ? M.journalState()
    : { earned: [], early: [], current: null, future: null, complete: false, codeword: 'ZEUS' };
  const current = journal.current || journal.prologue || null;
  const earned = journal.earned || [];

  ctx.save();
  ctx.textAlign = 'left';
  let y = ty + 100;

  if (current) {
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = MANGA_ON ? '#6d3f14' : '#ffd54a';
    ctx.fillText(current.id === 'clue.toad' ? 'FIRST OMEN' : 'CURRENT OMEN', tx + 28, y);
    y += 20;
    y = drawJournalBox({
      x: tx + 24,
      y: y - 12,
      w: tabW - 48,
      title: current.title || 'AN OMEN',
      kicker: current.realm ? String(current.realm).toUpperCase() : '',
      body: current.riddle || current.text || '',
      note: current.journalNudge || current.mythBasis || '',
      accent: current.id === 'clue.toad' ? GOLD : (current.foundEarly ? '#cc88ff' : GOLD),
      maxBodyLines: earned.length ? 2 : 3,
      maxNoteLines: earned.length ? 1 : 2,
    }) + 10;
  } else {
    ctx.font = MANGA_ON ? 'bold 16px Georgia, serif' : 'italic 16px serif';
    ctx.fillStyle = MANGA_ON ? '#2f2114' : 'rgba(240,230,200,0.78)';
    wrapAndDraw('The toad has no omen left to read.', tx + tabW / 2, y, tabW - 60, 22, 'center');
    y += 36;
  }

  if (earned.length > 0) {
    ctx.font = 'bold 12px monospace';
    ctx.fillStyle = MANGA_ON ? '#0a0a0a' : '#ffd54a';
    ctx.fillText('FRAGMENTS UNCOVERED', tx + 28, y);
    y += 22;
    const available = Math.max(56, ty + tabH - 118 - y);
    const maxRows = Math.max(1, Math.min(4, Math.floor(available / 72)));
    const visible = earned.slice(Math.max(0, earned.length - maxRows));
    for (const c of visible) {
      const status = c.foundEarly ? 'FOUND EARLY' : (c.resolved ? 'FULFILLED' : 'ACTIVE');
      const head = `${c.letter || '?'} / ${String(c.realm || c.targetGame || '').toUpperCase()} / ${status}`;
      const body = c.foundEarly
        ? 'A later fragment has surfaced before its omen. The toad keeps it, but the path still begins earlier.'
        : (c.uncoveredText || c.text || '');
      y = drawMiniEntry(tx + 26, y - 8, tabW - 52, head, body, c.foundEarly ? '#cc88ff' : GOLD) + 8;
    }
    if (earned.length > visible.length) {
      ctx.font = 'bold 11px monospace';
      ctx.fillStyle = MANGA_ON ? 'rgba(30,20,12,0.66)' : 'rgba(240,230,200,0.58)';
      ctx.fillText(`${earned.length - visible.length} older fragment(s) are carved higher on the stone`, tx + 28, y + 4);
    }
  } else if (current) {
    ctx.font = MANGA_ON ? 'bold 14px Georgia, serif' : 'italic 14px serif';
    ctx.fillStyle = MANGA_ON ? '#2f2114' : 'rgba(240,230,200,0.78)';
    wrapAndDraw(current.purpose || 'The first clue is a direction, not a reward.', tx + 28, y, tabW - 56, 20, 'left');
  }
  ctx.restore();

  // What remains — purpose and final invocation.
  if (journal.complete && !journal.current) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = MANGA_ON ? '#8f204f' : '#ff88cc';
    ctx.shadowColor = '#ff88cc'; ctx.shadowBlur = MANGA_ON ? 0 : 6;
    wrapAndDraw(`SPEAK ${journal.codeword || 'ZEUS'} ON THE MOUNTAIN`, W / 2, ty + tabH - 64, tabW - 56, 18, 'center');
    ctx.shadowBlur = 0;
    ctx.restore();
  } else if (journal.future && earned.length > 0) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'italic 13px Georgia, serif';
    ctx.fillStyle = MANGA_ON ? 'rgba(67,32,79,0.82)' : 'rgba(204,136,255,0.78)';
    wrapAndDraw('A lower mark is still sealed. Answer the current omen before the stone will read it clearly.', W / 2, ty + tabH - 66, tabW - 70, 18, 'center');
    ctx.restore();
  }

  // Footer hint
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = '11px monospace';
  ctx.fillStyle = MANGA_ON ? 'rgba(30,20,12,0.70)' : 'rgba(180,180,180,0.55)';
  ctx.fillText('press T or ESC to return to the world', W / 2, Math.min(H - 96, ty + tabH + 34));
  ctx.restore();

  drawCluesDebugOverlay({ x: tx, y: ty, w: tabW, h: tabH });

  if (MANGA_ON) requestAnimationFrame(render);
}

function drawJournalBox(opts) {
  const art = window.GodGames && GodGames.MangaArt;
  const x = opts.x, y = opts.y, w = opts.w;
  const bodyLines = linesFor(opts.body || '', w - 34, MANGA_ON ? 'bold 15px Georgia, serif' : 'italic 15px serif', opts.maxBodyLines || 3);
  const noteLines = linesFor(opts.note || '', w - 34, '12px monospace', opts.maxNoteLines || 2);
  const boxH = 56 + bodyLines.length * 19 + (noteLines.length ? 12 + noteLines.length * 15 : 0);
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, x, y, w, boxH, {
      paper: 'rgba(255,248,220,0.82)',
      bottom: 'rgba(214,196,152,0.80)',
      accent: opts.accent || GOLD,
      lineWidth: 2.8,
      toneAlpha: 0.08,
      shadow: 'rgba(0,0,0,0.24)',
    });
  } else {
    ctx.fillStyle = 'rgba(18,12,18,0.62)';
    ctx.beginPath(); ctx.roundRect(x, y, w, boxH, 8); ctx.fill();
    ctx.strokeStyle = opts.accent || GOLD;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  ctx.textAlign = 'left';
  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = MANGA_ON ? '#6d3f14' : 'rgba(255,213,74,0.78)';
  ctx.fillText(opts.kicker || '', x + 17, y + 21);
  ctx.font = MANGA_ON ? '900 17px Georgia, serif' : 'bold 17px serif';
  ctx.fillStyle = MANGA_ON ? '#0a0a0a' : '#f4e8c4';
  ctx.fillText(opts.title || 'AN OMEN', x + 17, y + 41);
  ctx.font = MANGA_ON ? 'bold 15px Georgia, serif' : 'italic 15px serif';
  ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.92)';
  bodyLines.forEach((line, i) => ctx.fillText(line, x + 17, y + 66 + i * 19));
  if (noteLines.length) {
    ctx.font = '12px monospace';
    ctx.fillStyle = MANGA_ON ? 'rgba(48,31,15,0.78)' : 'rgba(220,200,150,0.72)';
    noteLines.forEach((line, i) => ctx.fillText(line, x + 17, y + 66 + bodyLines.length * 19 + 12 + i * 15));
  }
  ctx.restore();
  return y + boxH;
}

function drawMiniEntry(x, y, w, title, body, accent) {
  const art = window.GodGames && GodGames.MangaArt;
  const bodyLines = linesFor(body || '', w - 28, MANGA_ON ? 'bold 13px Georgia, serif' : '13px serif', 2);
  const h = 34 + bodyLines.length * 16;
  ctx.save();
  if (MANGA_ON && art && art.drawPanel) {
    art.drawPanel(ctx, x, y, w, h, {
      paper: 'rgba(255,248,220,0.66)',
      bottom: 'rgba(218,200,160,0.64)',
      accent: accent || GOLD,
      lineWidth: 2,
      toneAlpha: 0.05,
      shadow: 'rgba(0,0,0,0.12)',
    });
  } else {
    ctx.fillStyle = 'rgba(2,0,6,0.42)';
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill();
    ctx.strokeStyle = accent || GOLD;
    ctx.globalAlpha = 0.82;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.textAlign = 'left';
  ctx.font = 'bold 11px monospace';
  ctx.fillStyle = MANGA_ON ? '#0a0a0a' : accent || GOLD;
  ctx.fillText(title, x + 14, y + 19);
  ctx.font = MANGA_ON ? 'bold 13px Georgia, serif' : '13px serif';
  ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,230,200,0.88)';
  bodyLines.forEach((line, i) => ctx.fillText(line, x + 14, y + 38 + i * 16));
  ctx.restore();
  return y + h;
}

function linesFor(text, maxW, font, maxLines) {
  ctx.save();
  ctx.font = font;
  const lines = wrap(text, maxW, maxLines);
  ctx.restore();
  return lines;
}

function domRectOnCanvas(el) {
  if (!el) return null;
  const cr = canvas.getBoundingClientRect();
  const br = el.getBoundingClientRect();
  if (!cr.width || !cr.height || !br.width || !br.height) return null;
  return {
    x: (br.left - cr.left) * canvas.width / cr.width,
    y: (br.top - cr.top) * canvas.height / cr.height,
    w: br.width * canvas.width / cr.width,
    h: br.height * canvas.height / cr.height,
  };
}

function drawCluesDebugOverlay(tablet) {
  const debug = window.GodGames && GodGames.Debug;
  if (!debug || typeof debug.draw !== 'function' || (typeof debug.collecting === 'function' && !debug.collecting())) return;
  const items = [];
  if (tablet) items.push(Object.assign({ role: 'visual', center: false, label: 'clue tablet', alpha: 0.42 }, tablet));
  const backRect = domRectOnCanvas(document.getElementById('backBtn'));
  if (backRect) items.push(Object.assign({ role: 'hotspot', center: false, label: 'return button', alpha: 0.62 }, backRect));
  debug.draw(ctx, { game: 'clue-journal', items });
}

function wrap(text, maxW, maxLines) {
  ctx.save();
  const words = String(text).split(' ');
  const out = []; let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      if (maxLines && out.length >= maxLines - 1) {
        out.push((line + ' ...').trim());
        line = '';
        break;
      }
      out.push(line); line = w;
    }
    else line = test;
  }
  if (line) out.push(line);
  ctx.restore();
  return out;
}
function wrapAndDraw(text, x, y, maxW, lh, align) {
  ctx.textAlign = align || 'left';
  const lines = wrap(text, maxW);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
}

render();
</script>
</body>
</html>
