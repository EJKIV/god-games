<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; cursor:default; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;
const GOLD = '#D4AF37';
const GY   = H * 0.73;   // ground y

// ── Stars ─────────────────────────────────────────────────────────────────
const stars = Array.from({length:160}, () => ({
  x: Math.random()*W, y: Math.random()*GY*0.9,
  r: Math.random()*1.6+0.2,
  phase: Math.random()*Math.PI*2,
}));

// ── Portals ───────────────────────────────────────────────────────────────
const portals = [
  {
    x: W*0.38,
    name: 'ORION',
    sub:  'The Giant Scorpion',
    hue:  '#8844ff',
    glow: '#6622cc',
    href: 'orion.html',
    _btn: null,
  },
  {
    x: W*0.65,
    name: 'ICARUS',
    sub:  'The Flight of Icarus',
    hue:  '#ff7700',
    glow: '#ff4400',
    href: 'icarus.html',
    _btn: null,
  },
];

// ── Particle motes ────────────────────────────────────────────────────────
const motes = Array.from({length:28}, () => ({
  x: Math.random()*W, y: GY - Math.random()*GY*0.8,
  vy: -12 - Math.random()*18,
  alpha: Math.random(),
  r: Math.random()*1.8+0.4,
}));

// ── Player ────────────────────────────────────────────────────────────────
const player = {
  x: W*0.32, y: GY,
  vx: 0,
  facing: 1,
  walkPhase: 0,
  nearPortal: null,
};

let keys = {}, time = 0, mouse = {x:0, y:0};

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  time += dt;

  // movement
  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];
  player.vx = right ? 220 : left ? -220 : 0;
  if (player.vx !== 0) { player.facing = player.vx > 0 ? 1 : -1; player.walkPhase += dt*7; }
  player.x = Math.max(50, Math.min(W-50, player.x + player.vx*dt));

  // portal proximity
  player.nearPortal = null;
  for (const p of portals) {
    if (Math.abs(player.x - p.x) < 130) { player.nearPortal = p; break; }
  }

  // enter portal via Space / Enter
  if (player.nearPortal && (keys[' '] || keys['Enter'])) {
    window.location.href = player.nearPortal.href;
  }

  // motes drift upward, reset at bottom
  for (const m of motes) {
    m.y  += m.vy * dt;
    m.alpha -= dt * 0.18;
    if (m.alpha <= 0 || m.y < GY - H*0.75) {
      m.x     = Math.random()*W;
      m.y     = GY - Math.random()*30;
      m.alpha = 0.6 + Math.random()*0.4;
      m.vy    = -12 - Math.random()*18;
    }
  }
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function drawColumn(x) {
  const cH=100, cW=16;
  ctx.save();
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x-cW/2+4, GY-cH+4, cW, cH);
  // shaft
  const g = ctx.createLinearGradient(x-cW/2,0,x+cW/2,0);
  g.addColorStop(0,'#7a6c50'); g.addColorStop(0.4,'#c0ae88'); g.addColorStop(1,'#8a7a5c');
  ctx.fillStyle=g;
  ctx.fillRect(x-cW/2, GY-cH, cW, cH);
  // flutes
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for (let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(x-cW/2+i*(cW/4),GY-cH); ctx.lineTo(x-cW/2+i*(cW/4),GY); ctx.stroke();
  }
  // capital
  const cap = ctx.createLinearGradient(0,GY-cH-10,0,GY-cH);
  cap.addColorStop(0,'#d0be96'); cap.addColorStop(1,'#a09070');
  ctx.fillStyle=cap;
  ctx.fillRect(x-cW/2-5, GY-cH-10, cW+10, 10);
  // base
  ctx.fillStyle='#a09070';
  ctx.fillRect(x-cW/2-4, GY-7, cW+8, 7);
  ctx.restore();
}

function drawPortal(p) {
  const glow = 0.7 + Math.sin(time*2.2)*0.3;
  const archH=140, archW=64;
  ctx.save();
  ctx.translate(p.x, GY);

  // outer glow aura
  ctx.shadowColor = p.hue;
  ctx.shadowBlur  = 40 + glow*20;

  // pillars
  const pilG = ctx.createLinearGradient(-archW/2-14,0,archW/2+14,0);
  pilG.addColorStop(0,'#6a5c3c'); pilG.addColorStop(0.4,'#b0a070'); pilG.addColorStop(1,'#7a6c4c');
  ctx.fillStyle = pilG;
  ctx.fillRect(-archW/2-14, -archH, 14, archH);
  ctx.fillRect( archW/2,    -archH, 14, archH);

  // arch top stone
  ctx.beginPath();
  ctx.arc(0, -archH, archW/2+14, Math.PI, 0);
  ctx.fillStyle = '#9a8860';
  ctx.fill();

  // portal interior glow
  ctx.shadowBlur = 0;
  const iG = ctx.createRadialGradient(0,-archH*0.6,4, 0,-archH*0.6,archW/2+4);
  iG.addColorStop(0, `rgba(255,180,60,${0.75*glow})`);
  iG.addColorStop(0.45, `rgba(255,90,20,${0.45*glow})`);
  iG.addColorStop(1,   `rgba(255,40,0,0)`);
  ctx.fillStyle = iG;
  ctx.beginPath();
  ctx.rect(-archW/2, -archH, archW, archH);
  ctx.arc(0, -archH, archW/2, Math.PI, 0);
  ctx.fill();

  // wing silhouettes inside portal
  ctx.save();
  ctx.globalAlpha = 0.35*glow;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo(-22,-archH*0.85, -38,-archH*0.7, -28,-archH*0.45);
  ctx.bezierCurveTo(-16,-archH*0.38,  -6,-archH*0.48, 0,-archH*0.55);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo( 22,-archH*0.85,  38,-archH*0.7,  28,-archH*0.45);
  ctx.bezierCurveTo( 16,-archH*0.38,   6,-archH*0.48,  0,-archH*0.55);
  ctx.fill();
  ctx.restore();

  // portal name above arch
  ctx.shadowColor = p.hue; ctx.shadowBlur = 12;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, -archH-22);
  ctx.shadowBlur = 0;
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,220,140,0.7)';
  ctx.fillText(p.sub, 0, -archH-8);

  ctx.restore();

  // PLAY button if player is near
  const near = player.nearPortal === p;
  if (near) {
    const bx=p.x, by=GY-archH-56, bw=100, bh=34;
    const pulse = 0.88 + Math.sin(time*5)*0.12;
    ctx.save();
    ctx.shadowColor = GOLD; ctx.shadowBlur = 18*pulse;
    // button fill
    ctx.fillStyle = `rgba(212,175,55,${0.92*pulse})`;
    ctx.beginPath();
    ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 7);
    ctx.fill();
    // button label
    ctx.shadowBlur=0;
    ctx.fillStyle='#1a0f00';
    ctx.font='bold 17px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PLAY', bx, by);
    // hint
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='10px monospace';
    ctx.textBaseline='alphabetic';
    ctx.fillText('click or press SPACE', bx, by+28);
    ctx.restore();
    p._btn = {x:bx-bw/2, y:by-bh/2, w:bw, h:bh};
  } else {
    p._btn = null;
  }
}

function drawPlayer() {
  const x=player.x, y=player.y, f=player.facing;
  const walk = player.vx!==0 ? Math.sin(player.walkPhase)*0.9 : 0;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(f, 1);

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(0,0,20,5,0,0,Math.PI*2); ctx.fill();

  // legs
  ctx.lineCap='round';
  ctx.lineWidth=6; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-9+walk*10, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5,-18); ctx.lineTo( 9-walk*10, 0); ctx.stroke();

  // sandals
  ctx.lineWidth=3; ctx.strokeStyle='#8a6030';
  ctx.beginPath(); ctx.moveTo(-10+walk*10,-1); ctx.lineTo(-6+walk*10,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(  8-walk*10,-1); ctx.lineTo( 4-walk*10,-1); ctx.stroke();

  // robe body
  const robeG = ctx.createLinearGradient(-12,-50,12,-50);
  robeG.addColorStop(0,'#d8d0be'); robeG.addColorStop(0.5,'#f0e8d8'); robeG.addColorStop(1,'#b8b0a0');
  ctx.fillStyle=robeG;
  ctx.beginPath();
  ctx.moveTo(-11,-18); ctx.lineTo(-13,-50); ctx.lineTo(13,-50); ctx.lineTo(11,-18);
  ctx.closePath(); ctx.fill();
  // robe fold lines
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-4,-50); ctx.lineTo(-5,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4,-50); ctx.lineTo( 5,-18); ctx.stroke();

  // arms
  ctx.lineWidth=5; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-11,-44); ctx.lineTo(-16-walk*5,-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 11,-44); ctx.lineTo( 16+walk*5,-30); ctx.stroke();

  // neck
  ctx.fillStyle='#c0995a';
  ctx.fillRect(-4,-56,8,8);

  // head
  ctx.beginPath(); ctx.arc(0,-62,12,0,Math.PI*2); ctx.fillStyle='#c0995a'; ctx.fill();
  // hair
  ctx.fillStyle='#2a1808';
  ctx.beginPath(); ctx.arc(0,-65,11,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-7,-60,4,Math.PI*0.8,Math.PI*1.6); ctx.fill();
  // eye
  ctx.fillStyle='#1a1008';
  ctx.beginPath(); ctx.arc(5,-62,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(6,-63,0.8,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  // Sky
  const sky = ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#04071a'); sky.addColorStop(0.55,'#091230'); sky.addColorStop(1,'#131d40');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Stars
  for (const s of stars) {
    const b = Math.sin(time*1.8+s.phase)*0.35+0.65;
    ctx.globalAlpha=b*0.9; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Moon
  ctx.save();
  ctx.shadowColor='rgba(230,230,200,0.5)'; ctx.shadowBlur=35;
  ctx.fillStyle='#f0ead8';
  ctx.beginPath(); ctx.arc(W*0.14,H*0.11,34,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#091230';
  ctx.beginPath(); ctx.arc(W*0.14+10,H*0.11,29,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Distant mountains / ruins silhouette
  ctx.fillStyle='rgba(10,15,35,0.9)';
  ctx.beginPath();
  ctx.moveTo(0,GY);
  const mpts = [0,.08,.14,.20,.28,.35,.44,.52,.60,.70,.80,.88,.95,1];
  const mhts = [0.22,0.15,0.30,0.18,0.25,0.12,0.28,0.16,0.22,0.10,0.20,0.14,0.08,0];
  for (let i=0;i<mpts.length;i++) ctx.lineTo(mpts[i]*W, GY-mhts[i]*H*0.55);
  ctx.lineTo(W,GY); ctx.closePath(); ctx.fill();

  // Ground stone
  const gnd = ctx.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#6a5c40'); gnd.addColorStop(0.08,'#524630'); gnd.addColorStop(1,'#201808');
  ctx.fillStyle=gnd; ctx.fillRect(0,GY,W,H-GY);

  // tile grid
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  for (let x=0;x<W;x+=72){ ctx.beginPath(); ctx.moveTo(x,GY); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=GY;y<H;y+=28){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle='rgba(200,180,130,0.22)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();

  // ambient motes
  for (const m of motes) {
    ctx.globalAlpha=Math.max(0,m.alpha)*0.5;
    ctx.fillStyle='rgba(180,220,255,1)';
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Columns across the plaza
  const colXs = [W*0.08, W*0.18, W*0.28, W*0.78, W*0.88];
  for (const cx of colXs) drawColumn(cx);

  // Portals
  for (const p of portals) drawPortal(p);

  // Player
  drawPlayer();

  // Title
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 30px serif';
  ctx.fillStyle=GOLD; ctx.shadowColor=GOLD; ctx.shadowBlur=20;
  ctx.fillText('GOD GAMES', W/2, 46);
  ctx.shadowBlur=0;
  ctx.font='13px monospace';
  ctx.fillStyle='rgba(255,255,200,0.45)';
  ctx.fillText('Walk to a portal  ·  Arrow keys to move', W/2, 70);
  ctx.restore();
}

// ── Loop ──────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts) {
  if (lastTime===null) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key]=true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key]=false; });

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
  // pointer cursor over PLAY button
  let overBtn=false;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mouse.x>=b.x && mouse.x<=b.x+b.w && mouse.y>=b.y && mouse.y<=b.y+b.h) { overBtn=true; break; }
    }
  }
  canvas.style.cursor = overBtn ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) {
        window.location.href=p.href;
      }
    }
  }
});
</script>
</body>
</html>
