<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family: 'Trebuchet MS', serif; color:#f0e8d0; }
canvas { display:block; cursor:default; }

/* ── Landscape rotation prompt (touch + portrait only) ── */
.rotate-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #04071a; color: #D4AF37;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; font-family: 'Trebuchet MS', serif; font-size: 22px;
  letter-spacing: 0.1em; text-align: center;
}
.rotate-icon {
  width: 56px; height: 92px;
  border: 3px solid #D4AF37; border-radius: 8px;
  box-shadow: 0 0 24px rgba(212,175,55,0.45);
  animation: rotate-bob 2.4s ease-in-out infinite;
}
@keyframes rotate-bob {
  0%, 25%, 100% { transform: rotate(0deg); }
  55%, 80%      { transform: rotate(-90deg); }
}
@media (orientation: portrait) and (pointer: coarse) {
  body > *:not(.rotate-overlay) { display: none !important; }
  .rotate-overlay { display: flex !important; }
}

/* ── Top-right HUD: player name ── */
#whoBar {
  position:fixed; top:18px; right:22px; z-index:5;
  font-family: monospace; font-size:13px;
  background:rgba(10,14,28,0.6); border:1px solid rgba(212,175,55,0.35);
  padding:6px 14px; border-radius:3px;
  color:rgba(240,215,122,0.85);
  pointer-events:auto;
}
#whoBar b { color:#D4AF37; }
#whoBar button {
  background:none; border:none; color:rgba(240,215,122,0.6);
  cursor:pointer; font:inherit; margin-left:10px; text-decoration:underline;
}
#whoBar button:hover { color:#D4AF37; }

/* ── Modal (name prompt) ── */
.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.82);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #131d40 0%, #04071a 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow: 0 0 50px rgba(212,175,55,0.4);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(240,215,122,0.7); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(10,14,28,0.6); border:1px solid rgba(212,175,55,0.5);
  color:#f0e8d0; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.4); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#1a0f00;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }

body.manga-mode {
  background:#050505;
  font-family: "Trebuchet MS", "Arial Black", sans-serif;
}
body.manga-mode .rotate-overlay {
  background:#070707;
  color:#fff1b8;
  text-shadow:0 2px 0 #0a0a0a;
}
body.manga-mode .rotate-icon {
  border:4px solid #0a0a0a;
  background:#f1e6c8;
  box-shadow:8px 8px 0 rgba(0,0,0,0.55), inset 0 0 0 3px #D4AF37;
}
body.manga-mode #whoBar {
  background:rgba(241,230,200,0.92);
  border:3px solid #0a0a0a;
  border-radius:4px;
  box-shadow:7px 7px 0 rgba(0,0,0,0.45);
  color:#23170d;
  font-weight:bold;
  letter-spacing:0.04em;
}
body.manga-mode #whoBar b { color:#9b2b2b; text-shadow:none; }
body.manga-mode #whoBar button {
  color:#0a0a0a;
  text-decoration:none;
  border-left:2px solid #0a0a0a;
  padding-left:10px;
}
body.manga-mode .modal-bg {
  background:rgba(0,0,0,0.72);
}
body.manga-mode .modal {
  background:
    radial-gradient(circle at 18px 18px, rgba(10,10,10,0.16) 0 2px, transparent 2.4px) 0 0/10px 10px,
    linear-gradient(180deg, #f4ead0, #cdbc96);
  border:4px solid #0a0a0a;
  border-radius:6px;
  color:#1f170d;
  box-shadow:12px 12px 0 rgba(0,0,0,0.55);
}
body.manga-mode .modal h3 {
  font-family:"Impact", "Arial Black", sans-serif;
  color:#0a0a0a;
  text-shadow:2px 2px 0 #D4AF37;
  letter-spacing:0.04em;
}
body.manga-mode .modal p { color:#3a2a18; font-style:normal; font-weight:bold; }
body.manga-mode .modal input {
  background:#fff8df;
  border:3px solid #0a0a0a;
  color:#0a0a0a;
  border-radius:4px;
  box-shadow:inset 3px 3px 0 rgba(0,0,0,0.16);
}
body.manga-mode .modal input:focus {
  border-color:#0a0a0a;
  box-shadow:0 0 0 3px #D4AF37, inset 3px 3px 0 rgba(0,0,0,0.12);
}
body.manga-mode .modal button {
  background:#D4AF37;
  border:3px solid #0a0a0a;
  border-radius:4px;
  box-shadow:5px 5px 0 rgba(0,0,0,0.45);
  color:#0a0a0a;
}
body.manga-mode .modal button:hover {
  transform:translateY(-1px);
  box-shadow:6px 7px 0 rgba(0,0,0,0.45);
}
@media (max-height: 460px) {
  body.manga-mode #whoBar {
    top:8px; right:10px;
    font-size:11px;
    padding:4px 9px;
    box-shadow:4px 4px 0 rgba(0,0,0,0.45);
  }
}
</style>
</head>
<body>
<div class="rotate-overlay">
  <div class="rotate-icon"></div>
  <div>ROTATE YOUR DEVICE</div>
  <div style="font-size:13px; opacity:0.7; letter-spacing:0.04em;">The hub is best viewed in landscape</div>
</div>
<canvas id="c"></canvas>

<div id="whoBar">Playing as: <b id="whoName">…</b><button id="changeNameBtn">change</button></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE MORTAL</h3>
    <p>Speak your name, that the gods might know you.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">ENTER OLYMPUS</button>
  </div>
</div>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;
const GOLD = '#D4AF37';
const MANGA_KEY = 'godgames_manga';
const HUB_CONCOURSE_ASSET = 'godgames.shared.hubConcourseV2';
const HUB_DESTINATION_PANELS_ASSET = 'godgames.shared.hubDestinationPanelsV2';
const HUB_AVATAR_ASSET = 'godgames.shared.hubAvatarV2';
const HUB_MANGA_STATION_X = [0.145, 0.322, 0.500, 0.678, 0.855];
const HUB_CONCOURSE_SOURCE = { w: 1672, h: 941, focusX: 0.50, focusY: 0.54 };
const HUB_MANGA_STATION_RECTS = [
  { x: 166, y: 358, w: 150, h: 218, labelY: 604 },
  { x: 464, y: 360, w: 148, h: 216, labelY: 604 },
  { x: 762, y: 360, w: 148, h: 216, labelY: 604 },
  { x: 1060, y: 360, w: 148, h: 216, labelY: 604 },
  { x: 1356, y: 360, w: 146, h: 216, labelY: 604 },
];
const GY   = H * 0.73;   // ground y

function mangaOn() { return localStorage.getItem(MANGA_KEY) === '1'; }
function syncMangaClass() { document.body.classList.toggle('manga-mode', mangaOn()); }
syncMangaClass();

// ── Stars ─────────────────────────────────────────────────────────────────
const stars = Array.from({length:160}, () => ({
  x: Math.random()*W, y: Math.random()*GY*0.9,
  r: Math.random()*1.6+0.2,
  phase: Math.random()*Math.PI*2,
}));

// ── Portals ───────────────────────────────────────────────────────────────
// To add a new game: append an entry. x is auto-distributed across the screen.
// kind: 'arch' (default) draws an archway portal; 'mountain' draws a snow-capped peak.
const portals = [
  { name: 'ORION',    sub: 'The Giant Scorpion',    hue: '#8844ff', glow: '#6622cc', href: 'orion.html'         },
  { name: 'ACHILLES', sub: 'The Arrow Gauntlet',    hue: '#cc2222', glow: '#882200', href: 'achilles.html'      },
  { name: 'PERSEUS',  sub: 'The Gorgon\'s Mirror',  hue: '#3db0c6', glow: '#1c6c80', href: 'perseus.html'       },
  { name: 'OLYMPUS',  sub: 'Hall of the Gods',      hue: '#fff5c0', glow: '#D4AF37', href: 'mount-olympus.html', kind: 'mountain' },
  { name: 'ICARUS',   sub: 'The Flight of Icarus',  hue: '#ff7700', glow: '#ff4400', href: 'icarus.html'        },
];
portals.forEach((p, i) => {
  p.x = W * (i + 1) / (portals.length + 1);
  p.mangaX = W * (HUB_MANGA_STATION_X[i] ?? ((i + 1) / (portals.length + 1)));
  p.mangaSourceRect = HUB_MANGA_STATION_RECTS[i] || null;
  p.slot = i;
  p._btn = null;
});
const PORTAL_RADIUS = Math.min(130, (W / (portals.length + 1)) * 0.45);
const IS_TOUCH = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

function hubStage() {
  const groundY = H * 0.735;
  const portalGap = W / (portals.length + 1);
  const portalRadius = Math.min(140, portalGap * 0.46);
  return {
    W, H,
    groundY,
    horizonY: H * 0.50,
    stationTopY: H * 0.34,
    stationBaseY: H * 0.675,
    vanishX: W * 0.50,
    playerLane: { minX: Math.max(42, W * 0.035), maxX: Math.min(W - 42, W * 0.965) },
    portalRadius,
    foregroundY: H * 0.80,
  };
}
function hubPortalX(p) {
  if (mangaOn() && p.mangaSourceRect) {
    const r = hubSourceRectToScreen(p.mangaSourceRect);
    return r.cx;
  }
  return mangaOn() ? (p.mangaX ?? p.x) : p.x;
}
function hubConcourseCover() {
  const sw = HUB_CONCOURSE_SOURCE.w;
  const sh = HUB_CONCOURSE_SOURCE.h;
  const scale = Math.max(W / sw, H / sh);
  const cropW = Math.min(sw, W / scale);
  const cropH = Math.min(sh, H / scale);
  return {
    scale,
    sx: (sw - cropW) * HUB_CONCOURSE_SOURCE.focusX,
    sy: (sh - cropH) * HUB_CONCOURSE_SOURCE.focusY,
    cropW,
    cropH,
  };
}
function hubSourceRectToScreen(rect) {
  const c = hubConcourseCover();
  const x = (rect.x - c.sx) * c.scale;
  const y = (rect.y - c.sy) * c.scale;
  const w = rect.w * c.scale;
  const h = rect.h * c.scale;
  const labelY = rect.labelY == null ? y + h + 20 : (rect.labelY - c.sy) * c.scale;
  return { x, y, w, h, cx: x + w / 2, cy: y + h / 2, labelY };
}
function hubGroundY() { return mangaOn() ? hubStage().groundY : GY; }
function hubStageDepth(y) {
  const s = hubStage();
  return Math.max(0, Math.min(1, (y - s.horizonY) / Math.max(1, s.groundY - s.horizonY)));
}
function hubStageScale(y, farScale, nearScale) {
  const d = Math.pow(hubStageDepth(y), 0.75);
  return farScale + (nearScale - farScale) * d;
}
function hubSceneScale() {
  return Math.max(0.58, Math.min(1, H / 680));
}
function hubPortalHitRegion(p) {
  const s = hubStage();
  const ss = hubSceneScale();
  const x = hubPortalX(p);
  if (mangaOn()) {
    const box = hubStationBox(p);
    const w = Math.max(112 * ss, box.w + 28);
    const top = Math.min(box.y, box.labelY - box.h * 0.18);
    const bottom = s.groundY + 80 * ss;
    return { x: x - w / 2, y: top, w, h: bottom - top };
  }
  const isMtn = p.kind === 'mountain';
  const w = (isMtn ? 230 : Math.max(132, s.portalRadius * 1.15)) * ss;
  const h = (isMtn ? 265 : 205) * ss;
  return { x: x - w / 2, y: s.groundY - h, w, h: h + 36 };
}

// ── Particle motes ────────────────────────────────────────────────────────
const motes = Array.from({length:28}, () => ({
  x: Math.random()*W, y: GY - Math.random()*GY*0.8,
  vy: -12 - Math.random()*18,
  alpha: Math.random(),
  r: Math.random()*1.8+0.4,
}));

// ── Player ────────────────────────────────────────────────────────────────
const player = {
  x: W*0.32, y: GY,
  visualX: W*0.32,
  visualY: GY,
  visualVx: 0,
  visualLean: 0,
  vx: 0,
  vy: 0,                  // toad-mode jump physics
  onGround: true,
  facing: 1,
  drawFacing: 1,
  prevFacing: 1,
  turnT: 0,
  readyT: 0,
  landingT: 0,
  walkPhase: 0,
  nearPortal: null,
  isToad: false, // easter egg: press 't' to toggle
};
const TOAD_JUMP_V = -640; // toad jump initial velocity (negative = up)
const TOAD_GRAVITY = 1400;
const HUB_TURN_DUR = 0.18;
const HUB_LAND_DUR = 0.18;

let keys = {}, time = 0, mouse = {x:0, y:0};
let lastHopCycle = 0; // tracks toad's hop cycle to fire one ribbit per hop

// ── Audio (lazy — created on first user gesture) ──────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function ribbit() {
  const ac = ensureAudio();
  if (!ac) return;
  const t0 = ac.currentTime;
  // two short bursts — "ri" then a longer "bbit"
  const bursts = [
    { start: 0,    dur: 0.07, f0: 200, f1: 130, vol: 0.14 },
    { start: 0.10, dur: 0.20, f0: 170, f1:  80, vol: 0.20 },
  ];
  for (const b of bursts) {
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(b.f0, t0 + b.start);
    osc.frequency.exponentialRampToValueAtTime(b.f1, t0 + b.start + b.dur);
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 900; filt.Q.value = 6;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.0001, t0 + b.start);
    gain.gain.exponentialRampToValueAtTime(b.vol, t0 + b.start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + b.start + b.dur);
    osc.connect(filt).connect(gain).connect(ac.destination);
    osc.start(t0 + b.start);
    osc.stop(t0 + b.start + b.dur + 0.02);
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  time += dt;
  const groundY = hubGroundY();
  const lane = mangaOn() ? hubStage().playerLane : { minX: 50, maxX: W - 50 };
  const wasOnGround = player.onGround;

  // movement — toad is twice as fast
  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];
  const up    = keys['ArrowUp']    || keys['w'];
  const speed = player.isToad ? 440 : 220;
  player.vx = right ? speed : left ? -speed : 0;
  if (player.vx !== 0) {
    const nextFacing = player.vx > 0 ? 1 : -1;
    if (nextFacing !== player.facing) {
      player.prevFacing = player.facing;
      player.turnT = HUB_TURN_DUR;
    }
    player.facing = nextFacing;
    player.walkPhase += dt * (player.isToad ? 8.4 : 7.2);
  }
  player.x = Math.max(lane.minX, Math.min(lane.maxX, player.x + player.vx*dt));

  // Toad jump physics — Up or Space launches when on ground; gravity pulls
  // back to GY. Only the toad form gets vertical control. Space in human
  // form continues to enter portals (handled below).
  if (player.isToad) {
    if (player.onGround && (up || keys[' '])) {
      player.vy = TOAD_JUMP_V;
      player.onGround = false;
    }
    if (!player.onGround) {
      player.vy += TOAD_GRAVITY * dt;
      player.y  += player.vy * dt;
      if (player.y >= groundY) {
        player.y = groundY; player.vy = 0; player.onGround = true;
        if (!wasOnGround) player.landingT = HUB_LAND_DUR;
      }
    }
  } else {
    // Human form snaps to ground.
    player.y = groundY; player.vy = 0; player.onGround = true;
  }
  if (typeof player.visualX !== 'number') player.visualX = player.x;
  if (typeof player.visualY !== 'number') player.visualY = player.y;
  player.turnT = Math.max(0, player.turnT - dt);
  player.landingT = Math.max(0, player.landingT - dt);
  player.drawFacing = player.turnT > HUB_TURN_DUR * 0.5 ? (player.prevFacing || player.facing) : player.facing;
  player.visualX += (player.x - player.visualX) * Math.min(1, dt * 14);
  player.visualY += (player.y - player.visualY) * Math.min(1, dt * 14);
  player.visualVx += (player.vx - player.visualVx) * Math.min(1, dt * 10);
  const targetLean = Math.max(-0.075, Math.min(0.075, player.visualVx / (player.isToad ? 5600 : 3600)))
    + (player.turnT > 0 ? -(player.drawFacing || player.facing) * 0.035 : 0);
  player.visualLean += (targetLean - (player.visualLean || 0)) * Math.min(1, dt * 9);

  // ribbit once per hop while moving as toad
  if (player.isToad && (player.vx !== 0 || !player.onGround)) {
    const cycle = Math.floor(player.walkPhase / (Math.PI * 2));
    if (cycle !== lastHopCycle) { ribbit(); lastHopCycle = cycle; }
  } else {
    lastHopCycle = Math.floor(player.walkPhase / (Math.PI * 2));
  }

  // portal proximity
  player.nearPortal = null;
  for (const p of portals) {
    const radius = mangaOn() ? hubStage().portalRadius : PORTAL_RADIUS;
    if (Math.abs(player.x - hubPortalX(p)) < radius) { player.nearPortal = p; break; }
  }
  const readyTarget = player.nearPortal && Math.abs(player.visualVx || player.vx) < 14 && player.onGround ? 1 : 0;
  player.readyT += (readyTarget - (player.readyT || 0)) * Math.min(1, dt * 8);

  // Toad-only mushroom on Mt. Olympus — when the toad lands on it (or
  // overlaps mid-air during a descent), cut to the olympus-clues page.
  // The mushroom sits at the base of the Olympus portal so the player has
  // to deliberately walk over and jump.
  if (player.isToad) {
    const olympus = portals.find(p => p.kind === 'mountain');
    if (olympus) {
      const dx = player.x - hubPortalX(olympus);
      const dy = player.y - (groundY - 14);
      if (Math.abs(dx) < 30 && Math.abs(dy) < 32 && !player.onGround) {
        window.location.href = 'olympus-clues.html';
      }
    }
  }

  // enter portal via Space / Enter — only in human form. In toad form Space
  // is the jump key, so the same press shouldn't also pop the player into
  // the portal.
  if (!player.isToad && player.nearPortal && (keys[' '] || keys['Enter'])) {
    window.location.href = player.nearPortal.href;
  }
  if (player.isToad && player.nearPortal && keys['Enter']) {
    window.location.href = player.nearPortal.href;
  }

  // manga toast lifetime
  if (_mangaToast.t > 0) _mangaToast.t = Math.max(0, _mangaToast.t - dt);

  // Mystery cinematic — runs even on the hub if a hint is earned elsewhere
  // and the player returns mid-cinematic. (Most cinematics start in-game.)
  if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.update(dt);

  // Storm-brewing intensity eases toward the codeword progress fraction.
  // Mid-codeword → builds; broken sequence → dissipates.
  const target = _codewordIdx / CODEWORD.length;
  _stormIntensity += (target - _stormIntensity) * Math.min(1, dt * 4);
  // Spawn lightning flashes more often as intensity climbs.
  if (_stormIntensity > 0.15) {
    const rate = _stormIntensity * _stormIntensity * 4;   // 0..4 flashes/sec
    if (Math.random() < dt * rate) spawnStormFlash();
  }
  for (let i = _stormFlashes.length - 1; i >= 0; i--) {
    _stormFlashes[i].life -= dt;
    if (_stormFlashes[i].life <= 0) _stormFlashes.splice(i, 1);
  }

  // Zeus cinematic
  if (_zeusStrike) _zeusStrike.update(dt);
  if (_mangaAwakenT > 0) _mangaAwakenT = Math.max(0, _mangaAwakenT - dt);

  // motes drift upward, reset at bottom
  for (const m of motes) {
    m.y  += m.vy * dt;
    m.alpha -= dt * 0.18;
    if (m.alpha <= 0 || m.y < GY - H*0.75) {
      m.x     = Math.random()*W;
      m.y     = GY - Math.random()*30;
      m.alpha = 0.6 + Math.random()*0.4;
      m.vy    = -12 - Math.random()*18;
    }
  }
}

// ── Storm-brewing helpers ────────────────────────────────────────────────
function spawnStormFlash() {
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  if (!olympus) return;
  const gy = hubGroundY();
  const cx = hubPortalX(olympus) + (Math.random() - 0.5) * 140;
  const cy = gy - 200 - Math.random() * 60;
  // Branching ink path drawn during render — pre-roll the segments now.
  const branches = [];
  let x = cx, y = cy;
  while (y < gy - 60 + Math.random() * 30) {
    const nx = x + (Math.random() - 0.5) * 30;
    const ny = y + 12 + Math.random() * 20;
    branches.push([x, y, nx, ny]);
    x = nx; y = ny;
  }
  // Side fork
  if (branches.length > 2 && Math.random() < 0.5) {
    const [, , bx, by] = branches[Math.floor(branches.length * 0.4)];
    let fx = bx, fy = by;
    for (let k = 0; k < 3; k++) {
      const nx = fx + (Math.random() < 0.5 ? -1 : 1) * (8 + Math.random() * 16);
      const ny = fy + 8 + Math.random() * 12;
      branches.push([fx, fy, nx, ny]);
      fx = nx; fy = ny;
    }
  }
  _stormFlashes.push({ life: 0.18, maxLife: 0.18, branches });
}

// Toad-only mushroom that sits at the base of Mt. Olympus. Jumping onto it
// (overlap during a descent) cuts the player to olympus-clues.html, where
// they review every clue earned. Visible only while player.isToad.
function renderToadMushroom() {
  const olympus = portals.find(p => p.kind === 'mountain');
  if (!olympus) return;
  const gy = hubGroundY();
  const cx = hubPortalX(olympus);
  const cy = gy - 14 + Math.sin(time * 2.6) * 1.2;
  // Faint glow halo so it reads at a glance.
  ctx.save();
  if (mangaOn() && window.GodGames && GodGames.MangaArt) {
    GodGames.MangaArt.contactShadow(ctx, cx, cy + 12, { w: 28, h: 7, alpha: 0.34, rim: '#ffd54a' });
    ctx.fillStyle = 'rgba(255,213,74,0.22)';
    ctx.beginPath(); ctx.ellipse(cx, cy + 7, 36, 13, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 22;
  ctx.fillStyle = 'rgba(255,213,74,0.18)';
  ctx.beginPath(); ctx.ellipse(cx, cy + 8, 28, 9, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Stem
  ctx.fillStyle = '#f5ead6';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 6, 7, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2;
  ctx.stroke();
  // Cap — bold ink red
  ctx.fillStyle = '#cc1818';
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy);
  ctx.bezierCurveTo(cx - 18, cy - 18, cx + 18, cy - 18, cx + 18, cy);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2.5;
  ctx.stroke();
  // White spots — fly agaric mythos
  ctx.fillStyle = '#fbf6e8';
  for (const [sx, sy, sr] of [[-9, -6, 2.5], [-3, -10, 2.0], [4, -7, 2.8], [10, -3, 2.2]]) {
    ctx.beginPath(); ctx.arc(cx + sx, cy + sy, sr, 0, Math.PI * 2); ctx.fill();
  }
  // Hint label — "↑ JUMP" appears when toad is close enough
  if (Math.abs(player.x - cx) < 90) {
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,213,74,0.85)';
    ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 6;
    ctx.fillText('↑ JUMP', cx, cy - 30);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function renderStorm() {
  if (_stormIntensity < 0.02) return;
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  if (!olympus) return;
  const cx = hubPortalX(olympus);
  const gy = hubGroundY();
  const ay = gy - 240;
  const intensity = _stormIntensity;

  ctx.save();
  // Dark cloud bank above the mountain — alpha + size scale with intensity.
  const cloudAlpha = Math.min(0.85, 0.15 + intensity * 0.85);
  for (let i = 0; i < 7; i++) {
    const ox = (i - 3) * 60 + Math.sin(time * 0.6 + i) * 14;
    const oy = Math.cos(time * 0.5 + i * 1.3) * 6;
    const r  = 60 + intensity * 26 + Math.sin(time * 0.4 + i * 2) * 6;
    const g = ctx.createRadialGradient(cx + ox, ay + oy, 4, cx + ox, ay + oy, r);
    const dark = `rgba(20,18,38,${cloudAlpha})`;
    g.addColorStop(0,    dark);
    g.addColorStop(0.6,  `rgba(35,30,60,${cloudAlpha * 0.6})`);
    g.addColorStop(1,    'rgba(20,18,38,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx + ox, ay + oy, r, 0, Math.PI * 2); ctx.fill();
  }
  // Distant orange glow on the mountain peak (fire light from the storm).
  ctx.globalAlpha = Math.min(1, intensity);
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20 * intensity;
  ctx.fillStyle = `rgba(255,140,40,${0.06 + intensity * 0.18})`;
  ctx.beginPath(); ctx.arc(cx, gy - 50, 90 + intensity * 40, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  // Lightning flashes — bright ink branches with bloom.
  for (const fl of _stormFlashes) {
    const a = fl.life / fl.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 18;
    ctx.strokeStyle = '#fff5c0';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const [x1, y1, x2, y2] of fl.branches) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    // Inner core
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1.5;
    for (const [x1, y1, x2, y2] of fl.branches) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    ctx.restore();
  }
  // Codeword progress strip showing only letters the player has typed;
  // unknown positions stay as dots. Sits just above the mountain.
  if (_codewordIdx > 0) {
    const stripY = gy - 320;
    const cellW = 22;
    const total = CODEWORD.length;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < total; i++) {
      const ch = CODEWORD[i].toUpperCase();
      const x = cx + (i - (total - 1) / 2) * cellW;
      if (i < _codewordIdx) {
        ctx.fillStyle = GOLD;
        ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 10;
        ctx.fillText(ch, x, stripY);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = 'rgba(220,200,150,0.25)';
        ctx.fillText('·', x, stripY);
      }
    }
  }
  ctx.restore();
}

function renderInvocationSeal() {
  const ready = codewordReady();
  const mangaOn = localStorage.getItem(MANGA_KEY) === '1';
  if (mangaOn || _codewordIdx <= 0) return;
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  if (!olympus) return;
  const cx = hubPortalX(olympus);
  const cy = Math.max(120, hubGroundY() - 320);
  const pulse = 0.5 + 0.5 * Math.sin(time * 5.2);
  const a = 0.36 + _codewordIdx * 0.12;

  ctx.save();
  ctx.globalAlpha = Math.min(1, a);
  ctx.translate(cx, cy);
  ctx.strokeStyle = ready ? '#ffeeaa' : 'rgba(212,175,55,0.55)';
  ctx.lineWidth = 2;
  ctx.shadowColor = ready ? '#ffeeaa' : GOLD;
  ctx.shadowBlur = ready ? 24 : 10;
  ctx.beginPath();
  ctx.arc(0, 0, 58 + pulse * 4, 0, Math.PI * 2);

  ctx.beginPath();
  ctx.arc(0, 0, 36 - pulse * 3, 0, Math.PI * 2);

  ctx.textAlign = 'center';

    ctx.fillStyle = lit ? '#2b1608' : 'rgba(255,240,200,0.35)';

  ctx.shadowBlur = 0;
  ctx.restore();
}

// ── Mysteries panel ──────────────────────────────────────────────────────
// Cryptic right-edge scroll. Locked mysteries show only a poetic flavor
// line — never instructions. Once a hint is earned, the panel reveals only
// the syllable/fragment as a poetic line; the player has to figure out what
// to do with the fragments. Solved mysteries get a single celebration line.
function renderMysteriesPanel() {
  const Mysteries = window.GodGames && window.GodGames.Mysteries;
  if (!Mysteries) return;
  const panelW = 230;
  const x0 = W - panelW - 18;
  const y0 = 80;
  const items = Mysteries.list;

  ctx.save();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  // First pass: measure required height (no draws — just font metrics).
  const lh = 13;
  let neededH = 30;
  for (const m of items) {
    neededH += 18; // title row
    for (const h of m.hints || []) {
      if (hintVisible(Mysteries, h)) {
        ctx.font = 'italic 10px serif';
        const w = ctx.measureText('· ' + h.fragment).width;
        const lines = Math.max(1, Math.ceil(w / (panelW - 24)));
        neededH += lines * lh + 1;
      }
    }
    if (Mysteries.isSolved(m.id)) {
      ctx.font = 'italic 10px serif';
      const w = ctx.measureText('✓ ' + (m.solvedFlavor || '')).width;
      const lines = Math.max(1, Math.ceil(w / (panelW - 24)));
      neededH += lines * lh + 4;
    }
    neededH += 6;
  }
  const panelH = Math.min(H - 100, neededH);

  // Background scroll
  ctx.fillStyle = 'rgba(15,10,4,0.78)';
  ctx.strokeStyle = 'rgba(212,175,55,0.45)';
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.roundRect(x0, y0, panelW, panelH, 6);
  ctx.fill(); ctx.stroke();

  // Header
  ctx.fillStyle = GOLD; ctx.font = 'bold 12px monospace';
  ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
  ctx.fillText('THE MYSTERIES', x0 + 12, y0 + 10);
  ctx.shadowBlur = 0;

  let y = y0 + 30;
  for (const m of items) {
    if (y + 18 > y0 + panelH) break;
    const solved = Mysteries.isSolved(m.id);
    const blocked = m.requires && !Mysteries.isSolved(m.requires);

    // Title row — solved/locked/blocked all stay short and poetic.
    ctx.font = 'bold 10px monospace';
    if (solved) {
      ctx.fillStyle = '#9adda4';
      ctx.fillText('✦ ' + (m.solvedTitle || ''), x0 + 12, y);
    } else if (blocked) {
      ctx.fillStyle = 'rgba(160,140,110,0.40)';
      ctx.fillText('· · ·', x0 + 12, y);
    } else {
      ctx.fillStyle = 'rgba(220,200,150,0.65)';
      ctx.fillText(m.lockedTitle, x0 + 12, y);
    }
    y += 14;

    // Body — locked mysteries show ONLY the flavor line. Earned hints reveal
    // their poetic fragment. No counters, no goal text, no instructions.
    ctx.font = 'italic 10px serif';
    if (solved) {
      ctx.fillStyle = 'rgba(170,220,180,0.75)';
      y = drawWrap('✓ ' + (m.solvedFlavor || ''), x0 + 16, y, panelW - 24, lh);
      y += 4;
    } else if (blocked) {
      // Don't even show flavor for blocked-by-prereq mysteries — they're
      // truly invisible until their prereq solves.
    } else {
      // Show only the LOCKED flavor as the persistent line.
      ctx.fillStyle = 'rgba(190,170,130,0.55)';
      y = drawWrap(m.lockedFlavor, x0 + 16, y, panelW - 24, lh);
      // Then any earned hint fragments appear below as discovered fragments.
      let anyHintEarned = false;
      for (const h of m.hints || []) {
        if (!hintVisible(Mysteries, h)) continue;
        anyHintEarned = true;
        ctx.fillStyle = '#ffd54a';
        y = drawWrap('· ' + h.fragment, x0 + 16, y, panelW - 24, lh);
      }
      if (anyHintEarned) y += 2;
    }
    y += 6;
  }
  ctx.restore();
}

function hintVisible(Mysteries, h) {
  if (!Mysteries.hasHint(h.id)) return false;
  if (!h.autoEarnsAfter) return true;
  // Legacy localStorage may contain the old final hint before Perseus existed.
  // Keep it hidden until its new prerequisites are truly present.
  return h.autoEarnsAfter.every(id => Mysteries.hasHint(id));
}

// drawWrap: helper that wraps `text` to maxW at the current font + fillStyle,
// drawing each line at incrementing y. Returns the y-cursor after the last line.
function drawWrap(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      cy += lh;
      line = w;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, cy); cy += lh; }
  return cy;
}

function wrapAndDraw(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      cy += lh;
      line = w;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function drawColumn(x) {
  const cH=100, cW=16;
  ctx.save();
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x-cW/2+4, GY-cH+4, cW, cH);
  // shaft
  const g = ctx.createLinearGradient(x-cW/2,0,x+cW/2,0);
  g.addColorStop(0,'#7a6c50'); g.addColorStop(0.4,'#c0ae88'); g.addColorStop(1,'#8a7a5c');
  ctx.fillStyle=g;
  ctx.fillRect(x-cW/2, GY-cH, cW, cH);
  // flutes
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for (let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(x-cW/2+i*(cW/4),GY-cH); ctx.lineTo(x-cW/2+i*(cW/4),GY); ctx.stroke();
  }
  // capital
  const cap = ctx.createLinearGradient(0,GY-cH-10,0,GY-cH);
  cap.addColorStop(0,'#d0be96'); cap.addColorStop(1,'#a09070');
  ctx.fillStyle=cap;
  ctx.fillRect(x-cW/2-5, GY-cH-10, cW+10, 10);
  // base
  ctx.fillStyle='#a09070';
  ctx.fillRect(x-cW/2-4, GY-7, cW+8, 7);
  ctx.restore();
}

function drawMountain(p) {
  // Mount Olympus: snow-capped peak that sits behind the player line.
  // Same footprint/anchor as a portal so player.nearPortal logic still applies.
  const peakH = 200, baseW = 220;
  const pulse = 0.85 + Math.sin(time*1.4)*0.15;
  ctx.save();
  ctx.translate(p.x, GY);

  // Divine aura behind the summit
  const aura = ctx.createRadialGradient(0, -peakH+10, 4, 0, -peakH+10, peakH*1.1);
  aura.addColorStop(0, `rgba(255,240,180,${0.55*pulse})`);
  aura.addColorStop(0.4, `rgba(212,175,55,${0.22*pulse})`);
  aura.addColorStop(1, 'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(0, -peakH+10, peakH*1.1, 0, Math.PI*2);
  ctx.fill();

  // Mountain body — triangle with subtle gradient
  const mtnG = ctx.createLinearGradient(0, -peakH, 0, 0);
  mtnG.addColorStop(0,   '#5b6694');
  mtnG.addColorStop(0.4, '#2e375f');
  mtnG.addColorStop(1,   '#0d1126');
  ctx.fillStyle = mtnG;
  ctx.beginPath();
  ctx.moveTo(-baseW/2, 0);
  ctx.lineTo(-baseW*0.18, -peakH*0.55);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.lineTo( baseW*0.06, -peakH*0.84);
  ctx.lineTo( baseW*0.20, -peakH*0.55);
  ctx.lineTo( baseW/2, 0);
  ctx.closePath();
  ctx.fill();

  // ridge highlight (left flank catches the divine light)
  ctx.strokeStyle = 'rgba(180,200,240,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-baseW*0.18, -peakH*0.55);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.stroke();

  // Snowcap
  ctx.fillStyle = 'rgba(245,248,255,0.95)';
  ctx.beginPath();
  ctx.moveTo(-baseW*0.10, -peakH*0.65);
  ctx.lineTo(-baseW*0.07, -peakH*0.72);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.lineTo( baseW*0.06, -peakH*0.84);
  ctx.lineTo( baseW*0.10, -peakH*0.72);
  ctx.lineTo( baseW*0.13, -peakH*0.65);
  ctx.lineTo( baseW*0.07, -peakH*0.66);
  ctx.lineTo( baseW*0.04, -peakH*0.78);
  ctx.lineTo(0, -peakH*0.74);
  ctx.lineTo(-baseW*0.04, -peakH*0.78);
  ctx.lineTo(-baseW*0.07, -peakH*0.66);
  ctx.closePath();
  ctx.fill();

  // Tiny shrine/altar at the foot center
  ctx.fillStyle = 'rgba(212,175,55,0.5)';
  ctx.fillRect(-12, -8, 24, 8);
  ctx.fillStyle = 'rgba(255,240,180,' + (0.5+0.4*pulse) + ')';
  ctx.fillRect(-3, -14, 6, 6);

  // Title above peak
  ctx.shadowColor = '#D4AF37';
  ctx.shadowBlur = 18*pulse;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 16px serif';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, -peakH-22);
  ctx.shadowBlur = 0;
  ctx.font = 'italic 11px serif';
  ctx.fillStyle = 'rgba(255,220,140,0.75)';
  ctx.fillText(p.sub, 0, -peakH-8);

  ctx.restore();

  // ENTER button when player is near
  if (player.nearPortal === p) {
    const bx=p.x, by=GY-peakH-56, bw=120, bh=34;
    const bp = 0.88 + Math.sin(time*5)*0.12;
    ctx.save();
    ctx.shadowColor = GOLD; ctx.shadowBlur = 18*bp;
    ctx.fillStyle = `rgba(212,175,55,${0.92*bp})`;
    ctx.beginPath(); ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a0f00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ASCEND', bx, by);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '10px monospace';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('click or press SPACE', bx, by+28);
    ctx.restore();
    p._btn = {x:bx-bw/2, y:by-bh/2, w:bw, h:bh};
  } else {
    p._btn = null;
  }
}

function drawPortal(p) {
  const glow = 0.7 + Math.sin(time*2.2)*0.3;
  const archH=140, archW=64;
  ctx.save();
  ctx.translate(p.x, GY);

  // outer glow aura
  ctx.shadowColor = p.hue;
  ctx.shadowBlur  = 40 + glow*20;

  // pillars
  const pilG = ctx.createLinearGradient(-archW/2-14,0,archW/2+14,0);
  pilG.addColorStop(0,'#6a5c3c'); pilG.addColorStop(0.4,'#b0a070'); pilG.addColorStop(1,'#7a6c4c');
  ctx.fillStyle = pilG;
  ctx.fillRect(-archW/2-14, -archH, 14, archH);
  ctx.fillRect( archW/2,    -archH, 14, archH);

  // arch top stone
  ctx.beginPath();
  ctx.arc(0, -archH, archW/2+14, Math.PI, 0);
  ctx.fillStyle = '#9a8860';
  ctx.fill();

  // portal interior glow
  ctx.shadowBlur = 0;
  const iG = ctx.createRadialGradient(0,-archH*0.6,4, 0,-archH*0.6,archW/2+4);
  iG.addColorStop(0, `rgba(255,180,60,${0.75*glow})`);
  iG.addColorStop(0.45, `rgba(255,90,20,${0.45*glow})`);
  iG.addColorStop(1,   `rgba(255,40,0,0)`);
  ctx.fillStyle = iG;
  ctx.beginPath();
  ctx.rect(-archW/2, -archH, archW, archH);
  ctx.arc(0, -archH, archW/2, Math.PI, 0);
  ctx.fill();

  // wing silhouettes inside portal
  ctx.save();
  ctx.globalAlpha = 0.35*glow;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo(-22,-archH*0.85, -38,-archH*0.7, -28,-archH*0.45);
  ctx.bezierCurveTo(-16,-archH*0.38,  -6,-archH*0.48, 0,-archH*0.55);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo( 22,-archH*0.85,  38,-archH*0.7,  28,-archH*0.45);
  ctx.bezierCurveTo( 16,-archH*0.38,   6,-archH*0.48,  0,-archH*0.55);
  ctx.fill();
  ctx.restore();

  // portal name above arch
  ctx.shadowColor = p.hue; ctx.shadowBlur = 12;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, -archH-22);
  ctx.shadowBlur = 0;
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,220,140,0.7)';
  ctx.fillText(p.sub, 0, -archH-8);

  ctx.restore();

  // PLAY button if player is near
  const near = player.nearPortal === p;
  if (near) {
    const bx=p.x, by=GY-archH-56, bw=100, bh=34;
    const pulse = 0.88 + Math.sin(time*5)*0.12;
    ctx.save();
    ctx.shadowColor = GOLD; ctx.shadowBlur = 18*pulse;
    // button fill
    ctx.fillStyle = `rgba(212,175,55,${0.92*pulse})`;
    ctx.beginPath();
    ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 7);
    ctx.fill();
    // button label
    ctx.shadowBlur=0;
    ctx.fillStyle='#1a0f00';
    ctx.font='bold 17px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PLAY', bx, by);
    // hint
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='10px monospace';
    ctx.textBaseline='alphabetic';
    ctx.fillText('click or press SPACE', bx, by+28);
    ctx.restore();
    p._btn = {x:bx-bw/2, y:by-bh/2, w:bw, h:bh};
  } else {
    p._btn = null;
  }
}

function drawMangaHubBackdrop() {
  const art = window.GodGames && GodGames.MangaArt;
  let drewAsset = false;
  if (art && typeof art.drawImage === 'function') {
    drewAsset = art.drawImage(ctx, HUB_CONCOURSE_ASSET, 0, 0, W, H, {
      fit: 'cover',
      focusX: HUB_CONCOURSE_SOURCE.focusX,
      focusY: HUB_CONCOURSE_SOURCE.focusY,
    });
  }

  if (!drewAsset) {
    drawMangaHubConcourseFallback();
  }

  if (art && art.overlay) art.overlay(ctx, W, H, {
    top: 'rgba(0,0,0,0.08)',
    mid: 'rgba(0,0,0,0.02)',
    bottom: 'rgba(0,0,0,0.24)',
  });
  drawMangaHubStageUnderlay(drewAsset);
  return true;
}

function drawMangaHubConcourseFallback() {
  const s = hubStage();
  ctx.save();
  const sky = ctx.createLinearGradient(0, 0, 0, s.stationTopY);
  sky.addColorStop(0, '#070917');
  sky.addColorStop(0.55, '#1c2442');
  sky.addColorStop(1, '#533451');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(248,232,190,0.86)';
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, s.stationTopY);
  ctx.quadraticCurveTo(W * 0.5, s.stationTopY - H * 0.06, W, s.stationTopY);
  ctx.lineTo(W, s.stationBaseY + H * 0.03);
  ctx.quadraticCurveTo(W * 0.5, s.stationBaseY + H * 0.07, 0, s.stationBaseY + H * 0.03);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  for (const p of portals) {
    const box = hubStationBox(p);
    ctx.fillStyle = 'rgba(54,49,58,0.70)';
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(box.x - box.w * 0.12, box.y - box.h * 0.20, box.w * 1.24, box.h * 1.34, 6);
    ctx.fill();
    ctx.stroke();
  }

  const floor = ctx.createLinearGradient(0, s.stationBaseY, 0, H);
  floor.addColorStop(0, '#d8c08b');
  floor.addColorStop(0.55, '#9b8153');
  floor.addColorStop(1, '#251b12');
  ctx.fillStyle = floor;
  ctx.fillRect(0, s.stationBaseY, W, H - s.stationBaseY);
  ctx.restore();
}

function drawMangaHubStageUnderlay(assetReady = false) {
  const art = window.GodGames && GodGames.MangaArt;
  const s = hubStage();
  ctx.save();
  const floor = ctx.createLinearGradient(0, s.horizonY, 0, H);
  floor.addColorStop(0, assetReady ? 'rgba(255,240,190,0.00)' : 'rgba(255,240,190,0.06)');
  floor.addColorStop(0.60, 'rgba(255,225,140,0.08)');
  floor.addColorStop(1, 'rgba(0,0,0,0.30)');
  ctx.fillStyle = floor;
  ctx.fillRect(0, s.horizonY, W, H - s.horizonY);

  ctx.strokeStyle = 'rgba(10,10,10,0.20)';
  ctx.lineWidth = 1.1;
  for (let i = 0; i <= 8; i++) {
    const t = i / 8;
    const x = W * (0.08 + t * 0.84);
    const hx = s.vanishX + (x - s.vanishX) * 0.18;
    ctx.beginPath();
    ctx.moveTo(hx, s.horizonY);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(255,236,160,0.22)';
  for (let i = 0; i < 5; i++) {
    const y = s.groundY + i * 32;
    ctx.beginPath();
    ctx.ellipse(s.vanishX, y, W * (0.24 + i * 0.10), 9 + i * 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (art && art.contactShadow) {
    for (const p of portals) {
      art.contactShadow(ctx, hubPortalX(p), s.groundY + 7, {
        w: player.nearPortal === p ? 78 : 58,
        h: player.nearPortal === p ? 15 : 11,
        alpha: player.nearPortal === p ? 0.46 : 0.30,
        rim: p.hue,
      });
    }
  }
  ctx.restore();
}

function hubStationBox(p) {
  if (p.mangaSourceRect) return hubSourceRectToScreen(p.mangaSourceRect);
  const s = hubStage();
  const x = hubPortalX(p);
  const w = Math.max(78, Math.min(152, W * 0.096));
  const h = Math.max(80, Math.min(166, H * 0.226));
  return { x: x - w / 2, y: s.stationTopY + H * 0.064, w, h, cx: x, cy: s.stationTopY + H * 0.064 + h / 2, labelY: s.stationBaseY - Math.max(11, H * 0.016) };
}

function drawMangaDestinationStation(p) {
  const art = window.GodGames && GodGames.MangaArt;
  const box = hubStationBox(p);
  const near = player.nearPortal === p;
  const pulse = near ? 0.74 + Math.sin(time * 5) * 0.18 : 0.28 + Math.sin(time * 1.7 + p.slot) * 0.05;
  ctx.save();

  ctx.fillStyle = `rgba(90,62,30,${near ? 0.11 + pulse * 0.05 : 0.07})`;
  ctx.beginPath(); ctx.roundRect(box.x - 2, box.y - 2, box.w + 4, box.h + 4, 2); ctx.fill();
  drawMangaStationPreview(p, box, near);

  ctx.strokeStyle = near ? 'rgba(255,241,184,0.50)' : 'rgba(55,39,20,0.42)';
  ctx.lineWidth = near ? 1.8 : 1;
  ctx.beginPath(); ctx.roundRect(box.x - 0.5, box.y - 0.5, box.w + 1, box.h + 1, 2); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,244,202,0.20)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(box.x + 5, box.y + 5, box.w - 10, box.h - 10, 2); ctx.stroke();
  ctx.restore();

  drawEtchedHubLabel(p, box, near);

  p._btn = hubPortalHitRegion(p);
  if (near) {
    const by = Math.min(H - 42, hubStage().groundY + Math.max(28, H * 0.064));
    const label = p.kind === 'mountain' ? 'ASCEND' : 'ENTER';
    const bw = p.kind === 'mountain' ? 118 : 98;
    const bh = 30;
    if (art && art.drawPanel) art.drawPanel(ctx, box.cx - bw / 2, by - bh / 2, bw, bh, {
      radius: 5,
      paper: 'rgba(255,224,92,0.96)',
      bottom: 'rgba(212,175,55,0.96)',
      accent: '#fff1b8',
      toneAlpha: 0.05,
      lineWidth: 3,
    });
    else {
      ctx.save();
      ctx.fillStyle = GOLD;
      ctx.fillRect(box.cx - bw / 2, by - bh / 2, bw, bh);
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3;
      ctx.strokeRect(box.cx - bw / 2, by - bh / 2, bw, bh);
      ctx.restore();
    }
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `900 ${Math.max(14, Math.min(17, W / 74))}px "Impact", "Arial Black", sans-serif`;
    ctx.fillStyle = '#0a0a0a';
    ctx.fillText(label, box.cx, by + 1);
    ctx.restore();
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#fff1b8';
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 3;
    ctx.strokeText('click or press SPACE', box.cx, by + 30);
    ctx.fillText('click or press SPACE', box.cx, by + 30);
    ctx.restore();
  }
}

function drawMangaStationPreview(p, box, near) {
  const art = window.GodGames && GodGames.MangaArt;
  const frameName = String(p.name || '').toLowerCase();
  const skew = (2 - (p.slot ?? 2)) * 0.012;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(box.x, box.y, box.w, box.h, 2); ctx.clip();
  ctx.transform(1, 0, skew, 1, -skew * (box.y + box.h * 0.5), 0);
  if (art && typeof art.drawFrameCover === 'function'
      && art.drawFrameCover(ctx, HUB_DESTINATION_PANELS_ASSET, frameName, box.x - Math.abs(skew) * box.h, box.y, box.w + Math.abs(skew) * box.h * 2, box.h, {
        focusX: 0.5,
        focusY: 0.48,
        alpha: near ? 0.76 : 0.62,
      })) {
    ctx.filter = 'none';
    ctx.globalCompositeOperation = 'multiply';
    ctx.fillStyle = 'rgba(190,165,122,0.28)';
    ctx.fillRect(box.x - 20, box.y - 2, box.w + 40, box.h + 4);
    ctx.globalCompositeOperation = 'source-over';
    const shade = ctx.createLinearGradient(box.x, box.y, box.x, box.y + box.h);
    shade.addColorStop(0, 'rgba(255,238,186,0.08)');
    shade.addColorStop(0.52, 'rgba(90,68,42,0.07)');
    shade.addColorStop(1, 'rgba(0,0,0,0.22)');
    ctx.fillStyle = shade;
    ctx.fillRect(box.x - 20, box.y, box.w + 40, box.h);
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = 'rgba(35,26,16,0.75)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
      const yy = box.y + box.h * (0.12 + i * 0.15);
      ctx.beginPath();
      ctx.moveTo(box.x - 8, yy + Math.sin(i + p.slot) * 3);
      ctx.bezierCurveTo(box.cx - 18, yy + 7, box.cx + 24, yy - 6, box.x + box.w + 8, yy + Math.cos(i) * 3);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    if (near) {
      ctx.fillStyle = `${p.hue}18`;
      ctx.fillRect(box.x - 20, box.y, box.w + 40, box.h);
    }
    ctx.restore();
    return;
  }

  const g = ctx.createLinearGradient(box.x, box.y, box.x, box.y + box.h);
  const palette = {
    ORION:    ['#081225', '#3b2258', '#100915'],
    ACHILLES: ['#2d0708', '#7d2418', '#160605'],
    PERSEUS:  ['#08272c', '#1a6570', '#071214'],
    OLYMPUS:  ['#1d2440', '#b58a34', '#17100a'],
    ICARUS:   ['#14365a', '#e8872d', '#082133'],
  }[p.name] || ['#101820', p.hue, '#080808'];
  g.addColorStop(0, palette[0]);
  g.addColorStop(0.52, palette[1]);
  g.addColorStop(1, palette[2]);
  ctx.fillStyle = g;
  ctx.fillRect(box.x, box.y, box.w, box.h);

  ctx.globalAlpha = 0.16;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  for (let y = box.y + 8; y < box.y + box.h; y += 11) {
    ctx.beginPath(); ctx.moveTo(box.x, y); ctx.lineTo(box.x + box.w, y + Math.sin(y * 0.03 + time) * 5); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  const cx = box.cx;
  const cy = box.cy;
  const u = Math.min(box.w, box.h);
  ctx.strokeStyle = '#0a0a0a';
  ctx.fillStyle = '#fff1b8';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (p.name === 'ICARUS') {
    ctx.fillStyle = 'rgba(255,238,150,0.92)';
    ctx.beginPath(); ctx.arc(cx + u * 0.20, cy - u * 0.22, u * 0.19, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.strokeStyle = '#fff1b8'; ctx.lineWidth = 3;
    for (let i = 0; i < 4; i++) {
      const yy = cy + u * (0.16 + i * 0.08);
      ctx.beginPath(); ctx.moveTo(box.x + 8, yy); ctx.quadraticCurveTo(cx, yy - 10, box.x + box.w - 8, yy); ctx.stroke();
    }
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(cx - u * 0.19, cy + u * 0.02); ctx.quadraticCurveTo(cx - u * 0.03, cy - u * 0.27, cx + u * 0.19, cy + u * 0.02); ctx.stroke();
  } else if (p.name === 'ORION') {
    const pts = [[-0.24,-0.24],[-0.03,-0.36],[0.15,-0.18],[0.04,0.04],[0.24,0.20]];
    ctx.strokeStyle = '#fff1b8'; ctx.lineWidth = 2.2;
    ctx.beginPath();
    pts.forEach(([px, py], i) => {
      const x = cx + px * u, y = cy + py * u;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.fillStyle = '#fff1b8';
    for (const [px, py] of pts) { ctx.beginPath(); ctx.arc(cx + px * u, cy + py * u, 3, 0, Math.PI * 2); ctx.fill(); }
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.arc(cx + u * 0.12, cy + u * 0.22, u * 0.25, Math.PI * 0.15, Math.PI * 1.35); ctx.stroke();
    ctx.strokeStyle = '#c084ff'; ctx.lineWidth = 2.6; ctx.stroke();
  } else if (p.name === 'ACHILLES') {
    ctx.strokeStyle = '#fff1b8'; ctx.lineWidth = 2.5;
    for (let i = 0; i < 6; i++) {
      const x = box.x + box.w * (0.10 + i * 0.16);
      ctx.beginPath(); ctx.moveTo(x, box.y + 8); ctx.lineTo(x + 26, box.y + box.h - 12); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + 26, box.y + box.h - 12); ctx.lineTo(x + 16, box.y + box.h - 24); ctx.moveTo(x + 26, box.y + box.h - 12); ctx.lineTo(x + 30, box.y + box.h - 26); ctx.stroke();
    }
    ctx.fillStyle = 'rgba(212,175,55,0.82)';
    ctx.beginPath(); ctx.ellipse(cx, cy + u * 0.14, u * 0.20, u * 0.27, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3; ctx.stroke();
  } else if (p.name === 'PERSEUS') {
    ctx.fillStyle = 'rgba(235,255,255,0.78)';
    ctx.beginPath(); ctx.ellipse(cx, cy, u * 0.26, u * 0.34, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3.2; ctx.stroke();
    ctx.strokeStyle = '#b8ffff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - u * 0.19, cy - u * 0.04); ctx.quadraticCurveTo(cx, cy - u * 0.15, cx + u * 0.19, cy - u * 0.04); ctx.stroke();
    ctx.strokeStyle = '#143f45'; ctx.lineWidth = 2.4;
    for (let i = 0; i < 4; i++) {
      const sx = box.x + box.w * (0.20 + i * 0.18);
      ctx.beginPath(); ctx.moveTo(sx, box.y + box.h - 9); ctx.quadraticCurveTo(sx + 10, cy, sx - 2, box.y + 10); ctx.stroke();
    }
  } else {
    ctx.fillStyle = 'rgba(255,245,196,0.88)';
    ctx.beginPath();
    ctx.moveTo(cx - u * 0.36, cy + u * 0.30);
    ctx.lineTo(cx - u * 0.10, cy - u * 0.18);
    ctx.lineTo(cx, cy - u * 0.42);
    ctx.lineTo(cx + u * 0.12, cy - u * 0.16);
    ctx.lineTo(cx + u * 0.38, cy + u * 0.30);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3; ctx.stroke();
    ctx.strokeStyle = '#fff1b8'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx + u * 0.12, cy - u * 0.34); ctx.lineTo(cx - u * 0.03, cy - u * 0.02); ctx.lineTo(cx + u * 0.15, cy - u * 0.05); ctx.lineTo(cx - u * 0.10, cy + u * 0.31); ctx.stroke();
  }

  if (near) {
    ctx.fillStyle = `${p.hue}33`;
    ctx.fillRect(box.x, box.y, box.w, box.h);
  }
  ctx.restore();
}

function drawEtchedHubLabel(p, box, near) {
  const nameSize = Math.max(12, Math.min(16, W / 82));
  const subSize = Math.max(7.5, Math.min(10, W / 132));
  const plaqueW = Math.max(76, box.w * 0.95);
  const plaqueH = Math.max(27, nameSize + subSize + 7);
  const x = box.cx - plaqueW / 2;
  const y = box.labelY - plaqueH * 0.52;
  ctx.save();
  ctx.fillStyle = near ? 'rgba(255,238,184,0.17)' : 'rgba(255,238,184,0.08)';
  ctx.strokeStyle = near ? 'rgba(255,241,184,0.46)' : 'rgba(55,39,20,0.38)';
  ctx.lineWidth = 1.1;
  ctx.beginPath(); ctx.roundRect(x, y, plaqueW, plaqueH, 4); ctx.fill(); ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  ctx.font = `900 ${nameSize}px "Impact", "Arial Black", sans-serif`;
  ctx.fillStyle = 'rgba(255,238,184,0.22)';
  ctx.fillText(p.name, box.cx + 1, y + plaqueH * 0.39 + 1);
  ctx.fillStyle = near ? 'rgba(72,43,18,0.96)' : 'rgba(47,34,22,0.88)';
  ctx.fillText(p.name, box.cx, y + plaqueH * 0.39);

  ctx.font = `700 ${subSize}px Georgia, serif`;
  ctx.fillStyle = 'rgba(255,241,196,0.18)';
  ctx.fillText(p.sub, box.cx + 1, y + plaqueH * 0.72 + 1);
  ctx.fillStyle = near ? 'rgba(49,35,22,0.90)' : 'rgba(36,28,21,0.76)';
  ctx.fillText(p.sub, box.cx, y + plaqueH * 0.72);
  ctx.restore();
}

function drawMangaHubForeground() {
  const s = hubStage();
  ctx.save();
  const bottom = ctx.createLinearGradient(0, s.foregroundY, 0, H);
  bottom.addColorStop(0, 'rgba(0,0,0,0.00)');
  bottom.addColorStop(0.50, 'rgba(0,0,0,0.18)');
  bottom.addColorStop(1, 'rgba(0,0,0,0.58)');
  ctx.fillStyle = bottom;
  ctx.fillRect(0, s.foregroundY, W, H - s.foregroundY);
  ctx.fillStyle = 'rgba(0,0,0,0.24)';
  ctx.beginPath();
  ctx.moveTo(0, H);
  ctx.lineTo(0, H * 0.73);
  ctx.quadraticCurveTo(W * 0.10, H * 0.88, W * 0.22, H);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W, H);
  ctx.lineTo(W, H * 0.73);
  ctx.quadraticCurveTo(W * 0.90, H * 0.88, W * 0.78, H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawMangaHubTitle() {
  const art = window.GodGames && GodGames.MangaArt;
  if (art && art.inkText) {
    const ss = Math.max(0.72, Math.min(1, H / 620));
    art.inkText(ctx, 'GOD GAMES', W / 2, 48, {
      font: `900 ${38 * ss}px "Impact", "Arial Black", sans-serif`,
      fill: '#fff1b8',
      shadow: GOLD,
      shadowBlur: 10,
      strokeWidth: 6 * ss,
    });
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = `bold ${12 * ss}px monospace`;
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#0a0a0a';
    ctx.fillStyle = '#f6d86d';
    ctx.strokeText('Walk the marble lane  ·  Arrow keys to move', W / 2, 72 * ss);
    ctx.fillText('Walk the marble lane  ·  Arrow keys to move', W / 2, 72 * ss);
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px serif';
  ctx.fillStyle = GOLD;
  ctx.shadowColor = GOLD;
  ctx.shadowBlur = 20;
  ctx.fillText('GOD GAMES', W / 2, 46);
  ctx.shadowBlur = 0;
  ctx.font = '13px monospace';
  ctx.fillStyle = 'rgba(255,255,200,0.45)';
  ctx.fillText('Walk to a portal  ·  Arrow keys to move', W / 2, 70);
  ctx.restore();
}

function drawMangaHubAvatar(scale) {
  if (!window.Manga || !Manga.assets || typeof Manga.assets.ready !== 'function'
      || !Manga.assets.ready(HUB_AVATAR_ASSET)
      || typeof Manga.assets.drawFrame !== 'function') return false;

  const drawVx = typeof player.visualVx === 'number' ? player.visualVx : player.vx;
  const moving = Math.abs(drawVx) > 8;
  const ready = Math.max(0, Math.min(1, player.readyT || 0));
  const turn = Math.max(0, Math.min(1, (player.turnT || 0) / HUB_TURN_DUR));
  const turnPhase = 1 - turn;
  const turnSqueeze = turn > 0 ? 0.52 + Math.abs(turnPhase - 0.5) * 0.96 : 1;
  const facing = player.drawFacing || player.facing;
  let frame = 'idle';
  if (ready > 0.45 && !moving) frame = 'ready';
  else if (moving) {
    const walkCycle = ((player.walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
    frame = walkCycle < 0.5 ? 'walkA' : 'walkB';
  }

  const avatarScale = Math.max(0.082, Math.min(0.152, 0.138 * scale));
  const drawX = typeof player.visualX === 'number' ? player.visualX : player.x;
  const drawY = typeof player.visualY === 'number' ? player.visualY : player.y;
  const walkPhase = ((player.walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
  const landing = Math.max(0, Math.min(1, (player.landingT || 0) / HUB_LAND_DUR));
  const bob = moving ? Math.max(0, Math.sin(player.walkPhase)) * 2.4 * scale : ready * 0.9 * scale;
  const art = window.GodGames && GodGames.MangaArt;
  if (art && art.contactShadow) {
    art.contactShadow(ctx, drawX, drawY + 2, {
      w: (24 + Math.abs(drawVx) * 0.018 + landing * 7) * scale,
      h: (5.5 + landing * 2.4) * scale,
      alpha: 0.38 + ready * 0.06 + landing * 0.08,
      rim: 'rgba(255,220,120,0.45)',
    });
  }

  ctx.save();
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  ctx.filter = heavy
    ? 'drop-shadow(0 5px 3px rgba(0,0,0,0.45)) saturate(0.96) contrast(1.04)'
    : 'saturate(0.96) contrast(1.04)';
  const drew = art && typeof art.drawFilmFrame === 'function'
    ? art.drawFilmFrame(ctx, HUB_AVATAR_ASSET, frame, drawX, drawY, {
        scale: avatarScale,
        flipX: facing < 0,
        phase: walkPhase,
        amount: moving ? Math.min(1, Math.abs(drawVx) / 220) : 0.12 + ready * 0.12,
        bob: moving ? 3.0 * scale : 0.7 * scale,
        sway: 0.022,
        squash: 0.026 + landing * 0.06,
        filmScaleX: turnSqueeze,
        filmScaleY: 1 + landing * 0.05,
        lean: (player.visualLean || 0) + ready * facing * -0.012,
        smear: moving ? 5 : false,
        animName: moving ? 'walk' : frame,
      })
    : Manga.assets.drawFrame(ctx, HUB_AVATAR_ASSET, frame, drawX, drawY - bob, {
        scale: avatarScale,
        flipX: facing < 0,
        rotate: (player.visualLean || 0) + ready * facing * -0.012,
      });
  ctx.restore();
  return drew;
}

function drawPlayer() {
  if (mangaOn()) {
    const art = window.GodGames && GodGames.MangaArt;
    const shortScale = Math.max(0.72, Math.min(1, H / 620));
    const scale = (player.isToad ? hubStageScale(player.y, 0.92, 1.06) : hubStageScale(player.y, 0.92, 1.10)) * shortScale;
    if (!player.isToad && drawMangaHubAvatar(scale)) return;
    if (art && art.drawSharedWalker && art.drawSharedWalker(ctx, {
      x: typeof player.visualX === 'number' ? player.visualX : player.x,
      y: typeof player.visualY === 'number' ? player.visualY : player.y,
      facing: player.drawFacing || player.facing,
      walkPhase: player.walkPhase,
      vx: typeof player.visualVx === 'number' ? player.visualVx : player.vx,
      form: player.isToad ? 'toad' : 'human',
      lean: player.visualLean || 0,
      turnT: player.turnT || 0,
      readyT: player.readyT || 0,
      landingT: player.landingT || 0,
      t: time,
    }, { scale })) return;
    if (window.Manga && Manga.characters && Manga.characters.hubWalker) {
      ctx.save();
      ctx.translate(
        typeof player.visualX === 'number' ? player.visualX : player.x,
        typeof player.visualY === 'number' ? player.visualY : player.y
      );
      ctx.rotate(player.visualLean || 0);
      ctx.scale(scale, scale);
      Manga.characters.hubWalker.draw(ctx, {
        x: 0, y: 0, facing: player.drawFacing || player.facing,
        walkPhase: player.walkPhase,
        vx: typeof player.visualVx === 'number' ? player.visualVx : player.vx,
        form: player.isToad ? 'toad' : 'human',
      });
      ctx.restore();
      return;
    }
  }
  if (player.isToad) drawToad(); else drawHuman();
}

function drawHuman() {
  const x=player.x, y=player.y, f=player.facing;
  const walk = player.vx!==0 ? Math.sin(player.walkPhase)*0.9 : 0;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(f, 1);

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(0,0,20,5,0,0,Math.PI*2); ctx.fill();

  // legs
  ctx.lineCap='round';
  ctx.lineWidth=6; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-9+walk*10, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5,-18); ctx.lineTo( 9-walk*10, 0); ctx.stroke();

  // sandals
  ctx.lineWidth=3; ctx.strokeStyle='#8a6030';
  ctx.beginPath(); ctx.moveTo(-10+walk*10,-1); ctx.lineTo(-6+walk*10,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(  8-walk*10,-1); ctx.lineTo( 4-walk*10,-1); ctx.stroke();

  // robe body
  const robeG = ctx.createLinearGradient(-12,-50,12,-50);
  robeG.addColorStop(0,'#d8d0be'); robeG.addColorStop(0.5,'#f0e8d8'); robeG.addColorStop(1,'#b8b0a0');
  ctx.fillStyle=robeG;
  ctx.beginPath();
  ctx.moveTo(-11,-18); ctx.lineTo(-13,-50); ctx.lineTo(13,-50); ctx.lineTo(11,-18);
  ctx.closePath(); ctx.fill();
  // robe fold lines
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-4,-50); ctx.lineTo(-5,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4,-50); ctx.lineTo( 5,-18); ctx.stroke();

  // arms
  ctx.lineWidth=5; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-11,-44); ctx.lineTo(-16-walk*5,-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 11,-44); ctx.lineTo( 16+walk*5,-30); ctx.stroke();

  // neck
  ctx.fillStyle='#c0995a';
  ctx.fillRect(-4,-56,8,8);

  // head
  ctx.beginPath(); ctx.arc(0,-62,12,0,Math.PI*2); ctx.fillStyle='#c0995a'; ctx.fill();
  // hair
  ctx.fillStyle='#2a1808';
  ctx.beginPath(); ctx.arc(0,-65,11,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-7,-60,4,Math.PI*0.8,Math.PI*1.6); ctx.fill();
  // eye
  ctx.fillStyle='#1a1008';
  ctx.beginPath(); ctx.arc(5,-62,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(6,-63,0.8,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawToad() {
  const x=player.x, y=player.y, f=player.facing;
  const moving = player.vx !== 0;
  // hop arc when moving — toad rises and stretches mid-air
  const hopT   = moving ? Math.max(0, Math.sin(player.walkPhase)) : 0;
  const hop    = hopT * 16;
  const stretch = hopT * 0.10;

  ctx.save();
  ctx.translate(x, y);

  // ground shadow (shrinks while toad is in the air)
  const shScale = 1 - hop/42;
  ctx.fillStyle = `rgba(0,0,0,${0.32*shScale})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, 26*shScale, 5*shScale, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.translate(0, -hop);
  ctx.scale(f * (1 - stretch*0.4), 1 + stretch);

  // ── BACK LEG (folded, behind body) ───────────────────────────────
  ctx.fillStyle = '#2d5d2a';
  ctx.beginPath();
  ctx.ellipse(-14, -14, 14, 9, -0.2, 0, Math.PI*2);
  ctx.fill();
  // back foot
  ctx.fillStyle = '#3a7a36';
  ctx.beginPath();
  ctx.ellipse(-22, -3, 14, 5, 0.05, 0, Math.PI*2);
  ctx.fill();
  // webbed toes
  ctx.strokeStyle = '#1c3a1a'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(-28, -3);
    ctx.lineTo(-36 + i*2, -2 + (i-1)*2);
    ctx.stroke();
  }

  // ── BODY (head + body fused, squat oval) ─────────────────────────
  const bodyG = ctx.createRadialGradient(8, -32, 4, 4, -22, 30);
  bodyG.addColorStop(0,    '#6cb064');
  bodyG.addColorStop(0.55, '#3f7a39');
  bodyG.addColorStop(1,    '#214c1f');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(2, -18, 24, 18, 0, 0, Math.PI*2);
  ctx.fill();

  // pale belly underside
  ctx.fillStyle = 'rgba(222,228,168,0.9)';
  ctx.beginPath();
  ctx.ellipse(2, -9, 18, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // ── WARTS ────────────────────────────────────────────────────────
  const warts = [[-10,-30],[-2,-34],[8,-32],[16,-26],[-14,-22],[12,-20],[20,-18],[-8,-24]];
  ctx.fillStyle = '#1c3a1a';
  for (const [wx,wy] of warts) {
    ctx.beginPath(); ctx.arc(wx, wy, 1.8, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(170,210,130,0.7)';
  for (const [wx,wy] of warts) {
    ctx.beginPath(); ctx.arc(wx-0.6, wy-0.7, 0.7, 0, Math.PI*2); ctx.fill();
  }

  // ── FRONT LEG ────────────────────────────────────────────────────
  ctx.fillStyle = '#3a7a36';
  ctx.beginPath();
  ctx.ellipse(15, -3, 7, 4.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#1c3a1a'; ctx.lineWidth = 1.5;
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(19, -2);
    ctx.lineTo(24 + i*1.5, 0.5);
    ctx.stroke();
  }

  // ── MOUTH (wide curve across the front) ──────────────────────────
  ctx.strokeStyle = '#0e1a0d'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(8, -14);
  ctx.quadraticCurveTo(20, -10, 25, -16);
  ctx.stroke();
  // tongue peek at the corner
  ctx.fillStyle = '#c8484a';
  ctx.beginPath(); ctx.arc(19, -12, 1.2, 0, Math.PI*2); ctx.fill();

  // ── BACK EYE BUMP (further, smaller) ─────────────────────────────
  ctx.fillStyle = '#3f7a39';
  ctx.beginPath(); ctx.ellipse(-2, -34, 6, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4b240';
  ctx.beginPath(); ctx.arc(-1, -34, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.ellipse(-1, -34, 1, 3, 0, 0, Math.PI*2); ctx.fill();

  // ── FRONT EYE BUMP (large, prominent) ────────────────────────────
  ctx.fillStyle = '#4d8c46';
  ctx.beginPath(); ctx.ellipse(14, -36, 8.5, 9, 0, 0, Math.PI*2); ctx.fill();
  // golden iris
  ctx.fillStyle = '#f0c844';
  ctx.beginPath(); ctx.arc(15, -36, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7a4a10'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(15, -36, 5.5, 0, Math.PI*2); ctx.stroke();
  // vertical slit pupil
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.ellipse(15, -36, 1.4, 4.6, 0, 0, Math.PI*2); ctx.fill();
  // catchlight
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(16.6, -38, 1.0, 0, Math.PI*2); ctx.fill();

  // nostril
  ctx.fillStyle = '#1a2818';
  ctx.beginPath(); ctx.arc(22, -22, 0.9, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const mangaOn = localStorage.getItem(MANGA_KEY) === '1';
  let mangaSceneBackdrop = false;
  if (mangaOn) mangaSceneBackdrop = drawMangaHubBackdrop();

  if (!mangaSceneBackdrop) {
  // Sky
  const sky = ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#04071a'); sky.addColorStop(0.55,'#091230'); sky.addColorStop(1,'#131d40');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Stars
  for (const s of stars) {
    const b = Math.sin(time*1.8+s.phase)*0.35+0.65;
    ctx.globalAlpha=b*0.9; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Moon
  ctx.save();
  ctx.shadowColor='rgba(230,230,200,0.5)'; ctx.shadowBlur=35;
  ctx.fillStyle='#f0ead8';
  ctx.beginPath(); ctx.arc(W*0.14,H*0.11,34,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#091230';
  ctx.beginPath(); ctx.arc(W*0.14+10,H*0.11,29,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Distant mountains / ruins silhouette
  ctx.fillStyle='rgba(10,15,35,0.9)';
  ctx.beginPath();
  ctx.moveTo(0,GY);
  const mpts = [0,.08,.14,.20,.28,.35,.44,.52,.60,.70,.80,.88,.95,1];
  const mhts = [0.22,0.15,0.30,0.18,0.25,0.12,0.28,0.16,0.22,0.10,0.20,0.14,0.08,0];
  for (let i=0;i<mpts.length;i++) ctx.lineTo(mpts[i]*W, GY-mhts[i]*H*0.55);
  ctx.lineTo(W,GY); ctx.closePath(); ctx.fill();

  // Ground stone
  const gnd = ctx.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#6a5c40'); gnd.addColorStop(0.08,'#524630'); gnd.addColorStop(1,'#201808');
  ctx.fillStyle=gnd; ctx.fillRect(0,GY,W,H-GY);

  // tile grid
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  for (let x=0;x<W;x+=72){ ctx.beginPath(); ctx.moveTo(x,GY); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=GY;y<H;y+=28){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle='rgba(200,180,130,0.22)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();

  // ambient motes
  for (const m of motes) {
    ctx.globalAlpha=Math.max(0,m.alpha)*0.5;
    ctx.fillStyle='rgba(180,220,255,1)';
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  }

  // Columns flanking the portals — left of leftmost, right of rightmost.
  const leftX  = portals[0].x;
  const rightX = portals[portals.length-1].x;
  const colXs = [
    leftX * 0.25, leftX * 0.65,
    rightX + (W - rightX) * 0.30, rightX + (W - rightX) * 0.72,
  ];
  // Only activate manga rendering once the actual scene functions have loaded.
  // The loader is async, so on the very first frame the namespace may exist
  // but its draw functions don't yet — fall back to normal draws until ready.
  const _mangaActive = localStorage.getItem(MANGA_KEY) === '1'
    && window.Manga
    && typeof Manga.scenes?.column === 'function'
    && typeof Manga.scenes?.archPortal === 'function'
    && typeof Manga.scenes?.olympus === 'function';
  if (!mangaOn && !mangaSceneBackdrop) {
    for (const cx of colXs) {
      if (_mangaActive) Manga.scenes.column(ctx, { x: cx, gy: GY });
      else drawColumn(cx);
    }
  }

  // Destinations. Manga mode uses concourse shrine stations; normal mode keeps
  // the original arch/mountain portals.
  for (const p of portals) {
    if (mangaOn) {
      drawMangaDestinationStation(p);
    } else if (_mangaActive) {
      if (p.kind === 'mountain') {
        Manga.scenes.olympus(ctx, { x: p.x, gy: GY, name: p.name, sub: p.sub, near: player.nearPortal === p, time });
      } else {
        Manga.scenes.archPortal(ctx, { x: p.x, gy: GY, name: p.name, sub: p.sub, hue: p.hue, near: player.nearPortal === p, time });
      }
    } else {
      if (p.kind === 'mountain') drawMountain(p); else drawPortal(p);
    }
  }

  // On touch devices, expand each portal's tap region to cover the whole arch
  // so the player can navigate by tapping any portal directly (no walking).
  if (IS_TOUCH) {
    const gy = hubGroundY();
    for (const p of portals) {
      const isMtn = p.kind === 'mountain';
      const w = isMtn ? 220 : 150;
      const h = isMtn ? 230 : 200;
      const x = hubPortalX(p);
      p._btn = { x: x - w/2, y: gy - h, w, h };
    }
  }

  // Player
  drawPlayer();
  if (mangaOn) drawMangaHubForeground();

  // Manga atmosphere — bold overlay so the screen unmistakably reads "manga".
  // Drawn on top of the world but below the Zeus cinematic + title + toast.
  const _mangaOn = mangaOn;
  const art = window.GodGames && GodGames.MangaArt;
  if (_mangaOn && window.Manga && art) {
    // The manga *art* (scenes + characters) carries most of the look now;
    // these overlays only add atmosphere, not replace it.
    if (typeof art.halftone === 'function') {
      art.halftone(ctx, 0, 0,  W, GY,    { density: 7, dotSize: 1.7, alpha: 0.10, color: '#000' });
      art.halftone(ctx, 0, GY, W, H - GY, { density: 6, dotSize: 1.7, alpha: 0.18, color: '#000' });
    }
    if (typeof art.scanlines === 'function') art.scanlines(ctx, 0, 0, W, H, { spacing: 3, alpha: 0.09 });
    if (typeof art.vignette === 'function') art.vignette(ctx, 0, 0, W, H, { strength: 0.6 });
  }
  // Apply a CSS filter to the canvas itself so the whole frame reads desaturated +
  // high-contrast — the difference is immediate and obvious.
  const desiredFilter = _mangaOn ? 'contrast(1.18) saturate(0.78)' : 'none';
  if (canvas.style.filter !== desiredFilter) canvas.style.filter = desiredFilter;

  // Storm brewing over Olympus as the codeword is typed.
  renderStorm();
  renderInvocationSeal();

  // Toad-only mushroom on Mt. Olympus. The player has to be in toad form
  // (press 't') to see it; jumping onto it cuts to the clue review scene.
  if (player.isToad) renderToadMushroom();

  // Zeus cinematic — drawn on top of atmosphere so the bolt + flash dominate.
  if (_zeusStrike) _zeusStrike.render(ctx, W, H);

  // Title
  if (mangaOn) {
    drawMangaHubTitle();
  } else {
    ctx.save();
    ctx.textAlign='center';
    ctx.font='bold 30px serif';
    ctx.fillStyle=GOLD; ctx.shadowColor=GOLD; ctx.shadowBlur=20;
    ctx.fillText('GOD GAMES', W/2, 46);
    ctx.shadowBlur=0;
    ctx.font='13px monospace';
    ctx.fillStyle='rgba(255,255,200,0.45)';
    ctx.fillText('Walk to a portal  ·  Arrow keys to move', W/2, 70);
    ctx.restore();
  }

  // Manga easter-egg toast (centered, fades out)
  renderMangaAwakening();
  if (_mangaToast.t > 0) {
    const a = Math.min(1, _mangaToast.t / 0.6);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    if (mangaOn && window.GodGames && GodGames.MangaArt && GodGames.MangaArt.drawPanel) {
      const bw = Math.min(560, W * 0.66);
      GodGames.MangaArt.drawPanel(ctx, W / 2 - bw / 2, H * 0.39 - 42, bw, 84, {
        accent: _mangaToast.color,
        paper: 'rgba(246,236,210,0.96)',
        bottom: 'rgba(210,192,150,0.96)',
        toneAlpha: 0.12,
      });
      GodGames.MangaArt.inkText(ctx, _mangaToast.text, W / 2, H * 0.39 + 10, {
        font: '900 28px "Impact", "Arial Black", sans-serif',
        fill: _mangaToast.color,
        strokeWidth: 5,
      });
    } else {
      ctx.font = 'bold 26px monospace';
      ctx.fillStyle = _mangaToast.color;
      ctx.shadowColor = _mangaToast.color; ctx.shadowBlur = 18;
      ctx.fillText(_mangaToast.text, W/2, H * 0.42);
    }
    ctx.restore();
  }

}

// ── Loop ──────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts) {
  if (lastTime===null) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────
function inputBusy(e) {
  // skip the canvas key handlers when the user is typing in a form field
  // or when a modal is open
  if (document.getElementById('modalBg')?.classList.contains('open')) return true;
  const tag = e.target?.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA';
}

// Secret manga mode — the codeword is inferred from per-game mysteries.
// 'shankle' remains as a dev bypass for testing.
// 'normal' reverts.
// Persisted in localStorage so the toggle survives navigation to game pages,
// where engine.js reads it at boot and exposes Engine.manga.
const CODEWORD = (window.GodGames && window.GodGames.Mysteries && window.GodGames.Mysteries.MANGA_CODEWORD) || 'zeus';
const DEV_BYPASS_CODEWORD = 'shankle';
let _typedBuf = '';
let _mangaToast = { text: '', t: 0, color: '#D4AF37' };
function showMangaToast(text, color) { _mangaToast = { text, t: 2.6, color: color || '#D4AF37' }; }

// Storm-brewing state — progress through each letter of CODEWORD darkens
// the sky over Olympus and increases lightning frequency. Wrong key dissipates.
let _codewordIdx     = 0;        // how many letters of CODEWORD typed in sequence
let _stormIntensity  = 0;        // 0..1, eased toward _codewordIdx / CODEWORD.length
let _stormFlashes    = [];       // {x, y, life, maxLife, branches}
let _lastStormTickT  = 0;
let _mangaAwakenT    = 0;

// Active Zeus strike instance (only present during the cinematic).
let _zeusStrike = null;
function codewordReady() {
  const M = window.GodGames && window.GodGames.Mysteries;
  return !!(M && M.mangaCodewordReady && M.mangaCodewordReady());
}
function activateMangaMode() {
  const M = window.GodGames && window.GodGames.Mysteries;
  if (M && typeof M.triggerMangaUnlock === 'function') M.triggerMangaUnlock();
  else localStorage.setItem(MANGA_KEY, '1');
  syncMangaClass();
  _mangaAwakenT = 3.8;
  for (let i = 0; i < 5; i++) spawnStormFlash();
}
function startZeusStrike() {
  if (!window.Manga || !Manga.fx || !Manga.fx.zeusStrike) {
    // Library not loaded yet — fall back to instant flip so the toggle still works.
    activateMangaMode();
    showMangaToast('MANGA MODE ACTIVATED', '#ff44aa');
    return;
  }
  ensureAudio();
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  const gy = hubGroundY();
  _zeusStrike = Manga.fx.zeusStrike({
    fromX: hubPortalX(olympus),
    fromY: gy - 220,            // above the mountain peak
    toX:   player.x,
    toY:   player.y - 30,
    audioCtx,
    onImpact: () => {
      activateMangaMode();
      showMangaToast('THE GODS HAVE SPOKEN', '#ffeeaa');
    },
    onDone: () => { _zeusStrike = null; },
  });
  _zeusStrike.start();
}

window.addEventListener('keydown', e => {
  if (inputBusy(e)) return;
  // easter egg: 't' toggles toad form (ignore key-repeat so a held key only flips once)
  if (!e.repeat && (e.key === 't' || e.key === 'T')) {
    player.isToad = !player.isToad;
    ensureAudio(); // unlock audio on user gesture so the first ribbit plays
  }
  // Sequence-detector: append printable chars, keep last 12.
  if (e.key && e.key.length === 1) {
    const ch = e.key.toLowerCase();
    _typedBuf = (_typedBuf + ch).slice(-12);
    // Per-letter progress through CODEWORD — drives the Olympus storm.
    if (ch === CODEWORD[_codewordIdx]) {
      _codewordIdx++;
      if (_codewordIdx >= CODEWORD.length) {
        _codewordIdx = 0;
        if (codewordReady() && localStorage.getItem(MANGA_KEY) !== '1' && !_zeusStrike) {
          startZeusStrike();
        }
      }
    } else if (_codewordIdx > 0) {
      // Broken sequence — let the storm dissipate. (If the wrong char happens
      // to be the FIRST letter of CODEWORD, restart progress at 1.)
      _codewordIdx = (ch === CODEWORD[0]) ? 1 : 0;
    }
    // Dev bypass — typing 'shankle' summons Zeus regardless of earned letters.
    if (_typedBuf.endsWith(DEV_BYPASS_CODEWORD)) {
      _typedBuf = '';
      _codewordIdx = 0;
      if (localStorage.getItem(MANGA_KEY) !== '1' && !_zeusStrike) {
        startZeusStrike();
      }
    }
    if (_typedBuf.endsWith('normal')) {
      localStorage.removeItem(MANGA_KEY);
      syncMangaClass();
      showMangaToast('NORMAL MODE', '#D4AF37');
      _typedBuf = '';
      _codewordIdx = 0;
    }
    // Dev: type 'debugon' / 'debugoff' to toggle the mystery debug overlays in
    // each game; type 'wipemysteries' to clear all unlock flags + counters.
    if (_typedBuf.endsWith('debugon')) {
      localStorage.setItem('godgames_debug', '1');
      showMangaToast('DEBUG ON', '#aaddff');
      _typedBuf = '';
    }
    if (_typedBuf.endsWith('debugoff')) {
      localStorage.removeItem('godgames_debug');
      showMangaToast('DEBUG OFF', '#aaddff');
      _typedBuf = '';
    }
    if (_typedBuf.endsWith('wipemysteries')) {
      localStorage.removeItem('tns.unlocks');
      localStorage.removeItem('tns.counters');
      showMangaToast('MYSTERIES WIPED', '#ff88cc');
      _typedBuf = '';
    }
  }
  keys[e.key]=true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { if (!inputBusy(e)) keys[e.key]=false; });

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
  // pointer cursor over PLAY button
  let overBtn=false;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mouse.x>=b.x && mouse.x<=b.x+b.w && mouse.y>=b.y && mouse.y<=b.y+b.h) { overBtn=true; break; }
    }
  }
  canvas.style.cursor = overBtn ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  // Block portal navigation while the name modal is open.
  if (document.getElementById('modalBg')?.classList.contains('open')) return;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) {
        window.location.href=p.href;
      }
    }
  }
});

// ── Player name (localStorage) ────────────────────────────────────────────
const NAME_KEY = 'godgames_playerName';
const $ = (id) => document.getElementById(id);

function getName() { return localStorage.getItem(NAME_KEY) || ''; }
function setName(n) {
  const clean = (n || '').replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g,' ').trim().slice(0,20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  $('whoName').textContent = clean;
  return true;
}
function showModal(initial) {
  $('nameInput').value = initial != null ? initial : getName();
  $('modalBg').classList.add('open');
  setTimeout(() => $('nameInput').focus(), 50);
}
function hideModal() { $('modalBg').classList.remove('open'); }

$('changeNameBtn').addEventListener('click', () => showModal());
$('nameSave').addEventListener('click', () => {
  if (setName($('nameInput').value)) hideModal();
});
$('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && setName($('nameInput').value)) hideModal();
  e.stopPropagation();
});

(function initName() {
  const n = getName();
  if (!n) showModal('');
  else $('whoName').textContent = n;
})();
</script>
</body>
