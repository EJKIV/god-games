<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family: 'Trebuchet MS', serif; color:#f0e8d0; }
canvas { display:block; cursor:default; }

/* ── Landscape rotation prompt (touch + portrait only) ── */
.rotate-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #04071a; color: #D4AF37;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 22px; font-family: 'Trebuchet MS', serif; font-size: 22px;
  letter-spacing: 0.1em; text-align: center;
}
.rotate-icon {
  width: 56px; height: 92px;
  border: 3px solid #D4AF37; border-radius: 8px;
  box-shadow: 0 0 24px rgba(212,175,55,0.45);
  animation: rotate-bob 2.4s ease-in-out infinite;
}
@keyframes rotate-bob {
  0%, 25%, 100% { transform: rotate(0deg); }
  55%, 80%      { transform: rotate(-90deg); }
}
@media (orientation: portrait) and (pointer: coarse) {
  body > *:not(.rotate-overlay) { display: none !important; }
  .rotate-overlay { display: flex !important; }
}

/* ── Top-right HUD: player name ── */
#whoBar {
  position:fixed; top:18px; right:22px; z-index:5;
  font-family: monospace; font-size:13px;
  background:rgba(10,14,28,0.6); border:1px solid rgba(212,175,55,0.35);
  padding:6px 14px; border-radius:3px;
  color:rgba(240,215,122,0.85);
  pointer-events:auto;
}
#whoBar b { color:#D4AF37; }
#whoBar button {
  background:none; border:none; color:rgba(240,215,122,0.6);
  cursor:pointer; font:inherit; margin-left:10px; text-decoration:underline;
}
#whoBar button:hover { color:#D4AF37; }

/* ── Modal (name prompt) ── */
.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.82);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #131d40 0%, #04071a 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow: 0 0 50px rgba(212,175,55,0.4);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(240,215,122,0.7); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(10,14,28,0.6); border:1px solid rgba(212,175,55,0.5);
  color:#f0e8d0; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.4); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#1a0f00;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<div class="rotate-overlay">
  <div class="rotate-icon"></div>
  <div>ROTATE YOUR DEVICE</div>
  <div style="font-size:13px; opacity:0.7; letter-spacing:0.04em;">The hub is best viewed in landscape</div>
</div>
<canvas id="c"></canvas>

<div id="whoBar">Playing as: <b id="whoName">…</b><button id="changeNameBtn">change</button></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE MORTAL</h3>
    <p>Speak your name, that the gods might know you.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">ENTER OLYMPUS</button>
  </div>
</div>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="mysteries.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;
const GOLD = '#D4AF37';
const GY   = H * 0.73;   // ground y

// ── Stars ─────────────────────────────────────────────────────────────────
const stars = Array.from({length:160}, () => ({
  x: Math.random()*W, y: Math.random()*GY*0.9,
  r: Math.random()*1.6+0.2,
  phase: Math.random()*Math.PI*2,
}));

// ── Portals ───────────────────────────────────────────────────────────────
// To add a new game: append an entry. x is auto-distributed across the screen.
// kind: 'arch' (default) draws an archway portal; 'mountain' draws a snow-capped peak.
const portals = [
  { name: 'ORION',    sub: 'The Giant Scorpion',    hue: '#8844ff', glow: '#6622cc', href: 'orion.html'         },
  { name: 'ACHILLES', sub: 'The Arrow Gauntlet',    hue: '#cc2222', glow: '#882200', href: 'achilles.html'      },
  { name: 'OLYMPUS',  sub: 'Hall of the Gods',      hue: '#fff5c0', glow: '#D4AF37', href: 'mount-olympus.html', kind: 'mountain' },
  { name: 'ICARUS',   sub: 'The Flight of Icarus',  hue: '#ff7700', glow: '#ff4400', href: 'icarus.html'        },
];
portals.forEach((p, i) => { p.x = W * (i + 1) / (portals.length + 1); p._btn = null; });
const PORTAL_RADIUS = Math.min(130, (W / (portals.length + 1)) * 0.45);
const IS_TOUCH = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);

// ── Particle motes ────────────────────────────────────────────────────────
const motes = Array.from({length:28}, () => ({
  x: Math.random()*W, y: GY - Math.random()*GY*0.8,
  vy: -12 - Math.random()*18,
  alpha: Math.random(),
  r: Math.random()*1.8+0.4,
}));

// ── Player ────────────────────────────────────────────────────────────────
const player = {
  x: W*0.32, y: GY,
  vx: 0,
  facing: 1,
  walkPhase: 0,
  nearPortal: null,
  isToad: false, // easter egg: press 't' to toggle
};

let keys = {}, time = 0, mouse = {x:0, y:0};
let lastHopCycle = 0; // tracks toad's hop cycle to fire one ribbit per hop

// ── Audio (lazy — created on first user gesture) ──────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function ribbit() {
  const ac = ensureAudio();
  if (!ac) return;
  const t0 = ac.currentTime;
  // two short bursts — "ri" then a longer "bbit"
  const bursts = [
    { start: 0,    dur: 0.07, f0: 200, f1: 130, vol: 0.14 },
    { start: 0.10, dur: 0.20, f0: 170, f1:  80, vol: 0.20 },
  ];
  for (const b of bursts) {
    const osc = ac.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(b.f0, t0 + b.start);
    osc.frequency.exponentialRampToValueAtTime(b.f1, t0 + b.start + b.dur);
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 900; filt.Q.value = 6;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.0001, t0 + b.start);
    gain.gain.exponentialRampToValueAtTime(b.vol, t0 + b.start + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + b.start + b.dur);
    osc.connect(filt).connect(gain).connect(ac.destination);
    osc.start(t0 + b.start);
    osc.stop(t0 + b.start + b.dur + 0.02);
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  time += dt;

  // movement — toad is twice as fast
  const left  = keys['ArrowLeft']  || keys['a'];
  const right = keys['ArrowRight'] || keys['d'];
  const speed = player.isToad ? 440 : 220;
  player.vx = right ? speed : left ? -speed : 0;
  if (player.vx !== 0) { player.facing = player.vx > 0 ? 1 : -1; player.walkPhase += dt*7; }
  player.x = Math.max(50, Math.min(W-50, player.x + player.vx*dt));

  // ribbit once per hop while moving as toad
  if (player.isToad && player.vx !== 0) {
    const cycle = Math.floor(player.walkPhase / (Math.PI * 2));
    if (cycle !== lastHopCycle) { ribbit(); lastHopCycle = cycle; }
  } else {
    lastHopCycle = Math.floor(player.walkPhase / (Math.PI * 2));
  }

  // portal proximity
  player.nearPortal = null;
  for (const p of portals) {
    if (Math.abs(player.x - p.x) < PORTAL_RADIUS) { player.nearPortal = p; break; }
  }

  // enter portal via Space / Enter
  if (player.nearPortal && (keys[' '] || keys['Enter'])) {
    window.location.href = player.nearPortal.href;
  }

  // manga toast lifetime
  if (_mangaToast.t > 0) _mangaToast.t = Math.max(0, _mangaToast.t - dt);

  // Mystery cinematic — runs even on the hub if a hint is earned elsewhere
  // and the player returns mid-cinematic. (Most cinematics start in-game.)
  if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.update(dt);

  // Storm-brewing intensity eases toward the codeword progress fraction.
  // Mid-codeword → builds; broken sequence → dissipates.
  const target = _codewordIdx / CODEWORD.length;
  _stormIntensity += (target - _stormIntensity) * Math.min(1, dt * 4);
  // Spawn lightning flashes more often as intensity climbs.
  if (_stormIntensity > 0.15) {
    const rate = _stormIntensity * _stormIntensity * 4;   // 0..4 flashes/sec
    if (Math.random() < dt * rate) spawnStormFlash();
  }
  for (let i = _stormFlashes.length - 1; i >= 0; i--) {
    _stormFlashes[i].life -= dt;
    if (_stormFlashes[i].life <= 0) _stormFlashes.splice(i, 1);
  }

  // Zeus cinematic
  if (_zeusStrike) _zeusStrike.update(dt);

  // motes drift upward, reset at bottom
  for (const m of motes) {
    m.y  += m.vy * dt;
    m.alpha -= dt * 0.18;
    if (m.alpha <= 0 || m.y < GY - H*0.75) {
      m.x     = Math.random()*W;
      m.y     = GY - Math.random()*30;
      m.alpha = 0.6 + Math.random()*0.4;
      m.vy    = -12 - Math.random()*18;
    }
  }
}

// ── Storm-brewing helpers ────────────────────────────────────────────────
function spawnStormFlash() {
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  if (!olympus) return;
  const cx = olympus.x + (Math.random() - 0.5) * 140;
  const cy = GY - 200 - Math.random() * 60;
  // Branching ink path drawn during render — pre-roll the segments now.
  const branches = [];
  let x = cx, y = cy;
  while (y < GY - 60 + Math.random() * 30) {
    const nx = x + (Math.random() - 0.5) * 30;
    const ny = y + 12 + Math.random() * 20;
    branches.push([x, y, nx, ny]);
    x = nx; y = ny;
  }
  // Side fork
  if (branches.length > 2 && Math.random() < 0.5) {
    const [, , bx, by] = branches[Math.floor(branches.length * 0.4)];
    let fx = bx, fy = by;
    for (let k = 0; k < 3; k++) {
      const nx = fx + (Math.random() < 0.5 ? -1 : 1) * (8 + Math.random() * 16);
      const ny = fy + 8 + Math.random() * 12;
      branches.push([fx, fy, nx, ny]);
      fx = nx; fy = ny;
    }
  }
  _stormFlashes.push({ life: 0.18, maxLife: 0.18, branches });
}

function renderStorm() {
  if (_stormIntensity < 0.02) return;
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  if (!olympus) return;
  const cx = olympus.x;
  const ay = GY - 240;
  const intensity = _stormIntensity;

  ctx.save();
  // Dark cloud bank above the mountain — alpha + size scale with intensity.
  const cloudAlpha = Math.min(0.85, 0.15 + intensity * 0.85);
  for (let i = 0; i < 7; i++) {
    const ox = (i - 3) * 60 + Math.sin(time * 0.6 + i) * 14;
    const oy = Math.cos(time * 0.5 + i * 1.3) * 6;
    const r  = 60 + intensity * 26 + Math.sin(time * 0.4 + i * 2) * 6;
    const g = ctx.createRadialGradient(cx + ox, ay + oy, 4, cx + ox, ay + oy, r);
    const dark = `rgba(20,18,38,${cloudAlpha})`;
    g.addColorStop(0,    dark);
    g.addColorStop(0.6,  `rgba(35,30,60,${cloudAlpha * 0.6})`);
    g.addColorStop(1,    'rgba(20,18,38,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx + ox, ay + oy, r, 0, Math.PI * 2); ctx.fill();
  }
  // Distant orange glow on the mountain peak (fire light from the storm).
  ctx.globalAlpha = Math.min(1, intensity);
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 20 * intensity;
  ctx.fillStyle = `rgba(255,140,40,${0.06 + intensity * 0.18})`;
  ctx.beginPath(); ctx.arc(cx, GY - 50, 90 + intensity * 40, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  // Lightning flashes — bright ink branches with bloom.
  for (const fl of _stormFlashes) {
    const a = fl.life / fl.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 18;
    ctx.strokeStyle = '#fff5c0';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const [x1, y1, x2, y2] of fl.branches) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    // Inner core
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1.5;
    for (const [x1, y1, x2, y2] of fl.branches) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    ctx.restore();
  }
  // Codeword progress strip ("sh-a-n-..." showing typed letters in gold,
  // remaining as faint outlines). Sits just above the mountain.
  if (_codewordIdx > 0) {
    const stripY = GY - 320;
    const cellW = 22;
    const total = CODEWORD.length;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let i = 0; i < total; i++) {
      const ch = CODEWORD[i].toUpperCase();
      const x = cx + (i - (total - 1) / 2) * cellW;
      if (i < _codewordIdx) {
        ctx.fillStyle = GOLD;
        ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 10;
        ctx.fillText(ch, x, stripY);
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = 'rgba(220,200,150,0.25)';
        ctx.fillText('·', x, stripY);
      }
    }
  }
  ctx.restore();
}

// ── Mysteries panel ──────────────────────────────────────────────────────
// Cryptic right-edge scroll. Locked mysteries show only a poetic flavor
// line — never instructions. Once a hint is earned, the panel reveals only
// the syllable/fragment as a poetic line; the player has to figure out what
// to do with the fragments. Solved mysteries get a single celebration line.
function renderMysteriesPanel() {
  const Mysteries = window.GodGames && window.GodGames.Mysteries;
  if (!Mysteries) return;
  const panelW = 230;
  const x0 = W - panelW - 18;
  const y0 = 80;
  const items = Mysteries.list;

  ctx.save();
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';

  // First pass: measure required height (no draws — just font metrics).
  const lh = 13;
  let neededH = 30;
  for (const m of items) {
    neededH += 18; // title row
    for (const h of m.hints || []) {
      if (Mysteries.hasHint(h.id)) {
        ctx.font = 'italic 10px serif';
        const w = ctx.measureText('· ' + h.fragment).width;
        const lines = Math.max(1, Math.ceil(w / (panelW - 24)));
        neededH += lines * lh + 1;
      }
    }
    if (Mysteries.isSolved(m.id)) {
      ctx.font = 'italic 10px serif';
      const w = ctx.measureText('✓ ' + (m.solvedFlavor || '')).width;
      const lines = Math.max(1, Math.ceil(w / (panelW - 24)));
      neededH += lines * lh + 4;
    }
    neededH += 6;
  }
  const panelH = Math.min(H - 100, neededH);

  // Background scroll
  ctx.fillStyle = 'rgba(15,10,4,0.78)';
  ctx.strokeStyle = 'rgba(212,175,55,0.45)';
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.roundRect(x0, y0, panelW, panelH, 6);
  ctx.fill(); ctx.stroke();

  // Header
  ctx.fillStyle = GOLD; ctx.font = 'bold 12px monospace';
  ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
  ctx.fillText('THE MYSTERIES', x0 + 12, y0 + 10);
  ctx.shadowBlur = 0;

  let y = y0 + 30;
  for (const m of items) {
    if (y + 18 > y0 + panelH) break;
    const solved = Mysteries.isSolved(m.id);
    const blocked = m.requires && !Mysteries.isSolved(m.requires);

    // Title row — solved/locked/blocked all stay short and poetic.
    ctx.font = 'bold 10px monospace';
    if (solved) {
      ctx.fillStyle = '#9adda4';
      ctx.fillText('✦ ' + (m.solvedTitle || ''), x0 + 12, y);
    } else if (blocked) {
      ctx.fillStyle = 'rgba(160,140,110,0.40)';
      ctx.fillText('· · ·', x0 + 12, y);
    } else {
      ctx.fillStyle = 'rgba(220,200,150,0.65)';
      ctx.fillText(m.lockedTitle, x0 + 12, y);
    }
    y += 14;

    // Body — locked mysteries show ONLY the flavor line. Earned hints reveal
    // their poetic fragment. No counters, no goal text, no instructions.
    ctx.font = 'italic 10px serif';
    if (solved) {
      ctx.fillStyle = 'rgba(170,220,180,0.75)';
      y = drawWrap('✓ ' + (m.solvedFlavor || ''), x0 + 16, y, panelW - 24, lh);
      y += 4;
    } else if (blocked) {
      // Don't even show flavor for blocked-by-prereq mysteries — they're
      // truly invisible until their prereq solves.
    } else {
      // Show only the LOCKED flavor as the persistent line.
      ctx.fillStyle = 'rgba(190,170,130,0.55)';
      y = drawWrap(m.lockedFlavor, x0 + 16, y, panelW - 24, lh);
      // Then any earned hint fragments appear below as discovered fragments.
      let anyHintEarned = false;
      for (const h of m.hints || []) {
        if (!Mysteries.hasHint(h.id)) continue;
        anyHintEarned = true;
        ctx.fillStyle = '#ffd54a';
        y = drawWrap('· ' + h.fragment, x0 + 16, y, panelW - 24, lh);
      }
      // For the manga mystery: once all letter hints are gathered, surface
      // the assembled invocation as a single uppercase line. The player has
      // to recognize "Z E U S" as the king's name and type it on the hub.
      if (m.id === 'manga_mode') {
        const lettered = (m.hints || []).filter(h => h.letter);
        const allLettered = lettered.length > 0 && lettered.every(h => Mysteries.hasHint(h.id));
        if (allLettered) {
          ctx.fillStyle = '#ff88cc';
          ctx.font = 'bold 12px monospace';
          const word = lettered.map(h => h.letter).join(' ');
          y = drawWrap(word, x0 + 16, y + 2, panelW - 24, lh + 1);
          ctx.font = 'italic 10px serif';
        }
      }
      if (anyHintEarned) y += 2;
    }
    y += 6;
  }
  ctx.restore();
}

// drawWrap: helper that wraps `text` to maxW at the current font + fillStyle,
// drawing each line at incrementing y. Returns the y-cursor after the last line.
function drawWrap(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      cy += lh;
      line = w;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, cy); cy += lh; }
  return cy;
}

function wrapAndDraw(text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, cy);
      cy += lh;
      line = w;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

// ── Draw helpers ──────────────────────────────────────────────────────────
function drawColumn(x) {
  const cH=100, cW=16;
  ctx.save();
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(x-cW/2+4, GY-cH+4, cW, cH);
  // shaft
  const g = ctx.createLinearGradient(x-cW/2,0,x+cW/2,0);
  g.addColorStop(0,'#7a6c50'); g.addColorStop(0.4,'#c0ae88'); g.addColorStop(1,'#8a7a5c');
  ctx.fillStyle=g;
  ctx.fillRect(x-cW/2, GY-cH, cW, cH);
  // flutes
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for (let i=1;i<4;i++){
    ctx.beginPath(); ctx.moveTo(x-cW/2+i*(cW/4),GY-cH); ctx.lineTo(x-cW/2+i*(cW/4),GY); ctx.stroke();
  }
  // capital
  const cap = ctx.createLinearGradient(0,GY-cH-10,0,GY-cH);
  cap.addColorStop(0,'#d0be96'); cap.addColorStop(1,'#a09070');
  ctx.fillStyle=cap;
  ctx.fillRect(x-cW/2-5, GY-cH-10, cW+10, 10);
  // base
  ctx.fillStyle='#a09070';
  ctx.fillRect(x-cW/2-4, GY-7, cW+8, 7);
  ctx.restore();
}

function drawMountain(p) {
  // Mount Olympus: snow-capped peak that sits behind the player line.
  // Same footprint/anchor as a portal so player.nearPortal logic still applies.
  const peakH = 200, baseW = 220;
  const pulse = 0.85 + Math.sin(time*1.4)*0.15;
  ctx.save();
  ctx.translate(p.x, GY);

  // Divine aura behind the summit
  const aura = ctx.createRadialGradient(0, -peakH+10, 4, 0, -peakH+10, peakH*1.1);
  aura.addColorStop(0, `rgba(255,240,180,${0.55*pulse})`);
  aura.addColorStop(0.4, `rgba(212,175,55,${0.22*pulse})`);
  aura.addColorStop(1, 'rgba(212,175,55,0)');
  ctx.fillStyle = aura;
  ctx.beginPath();
  ctx.arc(0, -peakH+10, peakH*1.1, 0, Math.PI*2);
  ctx.fill();

  // Mountain body — triangle with subtle gradient
  const mtnG = ctx.createLinearGradient(0, -peakH, 0, 0);
  mtnG.addColorStop(0,   '#5b6694');
  mtnG.addColorStop(0.4, '#2e375f');
  mtnG.addColorStop(1,   '#0d1126');
  ctx.fillStyle = mtnG;
  ctx.beginPath();
  ctx.moveTo(-baseW/2, 0);
  ctx.lineTo(-baseW*0.18, -peakH*0.55);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.lineTo( baseW*0.06, -peakH*0.84);
  ctx.lineTo( baseW*0.20, -peakH*0.55);
  ctx.lineTo( baseW/2, 0);
  ctx.closePath();
  ctx.fill();

  // ridge highlight (left flank catches the divine light)
  ctx.strokeStyle = 'rgba(180,200,240,0.35)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-baseW*0.18, -peakH*0.55);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.stroke();

  // Snowcap
  ctx.fillStyle = 'rgba(245,248,255,0.95)';
  ctx.beginPath();
  ctx.moveTo(-baseW*0.10, -peakH*0.65);
  ctx.lineTo(-baseW*0.07, -peakH*0.72);
  ctx.lineTo(-baseW*0.05, -peakH*0.85);
  ctx.lineTo(0, -peakH);
  ctx.lineTo( baseW*0.06, -peakH*0.84);
  ctx.lineTo( baseW*0.10, -peakH*0.72);
  ctx.lineTo( baseW*0.13, -peakH*0.65);
  ctx.lineTo( baseW*0.07, -peakH*0.66);
  ctx.lineTo( baseW*0.04, -peakH*0.78);
  ctx.lineTo(0, -peakH*0.74);
  ctx.lineTo(-baseW*0.04, -peakH*0.78);
  ctx.lineTo(-baseW*0.07, -peakH*0.66);
  ctx.closePath();
  ctx.fill();

  // Tiny shrine/altar at the foot center
  ctx.fillStyle = 'rgba(212,175,55,0.5)';
  ctx.fillRect(-12, -8, 24, 8);
  ctx.fillStyle = 'rgba(255,240,180,' + (0.5+0.4*pulse) + ')';
  ctx.fillRect(-3, -14, 6, 6);

  // Title above peak
  ctx.shadowColor = '#D4AF37';
  ctx.shadowBlur = 18*pulse;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 16px serif';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, -peakH-22);
  ctx.shadowBlur = 0;
  ctx.font = 'italic 11px serif';
  ctx.fillStyle = 'rgba(255,220,140,0.75)';
  ctx.fillText(p.sub, 0, -peakH-8);

  ctx.restore();

  // ENTER button when player is near
  if (player.nearPortal === p) {
    const bx=p.x, by=GY-peakH-56, bw=120, bh=34;
    const bp = 0.88 + Math.sin(time*5)*0.12;
    ctx.save();
    ctx.shadowColor = GOLD; ctx.shadowBlur = 18*bp;
    ctx.fillStyle = `rgba(212,175,55,${0.92*bp})`;
    ctx.beginPath(); ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#1a0f00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ASCEND', bx, by);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '10px monospace';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('click or press SPACE', bx, by+28);
    ctx.restore();
    p._btn = {x:bx-bw/2, y:by-bh/2, w:bw, h:bh};
  } else {
    p._btn = null;
  }
}

function drawPortal(p) {
  const glow = 0.7 + Math.sin(time*2.2)*0.3;
  const archH=140, archW=64;
  ctx.save();
  ctx.translate(p.x, GY);

  // outer glow aura
  ctx.shadowColor = p.hue;
  ctx.shadowBlur  = 40 + glow*20;

  // pillars
  const pilG = ctx.createLinearGradient(-archW/2-14,0,archW/2+14,0);
  pilG.addColorStop(0,'#6a5c3c'); pilG.addColorStop(0.4,'#b0a070'); pilG.addColorStop(1,'#7a6c4c');
  ctx.fillStyle = pilG;
  ctx.fillRect(-archW/2-14, -archH, 14, archH);
  ctx.fillRect( archW/2,    -archH, 14, archH);

  // arch top stone
  ctx.beginPath();
  ctx.arc(0, -archH, archW/2+14, Math.PI, 0);
  ctx.fillStyle = '#9a8860';
  ctx.fill();

  // portal interior glow
  ctx.shadowBlur = 0;
  const iG = ctx.createRadialGradient(0,-archH*0.6,4, 0,-archH*0.6,archW/2+4);
  iG.addColorStop(0, `rgba(255,180,60,${0.75*glow})`);
  iG.addColorStop(0.45, `rgba(255,90,20,${0.45*glow})`);
  iG.addColorStop(1,   `rgba(255,40,0,0)`);
  ctx.fillStyle = iG;
  ctx.beginPath();
  ctx.rect(-archW/2, -archH, archW, archH);
  ctx.arc(0, -archH, archW/2, Math.PI, 0);
  ctx.fill();

  // wing silhouettes inside portal
  ctx.save();
  ctx.globalAlpha = 0.35*glow;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo(-22,-archH*0.85, -38,-archH*0.7, -28,-archH*0.45);
  ctx.bezierCurveTo(-16,-archH*0.38,  -6,-archH*0.48, 0,-archH*0.55);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-archH*0.55);
  ctx.bezierCurveTo( 22,-archH*0.85,  38,-archH*0.7,  28,-archH*0.45);
  ctx.bezierCurveTo( 16,-archH*0.38,   6,-archH*0.48,  0,-archH*0.55);
  ctx.fill();
  ctx.restore();

  // portal name above arch
  ctx.shadowColor = p.hue; ctx.shadowBlur = 12;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.name, 0, -archH-22);
  ctx.shadowBlur = 0;
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,220,140,0.7)';
  ctx.fillText(p.sub, 0, -archH-8);

  ctx.restore();

  // PLAY button if player is near
  const near = player.nearPortal === p;
  if (near) {
    const bx=p.x, by=GY-archH-56, bw=100, bh=34;
    const pulse = 0.88 + Math.sin(time*5)*0.12;
    ctx.save();
    ctx.shadowColor = GOLD; ctx.shadowBlur = 18*pulse;
    // button fill
    ctx.fillStyle = `rgba(212,175,55,${0.92*pulse})`;
    ctx.beginPath();
    ctx.roundRect(bx-bw/2, by-bh/2, bw, bh, 7);
    ctx.fill();
    // button label
    ctx.shadowBlur=0;
    ctx.fillStyle='#1a0f00';
    ctx.font='bold 17px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('PLAY', bx, by);
    // hint
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='10px monospace';
    ctx.textBaseline='alphabetic';
    ctx.fillText('click or press SPACE', bx, by+28);
    ctx.restore();
    p._btn = {x:bx-bw/2, y:by-bh/2, w:bw, h:bh};
  } else {
    p._btn = null;
  }
}

function drawPlayer() {
  // Manga path uses the portable hub-walker character module.
  if (localStorage.getItem(MANGA_KEY) === '1'
      && window.Manga
      && Manga.characters
      && Manga.characters.hubWalker
      && typeof Manga.characters.hubWalker.draw === 'function') {
    Manga.characters.hubWalker.draw(ctx, {
      x: player.x, y: player.y, facing: player.facing,
      walkPhase: player.walkPhase, vx: player.vx,
      form: player.isToad ? 'toad' : 'human',
    });
    return;
  }
  if (player.isToad) drawToad(); else drawHuman();
}

// Manga-styled action button: bold ink-outlined gold pill above the portal.
// Mirrors the hit-region (`p._btn`) the existing canvas click listener reads.
function drawMangaPortalButton(p) {
  const near = player.nearPortal === p;
  if (!near) { p._btn = null; return; }
  const isMtn = p.kind === 'mountain';
  const archH = isMtn ? 220 : 150;
  const label = isMtn ? 'ASCEND' : 'PLAY';
  const bw = isMtn ? 130 : 110;
  const bh = 40;
  const bx = p.x;
  const by = GY - archH - 60;
  const pulse = 0.86 + Math.sin(time * 5) * 0.14;
  ctx.save();
  // Pill background — flat gold with thick ink outline
  ctx.fillStyle = `rgba(255, 215, 90, ${0.95 * pulse})`;
  ctx.beginPath(); ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, 8); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, 8); ctx.stroke();
  // Label — bold sans-serif with thicker ink outline
  ctx.font = '900 19px "Impact", "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(label, bx, by);
  ctx.fillStyle = '#1a0f00';
  ctx.fillText(label, bx, by);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
  p._btn = { x: bx - bw / 2, y: by - bh / 2, w: bw, h: bh };
}

function drawHuman() {
  const x=player.x, y=player.y, f=player.facing;
  const walk = player.vx!==0 ? Math.sin(player.walkPhase)*0.9 : 0;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(f, 1);

  // ground shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(0,0,20,5,0,0,Math.PI*2); ctx.fill();

  // legs
  ctx.lineCap='round';
  ctx.lineWidth=6; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-9+walk*10, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5,-18); ctx.lineTo( 9-walk*10, 0); ctx.stroke();

  // sandals
  ctx.lineWidth=3; ctx.strokeStyle='#8a6030';
  ctx.beginPath(); ctx.moveTo(-10+walk*10,-1); ctx.lineTo(-6+walk*10,-1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(  8-walk*10,-1); ctx.lineTo( 4-walk*10,-1); ctx.stroke();

  // robe body
  const robeG = ctx.createLinearGradient(-12,-50,12,-50);
  robeG.addColorStop(0,'#d8d0be'); robeG.addColorStop(0.5,'#f0e8d8'); robeG.addColorStop(1,'#b8b0a0');
  ctx.fillStyle=robeG;
  ctx.beginPath();
  ctx.moveTo(-11,-18); ctx.lineTo(-13,-50); ctx.lineTo(13,-50); ctx.lineTo(11,-18);
  ctx.closePath(); ctx.fill();
  // robe fold lines
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-4,-50); ctx.lineTo(-5,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4,-50); ctx.lineTo( 5,-18); ctx.stroke();

  // arms
  ctx.lineWidth=5; ctx.strokeStyle='#c0995a';
  ctx.beginPath(); ctx.moveTo(-11,-44); ctx.lineTo(-16-walk*5,-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 11,-44); ctx.lineTo( 16+walk*5,-30); ctx.stroke();

  // neck
  ctx.fillStyle='#c0995a';
  ctx.fillRect(-4,-56,8,8);

  // head
  ctx.beginPath(); ctx.arc(0,-62,12,0,Math.PI*2); ctx.fillStyle='#c0995a'; ctx.fill();
  // hair
  ctx.fillStyle='#2a1808';
  ctx.beginPath(); ctx.arc(0,-65,11,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-7,-60,4,Math.PI*0.8,Math.PI*1.6); ctx.fill();
  // eye
  ctx.fillStyle='#1a1008';
  ctx.beginPath(); ctx.arc(5,-62,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(6,-63,0.8,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawToad() {
  const x=player.x, y=player.y, f=player.facing;
  const moving = player.vx !== 0;
  // hop arc when moving — toad rises and stretches mid-air
  const hopT   = moving ? Math.max(0, Math.sin(player.walkPhase)) : 0;
  const hop    = hopT * 16;
  const stretch = hopT * 0.10;

  ctx.save();
  ctx.translate(x, y);

  // ground shadow (shrinks while toad is in the air)
  const shScale = 1 - hop/42;
  ctx.fillStyle = `rgba(0,0,0,${0.32*shScale})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, 26*shScale, 5*shScale, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.translate(0, -hop);
  ctx.scale(f * (1 - stretch*0.4), 1 + stretch);

  // ── BACK LEG (folded, behind body) ───────────────────────────────
  ctx.fillStyle = '#2d5d2a';
  ctx.beginPath();
  ctx.ellipse(-14, -14, 14, 9, -0.2, 0, Math.PI*2);
  ctx.fill();
  // back foot
  ctx.fillStyle = '#3a7a36';
  ctx.beginPath();
  ctx.ellipse(-22, -3, 14, 5, 0.05, 0, Math.PI*2);
  ctx.fill();
  // webbed toes
  ctx.strokeStyle = '#1c3a1a'; ctx.lineWidth = 1.6; ctx.lineCap = 'round';
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(-28, -3);
    ctx.lineTo(-36 + i*2, -2 + (i-1)*2);
    ctx.stroke();
  }

  // ── BODY (head + body fused, squat oval) ─────────────────────────
  const bodyG = ctx.createRadialGradient(8, -32, 4, 4, -22, 30);
  bodyG.addColorStop(0,    '#6cb064');
  bodyG.addColorStop(0.55, '#3f7a39');
  bodyG.addColorStop(1,    '#214c1f');
  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.ellipse(2, -18, 24, 18, 0, 0, Math.PI*2);
  ctx.fill();

  // pale belly underside
  ctx.fillStyle = 'rgba(222,228,168,0.9)';
  ctx.beginPath();
  ctx.ellipse(2, -9, 18, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // ── WARTS ────────────────────────────────────────────────────────
  const warts = [[-10,-30],[-2,-34],[8,-32],[16,-26],[-14,-22],[12,-20],[20,-18],[-8,-24]];
  ctx.fillStyle = '#1c3a1a';
  for (const [wx,wy] of warts) {
    ctx.beginPath(); ctx.arc(wx, wy, 1.8, 0, Math.PI*2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(170,210,130,0.7)';
  for (const [wx,wy] of warts) {
    ctx.beginPath(); ctx.arc(wx-0.6, wy-0.7, 0.7, 0, Math.PI*2); ctx.fill();
  }

  // ── FRONT LEG ────────────────────────────────────────────────────
  ctx.fillStyle = '#3a7a36';
  ctx.beginPath();
  ctx.ellipse(15, -3, 7, 4.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#1c3a1a'; ctx.lineWidth = 1.5;
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(19, -2);
    ctx.lineTo(24 + i*1.5, 0.5);
    ctx.stroke();
  }

  // ── MOUTH (wide curve across the front) ──────────────────────────
  ctx.strokeStyle = '#0e1a0d'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(8, -14);
  ctx.quadraticCurveTo(20, -10, 25, -16);
  ctx.stroke();
  // tongue peek at the corner
  ctx.fillStyle = '#c8484a';
  ctx.beginPath(); ctx.arc(19, -12, 1.2, 0, Math.PI*2); ctx.fill();

  // ── BACK EYE BUMP (further, smaller) ─────────────────────────────
  ctx.fillStyle = '#3f7a39';
  ctx.beginPath(); ctx.ellipse(-2, -34, 6, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d4b240';
  ctx.beginPath(); ctx.arc(-1, -34, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.ellipse(-1, -34, 1, 3, 0, 0, Math.PI*2); ctx.fill();

  // ── FRONT EYE BUMP (large, prominent) ────────────────────────────
  ctx.fillStyle = '#4d8c46';
  ctx.beginPath(); ctx.ellipse(14, -36, 8.5, 9, 0, 0, Math.PI*2); ctx.fill();
  // golden iris
  ctx.fillStyle = '#f0c844';
  ctx.beginPath(); ctx.arc(15, -36, 5.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#7a4a10'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.arc(15, -36, 5.5, 0, Math.PI*2); ctx.stroke();
  // vertical slit pupil
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath(); ctx.ellipse(15, -36, 1.4, 4.6, 0, 0, Math.PI*2); ctx.fill();
  // catchlight
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(16.6, -38, 1.0, 0, Math.PI*2); ctx.fill();

  // nostril
  ctx.fillStyle = '#1a2818';
  ctx.beginPath(); ctx.arc(22, -22, 0.9, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  // Sky
  const sky = ctx.createLinearGradient(0,0,0,GY);
  sky.addColorStop(0,'#04071a'); sky.addColorStop(0.55,'#091230'); sky.addColorStop(1,'#131d40');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Stars
  for (const s of stars) {
    const b = Math.sin(time*1.8+s.phase)*0.35+0.65;
    ctx.globalAlpha=b*0.9; ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Moon
  ctx.save();
  ctx.shadowColor='rgba(230,230,200,0.5)'; ctx.shadowBlur=35;
  ctx.fillStyle='#f0ead8';
  ctx.beginPath(); ctx.arc(W*0.14,H*0.11,34,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#091230';
  ctx.beginPath(); ctx.arc(W*0.14+10,H*0.11,29,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Distant mountains / ruins silhouette
  ctx.fillStyle='rgba(10,15,35,0.9)';
  ctx.beginPath();
  ctx.moveTo(0,GY);
  const mpts = [0,.08,.14,.20,.28,.35,.44,.52,.60,.70,.80,.88,.95,1];
  const mhts = [0.22,0.15,0.30,0.18,0.25,0.12,0.28,0.16,0.22,0.10,0.20,0.14,0.08,0];
  for (let i=0;i<mpts.length;i++) ctx.lineTo(mpts[i]*W, GY-mhts[i]*H*0.55);
  ctx.lineTo(W,GY); ctx.closePath(); ctx.fill();

  // Ground stone
  const gnd = ctx.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#6a5c40'); gnd.addColorStop(0.08,'#524630'); gnd.addColorStop(1,'#201808');
  ctx.fillStyle=gnd; ctx.fillRect(0,GY,W,H-GY);

  // tile grid
  ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1;
  for (let x=0;x<W;x+=72){ ctx.beginPath(); ctx.moveTo(x,GY); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y=GY;y<H;y+=28){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle='rgba(200,180,130,0.22)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GY); ctx.lineTo(W,GY); ctx.stroke();

  // ambient motes
  for (const m of motes) {
    ctx.globalAlpha=Math.max(0,m.alpha)*0.5;
    ctx.fillStyle='rgba(180,220,255,1)';
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Columns flanking the portals — left of leftmost, right of rightmost.
  const leftX  = portals[0].x;
  const rightX = portals[portals.length-1].x;
  const colXs = [
    leftX * 0.25, leftX * 0.65,
    rightX + (W - rightX) * 0.30, rightX + (W - rightX) * 0.72,
  ];
  // Only activate manga rendering once the actual scene functions have loaded.
  // The loader is async, so on the very first frame the namespace may exist
  // but its draw functions don't yet — fall back to normal draws until ready.
  const _mangaActive = localStorage.getItem(MANGA_KEY) === '1'
    && window.Manga
    && typeof Manga.scenes?.column === 'function'
    && typeof Manga.scenes?.archPortal === 'function'
    && typeof Manga.scenes?.olympus === 'function';
  for (const cx of colXs) {
    if (_mangaActive) Manga.scenes.column(ctx, { x: cx, gy: GY });
    else drawColumn(cx);
  }

  // Portals — manga path draws the arch/mountain art via Manga.scenes; the action
  // button (proximity prompt + p._btn hit region) is drawn by the helper below
  // since both paths need it.
  for (const p of portals) {
    if (_mangaActive) {
      if (p.kind === 'mountain') {
        Manga.scenes.olympus(ctx, { x: p.x, gy: GY, name: p.name, sub: p.sub, near: player.nearPortal === p, time });
      } else {
        Manga.scenes.archPortal(ctx, { x: p.x, gy: GY, name: p.name, sub: p.sub, hue: p.hue, near: player.nearPortal === p, time });
      }
      drawMangaPortalButton(p);
    } else {
      if (p.kind === 'mountain') drawMountain(p); else drawPortal(p);
    }
  }

  // On touch devices, expand each portal's tap region to cover the whole arch
  // so the player can navigate by tapping any portal directly (no walking).
  if (IS_TOUCH) {
    for (const p of portals) {
      const isMtn = p.kind === 'mountain';
      const w = isMtn ? 220 : 150;
      const h = isMtn ? 230 : 200;
      p._btn = { x: p.x - w/2, y: GY - h, w, h };
    }
  }

  // Player
  drawPlayer();

  // Manga atmosphere — bold overlay so the screen unmistakably reads "manga".
  // Drawn on top of the world but below the Zeus cinematic + title + toast.
  const _mangaOn = localStorage.getItem(MANGA_KEY) === '1';
  if (_mangaOn
      && window.Manga
      && typeof Manga.effects?.halftone  === 'function'
      && typeof Manga.effects?.scanlines === 'function'
      && typeof Manga.effects?.vignette  === 'function') {
    // The manga *art* (scenes + characters) carries most of the look now;
    // these overlays only add atmosphere, not replace it.
    Manga.effects.halftone(ctx, 0, 0,  W, GY,    { density: 7, dotSize: 1.7, alpha: 0.10, color: '#000' });
    Manga.effects.halftone(ctx, 0, GY, W, H - GY, { density: 6, dotSize: 1.7, alpha: 0.18, color: '#000' });
    Manga.effects.scanlines(ctx, 0, 0, W, H, { spacing: 3, alpha: 0.09 });
    Manga.effects.vignette(ctx, W, H, { strength: 0.6 });
  }
  // Apply a CSS filter to the canvas itself so the whole frame reads desaturated +
  // high-contrast — the difference is immediate and obvious.
  const desiredFilter = _mangaOn ? 'contrast(1.18) saturate(0.78)' : 'none';
  if (canvas.style.filter !== desiredFilter) canvas.style.filter = desiredFilter;

  // Storm brewing over Olympus as the codeword is typed.
  renderStorm();

  // Zeus cinematic — drawn on top of atmosphere so the bolt + flash dominate.
  if (_zeusStrike) _zeusStrike.render(ctx, W, H);

  // Mysteries panel — stays visible at the right edge of the screen.
  renderMysteriesPanel();

  // Mythological location cinematic — drawn on top of everything.
  if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, W, H);

  // Title
  ctx.save();
  ctx.textAlign='center';
  ctx.font='bold 30px serif';
  ctx.fillStyle=GOLD; ctx.shadowColor=GOLD; ctx.shadowBlur=20;
  ctx.fillText('GOD GAMES', W/2, 46);
  ctx.shadowBlur=0;
  ctx.font='13px monospace';
  ctx.fillStyle='rgba(255,255,200,0.45)';
  ctx.fillText('Walk to a portal  ·  Arrow keys to move', W/2, 70);
  ctx.restore();

  // Manga easter-egg toast (centered, fades out)
  if (_mangaToast.t > 0) {
    const a = Math.min(1, _mangaToast.t / 0.6);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.font = 'bold 26px monospace';
    ctx.fillStyle = _mangaToast.color;
    ctx.shadowColor = _mangaToast.color; ctx.shadowBlur = 18;
    ctx.fillText(_mangaToast.text, W/2, H * 0.42);
    ctx.restore();
  }

}

// ── Loop ──────────────────────────────────────────────────────────────────
let lastTime=null;
function loop(ts) {
  if (lastTime===null) lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Input ─────────────────────────────────────────────────────────────────
function inputBusy(e) {
  // skip the canvas key handlers when the user is typing in a form field
  // or when a modal is open
  if (document.getElementById('modalBg')?.classList.contains('open')) return true;
  const tag = e.target?.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA';
}

// Secret manga mode — earned codeword is 'zeus' (first three letters revealed
// by per-game mysteries; the final 'S' is the call-to-Zeus invocation typed
// here). 'shankle' remains as a dev bypass for testing. 'normal' reverts.
// Persisted in localStorage so the toggle survives navigation to game pages,
// where engine.js reads it at boot and exposes Engine.manga.
const MANGA_KEY = 'godgames_manga';
const CODEWORD = (window.GodGames && window.GodGames.Mysteries && window.GodGames.Mysteries.MANGA_CODEWORD) || 'zeus';
const DEV_BYPASS_CODEWORD = 'shankle';
let _typedBuf = '';
let _mangaToast = { text: '', t: 0, color: '#D4AF37' };
function showMangaToast(text, color) { _mangaToast = { text, t: 2.6, color: color || '#D4AF37' }; }

// Storm-brewing state — progress through each letter of CODEWORD darkens
// the sky over Olympus and increases lightning frequency. Wrong key dissipates.
let _codewordIdx     = 0;        // how many letters of CODEWORD typed in sequence
let _stormIntensity  = 0;        // 0..1, eased toward _codewordIdx / CODEWORD.length
let _stormFlashes    = [];       // {x, y, life, maxLife, branches}
let _lastStormTickT  = 0;

// Active Zeus strike instance (only present during the cinematic).
let _zeusStrike = null;
function startZeusStrike() {
  if (!window.Manga || !Manga.fx || !Manga.fx.zeusStrike) {
    // Library not loaded yet — fall back to instant flip so the toggle still works.
    localStorage.setItem(MANGA_KEY, '1');
    showMangaToast('MANGA MODE ACTIVATED', '#ff44aa');
    return;
  }
  ensureAudio();
  const olympus = portals.find(p => p.kind === 'mountain') || portals[0];
  _zeusStrike = Manga.fx.zeusStrike({
    fromX: olympus.x,
    fromY: GY - 220,            // above the mountain peak
    toX:   player.x,
    toY:   player.y - 30,
    audioCtx,
    onImpact: () => {
      localStorage.setItem(MANGA_KEY, '1');
      showMangaToast('THE GODS HAVE SPOKEN', '#ffeeaa');
    },
    onDone: () => { _zeusStrike = null; },
  });
  _zeusStrike.start();
}

window.addEventListener('keydown', e => {
  if (inputBusy(e)) return;
  // easter egg: 't' toggles toad form (ignore key-repeat so a held key only flips once)
  if (!e.repeat && (e.key === 't' || e.key === 'T')) {
    player.isToad = !player.isToad;
    ensureAudio(); // unlock audio on user gesture so the first ribbit plays
  }
  // Sequence-detector: append printable chars, keep last 12.
  if (e.key && e.key.length === 1) {
    const ch = e.key.toLowerCase();
    _typedBuf = (_typedBuf + ch).slice(-12);
    // Per-letter progress through CODEWORD — drives the Olympus storm.
    if (ch === CODEWORD[_codewordIdx]) {
      _codewordIdx++;
      if (_codewordIdx >= CODEWORD.length) {
        _codewordIdx = 0;
        if (localStorage.getItem(MANGA_KEY) !== '1' && !_zeusStrike) {
          startZeusStrike();
        }
      }
    } else if (_codewordIdx > 0) {
      // Broken sequence — let the storm dissipate. (If the wrong char happens
      // to be the FIRST letter of CODEWORD, restart progress at 1.)
      _codewordIdx = (ch === CODEWORD[0]) ? 1 : 0;
    }
    // Dev bypass — typing 'shankle' summons Zeus regardless of earned letters.
    if (_typedBuf.endsWith(DEV_BYPASS_CODEWORD)) {
      _typedBuf = '';
      _codewordIdx = 0;
      if (localStorage.getItem(MANGA_KEY) !== '1' && !_zeusStrike) {
        startZeusStrike();
      }
    }
    if (_typedBuf.endsWith('normal')) {
      localStorage.removeItem(MANGA_KEY);
      showMangaToast('NORMAL MODE', '#D4AF37');
      _typedBuf = '';
      _codewordIdx = 0;
    }
  }
  keys[e.key]=true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { if (!inputBusy(e)) keys[e.key]=false; });

canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
  // pointer cursor over PLAY button
  let overBtn=false;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mouse.x>=b.x && mouse.x<=b.x+b.w && mouse.y>=b.y && mouse.y<=b.y+b.h) { overBtn=true; break; }
    }
  }
  canvas.style.cursor = overBtn ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  // Block portal navigation while the name modal is open.
  if (document.getElementById('modalBg')?.classList.contains('open')) return;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  for (const p of portals) {
    if (p._btn) {
      const b=p._btn;
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) {
        window.location.href=p.href;
      }
    }
  }
});

// ── Player name (localStorage) ────────────────────────────────────────────
const NAME_KEY = 'godgames_playerName';
const $ = (id) => document.getElementById(id);

function getName() { return localStorage.getItem(NAME_KEY) || ''; }
function setName(n) {
  const clean = (n || '').replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g,' ').trim().slice(0,20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  $('whoName').textContent = clean;
  return true;
}
function showModal(initial) {
  $('nameInput').value = initial != null ? initial : getName();
  $('modalBg').classList.add('open');
  setTimeout(() => $('nameInput').focus(), 50);
}
function hideModal() { $('modalBg').classList.remove('open'); }

$('changeNameBtn').addEventListener('click', () => showModal());
$('nameSave').addEventListener('click', () => {
  if (setName($('nameInput').value)) hideModal();
});
$('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && setName($('nameInput').value)) hideModal();
  e.stopPropagation();
});

(function initName() {
  const n = getName();
  if (!n) showModal('');
  else $('whoName').textContent = n;
})();
</script>
