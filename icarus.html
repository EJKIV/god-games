<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICARUS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
canvas { display: block; }

/* ── Name prompt modal ── */
.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #2a1a08 0%, #0a0500 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow: 0 0 50px rgba(212,175,55,0.4);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(240,215,122,0.7); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(10,8,4,0.7); border:1px solid rgba(212,175,55,0.5);
  color:#f0e8d0; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.4); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#1a0f00;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE MORTAL</h3>
    <p>Daedalus must know the name of his son to launch him to the skies.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">TAKE FLIGHT</button>
  </div>
</div>
<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/dialogue/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="mysteries.js"></script>
<script>
// Canvas + ctx are owned by Engine; aliased after boot.
let canvas, ctx;

// ── Constants ──────────────────────────────────────────────────────────────
const GRAVITY        = 400;
const THRUST         = 620;
const MAX_SPEED      = 360;
const MAX_DAMAGE     = 28;   // wing HP/s at full danger
const BASE_XP        = 5;
const BONUS_XP       = 45;
const MAX_SHAKE      = 10;
const GOLD           = '#D4AF37';
const FLIGHT_SPEED   = 130;   // px/s auto-rightward world scroll
const ISLAND_XP_BONUS  = 100;
const ISLAND_SINK_TIME = 1.1; // s for island to sink after claiming
const WING_MAX         = 50;  // wing HP cap; subtracted by burn/wet/direct damage

// ── Tutorial dialogue ──────────────────────────────────────────────────────
// Built per-run via buildTutorial(): the rescue-introduction line only
// appears once the daedalus_compassion mystery has been earned (manga mode).
const BASE_TUTORIAL = [
  { speaker: 'DAEDALUS', text: 'Icarus, my son. I have crafted these wings myself — feathers gathered one by one, bound together with wax. They will carry you into the sky.' },
  { speaker: 'DAEDALUS', text: 'Hold ↑ to beat the wings and climb. Release the key and you will fall. You will fly forward on your own — guide your height to avoid sun and sea.' },
  { speaker: 'DAEDALUS', text: 'Islands rest upon the sea below. Land on them to gather honour — each one will reward you with glory before it sinks beneath your feet.' },
  { speaker: 'DAEDALUS', text: 'But listen closely. Fly too close to the sun and its heat will melt the wax. Your wings will burn, your feathers will fall, and you will plummet.' },
  { speaker: 'DAEDALUS', text: 'The sea is cold and will weigh your wings with water. Fly too low and they will turn blue and heavy — seek the middle skies when that happens.' },
  { speaker: 'DAEDALUS', text: 'Fly neither too high nor too low. Follow me, keep your course steady, and we will reach freedom. Now — are you ready?' },
];
function buildTutorial() {
  const lines = BASE_TUTORIAL.slice();
  // Manga rescue foreshadowing: only after Daedalus's Compassion has been
  // earned (the mystery's hint trail makes this feel like a discovered secret).
  const showRescue = !!(Engine && Engine.manga
    && window.GodGames && GodGames.Mysteries
    && GodGames.Mysteries.isSolved('daedalus_compassion'));
  if (showRescue) {
    lines.splice(lines.length - 1, 0, {
      speaker: 'DAEDALUS',
      text: 'And know this — should the wax fail you, I will not let you fall. Once. The gods will permit me one outstretched hand. Make it count.',
    });
  }
  return lines;
}
let TUTORIAL_LINES = BASE_TUTORIAL;

// ── State ──────────────────────────────────────────────────────────────────
// `state` is the game phase ('title' | 'tutorial' | 'playing' | 'dying' | 'dead').
// Engine's own state ('title' | 'playing' | 'dead') is kept in sync at transitions:
// tutorial → engine stays 'title'; dying → engine stays 'playing'.
let state = 'title';
let tutorialStep = 0;
let time = 0;     // mirror of Engine.time, synced before each frame's logic
// Mystery: The Sun's Embrace — Icarus mirrors his own myth by flying
// *into* the sun. Trigger uses altitude (player.y) directly instead of the
// derived heat ratio because the heat ramp depends on canvas height and
// caps below 1.0 due to the y=80 clamp — so heat-based thresholds were
// unreachable on smaller viewports. The y-clamp itself IS the "into the
// sun" geometry: at y ≤ SUN_EMBRACE_Y the player is inside the sun's
// drawn radius. Cumulative within a run.
let sunEmbraceT = 0;
const SUN_EMBRACE_Y    = 100;   // px — player at peak altitude (clamp is 80)
const SUN_EMBRACE_GOAL = 0.4;   // cumulative seconds in the sun → 'z'
                                // (the wing burns fully in ~0.8s at peak heat,
                                //  so the goal is short enough to fire before
                                //  death gates the player out of updatePlaying)
// Glyph: The Labyrinth Mark — Daedalus designed the labyrinth before the
// wings. A faint spiral is etched at a fixed worldX/y; flying through it
// claims it. Persistent unlock so it only collects once per profile.
const GLYPH_ICARUS = { worldX: 1500, yFrac: 0.45, radius: 22 };

let player, feathers, fires, clouds, floaters, islands, splashes, drips, shakeAmt, shakeDecay;

// ── Manga abilities (player) ──────────────────────────────────────────────
let diveT  = 0;          // dive-bomb active (s remaining)
let diveCD = 0;          // dive-bomb cooldown (s)
const DIVE_DUR = 0.45;
const DIVE_CD  = 5;
// Daedalus auto-rescue (manga-only). Multi-rescue economy: the player
// starts with 1 charge per run, and each island claimed earns favor that
// converts to additional charges (every RESCUES_PER_FAVOR favor = +1
// charge, capped at MAX_RESCUES). Each rescue consumes one charge.
let rescueAvailable = 0;  // remaining charges this run
let rescueIslandFavor = 0; // counter; rolls into +1 charge each ISLANDS_PER_RESCUE
let rescueT     = 0;     // active animation time remaining (s)
let rescueReach = 0;     // 0..1, hand stretching from below
const RESCUE_DUR = 1.4;
const ISLANDS_PER_RESCUE = 3;
const MAX_RESCUES = 3;
let mangaTexts = [];     // { text, x, y, t, color, size }
let eagles, eagleSpawnTimer;
let orcas, orcaSpawnTimer;
let waves, waveSpawnTimer;
let cameraX = 0;
let keys;        // alias for Engine.keys, assigned after boot

// ── Audio ──────────────────────────────────────────────────────────────────
let audioCtx = null;
let windOsc = null, windGain = null;
let crackleNode = null, crackleGain = null;
let noiseBuffer = null;

function initAudio() {
  if (audioCtx) return;
  Engine.audio.init();
  audioCtx = Engine.audio._ctx; // share the engine's context
  // white noise buffer for crackle
  const len = audioCtx.sampleRate * 2;
  noiseBuffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = noiseBuffer.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;

  // wind oscillator (continuous)
  windOsc  = audioCtx.createOscillator();
  windGain = audioCtx.createGain();
  windOsc.type = 'sine';
  windOsc.frequency.value = 90;
  windGain.gain.value = 0;
  windOsc.connect(windGain);
  windGain.connect(audioCtx.destination);
  windOsc.start();
}

function playFlapSound() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.value = 180;
  o.frequency.linearRampToValueAtTime(120, audioCtx.currentTime + 0.12);
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.15);
}

function playFeatherLoss() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(400, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(130, audioCtx.currentTime + 0.35);
  g.gain.setValueAtTime(0.15, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.4);
}

function playDeathSound() {
  if (!audioCtx) return;
  // descending cascade
  [440,370,311,261,220,185,155,130].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sawtooth';
    o.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.12;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.3);
  });
  // low boom
  const o2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  o2.type = 'sine';
  o2.frequency.value = 55;
  const t2 = audioCtx.currentTime + 1.0;
  g2.gain.setValueAtTime(0.4, t2);
  g2.gain.exponentialRampToValueAtTime(0.001, t2 + 1.2);
  o2.connect(g2); g2.connect(audioCtx.destination);
  o2.start(t2); o2.stop(t2 + 1.3);
}

function playXPTick() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.value = 880;
  g.gain.setValueAtTime(0.04, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.07);
}

function playIslandLand() {
  if (!audioCtx) return;
  // ascending triumphant chime
  [523, 659, 784, 1047].forEach((freq, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.09;
    g.gain.setValueAtTime(0.14, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.35);
  });
}

function playEagleScreech() {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(1100, audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(520, audioCtx.currentTime + 0.28);
  o.frequency.exponentialRampToValueAtTime(740, audioCtx.currentTime + 0.46);
  g.gain.setValueAtTime(0.13, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.6);
}

function playOrcaSound() {
  if (!audioCtx) return;
  [180, 240, 110].forEach((freq, i) => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'sine';
    const t = audioCtx.currentTime + i * 0.15;
    o.frequency.setValueAtTime(freq, t);
    o.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.4);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 0.55);
  });
}

function playSplash() {
  if (!audioCtx) return;
  // filtered noise burst
  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuffer;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.value = 600;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  src.connect(filt); filt.connect(g); g.connect(audioCtx.destination);
  src.start(); src.stop(audioCtx.currentTime + 0.55);
}

function updateSounds(dangerHeat, vy) {
  if (!audioCtx) return;
  // wind pitch tracks vertical speed
  const freq = 90 + Math.abs(vy) * 0.25;
  windOsc.frequency.linearRampToValueAtTime(freq, audioCtx.currentTime + 0.1);
  const windVol = state === 'playing' || state === 'dying' ? 0.05 + Math.abs(vy) * 0.0002 : 0;
  windGain.gain.linearRampToValueAtTime(windVol, audioCtx.currentTime + 0.1);

  // crackle when hot
  if (dangerHeat > 0.45 && !crackleNode) {
    crackleNode = audioCtx.createBufferSource();
    crackleNode.buffer = noiseBuffer;
    crackleNode.loop = true;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2200;
    filter.Q.value = 0.8;
    crackleGain = audioCtx.createGain();
    crackleGain.gain.value = 0;
    crackleNode.connect(filter);
    filter.connect(crackleGain);
    crackleGain.connect(audioCtx.destination);
    crackleNode.start();
  }
  if (crackleGain) {
    const vol = dangerHeat > 0.45 ? (dangerHeat - 0.45) * 0.22 : 0;
    crackleGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.1);
  }
}

function stopCrackle() {
  if (crackleNode) { try { crackleNode.stop(); } catch(e){} crackleNode = null; crackleGain = null; }
}

// ── Init game ──────────────────────────────────────────────────────────────
function initGame() {
  player = {
    x: canvas.width * 0.28,
    y: canvas.height * 0.78,
    worldX: 0,
    facingRight: true,
    vx: 0,
    vy: -220,
    angle: 0,
    spinV: 0,
    wingHealth: 50,
    burnDmg: 0,   // accumulated sun damage  (drives orange/fire visuals)
    wetDmg: 0,    // accumulated ocean damage (drives blue/drip visuals)
    eagleDmg: 0,  // permanent burn floor from eagle hits (irreversible)
    orcaDmg: 0,   // permanent wet floor from orca hits (irreversible)
    directDmg: 0, // damage from eagles/orcas — no visual effect, permanent
    inWater: false,
    xp: 0,
    flapPhase: 0,
    flapThresholdsHit: new Set(),
    lastXPTick: 0,
    lastFlapSound: 0,
    driftX: 0,
    onIsland: false,
  };
  feathers = [];
  fires    = [];
  splashes = [];
  drips    = [];
  clouds   = initClouds();
  islands  = initIslands();
  floaters = [];
  eagles = []; eagleSpawnTimer = 5;
  orcas  = []; orcaSpawnTimer  = 8;
  waves = []; waveSpawnTimer = 5;
  shakeAmt = 0;
  shakeDecay = 0;
  cameraX = player.worldX - canvas.width * 0.42;
  stopCrackle();
  submittedThisRun = false;
  hallRank = null;
  // Manga abilities
  diveT = 0; diveCD = 0;
  rescueAvailable = 1; rescueIslandFavor = 0; rescueT = 0; rescueReach = 0;
  sunEmbraceT = 0;
  mangaTexts.length = 0;
  hallStatus = null;
}

function initClouds() {
  const arr = [];
  for (let i = 0; i < 32; i++) {
    const yFrac = Math.random(); // 0=top, 1=bottom
    arr.push({
      x: Math.random() * canvas.width,
      y: yFrac * canvas.height,
      w: 60 + Math.random() * 100,
      h: 22 + Math.random() * 30,
      speed: 15 + Math.random() * 20,
      baseAlpha: 0.55 * Math.pow(yFrac, 1.4), // thin near top
    });
  }
  return arr;
}

function initIslands() {
  const arr = [];
  const worldXs = [350,  700, 1100, 1550, 2050, 2600];
  const widths  = [110,   85,  120,   90,  100,   80];
  const trees   = [  0,    2,    1,    0,    1,    2];
  for (let i = 0; i < worldXs.length; i++) {
    arr.push({
      worldX: worldXs[i],
      w: widths[i],
      treeType: trees[i],
      sinking: false,
      sinkT: 0,
      sparkle: 0,
    });
  }
  return arr;
}

function spawnIsland() {
  // place ahead of the furthest existing island
  const maxWorldX = islands.length > 0
    ? Math.max(...islands.map(i => i.worldX))
    : player.worldX + 400;
  const worldX = maxWorldX + 450 + Math.random() * 350;
  islands.push({
    worldX,
    w: 80 + Math.random() * 55,
    treeType: Math.floor(Math.random() * 3),
    sinking: false,
    sinkT: 0,
    sparkle: 0,
  });
}

function islandSurfaceY() { return canvas.height * 0.805; }
function oceanY()         { return canvas.height * 0.83; }

// ── Helpers ────────────────────────────────────────────────────────────────
function altRatio() {
  return 1 - player.y / oceanY();
}
function dangerHeat() {
  return Math.max(0, (altRatio() - 0.45) * (1 / 0.55));
}
function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar=(ah>>16)&255, ag=(ah>>8)&255, ab=ah&255;
  const br=(bh>>16)&255, bg=(bh>>8)&255, bb=bh&255;
  const r=Math.round(ar+(br-ar)*t), g=Math.round(ag+(bg-ag)*t), bl2=Math.round(ab+(bb-ab)*t);
  return `rgb(${r},${g},${bl2})`;
}

function spawnFeathers(count, fromX, fromY) {
  for (let i = 0; i < count; i++) {
    feathers.push({
      x: fromX + (Math.random()-0.5)*30,
      y: fromY + (Math.random()-0.5)*20,
      vx: (Math.random()-0.5)*120,
      vy: -40 - Math.random()*80,
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*6,
      alpha: 1,
      size: 6 + Math.random()*8,
      color: `hsl(${30+Math.random()*30},80%,${70+Math.random()*20}%)`,
    });
  }
}

function spawnFire(x, y, count) {
  const colors = ['#ff6a00','#ff9500','#ffcc00','#ff3300','#ffee88'];
  for (let i = 0; i < count; i++) {
    fires.push({
      x: x+(Math.random()-0.5)*22,
      y: y+(Math.random()-0.5)*12,
      vx: (Math.random()-0.5)*70,
      vy: -60 - Math.random()*90,
      life: 1, maxLife: 0.4+Math.random()*0.5,
      size: 3+Math.random()*5,
      color: colors[Math.floor(Math.random()*colors.length)],
    });
  }
}

function addShake(amt) {
  Engine.shake(amt); // engine owns the shake transform
}

// Single source of truth for wing HP. Any change to a damage source
// (burnDmg/wetDmg/directDmg) should be followed by recomputeWingHealth() so
// the player health bar and the death threshold stay in sync.
function recomputeWingHealth() {
  player.wingHealth = Math.max(0, WING_MAX - player.burnDmg - player.wetDmg - player.directDmg);
}

// ── Update ─────────────────────────────────────────────────────────────────
// `time` is synced from Engine.time before each call (see onUpdate in Engine.boot).
function update(dt) {
  // Manga ability cooldowns + telegraph text decay. Frozen during the rescue
  // cinematic so a player who tapped ↓ mid-rescue doesn't end up with a
  // ghost-dive timer ticking under the carry.
  if (rescueT <= 0) {
    diveT  = Math.max(0, diveT  - dt);
    diveCD = Math.max(0, diveCD - dt);
  }
  for (let i = mangaTexts.length - 1; i >= 0; i--) {
    mangaTexts[i].t -= dt;
    if (mangaTexts[i].t <= 0) mangaTexts.splice(i, 1);
  }

  if (state === 'playing') {
    updatePlaying(dt);
  } else if (state === 'dying') {
    updateDying(dt);
  }
}

function updatePlaying(dt) {
  // ── Daedalus rescue (manga-only) — Icarus is carried, world keeps moving but
  // can't hurt him. Eagles/orcas/waves still animate so the cinematic doesn't
  // freeze the scene. Motion-only updates kept in `rescueWorldMotion` to avoid
  // gating every damage site in the main loop below.
  if (rescueT > 0) {
    rescueT = Math.max(0, rescueT - dt);
    rescueReach = Math.min(1, rescueReach + dt * 4);
    player.vy = -55;
    player.y += player.vy * dt;
    player.flapPhase += dt * 4;
    rescueWorldMotion(dt);
    updateParticles(dt);
    updateClouds(dt);
    updateSounds(0, player.vy);
    return;
  }

  // During Icarian Dive (manga ability), thrust is locked off and the player
  // accelerates straight down through any eagles in the way.
  const diving   = diveT > 0;
  const thrusting = !diving && (keys['ArrowUp'] || keys[' ']);

  // player-driven horizontal flight — no auto-scroll
  const targetVx = (keys['ArrowRight'] ? 260 : 0) - (keys['ArrowLeft'] ? 260 : 0);
  player.vx += (targetVx - player.vx) * Math.min(1, dt * 10);
  player.worldX += player.vx * dt;
  if (Math.abs(player.vx) > 20) player.facingRight = player.vx > 0;
  player.x = canvas.width * 0.42;  // fixed screen position; camera follows
  cameraX = player.worldX - player.x;

  // vertical physics
  if (thrusting) {
    player.vy -= THRUST * dt;
    player.flapPhase += dt * 8;
    if (time - player.lastFlapSound > 0.18) {
      playFlapSound();
      player.lastFlapSound = time;
    }
  } else if (diving) {
    player.vy += THRUST * 1.4 * dt;   // extra downward acceleration
    player.flapPhase += dt * 14;       // wings beat fast
  } else {
    player.flapPhase += dt * 2;
  }
  player.vy += GRAVITY * dt;
  player.vy = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vy));
  player.y += player.vy * dt;

  // island landing & ocean clamping
  player.onIsland = false;
  const surf = islandSurfaceY();
  const oY   = oceanY();

  // advance sinking islands and remove when done
  for (let i = islands.length - 1; i >= 0; i--) {
    const isl = islands[i];
    isl.sparkle = Math.max(0, isl.sparkle - dt * 1.5);
    if (isl.sinking) {
      isl.sinkT += dt;
      // gurgle splashes while sinking
      if (Math.random() < dt * 10) {
        const ix = isl.worldX - cameraX;
        for (let j = 0; j < 3; j++) {
          splashes.push({
            x: ix + (Math.random()-0.5)*isl.w,
            y: surf + isl.sinkT / ISLAND_SINK_TIME * 25,
            vx: (Math.random()-0.5)*60,
            vy: -30 - Math.random()*40,
            alpha: 0.7,
            size: 2 + Math.random()*3,
          });
        }
      }
      if (isl.sinkT >= ISLAND_SINK_TIME) {
        islands.splice(i, 1);
        spawnIsland();
      }
    }
  }

  for (const isl of islands) {
    if (isl.sinking) continue; // can't land on a sinking island

    const ix = isl.worldX - cameraX;
    const onX = Math.abs(player.x - ix) < isl.w * 0.48;
    if (onX && player.y + 14 >= surf - 4 && player.vy >= 0) {
      // land on island
      player.y  = surf - 14;
      player.vy = 0;
      player.onIsland = true;
      // claim: give XP and start sinking
      isl.sinking = true;
      isl.sinkT   = 0;
      isl.sparkle = 1;
      player.xp  += ISLAND_XP_BONUS;
      floaters.push({
        x: ix, y: surf - 30,
        val: ISLAND_XP_BONUS, alpha: 1.5, vy: -75, big: true,
      });
      // Multi-rescue economy: every ISLANDS_PER_RESCUE landings earns +1
      // rescue charge (capped at MAX_RESCUES). Manga-mode + daedalus_compassion
      // gate is checked at trigger time, so the favor accumulates regardless.
      rescueIslandFavor++;
      if (rescueIslandFavor >= ISLANDS_PER_RESCUE) {
        rescueIslandFavor = 0;
        if (rescueAvailable < MAX_RESCUES) {
          rescueAvailable++;
          mangaTexts.push({
            text: 'DAEDALUS WATCHES', x: ix, y: surf - 80,
            t: 1.4, color: '#ffd54a', size: 22,
          });
        }
      }
      playIslandLand();
      addShake(3);
      for (let i = 0; i < 12; i++) {
        splashes.push({
          x: ix + (Math.random()-0.5)*isl.w,
          y: surf,
          vx: (Math.random()-0.5)*120,
          vy: -60 - Math.random()*80,
          alpha: 1,
          size: 3 + Math.random()*4,
        });
      }
      break;
    }
  }

  // ocean surface: bounce + wing damage (water extinguishes burn)
  if (player.y + 14 >= oY) {
    // burst damage on first contact each entry
    if (!player.inWater) {
      player.wetDmg = Math.min(100, player.wetDmg + 18);
      recomputeWingHealth();
    }
    player.inWater = true;
    const oceanDmg = 80 * dt;
    player.wetDmg  = Math.min(100, player.wetDmg  + oceanDmg);
    player.burnDmg = Math.max(player.eagleDmg, player.burnDmg - oceanDmg * 0.625); // water heals only 25% as effectively; eagle damage permanent
    recomputeWingHealth();
    player.y = oY - 14;
    if (player.vy > 40) {
      playSplash();
      addShake(4);
      for (let i = 0; i < 18; i++) {
        splashes.push({
          x: player.x + (Math.random()-0.5)*40,
          y: oY,
          vx: (Math.random()-0.5)*150,
          vy: -80 - Math.random()*100,
          alpha: 1,
          size: 2 + Math.random()*5,
        });
      }
    }
    player.vy = -player.vy * 0.3;
  } else {
    player.inWater = false;
  }

  player.y = Math.max(80, player.y);

  // wing health — two cancelling sources
  const heat   = dangerHeat();
  const sunDmg = heat * MAX_DAMAGE * dt;
  player.burnDmg = Math.min(100, player.burnDmg + sunDmg);
  player.wetDmg  = Math.max(player.orcaDmg, player.wetDmg  - sunDmg * 0.625); // sun heals only 25% as effectively; orca damage permanent
  const prev = player.wingHealth;
  recomputeWingHealth();

  // Mystery: The Sun's Embrace — Icarus mirrors his own myth by flying
  // *directly into* the sun. Sustain heat ≥ 0.95 for SUN_EMBRACE_GOAL seconds
  // and the syllable is whispered as the wax begins to fail.
  // Sun's Embrace — Icarus must hold himself in the sun's drawn radius for
  // a beat (cumulative within run). On commit, the run ends and we cut to
  // the River Oceanus place scene. unlockAndDepart is idempotent across
  // re-triggers: the cinematic plays again on repeat runs, but the chain
  // counter and clue reveal only advance on the first-ever discovery.
  if (player.y <= SUN_EMBRACE_Y) {
    sunEmbraceT += dt;
    if (sunEmbraceT >= SUN_EMBRACE_GOAL
      && window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.unlockAndDepart({
        hintId:   'z',
        placeId:  'oceanus',
        fromGame: 'icarus',
      });
      return; // game ends here; navigation begins
    }
  }

  // Glyph collection — fly through the spiral if not already found.
  if (window.Engine && Engine.unlock && !Engine.unlock.has('glyph_icarus_found')) {
    const gx = GLYPH_ICARUS.worldX - cameraX;
    const gy = canvas.height * GLYPH_ICARUS.yFrac;
    const dx = player.x - gx, dy = player.y - gy;
    if (dx * dx + dy * dy < GLYPH_ICARUS.radius * GLYPH_ICARUS.radius) {
      Engine.unlock.set('glyph_icarus_found');
      if (window.GodGames && GodGames.Mysteries) {
        GodGames.Mysteries.earnHint('glyph_first');
        GodGames.Mysteries.tally('glyphs_found');
      }
      // Feather burst + manga shout (gold-tinted feathers feel like sparkles)
      for (let i = 0; i < 14; i++) {
        feathers.push({
          x: gx + (Math.random()-0.5)*30, y: gy + (Math.random()-0.5)*30,
          vx: (Math.random()-0.5)*180, vy: -60 - Math.random()*100,
          rot: Math.random()*Math.PI*2, rotV: (Math.random()-0.5)*8,
          alpha: 1, size: 5 + Math.random()*4,
          color: `hsl(${45+Math.random()*15},85%,${65+Math.random()*15}%)`,
        });
      }
      mangaTexts.push({ text: 'A MARK!', x: player.x, y: player.y - 50, t: 0.8, color: '#ffd54a', size: 30 });
      addShake(4);
    }
  }

  // feather threshold events — only when near the sun
  if (heat > 0) {
    const thresholds = [90, 75, 60, 45, 30, 15];
    for (const t of thresholds) {
      if (prev > t && player.wingHealth <= t && !player.flapThresholdsHit.has(t)) {
        player.flapThresholdsHit.add(t);
        spawnFeathers(8 + Math.floor((100-t)/10), player.x, player.y);
        playFeatherLoss();
        addShake(5 + (100-t)*0.06);
      }
    }
  }

  // XP
  const xpRate = (BASE_XP + altRatio() * BONUS_XP) * (diveT > 0 ? 3 : 1);
  player.xp += xpRate * dt;
  // floating xp numbers
  if (time - player.lastXPTick > 0.9) {
    player.lastXPTick = time;
    floaters.push({ x: player.x + (Math.random()-0.5)*40, y: player.y - 20,
      val: Math.round(xpRate * 0.9), alpha: 1, vy: -55 });
    playXPTick();
  }

  // water drips driven by wetDmg, regardless of altitude
  if (player.wetDmg > 10) {
    const wetness = Math.min(1, player.wetDmg / 60);
    const ww = 55;
    if (Math.random() < wetness * dt * 18) {
      const side = Math.random() < 0.5 ? -1 : 1;
      const ex = player.x + side * (ww * (0.4 + Math.random() * 0.6));
      drips.push({
        x: ex, y: player.y + (Math.random()-0.5)*12,
        vy: 40 + Math.random()*60,
        alpha: 0.7 + Math.random()*0.3,
        size: 2 + Math.random()*2.5,
        stretch: 1,
      });
    }
  }

  // burning effects driven by burnDmg (sun source only)
  if (player.burnDmg > 0) {
    // continuous feathers shedding (from wing area — above+behind player)
    if (player.burnDmg > 80 && Math.random() < dt * 12) {
      spawnFeathers(2, player.x - 8, player.y - 28);
    }
    // fire particles from wing
    if (player.burnDmg > 40) {
      const intensity = (player.burnDmg - 40) / 60;
      if (Math.random() < intensity * dt * 40) {
        spawnFire(player.x - 8, player.y - 32, Math.ceil(intensity*3));
        spawnFire(player.x - 18, player.y - 18, Math.ceil(intensity*2));
      }
    }
    // screen shake
    if (player.burnDmg > 70) {
      const intensity = (player.burnDmg - 70) / 30;
      Engine.shake(intensity * MAX_SHAKE * (0.3 + 0.7*Math.random()));
    }
  }

  // remove islands far behind the player
  for (let i = islands.length - 1; i >= 0; i--) {
    if (islands[i].worldX < player.worldX - 1200) islands.splice(i, 1);
  }
  // ensure there are always at least 5 non-sinking islands ahead
  const readyAhead = islands.filter(i => !i.sinking && i.worldX > player.worldX).length;
  if (readyAhead < 5) spawnIsland();

  // ── Eagles ──
  eagleSpawnTimer -= dt;
  if (eagleSpawnTimer <= 0) {
    const diff = Math.min(1, player.worldX / 5000);
    eagleSpawnTimer = Math.max(2.5, 7 - diff * 4) + Math.random() * 3;
    const count = Math.random() < diff * 0.5 ? 2 : 1;
    for (let i = 0; i < count; i++) {
      eagles.push({
        x: canvas.width + 70 + i * 110,
        y: player.y + (Math.random() - 0.5) * canvas.height * 0.42,
        speed: 340 + Math.random() * 140 + diff * 90,
        wingPhase: Math.random() * Math.PI * 2,
        size: 0.9 + Math.random() * 0.4,
        markT: 0, divingT: 0, diveTargetX: 0, diveTargetY: 0,
      });
    }
  }
  for (let i = eagles.length - 1; i >= 0; i--) {
    const e = eagles[i];
    e.wingPhase += dt * 5.5;
    e.markT  = Math.max(0, e.markT  - dt);
    e.divingT = Math.max(0, e.divingT - dt);
    // Manga-only special — DIVING CLAW: random eagles mark + dive straight down.
    if (Engine.manga && e.markT <= 0 && e.divingT <= 0 && !e._diveRolled
        && e.x > 60 && e.x < canvas.width + 40) {
      e._diveRolled = true;
      if (Math.random() < 0.25) {
        e.markT = 0.45;
        e.diveTargetX = player.x;
        e.diveTargetY = player.y;
        mangaTexts.push({ text: 'DIVE!', x: e.x, y: e.y - 24, t: 0.45, color: '#ff2200', size: 26 });
      }
    }
    if (e.markT <= 0 && e._diveRolled && e.divingT <= 0 && !e._diving && e.diveTargetY != null) {
      e._diving = true;
      e.divingT = 0.6;
      // Lock dive trajectory: straight down toward last seen target X
      e.diveDX = (e.diveTargetX - e.x) * 0.4;  // partial chase
      e.diveDY = 700;
    }
    if (e._diving) {
      e.x += e.diveDX * dt;
      e.y += e.diveDY * dt;
    } else {
      e.x -= e.speed * dt;
    }
    const edx = e.x - player.x, edy = e.y - player.y;
    const edist = Math.sqrt(edx * edx + edy * edy);
    // Icarian dive (player diving) downs eagles in path.
    if (diveT > 0 && edist < 60) {
      spawnFeathers(8, e.x, e.y);
      mangaTexts.push({ text: 'KNOCKED!', x: e.x, y: e.y - 18, t: 0.4, color: '#ffd54a', size: 22 });
      eagles.splice(i, 1);
      continue;
    }
    if (edist < 28) {
      player.directDmg = Math.min(100, player.directDmg + 8);
      recomputeWingHealth();
      spawnFeathers(6, player.x - 8, player.y - 25);
      addShake(9);
      playEagleScreech();
      eagles.splice(i, 1);
      continue;
    }
    if (e.x < -90 || e.y > canvas.height + 100) eagles.splice(i, 1);
  }

  // ── Orcas ──
  orcaSpawnTimer -= dt;
  if (orcaSpawnTimer <= 0) {
    orcaSpawnTimer = 4 + Math.random() * 4;
    // always spawn directly below Icarus
    orcas.push({
      x: player.x,
      y: oceanY(),
      vx: 0,
      vy: 0,
      chargeT: 0.5,   // warning phase before launch
      splashed: false,
    });
  }
  for (let i = orcas.length - 1; i >= 0; i--) {
    const o = orcas[i];
    const oY = oceanY();

    if (o.chargeT > 0) {
      // warning phase: bubble and churn at the surface
      o.chargeT -= dt;
      // escalating warning splashes — more frequent as chargeT approaches 0
      const urgency = 1 - o.chargeT / 0.5;
      if (Math.random() < dt * (6 + urgency * 28)) {
        const spread = 55 * (1 - urgency * 0.5);
        splashes.push({
          x: o.x + (Math.random()-0.5) * spread, y: oY,
          vx: (Math.random()-0.5) * 80,
          vy: -30 - Math.random() * 50 * (1 + urgency),
          alpha: 0.6 + urgency * 0.4,
          size: 2 + Math.random() * 3 * (1 + urgency),
        });
      }
      // play sound on launch
      if (o.chargeT <= 0) {
        o.vy = -(380 + Math.random() * 80);
        o.vx = +(170 + Math.random() * 80);  // arc rightward
        playOrcaSound();
      }
      continue;
    }

    // airborne phase — ballistic arc leftward
    o.vy += GRAVITY * dt;
    o.y  += o.vy * dt;
    o.x  += o.vx * dt;

    // collision with player while above water
    if (o.y < oY) {
      const odx = o.x - player.x, ody = o.y - player.y;
      if (Math.sqrt(odx*odx + ody*ody) < 38) {
        player.directDmg = Math.min(100, player.directDmg + 8);  // no water visuals
        recomputeWingHealth();
        addShake(11);
        playSplash();
        orcas.splice(i, 1);
        continue;
      }
    }
    // re-enter water
    if (o.y >= oY && !o.splashed) {
      o.splashed = true;
      playSplash();
      addShake(5);
      for (let j = 0; j < 22; j++) {
        splashes.push({ x: o.x+(Math.random()-0.5)*70, y: oY,
          vx:(Math.random()-0.5)*170, vy:-75-Math.random()*90, alpha:1, size:3+Math.random()*6 });
      }
    }
    if (o.y > oY + 80) orcas.splice(i, 1);
  }

  // ── Waves ──────────────────────────────────────────────────────────────
  waveSpawnTimer -= dt;
  if (waveSpawnTimer <= 0 && waves.length < 3) {
    // Only spawn if no other wave is within 400px of the spawn zone
    const tooClose = waves.some(w => w.x > canvas.width - 100);
    if (!tooClose) {
      waveSpawnTimer = 6 + Math.random() * 5;
      waves.push({
        x:      canvas.width + 80 + Math.random() * 300,
        h:      0, maxH: 80 + Math.random() * 70,
        w:      55 + Math.random() * 35,
        phase:  'rise', timer: 0, inWave: false,
      });
    } else {
      waveSpawnTimer = 1.5;
    }
  }
  for (let i = waves.length - 1; i >= 0; i--) {
    const wv = waves[i];
    wv.x -= 450 * dt;
    if (wv.x < -wv.w - 20 || wv.x > canvas.width + wv.w + 20) {
      // Space loop-back away from any other wave
      let spawnX = canvas.width + 200 + Math.random() * 400;
      for (const other of waves) {
        if (other !== wv && Math.abs(other.x - spawnX) < 350)
          spawnX += 350;
      }
      wv.x = spawnX;
      wv.h = 0; wv.phase = 'rise'; wv.timer = 0; wv.inWave = false;
      wv.maxH = 80 + Math.random() * 70;
      wv.w = 55 + Math.random() * 35;
    }
    wv.timer += dt;
    const riseT = 0.55, holdT = 8.0, fallT = 0.7;
    if (wv.phase === 'rise') {
      wv.h = wv.maxH * Math.min(1, wv.timer / riseT);
      if (wv.timer >= riseT) { wv.phase = 'hold'; wv.timer = 0; }
    } else if (wv.phase === 'hold') {
      wv.h = wv.maxH;
      if (wv.timer >= holdT) { wv.phase = 'fall'; wv.timer = 0; }
    } else {
      wv.h = wv.maxH * Math.max(0, 1 - wv.timer / fallT);
      if (wv.timer >= fallT) {
        // Loop back instead of removing
        wv.x = canvas.width + 40 + Math.random() * 200;
        wv.h = 0; wv.phase = 'rise'; wv.timer = 0; wv.inWave = false;
        wv.maxH = 70 + Math.random() * 80;
        wv.w = 38 + Math.random() * 30;
      }
    }

    // Collision: player hitbox vs wave column
    const waveTop = oY - wv.h;
    const inRange = Math.abs(player.x - wv.x) < wv.w + 10
                 && player.y - 20 < oY
                 && player.y + 14 > waveTop;
    if (inRange && !player.inWater) {
      if (!wv.inWave) {
        // burst on first contact
        player.wetDmg = Math.min(100, player.wetDmg + 9);
        recomputeWingHealth();
        // knock Icarus downward
        player.vy = Math.max(player.vy + 60, 60);
        playSplash(); playSplash(); addShake(10);
        // dramatic splash burst at wave crest
        const waveTop = oY - wv.h;
        // main upward column
        for (let s = 0; s < 28; s++) {
          const angle = -Math.PI/2 + (Math.random()-0.5)*1.6;
          const spd = 180 + Math.random()*280;
          splashes.push({
            x: wv.x + (Math.random()-0.5)*wv.w*1.4,
            y: waveTop,
            vx: Math.cos(angle)*spd,
            vy: Math.sin(angle)*spd,
            alpha: 1,
            size: 4 + Math.random()*8,
          });
        }
        // wide lateral spray
        for (let s = 0; s < 18; s++) {
          const side = Math.random() < 0.5 ? -1 : 1;
          splashes.push({
            x: wv.x + side*(wv.w*0.3 + Math.random()*wv.w*1.2),
            y: waveTop + Math.random()*wv.h*0.4,
            vx: side*(60 + Math.random()*220),
            vy: -30 - Math.random()*130,
            alpha: 0.85,
            size: 2 + Math.random()*5,
          });
        }
      }
      wv.inWave = true;
      const waveDmg = 40 * dt;
      player.wetDmg = Math.min(100, player.wetDmg + waveDmg);
      player.burnDmg = Math.max(player.eagleDmg, player.burnDmg - waveDmg * 0.625);
      recomputeWingHealth();
    } else {
      wv.inWave = false;
    }
  }

  // update particles
  updateParticles(dt);
  updateClouds(dt);
  updateFloaters(dt);
  updateSounds(heat, player.vy);
  // shake decay is handled by the engine

  if (player.wingHealth <= 0) {
    // Rescue is gated by the daedalus_compassion mystery — the player has to
    // burn against the sun 3 times in manga mode to earn it. Until then the
    // rescue is invisible / inactive.
    const rescueEarned = window.GodGames && GodGames.Mysteries
      && GodGames.Mysteries.isSolved('daedalus_compassion');
    if (Engine.manga && rescueEarned && rescueAvailable > 0) {
      triggerDaedalusRescue();
      return;
    }
    // Mystery counters: sun-dominant deaths drive the daedalus_compassion hint.
    if (window.GodGames && GodGames.Mysteries) {
      if (player.burnDmg > player.wetDmg && player.burnDmg > player.directDmg) {
        GodGames.Mysteries.tally('icarus_sun_deaths');
      }
    }
    state = 'dying';
    player.spinV = (Math.random() > 0.5 ? 1 : -1) * 4;
    player.driftX = (Math.random() > 0.5 ? 1 : -1) * 80;
    playDeathSound();
    stopCrackle();
  }
}

// Manga-only one-shot: Daedalus's hand reaches up from below and revives Icarus.
// Halves recoverable damage (eagle/orca floors are preserved) and clears the
// direct-hit pool so wingHealth bounces back enough to keep flying.
function triggerDaedalusRescue() {
  rescueAvailable = Math.max(0, rescueAvailable - 1);
  rescueT     = RESCUE_DUR;
  rescueReach = 0;
  // Daedalus shaves a chunk off every damage source so the rescue actually
  // restores enough wing health to keep flying — eagle/orca floors decay too.
  // This is a deliberate exception to the "eagle/orca damage is permanent"
  // invariant: the rescue is a one-shot divine intervention. Without the
  // floor decay, a hit-heavy run would die at 0 wingHealth right after the
  // rescue ends because both floors are too high to clear.
  player.eagleDmg = Math.max(0, player.eagleDmg - 12);
  player.orcaDmg  = Math.max(0, player.orcaDmg  - 12);
  player.directDmg = 0;
  player.burnDmg = Math.max(player.eagleDmg, player.burnDmg * 0.5);
  player.wetDmg  = Math.max(player.orcaDmg,  player.wetDmg  * 0.5);
  recomputeWingHealth();
  // Floor the heal so the rescue is always meaningful (≥ 25 health restored)
  const RESCUE_FLOOR = WING_MAX / 2;
  if (player.wingHealth < RESCUE_FLOOR) {
    const need = RESCUE_FLOOR - player.wingHealth;
    const burnRoom = player.burnDmg - player.eagleDmg;
    const wetRoom  = player.wetDmg  - player.orcaDmg;
    const burnGive = Math.min(burnRoom, need * (burnRoom / Math.max(0.01, burnRoom + wetRoom)));
    const wetGive  = Math.min(wetRoom,  need - burnGive);
    player.burnDmg -= burnGive;
    player.wetDmg  -= wetGive;
    recomputeWingHealth();
  }
  player.vy = -55;
  // Manga banner + audio polish from the character's profile
  mangaTexts.push({ text: 'DAEDALUS!', x: player.x, y: player.y - 90, t: 1.1, color: '#ffd54a', size: 56 });
  const polish = window.Manga && Manga.characters && Manga.characters.daedalus && Manga.characters.daedalus.polish;
  if (polish && polish.onRescue && Engine.audio._ctx && Manga.fx && Manga.fx.sfxLayered) {
    Manga.fx.sfxLayered(Engine.audio._ctx, polish.onRescue.audioLayers);
  }
  addShake(8);
  stopCrackle();
}

function updateDying(dt) {
  player.vy += GRAVITY * 1.6 * dt;
  player.vy = Math.min(player.vy, MAX_SPEED * 1.5);
  player.y += player.vy * dt;
  player.x += player.driftX * dt;
  player.angle += player.spinV * dt;
  player.spinV += (player.spinV > 0 ? 1 : -1) * 3 * dt;

  // death fire trail
  if (Math.random() < dt * 30) {
    spawnFire(player.x, player.y, 4);
  }
  spawnFeathers(Math.ceil(dt*8), player.x - 8, player.y - 25);
  addShake(MAX_SHAKE);
  // shake decay is handled by the engine

  updateParticles(dt);
  updateClouds(dt);
  updateSounds(0, player.vy);

  const oY = oceanY();
  if (player.y + 14 >= oY && player.vy > 0) {
    // hit the ocean — splash and die
    if (!player._splashed) {
      player._splashed = true;
      playSplash();
      addShake(MAX_SHAKE);
      for (let i = 0; i < 30; i++) {
        splashes.push({
          x: player.x + (Math.random()-0.5)*60,
          y: oY,
          vx: (Math.random()-0.5)*180,
          vy: -100 - Math.random()*120,
          alpha: 1,
          size: 3 + Math.random()*6,
        });
      }
    }
    player.y = oY - 14;
    player.vy *= -0.1;
  }
  if (player._splashed && Math.abs(player.vy) < 5) {
    state = 'dead';
    Engine.setState('dead');
    stopCrackle();
    if (windGain) windGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
    if (!submittedThisRun) {
      submittedThisRun = true;
      submitToHall(Math.floor(player.xp));
    }
  }
}

// Motion-only world step used during the Daedalus rescue. Mirrors the eagle /
// orca / wave motion in updatePlaying minus damage and collision. If any of
// those motion rules change there, mirror the change here too.
function rescueWorldMotion(dt) {
  // Eagles keep flying / completing their dives; can't hurt the player.
  for (let i = eagles.length - 1; i >= 0; i--) {
    const e = eagles[i];
    e.wingPhase += dt * 5.5;
    e.markT   = Math.max(0, e.markT   - dt);
    e.divingT = Math.max(0, e.divingT - dt);
    if (e._diving) { e.x += e.diveDX * dt; e.y += e.diveDY * dt; }
    else           { e.x -= e.speed * dt; }
    if (e.x < -90 || e.y > canvas.height + 100) eagles.splice(i, 1);
  }
  // Orcas finish their breach arcs (no collision, no fresh splash sounds).
  const oY = oceanY();
  for (let i = orcas.length - 1; i >= 0; i--) {
    const o = orcas[i];
    if (o.chargeT > 0) {
      o.chargeT -= dt;
      if (o.chargeT <= 0) {
        o.vy = -(380 + Math.random() * 80);
        o.vx = +(170 + Math.random() * 80);
      }
      continue;
    }
    o.vy += GRAVITY * dt;
    o.y  += o.vy * dt;
    o.x  += o.vx * dt;
    if (o.y > oY + 80) orcas.splice(i, 1);
  }
  // Waves continue their rise/hold/fall cycle.
  const riseT = 0.55, holdT = 8.0, fallT = 0.7;
  for (const wv of waves) {
    wv.x -= 450 * dt;
    if (wv.x < -wv.w - 20) {
      wv.x = canvas.width + 200 + Math.random() * 400;
      wv.h = 0; wv.phase = 'rise'; wv.timer = 0; wv.inWave = false;
    }
    wv.timer += dt;
    if (wv.phase === 'rise') {
      wv.h = wv.maxH * Math.min(1, wv.timer / riseT);
      if (wv.timer >= riseT) { wv.phase = 'hold'; wv.timer = 0; }
    } else if (wv.phase === 'hold') {
      wv.h = wv.maxH;
      if (wv.timer >= holdT) { wv.phase = 'fall'; wv.timer = 0; }
    } else {
      wv.h = wv.maxH * Math.max(0, 1 - wv.timer / fallT);
      if (wv.timer >= fallT) {
        wv.x = canvas.width + 40 + Math.random() * 200;
        wv.h = 0; wv.phase = 'rise'; wv.timer = 0; wv.inWave = false;
        wv.maxH = 70 + Math.random() * 80;
        wv.w = 38 + Math.random() * 30;
      }
    }
  }
}

function updateParticles(dt) {
  for (let i = feathers.length-1; i >= 0; i--) {
    const f = feathers[i];
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.vy += 150 * dt;
    f.vx *= Math.pow(0.92, dt*60);
    f.rot += f.rotV * dt;
    f.alpha -= dt * 0.45;
    if (f.alpha <= 0) feathers.splice(i,1);
  }
  for (let i = fires.length-1; i >= 0; i--) {
    const f = fires[i];
    f.x += f.vx * dt; f.y += f.vy * dt;
    f.vy -= 20 * dt;
    f.life -= dt / f.maxLife;
    if (f.life <= 0) fires.splice(i,1);
  }
  for (let i = splashes.length-1; i >= 0; i--) {
    const s = splashes[i];
    s.x += s.vx * dt; s.y += s.vy * dt;
    s.vy += 200 * dt;
    s.vx *= Math.pow(0.88, dt*60);
    s.alpha -= dt * 1.2;
    if (s.alpha <= 0) splashes.splice(i,1);
  }
  for (let i = drips.length-1; i >= 0; i--) {
    const d = drips[i];
    d.y     += d.vy * dt;
    d.vy    += 180 * dt;          // gravity pulls drip down
    d.stretch = 1 + d.vy * 0.012; // elongate as it accelerates
    d.alpha -= dt * 1.4;
    if (d.alpha <= 0) drips.splice(i,1);
  }
}

function updateClouds(dt) {
  for (const c of clouds) {
    c.x += c.speed * dt;
    if (c.x - c.w > canvas.width) c.x = -c.w;
  }
}

function updateFloaters(dt) {
  for (let i = floaters.length-1; i >= 0; i--) {
    const f = floaters[i];
    f.y += f.vy * dt;
    f.alpha -= dt * 0.9;
    if (f.alpha <= 0) floaters.splice(i,1);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
// Engine drives the loop. It calls onRender only when state==='playing' (which
// covers our 'playing' and 'dying' phases). Title/tutorial/dead screens are
// routed through onTitleRender / onGameOverRender (see Engine.boot below).
// Engine wraps onRender with its own shake transform — so we no longer apply
// our own translate here.
function render() {
  const W = canvas.width, H = canvas.height;

  // background
  renderBackground(W, H);

  // sun
  renderSun(W, H);

  // clouds
  renderClouds();

  // ocean (behind islands)
  renderOcean(W, H);

  // waves
  for (const wv of waves) {
    const oY = oceanY();
    const h = wv.h, cx = wv.x, hw = wv.w;
    if (h < 2) continue;
    const progress = Math.min(1, h / wv.maxH);
    const lean = hw * 0.72 * progress;   // lip pitches left (direction of travel) as wave peaks
    const top  = oY - h;

    ctx.save();

    // ── Whitewater trail (right of wave — already broken surface)
    const trailLen = hw * 2.5 * progress;
    const trailGrad = ctx.createLinearGradient(cx + hw * 0.3, 0, cx + hw * 0.3 + trailLen, 0);
    trailGrad.addColorStop(0,   'rgba(210,240,255,0.30)');
    trailGrad.addColorStop(1,   'rgba(210,240,255,0.00)');
    ctx.beginPath();
    ctx.moveTo(cx + hw * 0.3, oY - h * 0.04);
    ctx.quadraticCurveTo(cx + hw * 0.3 + trailLen * 0.5, oY - h * 0.09, cx + hw * 0.3 + trailLen, oY);
    ctx.lineTo(cx + hw * 0.3, oY);
    ctx.closePath();
    ctx.fillStyle = trailGrad;
    ctx.fill();

    // ── Main wave body (asymmetric — steep concave face left, gentle back right)
    const bodyGrad = ctx.createLinearGradient(cx - lean, top, cx + hw * 0.4, oY);
    bodyGrad.addColorStop(0,    'rgba(28, 165, 215, 0.88)');  // crest — bright cyan-blue
    bodyGrad.addColorStop(0.42, 'rgba(10,  88, 172, 0.93)');  // mid — rich blue
    bodyGrad.addColorStop(1,    'rgba(4,   38, 108, 0.97)');  // base — deep ocean
    ctx.beginPath();
    ctx.moveTo(cx + hw * 0.55, oY);                            // right base
    ctx.bezierCurveTo(                                          // back wall — gentle slope
      cx + hw * 0.42, oY - h * 0.30,
      cx + hw * 0.10, top + h * 0.16,
      cx - lean + hw * 0.08, top                              // back of crest
    );
    ctx.bezierCurveTo(                                          // lip curls left/forward
      cx - lean + hw * 0.36, top - h * 0.07,
      cx - lean - hw * 0.06, top + h * 0.04,
      cx - lean - hw * 0.26, top + h * 0.22                  // curl tip
    );
    ctx.bezierCurveTo(                                          // concave scoop face
      cx - lean - hw * 0.10, oY - h * 0.54,
      cx - hw * 0.16, oY - h * 0.11,
      cx - hw * 0.09, oY                                      // front base
    );
    ctx.closePath();
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    // ── Backlit teal glow through thin wave face (sun behind the wave)
    const faceGrad = ctx.createLinearGradient(cx - lean, top + h * 0.18, cx + hw * 0.1, oY - h * 0.1);
    faceGrad.addColorStop(0,   'rgba(70, 225, 205, 0.40)');
    faceGrad.addColorStop(0.6, 'rgba(20, 160, 200, 0.15)');
    faceGrad.addColorStop(1,   'rgba(10, 100, 170, 0.00)');
    ctx.fillStyle = faceGrad;
    ctx.fill();

    // ── Barrel interior — the glowing hollow tube under the curling lip
    ctx.beginPath();
    ctx.moveTo(cx - lean + hw * 0.07, top + h * 0.06);
    ctx.bezierCurveTo(
      cx - lean - hw * 0.05, top + h * 0.17,
      cx - lean - hw * 0.20, top + h * 0.33,
      cx - hw * 0.05, oY - h * 0.27
    );
    ctx.bezierCurveTo(
      cx + hw * 0.09, oY - h * 0.13,
      cx + hw * 0.13, top + h * 0.11,
      cx - lean + hw * 0.07, top + h * 0.06
    );
    const barrelGrad = ctx.createRadialGradient(
      cx - lean * 0.22, top + h * 0.33, h * 0.02,
      cx - lean * 0.22, top + h * 0.33, hw * 0.52
    );
    barrelGrad.addColorStop(0,    'rgba(155, 245, 225, 0.58)');
    barrelGrad.addColorStop(0.45, 'rgba(45,  190, 210, 0.22)');
    barrelGrad.addColorStop(1,    'rgba(10,  100, 170, 0.00)');
    ctx.fillStyle = barrelGrad;
    ctx.fill();

    // ── Bright foam ridge along breaking crest
    ctx.beginPath();
    ctx.moveTo(cx - lean + hw * 0.05, top + 1);
    ctx.bezierCurveTo(
      cx - lean + hw * 0.26, top - h * 0.065,
      cx - lean + hw * 0.52, top - h * 0.018,
      cx + hw * 0.10, top + h * 0.09
    );
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.96)';
    ctx.lineWidth = 4.5;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#dff5ff';
    ctx.shadowBlur = 12;
    ctx.stroke();

    // ── Foam ribbon down the face
    ctx.beginPath();
    ctx.moveTo(cx - lean - hw * 0.20, top + h * 0.24);
    ctx.bezierCurveTo(
      cx - lean * 0.50, oY - h * 0.44,
      cx - hw * 0.11, oY - h * 0.14,
      cx - hw * 0.05, oY - h * 0.03
    );
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.52)';
    ctx.lineWidth = 2.2;
    ctx.shadowBlur = 5;
    ctx.stroke();

    // ── Mist / spray above the crest (when wave is near peak)
    if (progress > 0.5) {
      const mist = (progress - 0.5) / 0.5;
      ctx.shadowBlur = 0;
      for (let i = 0; i < 10; i++) {
        const ang = -Math.PI * 0.6 + i * 0.13 + Math.sin(time * 2.8 + i * 1.6) * 0.07;
        const r   = (hw * 0.20 + i * hw * 0.055) * mist;
        const sx  = cx - lean + hw * 0.08 + Math.cos(ang) * r;
        const sy  = top - Math.abs(Math.sin(ang)) * r * 0.75;
        ctx.beginPath();
        ctx.arc(sx, sy, 1.0 + i * 0.45, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(225, 248, 255, ${mist * 0.52 * (1 - i / 10)})`;
        ctx.fill();
      }
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // world objects: ledge + islands drawn in world space
  ctx.save();
  ctx.translate(-cameraX, 0);
  renderLedge(W, H);
  renderIslands(W, H);
  ctx.restore();

  // splash droplets
  for (const s of splashes) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, s.alpha);
    ctx.fillStyle = '#7dd6f7';
    ctx.shadowColor = '#aee8ff';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // feathers
  for (const f of feathers) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.globalAlpha = f.alpha;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size*0.4, f.size, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // water drips
  for (const d of drips) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    ctx.fillStyle = '#66aaee';
    ctx.shadowColor = '#aaddff';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, d.size * 0.5, d.size * d.stretch, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // fire particles
  for (const f of fires) {
    ctx.save();
    ctx.globalAlpha = f.life * 0.85;
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size * f.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // orcas (breach from ocean)
  for (const o of orcas) {
    if (o.y > oceanY() + 60) continue; // fully submerged
    ctx.save();
    ctx.translate(o.x, o.y);
    // rotate to face direction of travel when airborne
    if (o.chargeT <= 0 && (Math.abs(o.vx) > 10 || Math.abs(o.vy) > 10)) {
      ctx.rotate(Math.atan2(o.vx, -o.vy));
    }
    if (Engine.manga && window.Manga && typeof window.Manga.characters?.orca?.draw === 'function') {
      Manga.characters.orca.draw(ctx, {
        x: 0, y: 0, surfaceLocalY: oceanY() - o.y, facing: 1, t: time,
      });
    } else {
      drawOrca(oceanY() - o.y);
    }
    ctx.restore();
  }

  // eagles
  for (const e of eagles) {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (Engine.manga && window.Manga && typeof window.Manga.characters?.eagle?.draw === 'function') {
      Manga.characters.eagle.draw(ctx, {
        size: e.size, wingPhase: e.wingPhase,
        diving: !!e._diving, marked: e.markT > 0,
      });
    } else {
      drawEagle(e.size, e.wingPhase);
    }
    ctx.restore();
  }

  // Hidden glyph — Daedalus's labyrinth seal. Subtle spiral; brighter
  // shimmer once collected so the player sees their mark next time.
  renderIcarusGlyph(W, H);

  // player
  renderPlayer(W, H);

  // Daedalus rescue hand (manga-only): reaches up from below the player
  if (rescueT > 0 && Engine.manga && window.Manga && typeof window.Manga.characters?.daedalus?.draw === 'function') {
    Manga.characters.daedalus.draw(ctx, {
      x: player.x, y: player.y + 30, pose: 'rescue',
      reach: rescueReach, t: time,
    });
  }

  // Daedalus flies near Icarus during play
  if (state === 'playing') renderFlyingDaedalus(W, H);

  // floaters
  for (const f of floaters) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, f.alpha);
    ctx.fillStyle = f.big ? '#fff' : GOLD;
    ctx.font = f.big ? 'bold 26px monospace' : 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = GOLD;
    ctx.shadowBlur = f.big ? 18 : 6;
    ctx.fillText(`+${f.val} points`, f.x, f.y);
    ctx.restore();
  }

  // HUD
  renderHUD(W, H);
}

function renderBackground(W, H) {
  const alt = altRatio();
  const heat = dangerHeat();
  // gradient shifts: the hotter, the more orange bleeds downward
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  // top colors get more intense with heat
  const topC  = lerpColor('#ff8800', '#ffdd00', Math.sin(time*1.5)*0.15+0.5);
  const midHiC = lerpColor('#cc4400', '#ff7700', heat);
  const midC  = lerpColor('#1a6b9e', '#c2650a', heat * 0.9);
  const botC  = '#0d3a5c'; // deep blue that blends into ocean

  grad.addColorStop(0,    topC);
  grad.addColorStop(0.12 + heat*0.15, midHiC);
  grad.addColorStop(0.45 + heat*0.2,  midC);
  grad.addColorStop(0.80, botC);
  grad.addColorStop(1,    '#071e30');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // subtle heat shimmer lines near top when dangerous
  if (heat > 0.3) {
    ctx.save();
    ctx.globalAlpha = heat * 0.12;
    for (let i = 0; i < 8; i++) {
      const yy = (time*40 + i*30) % (H*0.5);
      ctx.strokeStyle = '#ffaa00';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(W, yy + Math.sin(time*3+i)*8);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function renderSun(W, H) {
  const cx = W/2, cy = -30;
  const pulse = 1 + Math.sin(time*1.8)*0.06;
  const R = 120 * pulse;

  // glow layers
  const glows = [
    {r: R*5.5, a: 0.022}, {r: R*4,   a: 0.04},
    {r: R*2.8, a: 0.07},  {r: R*1.9, a: 0.12},
    {r: R*1.35,a: 0.22},
  ];
  for (const g of glows) {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, g.r);
    grad.addColorStop(0,   `rgba(255,200,50,${g.a})`);
    grad.addColorStop(0.6, `rgba(255,120,0,${g.a*0.5})`);
    grad.addColorStop(1,   'rgba(255,80,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, g.r, 0, Math.PI*2);
    ctx.fill();
  }

  // corona rays
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(time * 0.12);
  ctx.globalAlpha = 0.25;
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const r1 = R * 1.2, r2 = R * 3.5 + Math.sin(time*2+i)*20;
    ctx.strokeStyle = '#ffcc44';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
    ctx.stroke();
  }
  ctx.restore();

  // core
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
  coreGrad.addColorStop(0,   '#ffffff');
  coreGrad.addColorStop(0.3, '#fffaaa');
  coreGrad.addColorStop(0.7, '#ffcc00');
  coreGrad.addColorStop(1,   '#ff8800');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI*2);
  ctx.fill();
}

function renderClouds() {
  for (const c of clouds) {
    const a = c.baseAlpha;
    if (a < 0.01) continue;
    ctx.save();
    ctx.globalAlpha = a;
    // fluffy cloud from overlapping ellipses
    const puffs = [
      {dx:0,    dy:0,    rx:c.w*0.45, ry:c.h*0.6},
      {dx:-c.w*0.28, dy:c.h*0.15, rx:c.w*0.32, ry:c.h*0.5},
      {dx: c.w*0.28, dy:c.h*0.15, rx:c.w*0.32, ry:c.h*0.5},
      {dx:-c.w*0.12, dy:-c.h*0.1, rx:c.w*0.28, ry:c.h*0.45},
      {dx: c.w*0.12, dy:-c.h*0.1, rx:c.w*0.28, ry:c.h*0.45},
    ];
    ctx.fillStyle = 'rgba(200,220,255,0.9)';
    for (const p of puffs) {
      ctx.beginPath();
      ctx.ellipse(c.x+p.dx, c.y+p.dy, p.rx, p.ry, 0, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function renderOcean(W, H) {
  const oY = oceanY();
  const waveAmp1 = 9, waveAmp2 = 5;

  // wave surface path
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, oY + waveAmp1);
  for (let x = 0; x <= W; x += 6) {
    const y = oY
      + Math.sin(x * 0.018 + time * 1.6) * waveAmp1
      + Math.sin(x * 0.032 - time * 2.1) * waveAmp2;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();

  // ocean body gradient
  const oGrad = ctx.createLinearGradient(0, oY, 0, H);
  oGrad.addColorStop(0,   '#1a7fbf');
  oGrad.addColorStop(0.15,'#1060a0');
  oGrad.addColorStop(0.5, '#0a3d70');
  oGrad.addColorStop(1,   '#071e30');
  ctx.fillStyle = oGrad;
  ctx.fill();

  // foam / wave crest highlight
  ctx.beginPath();
  ctx.moveTo(0, oY + waveAmp1);
  for (let x = 0; x <= W; x += 6) {
    const y = oY
      + Math.sin(x * 0.018 + time * 1.6) * waveAmp1
      + Math.sin(x * 0.032 - time * 2.1) * waveAmp2;
    ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(180,230,255,0.45)';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // secondary ripple
  ctx.beginPath();
  for (let x = 0; x <= W; x += 6) {
    const y = oY + 14
      + Math.sin(x * 0.022 - time * 1.2) * 6
      + Math.sin(x * 0.04  + time * 1.9) * 3;
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(100,180,240,0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // light sparkles on water surface
  ctx.globalAlpha = 0.55;
  for (let i = 0; i < 18; i++) {
    const sx = ((i * 137 + time * 25) % W);
    const sy = oY + 4 + Math.sin(sx * 0.02 + time * 1.5) * waveAmp1;
    const blink = Math.sin(time * 4 + i * 1.7) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(200,240,255,${blink * 0.7})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 2 + blink, 0, Math.PI * 2);
    ctx.fill();
  }

  // danger zone tint near ocean — warm orange ripple when close
  if (player && player.y + 14 > oY - 50) {
    const depth = Math.max(0, (player.y + 14 - (oY - 50)) / 50);
    ctx.globalAlpha = depth * 0.18;
    ctx.fillStyle = '#ff6600';
    ctx.fillRect(0, oY - 50, W, 50);
  }

  ctx.restore();
}

function renderLedge(W, H) {
  const surf = islandSurfaceY();
  const oY   = oceanY();
  // ledge runs from worldX -800 to 0 (where Icarus starts)
  const lx1 = -800, lx2 = 0;
  // only draw if any part is visible
  if (lx2 - cameraX < -50 || lx1 - cameraX > W + 50) return;

  // stone body (fills to screen bottom)
  ctx.fillStyle = '#7a7060';
  ctx.fillRect(lx1, surf, lx2 - lx1, H - surf);
  // top edge highlight
  ctx.strokeStyle = '#a09880'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx1, surf); ctx.lineTo(lx2, surf); ctx.stroke();
  // stone tile vertical lines
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
  for (let tx = Math.ceil(lx1 / 80) * 80; tx <= lx2; tx += 80) {
    ctx.beginPath(); ctx.moveTo(tx, surf); ctx.lineTo(tx, H); ctx.stroke();
  }
  // horizontal mortar line
  ctx.beginPath(); ctx.moveTo(lx1, surf + 30); ctx.lineTo(lx2, surf + 30); ctx.stroke();

  // subtle edge cliff detail on right side
  ctx.fillStyle = '#5a5048';
  ctx.beginPath();
  ctx.moveTo(lx2, surf);
  ctx.lineTo(lx2 + 18, surf + 14);
  ctx.lineTo(lx2 + 12, H);
  ctx.lineTo(lx2, H);
  ctx.closePath();
  ctx.fill();

  // Daedalus stands near the ledge edge (worldX = -135)
  const daedX = -135;
  if (daedX - cameraX > -100 && daedX - cameraX < W + 100) {
    drawDaedalus(daedX, surf);
  }
}

function drawIslandTrees(ix, baseTop, iw, worldX) {
  // deterministic pseudo-random from island's world position
  const r = (salt) => Math.abs(Math.sin(worldX * 0.137 + salt * 2.719));
  const nTrees = Math.max(3, Math.floor(iw / 13)); // pack as many as fit

  for (let t = 0; t < nTrees; t++) {
    // evenly spread with small per-tree jitter
    const xOff = iw * (-0.42 + 0.84 * ((t + 0.5 + (r(t*3+2) - 0.5) * 0.3) / nTrees));
    const tType = Math.floor(r(t*5+7) * 3);  // 0=palm, 1=cypress, 2=rock (no tree)
    const sc    = 0.38 + r(t*7+4) * 0.26;    // 0.38..0.64 scale
    const tx    = ix + xOff;

    if (tType === 0) {
      // palm
      const h = 26 * sc;
      ctx.strokeStyle = '#8B6914'; ctx.lineWidth = Math.max(1.2, 3 * sc); ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(tx, baseTop);
      ctx.bezierCurveTo(tx + 2*sc, baseTop - h*0.4, tx + sc, baseTop - h*0.75, tx - sc, baseTop - h);
      ctx.stroke();
      const fronds = [[-15,-5],[11,-4],[-9,-10],[8,-8],[0,-2]];
      for (const [dx, dy] of fronds) {
        ctx.strokeStyle = '#5a9030'; ctx.lineWidth = Math.max(0.8, 1.8 * sc);
        ctx.beginPath();
        ctx.moveTo(tx - sc, baseTop - h);
        ctx.quadraticCurveTo(tx + dx*sc*0.5, baseTop - h + dy*sc*0.5, tx + dx*sc, baseTop - h + dy*sc + 4*sc);
        ctx.stroke();
      }
    } else if (tType === 1) {
      // cypress
      const h = 28 * sc, hw = 9 * sc;
      ctx.fillStyle = '#2e6030';
      ctx.beginPath(); ctx.moveTo(tx, baseTop-h); ctx.lineTo(tx-hw*0.65, baseTop-1); ctx.lineTo(tx+hw*0.65, baseTop-1); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(tx, baseTop-h*0.65); ctx.lineTo(tx-hw, baseTop-h*0.1); ctx.lineTo(tx+hw, baseTop-h*0.1); ctx.closePath(); ctx.fill();
    }
    // tType 2 = bare rock — nothing drawn
  }
}

function renderIslands(W, H) {
  const surf = islandSurfaceY();
  const oY   = oceanY();
  for (const isl of islands) {
    const ix = isl.worldX;  // world space — camera translate already applied
    const iw = isl.w;
    // cull off-screen islands
    const screenX = ix - cameraX;
    if (screenX < -iw - 50 || screenX > W + iw + 50) continue;

    const pulse = Math.sin(time * 2.5) * 0.5 + 0.5;

    // sinking: island slides down and fades out
    const sinkFrac = isl.sinking ? Math.min(1, isl.sinkT / ISLAND_SINK_TIME) : 0;
    const sinkOffset = sinkFrac * 40;       // how far it's dropped in px
    const alpha = 1 - sinkFrac * 0.85;

    ctx.save();
    ctx.globalAlpha = alpha;

    const baseTop = surf + sinkOffset;
    const baseBot = baseTop + 30;
    const topHalf = iw * 0.5;
    const botHalf = iw * 0.38;

    // clip so sinking island disappears below the wave line (world-space rect)
    ctx.beginPath();
    ctx.rect(cameraX, 0, W, oY + 10);
    ctx.clip();

    // pulsing gold glow while not sinking
    if (!isl.sinking) {
      ctx.shadowColor = GOLD;
      ctx.shadowBlur  = 12 + pulse * 10;
    }

    // rock base
    ctx.beginPath();
    ctx.moveTo(ix - topHalf, baseTop);
    ctx.bezierCurveTo(ix - topHalf - 8, baseTop + 10, ix - botHalf - 4, baseBot - 8, ix - botHalf, baseBot);
    ctx.lineTo(ix + botHalf, baseBot);
    ctx.bezierCurveTo(ix + botHalf + 4, baseBot - 8, ix + topHalf + 8, baseTop + 10, ix + topHalf, baseTop);
    ctx.closePath();
    ctx.fillStyle = '#6a7c60';
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,230,180,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // grassy top
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.ellipse(ix, baseTop, topHalf * 0.9, 9, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#9ab870';
    ctx.fill();

    // trees — multiple small trees spread across the island
    ctx.shadowBlur = 0;
    drawIslandTrees(ix, baseTop, iw, isl.worldX);

    // pulsing gold ring (only while not sinking)
    if (!isl.sinking) {
      ctx.globalAlpha = (0.4 + pulse * 0.4) * alpha;
      ctx.strokeStyle = GOLD;
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.ellipse(ix, baseTop, topHalf + 6 + pulse * 4, 12 + pulse * 3, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // sparkle burst on claim
    if (isl.sparkle > 0) {
      ctx.globalAlpha = isl.sparkle * alpha;
      ctx.shadowColor = GOLD;
      ctx.shadowBlur = 15;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 + time * 3;
        const r = (1 - isl.sparkle) * 55 + 10;
        ctx.fillStyle = GOLD;
        ctx.beginPath();
        ctx.arc(ix + Math.cos(a) * r, baseTop + Math.sin(a) * r * 0.4, 3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }
}

function renderIcarusGlyph(W, H) {
  const gx = GLYPH_ICARUS.worldX - cameraX;
  if (gx < -40 || gx > W + 40) return;
  const gy = H * GLYPH_ICARUS.yFrac;
  const found = window.Engine && Engine.unlock && Engine.unlock.has('glyph_icarus_found');
  ctx.save();
  ctx.translate(gx, gy);
  // Spiral path — Daedalus's labyrinth motif.
  const turns = 2.4;
  const steps = 56;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = found ? '#fff5c0' : 'rgba(15, 12, 4, 0.42)';
  ctx.lineWidth = found ? 2.2 : 1.6;
  if (found) { ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 10; }
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = t * turns * Math.PI * 2;
    const r = 16 * t;
    const x = Math.cos(a) * r, y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else         ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Subtle shimmer on the unfound glyph so an observant player can pick it
  // out against the sky / sun gradient.
  if (!found) {
    const pulse = 0.20 + Math.sin(time * 2.3) * 0.10;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffd54a';
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function renderPlayer(W, H) {
  const p = player;
  // Manga route — bold ink Icarus + halftone wings
  if (Engine.manga && window.Manga && typeof window.Manga.characters?.icarus?.draw === 'function') {
    Manga.characters.icarus.draw(ctx, {
      x: p.x, y: p.y, facingRight: p.facingRight,
      vx: p.vx, vy: p.vy,
      flapPhase: p.flapPhase,
      wingHealth: p.wingHealth,
      burnDmg: p.burnDmg, wetDmg: p.wetDmg,
      thrusting: keys['ArrowUp'] || keys[' '],
      dying: state === 'dying', angle: p.angle,
      diving: diveT > 0,
    });
    return;
  }
  const wh       = p.wingHealth / WING_MAX;
  const burnFrac = p.burnDmg / 100;
  const wetFrac  = p.wetDmg  / 100;
  const thrusting = keys['ArrowUp'] || keys[' '];
  // flapY: positive = wing sweeps down (power stroke), negative = wing up (recovery)
  const flapY = Math.sin(p.flapPhase) * (thrusting ? 24 : 11);

  ctx.save();
  ctx.translate(p.x, p.y);
  if (state === 'dying') ctx.rotate(p.angle);
  ctx.scale(p.facingRight ? 0.65 : -0.65, 0.65);

  // glow aura
  if (burnFrac > wetFrac && burnFrac > 0.1) {
    const g = Math.min(1, (burnFrac - 0.1) / 0.4);
    ctx.shadowColor = lerpColor('#ff8800','#ff2200', g);
    ctx.shadowBlur  = 10 + g * 28;
  } else if (wetFrac > burnFrac && wetFrac > 0.1) {
    const g = Math.min(1, (wetFrac - 0.1) / 0.4);
    ctx.shadowColor = lerpColor('#5599dd','#1a3a7a', g);
    ctx.shadowBlur  = 10 + g * 20;
  }

  // Wing behind body (side profile — flies rightward)
  drawSideWing(ctx, flapY, wh, burnFrac, wetFrac);
  ctx.shadowBlur = 0;

  const skin  = '#f0c87a';
  const tunic = '#f0ead8';
  const shade = '#d8ccaa';
  // tunic cloth streams backward (leftward) proportional to speed
  const streamX = Math.max(0, -p.vy * 0.008);

  // Legs trail behind (left + slightly down in flight pose)
  ctx.strokeStyle = skin; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2, 8); ctx.quadraticCurveTo(-18+streamX, 22, -20+streamX, 40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4, 8); ctx.quadraticCurveTo(-10+streamX, 18, -12+streamX, 40); ctx.stroke();
  ctx.strokeStyle = '#7a5010'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-22+streamX, 40); ctx.lineTo(-16+streamX, 40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14+streamX, 40); ctx.lineTo(-8+streamX, 40); ctx.stroke();

  // Tunic (horizontal flight silhouette, cloth streaming left)
  ctx.fillStyle = tunic;
  ctx.beginPath();
  ctx.moveTo(-12, -14);
  ctx.lineTo( 14, -14);
  ctx.bezierCurveTo(16, -4, 14, 8, 10, 12);
  ctx.bezierCurveTo(0, 14+streamX*0.5, -12+streamX*0.8, 12, -14+streamX, 6);
  ctx.closePath();
  ctx.fill();
  // fabric folds
  ctx.strokeStyle = shade; ctx.lineWidth = 0.8;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.moveTo(i*4, -11); ctx.quadraticCurveTo(i*5+streamX*0.3, 0, i*3+streamX*0.5, 10); ctx.stroke();
  }
  // belt
  ctx.strokeStyle = GOLD; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-11, 0); ctx.lineTo(13, 0); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.beginPath(); ctx.arc(2, 0, 2.5, 0, Math.PI*2); ctx.fill();

  // Arms — one forward (right), one slightly behind
  ctx.strokeStyle = skin; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(12, -8); ctx.quadraticCurveTo(26, -5, 36, 0); ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(36, 0, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.moveTo(6, -6); ctx.quadraticCurveTo(18, -3, 28, 2); ctx.stroke();
  ctx.globalAlpha = 1;

  // Neck
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.rect(9, -24, 7, 12); ctx.fill();

  // Head in profile facing RIGHT
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(16, -32, 12, 0, Math.PI*2); ctx.fill();
  // Jaw shadow
  ctx.fillStyle = lerpColor(skin, '#c07830', 0.22);
  ctx.beginPath(); ctx.ellipse(19, -26, 7, 5, 0.3, 0, Math.PI); ctx.fill();
  // One eye (forward/right side of profile)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(21, -33, 2.2, 1.6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1800';
  ctx.beginPath(); ctx.arc(21, -33, 1.2, 0, Math.PI*2); ctx.fill();
  // Brow
  ctx.strokeStyle = '#2a1500'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(19, -36); ctx.lineTo(23.5, -35.5); ctx.stroke();
  // Nose pointing right
  ctx.strokeStyle = lerpColor(skin, '#8a5020', 0.5); ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(26, -31); ctx.lineTo(28, -28); ctx.stroke();
  // Mouth (determined)
  ctx.strokeStyle = '#8a4828'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(25, -26); ctx.lineTo(21, -25.5); ctx.stroke();

  // Hair — dark curly, streaming backward (left) in wind
  ctx.fillStyle = '#1e1000';
  ctx.beginPath(); ctx.arc(14, -37, 12, Math.PI*0.75, Math.PI*2.1); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -35, 7, Math.PI*1.2, Math.PI*2.5); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -41, 6, Math.PI*0.9, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#0e0800'; ctx.lineWidth = 1.8;
  for (let i = 0; i < 4; i++) {
    const hx = 8 - i * 5, hy = -38;
    ctx.beginPath(); ctx.arc(hx, hy, 3, 0, Math.PI, i % 2 === 0); ctx.stroke();
  }

  ctx.restore();
}

// ── Side-view wing ─────────────────────────────────────────────────────────
function drawSideWing(ctx, flapY, wh, burnFrac, wetFrac) {
  const dominant = burnFrac >= wetFrac ? 'burn' : 'wet';
  const domFrac  = dominant === 'burn' ? burnFrac : wetFrac;

  const fBase = dominant === 'burn'
    ? (domFrac < 0.35 ? '#f2ead8' : domFrac < 0.65 ? lerpColor('#f2ead8','#dd7700',(domFrac-0.35)/0.3) : lerpColor('#dd7700','#220800',(domFrac-0.65)/0.35))
    : (domFrac < 0.35 ? '#f2ead8' : domFrac < 0.65 ? lerpColor('#f2ead8','#4488cc',(domFrac-0.35)/0.3) : lerpColor('#4488cc','#081840',(domFrac-0.65)/0.35));
  const fDark = dominant === 'burn'
    ? (domFrac < 0.35 ? '#d8ceb0' : domFrac < 0.65 ? lerpColor('#d8ceb0','#993300',(domFrac-0.35)/0.3) : '#110400')
    : (domFrac < 0.35 ? '#d8ceb0' : domFrac < 0.65 ? lerpColor('#d8ceb0','#1a5599',(domFrac-0.35)/0.3) : '#040c28');

  // Wing root (upper back/shoulder)
  const rx = -5, ry = -12;
  // Tip: sweeps down on power stroke (positive flapY) and up on recovery (negative)
  const tipX = -8 + flapY * 0.45;
  const tipY = -55 + flapY * 0.88;

  const maxFeathers = 8;
  const nFeathers = Math.max(2, Math.round(wh * maxFeathers));

  // Translucent wing membrane
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = fBase;
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.bezierCurveTo(rx + 14, ry - 18, tipX + 22, tipY + 16, tipX, tipY);
  ctx.bezierCurveTo(tipX - 12, tipY + 20, rx - 14, ry + 6, rx, ry);
  ctx.fill();
  ctx.restore();

  // Individual feathers fanning along the trailing edge
  for (let i = 0; i < nFeathers; i++) {
    const t = i / Math.max(1, nFeathers - 1);
    const bx = rx + (tipX - rx) * t;
    const by = ry + (tipY - ry) * t;
    const len = 22 - t * 6;
    // fan angle: more spread at the tip
    const spreadAngle = -0.25 - t * 0.72 - flapY * 0.007;
    const col = i % 2 === 0 ? fBase : lerpColor(fBase, fDark, 0.18);

    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(spreadAngle);
    // leading vane
    ctx.fillStyle = lerpColor(col, fDark, 0.12);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(len*0.32, len*0.22, len*0.26, len*0.78, 0, len);
    ctx.bezierCurveTo(-len*0.04, len*0.7, -len*0.06, len*0.28, 0, 0);
    ctx.fill();
    // trailing vane
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-len*0.5, len*0.2, -len*0.44, len*0.76, 0, len);
    ctx.bezierCurveTo(len*0.06, len*0.68, len*0.08, len*0.22, 0, 0);
    ctx.fill();
    // highlight shimmer
    ctx.fillStyle = 'rgba(255,255,255,0.09)';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-len*0.1, len*0.18, -len*0.08, len*0.62, 0, len);
    ctx.bezierCurveTo(len*0.05, len*0.55, len*0.04, len*0.16, 0, 0);
    ctx.fill();
    ctx.restore();
  }

  // Wing arm / bone
  ctx.save();
  ctx.strokeStyle = lerpColor(fDark, '#000', 0.3);
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.32;
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.quadraticCurveTo((rx+tipX)/2 + 10, (ry+tipY)/2 - 4, tipX, tipY);
  ctx.stroke();
  ctx.restore();
}

// ── Daedalus commentary ────────────────────────────────────────────────────
function getDaedalusComment() {
  if (!player) return null;
  if (player.onIsland) return null;  // island landing is fine
  const alt  = altRatio();
  const heat = dangerHeat();
  if (player.burnDmg > 88) return 'Your wings are melting! Come down!';
  if (player.wetDmg  > 88) return 'Too heavy with water! Climb higher!';
  if (heat > 0.82)          return 'Too high! The sun will take you!';
  if (heat > 0.60)          return 'I feel the heat from here...';
  if (alt < 0.03)           return 'The sea! Pull up, Icarus!';
  if (alt < 0.08)           return 'Too low — the waves will take you!';
  return null;
}

// ── Flying Daedalus character ──────────────────────────────────────────────
function drawDaedalusWingSide(ctx, flapY) {
  const rx = -5, ry = -10;
  const tipX = -7 + flapY * 0.4;
  const tipY = -46 + flapY * 0.85;
  // membrane
  ctx.save(); ctx.globalAlpha = 0.22; ctx.fillStyle = '#ccc8b8';
  ctx.beginPath(); ctx.moveTo(rx, ry);
  ctx.bezierCurveTo(rx+11, ry-14, tipX+18, tipY+14, tipX, tipY);
  ctx.bezierCurveTo(tipX-10, tipY+18, rx-11, ry+5, rx, ry);
  ctx.fill(); ctx.restore();
  // feathers (grey/white)
  const cols = ['#d0ccc0', '#b8b4a8'];
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const bx = rx + (tipX-rx)*t, by = ry + (tipY-ry)*t;
    const len = 18 - t*4;
    const ang = -0.2 - t*0.62 - flapY*0.007;
    ctx.save(); ctx.translate(bx, by); ctx.rotate(ang);
    ctx.fillStyle = cols[i%2];
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.bezierCurveTo(-len*0.44,len*0.2,-len*0.38,len*0.74,0,len);
    ctx.bezierCurveTo(len*0.06,len*0.68,len*0.08,len*0.22,0,0);
    ctx.fill(); ctx.restore();
  }
}

function renderFlyingDaedalus(W, H) {
  const comment = getDaedalusComment();
  // Daedalus hovers behind and slightly below Icarus, gently bobbing
  const bob   = Math.sin(time * 1.35 + 0.8) * 7;
  const ddx   = player.x - 108;
  const ddy   = player.y + 14 + bob;
  const flapY = Math.sin(time * 3.2 + 1.4) * 13;

  // Manga route — bold ink Daedalus from the manga library
  if (Engine.manga && window.Manga && typeof window.Manga.characters?.daedalus?.draw === 'function') {
    Manga.characters.daedalus.draw(ctx, {
      x: ddx, y: ddy, pose: 'flying', facing: 1, t: time,
    });
    drawDaedalusBubble(W, H, ddx, ddy, comment);
    return;
  }

  ctx.save();
  ctx.translate(ddx, ddy);
  ctx.scale(0.50, 0.50);

  const skin = '#d4a060';
  const robe = '#3a2e1e';
  const robeL = '#5a4830';
  const grey = '#c0b8a8';

  // Wing (grey, behind body)
  drawDaedalusWingSide(ctx, flapY);

  // Legs trailing
  ctx.strokeStyle = skin; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2,8); ctx.quadraticCurveTo(-15,20,-17,36); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 3,8); ctx.quadraticCurveTo(-7,17,-9,36); ctx.stroke();

  // Dark robe body
  ctx.fillStyle = robe;
  ctx.beginPath(); ctx.moveTo(-12,-14); ctx.lineTo(14,-14);
  ctx.bezierCurveTo(15,-4,12,10,8,14); ctx.bezierCurveTo(-2,16,-12,12,-14,6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = robeL; ctx.lineWidth = 0.8;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.moveTo(i*4,-11); ctx.lineTo(i*3,10); ctx.stroke();
  }
