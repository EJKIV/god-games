  ctx.strokeStyle = '#8a7050'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-11,2); ctx.lineTo(12,2); ctx.stroke();

  // Arm forward
  ctx.strokeStyle = skin; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(11,-8); ctx.quadraticCurveTo(23,-5,32,1); ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(32,1,3.5,0,Math.PI*2); ctx.fill();

  // Neck + head profile facing right
  ctx.fillStyle = skin; ctx.beginPath(); ctx.rect(8,-22,7,11); ctx.fill();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(15,-30,11,0,Math.PI*2); ctx.fill();
  // Jaw
  ctx.fillStyle = lerpColor(skin,'#9a5020',0.22);
  ctx.beginPath(); ctx.ellipse(18,-25,6,4.5,0.3,0,Math.PI); ctx.fill();
  // Beard
  ctx.fillStyle = grey;
  ctx.beginPath(); ctx.moveTo(9,-23); ctx.quadraticCurveTo(8,-14,13,-10);
  ctx.quadraticCurveTo(20,-8,24,-14); ctx.quadraticCurveTo(26,-21,22,-24);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#a8a098'; ctx.lineWidth = 0.8;
  for (let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(11+i*2,-20);ctx.lineTo(13+i*2,-12);ctx.stroke();}
  // Eye
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(20,-32,2,1.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a1000'; ctx.beginPath(); ctx.arc(20,-32,1.1,0,Math.PI*2); ctx.fill();
  // Worried brow
  ctx.strokeStyle = grey; ctx.lineWidth = 2.2;
  ctx.beginPath(); ctx.moveTo(17.5,-35.5); ctx.quadraticCurveTo(20,-36.5,23,-35); ctx.stroke();
  // White hair
  ctx.fillStyle = grey;
  ctx.beginPath(); ctx.arc(13,-35,11,Math.PI*0.78,Math.PI*2.0); ctx.fill();
  ctx.beginPath(); ctx.arc(2,-32,6,Math.PI*1.3,Math.PI*2.4); ctx.fill();
  ctx.beginPath(); ctx.arc(8,-40,5,Math.PI*0.9,Math.PI*2); ctx.fill();

  ctx.restore();

  drawDaedalusBubble(W, H, ddx, ddy, comment);
}

function drawDaedalusBubble(W, H, ddx, ddy, comment) {
  if (!comment) return;
  const bw = 178, bh = 44;
  const bx = Math.max(4, Math.min(W - bw - 4, ddx - bw/2 + 8));
  const by = Math.max(4, ddy - 72);
  // Engine.dialogue.drawBubble is the portable helper; if the dialogue
  // module hasn't loaded for some reason, fall back to inline drawing.
  if (Engine.dialogue && typeof Engine.dialogue.drawBubble === 'function') {
    Engine.dialogue.drawBubble(ctx, {
      x: bx, y: by, w: bw, h: bh,
      anchorX: ddx + 8, anchorY: ddy - 28,
      speaker: 'DAEDALUS', text: comment, color: GOLD,
    });
    return;
  }
  // Fallback (kept for resilience)
  ctx.save();
  ctx.globalAlpha = 0.92;
  ctx.fillStyle = 'rgba(5,10,22,0.90)';
  ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 7); ctx.fill();
  ctx.strokeStyle = GOLD; ctx.lineWidth = 1.3;
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 7); ctx.stroke();
  ctx.shadowBlur = 0;
  const tx = Math.max(bx + 14, Math.min(bx + bw - 14, ddx + 8));
  ctx.beginPath(); ctx.moveTo(tx-7, by+bh); ctx.lineTo(tx, ddy-28); ctx.lineTo(tx+7, by+bh); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center';
  ctx.fillText('DAEDALUS', bx + bw/2, by + 13);
  ctx.fillStyle = 'rgba(240,230,200,0.95)'; ctx.font = '12px serif';
  const lines = wrapText(comment, bw - 18, '12px serif');
  lines.forEach((l, i) => ctx.fillText(l, bx + bw/2, by + 27 + i * 14));
  ctx.restore();
}

// ── Eagle & Orca drawing ───────────────────────────────────────────────────
function drawEagle(size, wingPhase) {
  const s = size;
  const flapY = Math.sin(wingPhase) * 18 * s;
  // Left-facing eagle: head at -x, tail at +x, wing root at upper-right (back)
  const rx = 6*s, ry = -8*s;
  const tipX = 8*s - flapY * 0.38;
  const tipY = -46*s + flapY * 0.86;

  // Wing membrane
  ctx.save(); ctx.globalAlpha = 0.22; ctx.fillStyle = '#3d2a0a';
  ctx.beginPath(); ctx.moveTo(rx, ry);
  ctx.bezierCurveTo(rx+12*s, ry-14*s, tipX+18*s, tipY+12*s, tipX, tipY);
  ctx.bezierCurveTo(tipX-10*s, tipY+15*s, rx-12*s, ry+5*s, rx, ry);
  ctx.fill(); ctx.restore();
  // Primary feathers
  for (let i = 0; i < 5; i++) {
    const t = i / 4;
    const bx = rx + (tipX-rx)*t, by2 = ry + (tipY-ry)*t;
    const len = (20 - t*5) * s;
    const ang = -0.18 - t*0.62 - flapY*0.006/s;
    ctx.save(); ctx.translate(bx, by2); ctx.rotate(ang);
    ctx.fillStyle = i%2===0 ? '#3d2a0a' : '#2a1a04';
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.bezierCurveTo(-len*0.44,len*0.2,-len*0.38,len*0.73,0,len);
    ctx.bezierCurveTo(len*0.06,len*0.68,len*0.08,len*0.22,0,0);
    ctx.fill(); ctx.restore();
  }
  // Body (dark brown)
  ctx.fillStyle = '#3d2a0a';
  ctx.beginPath(); ctx.ellipse(2*s, 0, 15*s, 5.5*s, 0, 0, Math.PI*2); ctx.fill();
  // White tail band
  ctx.fillStyle = 'rgba(220,210,175,0.75)';
  ctx.beginPath(); ctx.ellipse(14*s, 0, 5*s, 3.5*s, 0, 0, Math.PI*2); ctx.fill();
  // Tail shape
  ctx.fillStyle = '#2a1a04';
  ctx.beginPath(); ctx.moveTo(16*s,-3*s);
  ctx.bezierCurveTo(22*s,-7*s,27*s,-3*s,28*s,0);
  ctx.bezierCurveTo(27*s,4*s,22*s,7*s,16*s,3*s); ctx.closePath(); ctx.fill();
  // White head (bald eagle)
  ctx.fillStyle = '#e8e0c8';
  ctx.beginPath(); ctx.arc(-9*s, -2*s, 6.5*s, 0, Math.PI*2); ctx.fill();
  // Yellow eye
  ctx.fillStyle = '#e8c000'; ctx.beginPath(); ctx.arc(-11*s,-3.5*s,2*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';    ctx.beginPath(); ctx.arc(-11*s,-3.5*s,1*s,0,Math.PI*2); ctx.fill();
  // Hooked beak (points LEFT)
  ctx.fillStyle = '#cc9900';
  ctx.beginPath(); ctx.moveTo(-14*s,-1.5*s); ctx.lineTo(-22*s,-0.5*s);
  ctx.lineTo(-18*s,3.5*s); ctx.lineTo(-13*s,2*s); ctx.closePath(); ctx.fill();
}

// surfaceLocalY = oceanY - orca.y (ocean position in the orca's local coord space)
function drawOrca(surfaceLocalY) {
  const bLen = 52, bW = 17;
  ctx.save();
  // Only draw what's above the ocean surface
  ctx.beginPath(); ctx.rect(-70, -bLen - 40, 140, bLen + 40 + surfaceLocalY); ctx.clip();

  // Body
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(0, 0, bW, bLen, 0, 0, Math.PI*2); ctx.fill();
  // White belly
  ctx.fillStyle = '#f0f0e8';
  ctx.beginPath(); ctx.ellipse(9, 12, bW*0.48, bLen*0.48, 0.2, 0, Math.PI*2); ctx.fill();
  // White eye patch
  ctx.fillStyle = '#f0f0e8';
  ctx.beginPath(); ctx.ellipse(13, -22, 10, 7, 0.3, 0, Math.PI*2); ctx.fill();
  // Dorsal fin
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.moveTo(-4,-28); ctx.lineTo(-18,-68); ctx.lineTo(4,-32); ctx.closePath(); ctx.fill();
  // Fluke (tail, at bottom)
  ctx.beginPath();
  ctx.moveTo(-4, bLen-4);
  ctx.bezierCurveTo(-24,bLen+10,-28,bLen+24,-14,bLen+19); ctx.lineTo(0,bLen+5);
  ctx.lineTo(14,bLen+19); ctx.bezierCurveTo(28,bLen+24,24,bLen+10,4,bLen-4);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function renderHUD(W, H) {
  const wh = player.wingHealth;
  const heat = dangerHeat();

  // Wing health bar
  const bx=20, by=20, bw=200, bh=22;
  const mangaOn = !!Engine.manga;
  ctx.save();
  // label — manga gets a bold ink stroke for that comic feel
  ctx.font = mangaOn ? 'bold 13px monospace' : '12px monospace';
  ctx.textAlign = 'left';
  if (mangaOn) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 4;
    ctx.strokeText('WING HEALTH', bx, by - 4);
  }
  ctx.fillStyle = mangaOn ? '#fff5c0' : 'rgba(255,255,255,0.7)';
  ctx.fillText('WING HEALTH', bx, by - 4);
  // bg
  ctx.fillStyle = mangaOn ? '#0a0a0a' : 'rgba(0,0,0,0.45)';
  ctx.fillRect(bx, by, bw, bh);
  // fill
  const barFrac = wh / WING_MAX;
  const barColor = wh > 15 ? '#44dd66' :
                   wh > 9  ? '#ddcc00' :
                   wh > 4  ? '#ff8800' : '#ff2200';
  // flicker at low health
  const flicker = wh < 5 ? (Math.sin(time*18)*0.3+0.7) : 1;
  ctx.fillStyle = barColor;
  ctx.globalAlpha = flicker;
  ctx.fillRect(bx, by, bw * barFrac, bh);
  ctx.globalAlpha = 1;
  // Manga halftone scrim over the unfilled portion for the screen-tone feel.
  if (mangaOn && window.Manga && Manga.effects && Manga.effects.halftone) {
    ctx.save();
    ctx.beginPath(); ctx.rect(bx + bw * barFrac, by, bw - bw * barFrac, bh);
    ctx.clip();
    Manga.effects.halftone(ctx, bx, by, bw, bh, { density: 4, dotSize: 1.4, alpha: 0.55, color: '#0a0a0a' });
    ctx.restore();
  }
  // border — bold ink in manga, thin white otherwise
  ctx.strokeStyle = mangaOn ? '#0a0a0a' : 'rgba(255,255,255,0.4)';
  ctx.lineWidth = mangaOn ? 3 : 1.5;
  ctx.strokeRect(bx, by, bw, bh);
  // bar glow
  if (wh < 10 && !mangaOn) {
    ctx.shadowColor = barColor;
    ctx.shadowBlur = 8;
    ctx.strokeRect(bx, by, bw * barFrac, bh);
    ctx.shadowBlur = 0;
  }
  ctx.restore();

  // Altitude indicator (left edge strip)
  const alt = altRatio();
  const stripH = H * 0.6;
  const stripY = (H - stripH) / 2;
  ctx.save();
  ctx.globalAlpha = 0.35;
  const sGrad = ctx.createLinearGradient(0, stripY, 0, stripY+stripH);
  sGrad.addColorStop(0, '#ff8800');
  sGrad.addColorStop(1, '#1a6b9e');
  ctx.fillStyle = sGrad;
  ctx.fillRect(5, stripY, 6, stripH);
  // indicator dot
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(8, stripY + stripH * (1-alt), 5, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // XP display
  ctx.save();
  ctx.textAlign = 'right';
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('POINTS', W - 20, 28);
  ctx.font = 'bold 32px monospace';
  ctx.fillStyle = GOLD;
  ctx.shadowColor = GOLD;
  ctx.shadowBlur = 10;
  ctx.fillText(Math.floor(player.xp).toLocaleString(), W - 20, 62);
  ctx.restore();

  // island counter — how many are ready to land on
  const readyIslands = islands ? islands.filter(i => !i.sinking).length : 0;
  ctx.save();
  ctx.textAlign = 'left';
  ctx.font = '12px monospace';
  ctx.fillStyle = readyIslands > 0 ? 'rgba(100,220,120,0.85)' : 'rgba(180,180,180,0.5)';
  ctx.shadowColor = readyIslands > 0 ? '#44dd66' : 'transparent';
  ctx.shadowBlur = readyIslands > 0 ? 6 : 0;
  ctx.fillText(`ISLANDS: ${readyIslands} ready  (+${ISLAND_XP_BONUS} points each)`, 20, 70);
  ctx.restore();

  // danger warning
  if (heat > 0.65) {
    const pulse = Math.sin(time * 6) * 0.5 + 0.5;
    ctx.save();
    ctx.globalAlpha = 0.5 + pulse * 0.5;
    ctx.fillStyle = '#ff4400';
    ctx.font = 'bold 15px monospace';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 12;
    ctx.fillText('⚠  TOO CLOSE TO THE SUN  ⚠', W/2, H - 30);
    ctx.restore();
  }

  // ── DEBUG: mystery state overlay (top-left). Toggle by setting
  // localStorage.godgames_debug = '1'. Helps diagnose unreachable triggers.
  if (typeof localStorage !== 'undefined' && localStorage.getItem('godgames_debug') === '1') {
    ctx.save();
    ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(8, 92, 280, 92);
    ctx.fillStyle = '#ffd54a';
    const inSun = player.y <= SUN_EMBRACE_Y;
    const heatNow = dangerHeat();
    const earnedZ = window.Engine && Engine.unlock && Engine.unlock.has('hint.z');
    ctx.fillText('— DEBUG: Icarus —', 14, 96);
    ctx.fillStyle = '#fff';
    ctx.fillText(`player.y = ${player.y.toFixed(1)}  threshold = ${SUN_EMBRACE_Y}`, 14, 112);
    ctx.fillText(`inSun = ${inSun}   heat = ${heatNow.toFixed(2)}`, 14, 128);
    ctx.fillStyle = inSun ? '#88ff88' : '#ff8888';
    ctx.fillText(`sunEmbraceT = ${sunEmbraceT.toFixed(2)} / ${SUN_EMBRACE_GOAL}s`, 14, 144);
    ctx.fillStyle = earnedZ ? '#44dd66' : '#cc6666';
    ctx.fillText(`hint.z earned = ${!!earnedZ}`, 14, 160);
    ctx.restore();
  }

  // Manga ability HUD — bottom-right rings: ↓ Icarian Dive + Daedalus rescue.
  if (Engine.manga) {
    drawIcarusAbilityRing(W - 32, H - 76, '↓', diveCD, DIVE_CD, diveT > 0);
    // Rescue ring only appears once the daedalus_compassion mystery is earned.
    if (window.GodGames && GodGames.Mysteries && GodGames.Mysteries.isSolved('daedalus_compassion')) {
      drawRescueRing(W - 32, H - 132);
    }
  }

  // Manga telegraph + ability shouts
  if (Engine.manga && mangaTexts.length && window.Manga && Manga.effects && Manga.effects.sfxText) {
    for (const mt of mangaTexts) {
      const a = Math.min(1, mt.t * 1.6);
      Manga.effects.sfxText(ctx, mt.x, mt.y, mt.text, {
        size: mt.size || 38, color: mt.color || '#ffd54a',
        outline: '#0a0a0a', tilt: -8, alpha: a,
      });
    }
  }
}

// Daedalus rescue indicator — a small wing icon. Bright while available,
// pulses while the carry plays, dims to a flat outline once consumed.
function drawRescueRing(cx, cy) {
  const r = 22;
  const consumed = rescueAvailable === 0 && rescueT <= 0;
  const active   = rescueT > 0;
  ctx.save();
  ctx.fillStyle = active ? 'rgba(255,220,120,0.55)' : 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  if (active) {
    const prog = 1 - rescueT / RESCUE_DUR;
    ctx.strokeStyle = 'rgba(255,220,120,0.95)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2); ctx.stroke();
  } else if (!consumed) {
    ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 10;
    ctx.strokeStyle = '#ffd54a'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  // Tiny wing glyph in the centre — bright when ready, grey when consumed.
  ctx.strokeStyle = consumed ? '#666' : (active ? '#fff5c0' : '#ffd54a');
  ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy + 2);
  ctx.quadraticCurveTo(cx - 2, cy - 8, cx + 8, cy + 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy + 6);
  ctx.quadraticCurveTo(cx, cy + 1, cx + 6, cy + 6);
  ctx.stroke();

  // Charge count + favor pip — small dot row beneath the ring shows how many
  // rescues remain and how close we are to the next one.
  const dotsY = cy + r + 8;
  for (let i = 0; i < MAX_RESCUES; i++) {
    const x = cx - (MAX_RESCUES - 1) * 5 + i * 10;
    if (i < rescueAvailable) {
      ctx.fillStyle = '#ffd54a';
      ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 6;
    } else if (i === rescueAvailable && rescueIslandFavor > 0) {
      // Partial fill scaled by favor progress
      const frac = rescueIslandFavor / ISLANDS_PER_RESCUE;
      ctx.fillStyle = `rgba(255,213,74,${0.20 + frac * 0.6})`;
      ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(120,100,60,0.45)';
      ctx.shadowBlur = 0;
    }
    ctx.beginPath(); ctx.arc(x, dotsY, 3, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawIcarusAbilityRing(cx, cy, key, cd, cdMax, active) {
  const r = 22;
  ctx.save();
  ctx.fillStyle = active ? 'rgba(255,180,80,0.55)' : 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  const ready = 1 - Math.min(1, cd / cdMax);
  if (cd > 0) {
    ctx.strokeStyle = 'rgba(255,180,80,0.95)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, -Math.PI / 2, -Math.PI / 2 + ready * Math.PI * 2); ctx.stroke();
  } else {
    ctx.shadowColor = '#ffaa44'; ctx.shadowBlur = 10;
    ctx.strokeStyle = '#ffaa44'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.font = '900 22px "Impact", "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(key, cx, cy);
  ctx.fillStyle = cd > 0 ? '#888' : '#fff5c0';
  ctx.fillText(key, cx, cy);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── Tutorial ───────────────────────────────────────────────────────────────
function wrapText(text, maxWidth, font) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function drawDaedalus(x, y) {
  // Manga route — standing pose from the manga library
  if (Engine.manga && window.Manga && typeof window.Manga.characters?.daedalus?.draw === 'function') {
    Manga.characters.daedalus.draw(ctx, {
      x, y, pose: 'standing', facing: 1, t: time,
    });
    return;
  }
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(0.55, 0.55);

  const skin  = '#d4a060';
  const robe  = '#4a3a28';
  const robeL = '#6a5438';
  const grey  = '#b0a898';

  // robe body
  ctx.fillStyle = robe;
  ctx.beginPath();
  ctx.moveTo(-13,-18); ctx.lineTo(13,-18);
  ctx.lineTo(16, 20);  ctx.lineTo(-16, 20);
  ctx.closePath(); ctx.fill();
  // robe folds
  ctx.strokeStyle = robeL; ctx.lineWidth = 1;
  for (const xi of [-5, 0, 5]) {
    ctx.beginPath(); ctx.moveTo(xi,-14); ctx.lineTo(xi+2,18); ctx.stroke();
  }
  // belt rope
  ctx.strokeStyle = '#8a7050'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-14,6); ctx.lineTo(14,6); ctx.stroke();
  // legs
  ctx.strokeStyle = skin; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-5,20); ctx.lineTo(-5,48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5,20); ctx.lineTo( 5,48); ctx.stroke();
  // sandals
  ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-8,48); ctx.lineTo(-2,48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 2,48); ctx.lineTo( 8,48); ctx.stroke();
  // left arm down at side
  ctx.strokeStyle = skin; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-13,-10); ctx.quadraticCurveTo(-22,-2,-20,18); ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(-20,18,3.5,0,Math.PI*2); ctx.fill();
  // right arm raised (gesturing / pointing)
  ctx.beginPath(); ctx.moveTo(13,-10); ctx.quadraticCurveTo(28,-22,38,-32); ctx.stroke();
  ctx.fillStyle = skin; ctx.beginPath(); ctx.arc(38,-32,3.5,0,Math.PI*2); ctx.fill();
  // neck
  ctx.fillStyle = skin; ctx.beginPath(); ctx.rect(-4,-28,8,12); ctx.fill();
  // head
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(0,-36,11,0,Math.PI*2); ctx.fill();
  // beard
  ctx.fillStyle = grey;
  ctx.beginPath();
  ctx.moveTo(-9,-30); ctx.quadraticCurveTo(-11,-20,-8,-12);
  ctx.quadraticCurveTo(0,-8,8,-12);
  ctx.quadraticCurveTo(11,-20,9,-30);
  ctx.closePath(); ctx.fill();
  // beard texture
  ctx.strokeStyle = '#888078'; ctx.lineWidth = 0.8;
  for (let i = -6; i <= 6; i += 3) {
    ctx.beginPath(); ctx.moveTo(i,-26); ctx.lineTo(i*0.8,-14); ctx.stroke();
  }
  // hair (white/grey, receding)
  ctx.fillStyle = grey;

function renderTutorial(W, H) {
  const line = TUTORIAL_LINES[tutorialStep];
  const isLast = tutorialStep === TUTORIAL_LINES.length - 1;

  // sky background (dawn, soft)
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,   '#2a4a7a');
  bg.addColorStop(0.4, '#4a80b0');
  bg.addColorStop(0.75,'#7ab0d8');
  bg.addColorStop(1,   '#a8cce8');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

  // soft sun glow on horizon
  const hx = W/2, hy = H*0.68;
  const hglow = ctx.createRadialGradient(hx,hy,0,hx,hy,H*0.5);
  hglow.addColorStop(0,'rgba(255,200,100,0.22)');
  hglow.addColorStop(1,'rgba(255,150,0,0)');
  ctx.fillStyle = hglow; ctx.fillRect(0,0,W,H);

  // stone platform
  const platY = H * 0.72;
  ctx.fillStyle = '#7a7060';
  ctx.fillRect(0, platY, W, H - platY);
  // platform edge highlight
  ctx.strokeStyle = '#a09880'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, platY); ctx.lineTo(W, platY); ctx.stroke();
  // stone tile lines
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
  for (let tx = 0; tx < W; tx += 80) {
    ctx.beginPath(); ctx.moveTo(tx, platY); ctx.lineTo(tx, H); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, platY+30); ctx.lineTo(W, platY+30); ctx.stroke();

  // sea in background
  const seaY = platY - 60;
  ctx.fillStyle = '#1a5080';
  ctx.beginPath();
  for (let sx = 0; sx <= W; sx += 8) {
    const wy = seaY + Math.sin(sx*0.025 + time*1.4)*5 + Math.sin(sx*0.04 - time*2)*3;
    sx === 0 ? ctx.moveTo(sx, wy) : ctx.lineTo(sx, wy);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

  // Daedalus (left)
  drawDaedalus(W * 0.3, platY);

  // Icarus (right, standing with wings, no flight state)
  ctx.save();
  ctx.translate(W * 0.65, platY);
  ctx.scale(0.55, 0.55);
  // static wings folded (simplified behind figure)
  for (const side of [-1, 1]) {
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#f2ead8';
    ctx.beginPath();
    ctx.moveTo(side*12, -14);
    ctx.quadraticCurveTo(side*40, 10, side*35, 40);
    ctx.quadraticCurveTo(side*20, 50, side*12, 20);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // tunic + body (reuse same draw calls as renderPlayer but arms down)
  const skin2 = '#f0c87a', tunic2 = '#f0ead8', shade2 = '#d8ccaa';
  // legs
  ctx.strokeStyle = skin2; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-4,16); ctx.lineTo(-5,48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 4,16); ctx.lineTo( 5,48); ctx.stroke();
  ctx.strokeStyle = '#7a5010'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-8,48); ctx.lineTo(-2,48); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 2,48); ctx.lineTo( 8,48); ctx.stroke();
  // tunic
  ctx.fillStyle = tunic2;
  ctx.beginPath(); ctx.moveTo(-11,-18); ctx.lineTo(11,-18); ctx.lineTo(12,16); ctx.lineTo(-12,16); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = shade2; ctx.lineWidth = 0.8;
  for (const xi of [-3,0,3]) { ctx.beginPath(); ctx.moveTo(xi,-14); ctx.lineTo(xi+1,14); ctx.stroke(); }
  ctx.fillStyle = tunic2;
  ctx.beginPath(); ctx.moveTo(-12,16); ctx.lineTo(12,16); ctx.quadraticCurveTo(13,24,9,28); ctx.lineTo(-9,28); ctx.quadraticCurveTo(-13,24,-12,16); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = GOLD; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-12,10); ctx.lineTo(12,10); ctx.stroke();
  ctx.fillStyle = GOLD; ctx.beginPath(); ctx.arc(0,10,2.5,0,Math.PI*2); ctx.fill();
  // arms at sides
  ctx.strokeStyle = skin2; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(-11,-12); ctx.quadraticCurveTo(-20,-8,-18,14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 11,-12); ctx.quadraticCurveTo( 20,-8, 18,14); ctx.stroke();
  ctx.fillStyle = skin2;
  ctx.beginPath(); ctx.arc(-18,14,3.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 18,14,3.5,0,Math.PI*2); ctx.fill();
  // neck + head
  ctx.fillStyle = skin2; ctx.beginPath(); ctx.rect(-4,-28,8,11); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-36,11,0,Math.PI*2); ctx.fill();
  // face (wonder/excitement expression)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(-3.8,-37,2.2,1.6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 3.8,-37,2.2,1.6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1800';
  ctx.beginPath(); ctx.arc(-3.8,-37,1.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 3.8,-37,1.3,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#2a1500'; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.moveTo(-5.5,-40); ctx.lineTo(-1.5,-40.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5.5,-40); ctx.lineTo( 1.5,-40.5); ctx.stroke();
  ctx.strokeStyle = lerpColor(skin2,'#8a5020',0.45); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0,-36); ctx.lineTo(-1.5,-32); ctx.lineTo(1.5,-32); ctx.stroke();
  // slight open mouth smile
  ctx.strokeStyle = '#8a4828'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(-3,-29.5); ctx.quadraticCurveTo(0,-27.5,3,-29.5); ctx.stroke();
  // hair
  ctx.fillStyle = '#1e1000';
  ctx.beginPath(); ctx.arc(0,-40,11,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(-10,-36,4,Math.PI*1.2,Math.PI*2.2); ctx.fill();
  ctx.beginPath(); ctx.arc( 10,-36,4,Math.PI*0.8,Math.PI*1.8,true); ctx.fill();
  ctx.strokeStyle = '#0e0800'; ctx.lineWidth = 1.8;
  for (let i = -4; i <= 4; i += 2) { ctx.beginPath(); ctx.arc(i*2.2,-41,2.2,0,Math.PI,i%4===0); ctx.stroke(); }
  ctx.restore();

  // dialogue box
  const boxX = W*0.04, boxY = H*0.76, boxW = W*0.92, boxH = H*0.2;
  // box background
  ctx.fillStyle = 'rgba(8,16,32,0.88)';
  ctx.beginPath();
  ctx.roundRect(boxX, boxY, boxW, boxH, 8);
  ctx.fill();
  // gold border
  ctx.strokeStyle = GOLD; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(boxX, boxY, boxW, boxH, 8); ctx.stroke();
  // step dots
  for (let i = 0; i < TUTORIAL_LINES.length; i++) {
    ctx.fillStyle = i === tutorialStep ? GOLD : 'rgba(180,150,60,0.35)';
    ctx.beginPath(); ctx.arc(boxX + boxW/2 + (i - TUTORIAL_LINES.length/2 + 0.5)*14, boxY + boxH - 10, 3, 0, Math.PI*2); ctx.fill();
  }
  // speaker name
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'left';
  ctx.shadowColor = GOLD; ctx.shadowBlur = 6;
  ctx.fillText(line.speaker, boxX + 16, boxY + 20);
  ctx.shadowBlur = 0;
  // dialogue text with wrapping
  const textFont = '16px serif';
  const textLines = wrapText('"' + line.text + '"', boxW - 32, textFont);
  ctx.font = textFont;
  ctx.fillStyle = 'rgba(240,230,200,0.92)';
  textLines.forEach((l, i) => ctx.fillText(l, boxX + 16, boxY + 40 + i * 22));
  // continue prompt
  const blink = Math.sin(time * 4) > 0;
  if (blink) {
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = 'rgba(200,180,100,0.8)';
    ctx.textAlign = 'right';
    ctx.fillText(isLast ? '↑  FLY, ICARUS' : '↑  CONTINUE', boxX + boxW - 14, boxY + boxH - 10);
  }
}

  for(const g of glows2){

  cg.addColorStop(0.8,'#ffcc00');cg.addColorStop(1,'#ff8800');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  // mini Icarus flying toward sun

function drawMiniIcarus(x, y, flapY) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(0.75, 0.75);
  const skin = '#f0c87a'; const tunic = '#f0ead8';

  // Side-profile wing
  const tipX = -8 + flapY * 0.45;
  const tipY2 = -52 + flapY * 0.85;
  ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = '#e8e0c8';
  ctx.beginPath();
  ctx.moveTo(-5, -12);
  ctx.bezierCurveTo(-5+14, -12-18, tipX+22, tipY2+16, tipX, tipY2);
  ctx.bezierCurveTo(tipX-12, tipY2+20, -5-14, -12+6, -5, -12);
  ctx.fill(); ctx.restore();
  // feathers
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const bx = -5 + (tipX+5)*t, by2 = -12 + (tipY2+12)*t;
    const len = 20 - t * 5;
    ctx.save();
    ctx.translate(bx, by2);
    ctx.rotate(-0.25 - t * 0.68 - flapY * 0.007);
    ctx.fillStyle = '#f2ead8';
    ctx.beginPath();
    ctx.moveTo(0,0); ctx.bezierCurveTo(-len*0.45,len*0.2,-len*0.4,len*0.75,0,len);
    ctx.bezierCurveTo(len*0.06,len*0.7,len*0.08,len*0.22,0,0); ctx.fill();
    ctx.restore();
  }
  // legs
  ctx.strokeStyle = skin; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-2,8); ctx.quadraticCurveTo(-16,20,-18,36); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 3,8); ctx.quadraticCurveTo(-8,18,-10,36); ctx.stroke();
  // tunic
  ctx.fillStyle = tunic;
  ctx.beginPath(); ctx.moveTo(-12,-14); ctx.lineTo(14,-14); ctx.bezierCurveTo(16,-4,14,10,10,12); ctx.bezierCurveTo(0,14,-12,12,-14,6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = GOLD; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(12,0); ctx.stroke();
  // arm forward
  ctx.strokeStyle = skin; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(12,-8); ctx.quadraticCurveTo(24,-5,32,0); ctx.stroke();
  // neck + head profile
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.rect(9,-22,6,10); ctx.fill();
  ctx.beginPath(); ctx.arc(15,-28,10,0,Math.PI*2); ctx.fill();
  // hair
  ctx.fillStyle = '#1e1000';
  ctx.beginPath(); ctx.arc(13,-34,10,Math.PI*0.75,Math.PI*2.1); ctx.fill();
  ctx.beginPath(); ctx.arc(1,-32,6,Math.PI*1.2,Math.PI*2.5); ctx.fill();
  ctx.restore();
}

  ctx.shadowBlur=0;

  if (hallStatus === 'pending') {

  ctx.font='13px monospace';
  ctx.fillStyle='rgba(180,180,180,0.55)';

// ── Hall of Mount Olympus (leaderboard) ───────────────────────────────────
const NAME_KEY = 'godgames_playerName';
let hallRank = null;
let hallStatus = null; // 'pending' | 'ok' | 'fail'
let submittedThisRun = false;

async function submitToHall(score) {
  const name = localStorage.getItem(NAME_KEY) || 'NAMELESS MORTAL';
  const game = Engine.manga ? 'icarus-manga' : 'icarus';
  hallStatus = 'pending';
  try {
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, name, score }),
    });
    if (!res.ok) { hallStatus = 'fail'; return; }
    const json = await res.json();
    hallRank = json.rank;
    hallStatus = 'ok';
    // Pantheon mystery: any submission earns the first hint, top-10 progresses goal.
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('first_score');
      if (hallRank && hallRank <= 10) GodGames.Mysteries.tally('olympus_top10_count');
    }
  } catch {
    hallStatus = 'fail';
  }
}

// ── Session helpers ────────────────────────────────────────────────────────
const LAST_PLAY_KEY = 'icarus_lastPlay';
const THREE_DAYS_MS = 3 * 24 * 60 * 60 * 1000;

function recentlyPlayed() {
  const last = localStorage.getItem(LAST_PLAY_KEY);
  if (!last) return false;
  return (Date.now() - parseInt(last, 10)) < THREE_DAYS_MS;
}

function recordPlay() {
  localStorage.setItem(LAST_PLAY_KEY, Date.now().toString());
}

function startGame() {
  recordPlay();
  // Engine.setState('playing') triggers onInit, which calls initAudio + initGame
  // and sets `state = 'playing'`.
  Engine.setState('playing');
}

// ── Name gate ──────────────────────────────────────────────────────────────
function hasName() { return !!localStorage.getItem(NAME_KEY); }
let pendingStart = null; // function to run once name is provided

function showNameModal(after) {
  pendingStart = after || null;
  const mb = document.getElementById('modalBg');
  const inp = document.getElementById('nameInput');
  inp.value = localStorage.getItem(NAME_KEY) || '';
  mb.classList.add('open');
  setTimeout(() => inp.focus(), 50);
}
function hideNameModal() {
  document.getElementById('modalBg').classList.remove('open');
}
function saveNameFromModal() {
  const raw = document.getElementById('nameInput').value || '';
  const clean = raw.replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g,' ').trim().slice(0,20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  hideNameModal();
  if (pendingStart) { const fn = pendingStart; pendingStart = null; fn(); }
  return true;
}
document.getElementById('nameSave').addEventListener('click', saveNameFromModal);
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); saveNameFromModal(); }
  e.stopPropagation();
});

// Functions that begin a run — wrapped so they can be queued behind the modal.
function beginFromTitle() {
  if (recentlyPlayed()) {
    startGame();
  } else {
    tutorialStep = 0;
    TUTORIAL_LINES = buildTutorial();
    state = 'tutorial';
    // engine state is already 'title' here; tutorial renders via onTitleRender.
  }
}
function beginFromDead() {
  if (recentlyPlayed()) {
    startGame();
  } else {
    tutorialStep = 0;
    TUTORIAL_LINES = buildTutorial();
    state = 'tutorial';
    Engine.setState('title');  // from 'dead' back to 'title' so tutorial renders
  }
}

function modalOpen() { return document.getElementById('modalBg').classList.contains('open'); }

    // just needs to clear the frame here.

    accent: '#ff8800',
    danger: '#cc2200',

    time = Engine.time;
    render();
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, canvas.width, canvas.height);
  },

  onTitleRender() {
    time = Engine.time;
    if (state === 'tutorial') renderTutorial(Engine.W, Engine.H);
    else                       renderTitle(Engine.W, Engine.H);
  },

  onGameOverRender() {
    time = Engine.time;
    renderDead(Engine.W, Engine.H);
  },

  // Called when the engine is about to auto-transition (Space on title, '1' on
  // dead). Return false to gate the transition (modal, name prompt, tutorial).
  onTryStart(e) {
    if (modalOpen()) return false;
    if (e.state === 'title') {
      if (state === 'tutorial') return false;  // tutorial advances via onKeyDown
      if (!hasName()) { showNameModal(beginFromTitle); return false; }
      if (recentlyPlayed()) return true;       // skip tutorial → engine sets 'playing'
      tutorialStep = 0;
      state = 'tutorial';
      return false;
    }
    if (e.state === 'dead') {
      if (!hasName()) { showNameModal(beginFromDead); return false; }
      if (recentlyPlayed()) return true;
      tutorialStep = 0;
      state = 'tutorial';
      Engine.setState('title');  // route tutorial render via onTitleRender
      return false;
    }
    return true;
  },

  onKeyDown(ev, e) {
    if (modalOpen()) return;

    // Title — engine only auto-handles Space, so mirror it for ArrowUp.
    if (e.state === 'title' && state === 'title' && ev.key === 'ArrowUp') {
      if (e.config.onTryStart(e)) {
        e.audio.init();
        initAudio();
        e.setState('playing');
      }
      return;
    }

    // Tutorial — advance with ArrowUp or Space; on the last line, start the game.
    if (e.state === 'title' && state === 'tutorial' && (ev.key === 'ArrowUp' || ev.key === ' ')) {
      tutorialStep++;
      if (tutorialStep >= TUTORIAL_LINES.length) {
        e.audio.init();
        initAudio();
        e.setState('playing');
      }
      return;
    }

    // Dead — H jumps to Mount Olympus. (Engine handles Escape → hub and '1' → restart.)
    if (e.state === 'dead' && (ev.key === 'h' || ev.key === 'H')) {
      window.location.href = 'mount-olympus.html';
    }

    // Manga ability: ICARIAN DIVE (ArrowDown). Dive-bombs through eagles in path.
    if (Engine.manga && state === 'playing' && rescueT <= 0 && ev.key === 'ArrowDown' && diveCD <= 0) {
      diveT  = DIVE_DUR;
      diveCD = DIVE_CD;
      mangaTexts.push({ text: 'ICARIAN DIVE!', x: player.x, y: player.y - 70, t: 0.5, color: '#ffd54a', size: 36 });
      const polish = window.Manga && Manga.characters && Manga.characters.icarus && Manga.characters.icarus.polish;
      if (polish && polish.onDive && Engine.audio._ctx && Manga.fx && Manga.fx.sfxLayered) {
        Manga.fx.sfxLayered(Engine.audio._ctx, polish.onDive.audioLayers);
      }
      // Snap player downward immediately for kinetic feel
      player.vy = Math.max(player.vy, 220);
      addShake(4);
    }
  },
});

// Aliases for code that references these globals.
canvas = Engine.canvas;
ctx    = Engine.ctx;
keys   = Engine.keys;

// Prompt for name on first visit if not set.
if (!hasName()) showNameModal(null);
</script>
