<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth Place Cut - engine example</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b1020; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f3ead2; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="../../core/engine.js"></script>
<script src="../../unlock/index.js"></script>
<script src="../../manga/manga.js"></script>
<script>
// myth-place-cut - the current production-style myth discovery pattern.
//
// The game finds a hidden spot, records it with Engine.unlock, then leaves
// the level for a dedicated place.html scene. God Games has a full
// mysteries.js module; this small shim keeps the same call shape without
// pulling in any god-games code.

window.GodGames = window.GodGames || {};
window.GodGames.Mysteries = {
  unlockAndDepart(opts) {
    opts = opts || {};
    const hintId = opts.hintId || 'hint.demo';
    const fullHint = hintId.startsWith('hint.') ? hintId : 'hint.' + hintId;
    const isNew = window.Engine && Engine.unlock && !Engine.unlock.has(fullHint);
    if (isNew) {
      Engine.unlock.set(fullHint);
      Engine.unlock.tally('mysteries_solved_count');
    }
    if (window.Engine && Engine.shake) Engine.shake(7);

    const params = new URLSearchParams();
    params.set('id', opts.placeId || 'dreams');
    params.set('from', opts.fromGame || 'wanderer');
    params.set('hint', fullHint);
    setTimeout(() => { location.href = 'place.html?' + params.toString(); }, 80);
  },
};

const ARENA_W = 800, ARENA_H = 480;
const SPOT = { x: 635, y: 132, r: 25 };
const player = { x: 190, y: 335, vx: 0, vy: 0, walk: 0, facing: 1 };
let departQueued = false;

Engine.boot({
  title: 'MYTH PLACE CUT',
  subtitle: 'find what the corner remembers',
  theme: { bg: '#0b1020', accent: '#aa66ff', danger: '#cc2200', restartKey: '1' },
  mobile: { movement: 'all' },

  onInit() {
    Engine.canvas.width = ARENA_W;
    Engine.canvas.height = ARENA_H;
  },

  onUpdate(dt) {
    const k = Engine.keys;
    const speed = 190;
    player.vx = (k['ArrowRight'] ? 1 : 0) - (k['ArrowLeft'] ? 1 : 0);
    player.vy = (k['ArrowDown'] ? 1 : 0) - (k['ArrowUp'] ? 1 : 0);
    if (player.vx) player.facing = player.vx > 0 ? 1 : -1;
    player.x += player.vx * speed * dt;
    player.y += player.vy * speed * dt;
    player.x = Math.max(28, Math.min(ARENA_W - 28, player.x));
    player.y = Math.max(70, Math.min(ARENA_H - 35, player.y));
    if (player.vx || player.vy) player.walk += dt * 8;

    const dx = player.x - SPOT.x, dy = player.y - SPOT.y;
    if (!departQueued && dx * dx + dy * dy <= SPOT.r * SPOT.r) {
      departQueued = true;
      window.GodGames.Mysteries.unlockAndDepart({
        hintId: 'demo_mark',
        placeId: 'dreams',
        fromGame: 'icarus',
      });
    }
  },

  onRender(ctx) {
    const time = Engine.time;
    ctx.fillStyle = '#11172a';
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);

    // Manga library touchpoint: use the shared ink constant + halftone if
    // loaded, but keep the game readable if scripts are still parsing.
    const ink = (window.Manga && Manga.INK) || '#0a0a0a';
    ctx.fillStyle = ink;
    ctx.fillRect(0, 360, ARENA_W, 120);
    if (window.Manga && Manga.effects && Manga.effects.halftone) {
      Manga.effects.halftone(ctx, 0, 360, ARENA_W, 120, { alpha: 0.35 });
    }

    // Old stones around the hidden spot. No instructions: the shimmer is the clue.
    ctx.strokeStyle = 'rgba(170,102,255,0.30)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(SPOT.x, SPOT.y, SPOT.r + i * 8 + Math.sin(time * 2 + i) * 2, 9 + i * 4, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.fillStyle = 'rgba(255,213,74,0.36)';
    ctx.beginPath();
    ctx.arc(SPOT.x, SPOT.y, 4 + Math.sin(time * 3) * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Player. Keep this deliberately tiny so the discovery call is the point.
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.scale(player.facing, 1);
    ctx.fillStyle = '#f0d28a';
    ctx.beginPath();
    ctx.arc(0, -25, 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#d8c0a0';
    ctx.fillRect(-8, -16, 16, 24);
    ctx.strokeStyle = '#b98450';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    const swing = Math.sin(player.walk) * 7;
    ctx.beginPath(); ctx.moveTo(-4, 8); ctx.lineTo(-6 + swing, 24); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 4, 8); ctx.lineTo( 6 - swing, 24); ctx.stroke();
    ctx.restore();

    ctx.fillStyle = 'rgba(255,240,205,0.72)';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('mysteries solved: ' + Engine.unlock.count('mysteries_solved_count'), 14, ARENA_H - 16);
  },
});
</script>
</body>
</html>
