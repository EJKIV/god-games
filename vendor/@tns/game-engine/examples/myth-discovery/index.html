<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth Discovery — engine extractions demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0e1c; overflow: hidden; font-family: 'Trebuchet MS', serif; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<!-- The engine package ships these as <script src> — kids' games include the
     same files, no build step. In the kid CLI's `npx tns dev`, paths resolve
     under node_modules/@tns/game-engine/. Here we point at relative paths in
     the package so this file works when opened directly. -->
<script src="../../core/engine.js"></script>
<script src="../../unlock/index.js"></script>
<script src="../../dialogue/index.js"></script>
<script src="../../manga/manga.js"></script>
<script>
// myth-discovery — a 30-second showcase of three engine extractions:
//
//   1. Manga.fx.cinematic   — fires a mythology-vignette overlay on discovery.
//   2. Engine.unlock        — persists "you found the glyph" across sessions.
//   3. Engine.dialogue.drawBubble — NPC speech bubble pointing at a character.
//
// Walk with arrow keys. The shimmering mark in the upper-right is a hidden
// glyph. Touch it and the LAND OF DREAMS cinematic plays; the unlock persists
// so reloading shows the glyph already collected. The robed NPC murmurs a
// hint until you find it.

const ARENA_W = 800, ARENA_H = 480;
const GLYPH = { x: 660, y: 110, r: 22 };

// Lazy-create one cinematic instance for this game's lifetime.
const cinematic = (window.Manga && Manga.fx && Manga.fx.cinematic)
  ? Manga.fx.cinematic()
  : null;

const player = { x: ARENA_W * 0.30, y: ARENA_H * 0.70, vx: 0, vy: 0, walk: 0 };
const npc    = { x: ARENA_W * 0.18, y: ARENA_H * 0.62 };

Engine.boot({
  title:    'MYTH DISCOVERY',
  subtitle: 'a tiny tour of the engine extractions',
  theme: { bg: '#0a0e1c', accent: '#aa66ff', danger: '#cc2200', restartKey: '1' },
  mobile:  { movement: 'horizontal' },

  onInit() {
    Engine.canvas.width  = ARENA_W;
    Engine.canvas.height = ARENA_H;
  },

  onUpdate(dt) {
    if (cinematic) cinematic.update(dt);

    const k = Engine.keys;
    const speed = 180;
    player.vx = (k['ArrowRight'] ? 1 : 0) - (k['ArrowLeft'] ? 1 : 0);
    player.vy = (k['ArrowDown']  ? 1 : 0) - (k['ArrowUp']   ? 1 : 0);
    player.x += player.vx * speed * dt;
    player.y += player.vy * speed * dt;
    player.x = Math.max(20, Math.min(ARENA_W - 20, player.x));
    player.y = Math.max(20, Math.min(ARENA_H - 20, player.y));
    if (player.vx || player.vy) player.walk += dt * 8;

    // Touch the glyph if we haven't already → fire the cinematic + persist.
    if (!Engine.unlock.has('myth.dreamer_mark')) {
      const dx = player.x - GLYPH.x, dy = player.y - GLYPH.y;
      if (dx * dx + dy * dy < GLYPH.r * GLYPH.r) {
        Engine.unlock.set('myth.dreamer_mark');
        Engine.unlock.tally('myth_marks_found');
        if (cinematic) cinematic.trigger(
          'LAND OF DREAMS',
          'where ghosts of dreams dwell beyond the streams of Oceanus',
          '#aa44ff'
        );
        Engine.shake(6);
      }
    }
  },

  onRender(ctx) {
    const time = Engine.time;
    // Background
    ctx.fillStyle = '#101426';
    ctx.fillRect(0, 0, ARENA_W, ARENA_H);

    // Glyph — pulses gold while undiscovered, steady rune once collected.
    const found = Engine.unlock.has('myth.dreamer_mark');
    ctx.save();
    ctx.translate(GLYPH.x, GLYPH.y);
    ctx.strokeStyle = found ? '#fff5c0' : `rgba(255, 213, 74, ${0.35 + Math.sin(time * 2.4) * 0.2})`;
    ctx.lineWidth = found ? 2.4 : 1.6;
    if (found) { ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 12; }
    // Spiral
    ctx.beginPath();
    for (let i = 0; i <= 50; i++) {
      const t = i / 50, a = t * Math.PI * 4, r = 14 * t;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();

    // Player — minimal stick figure
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.fillStyle = '#ffd54a';
    ctx.beginPath(); ctx.arc(0, -16, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e8d8b8';
    ctx.fillRect(-8, -8, 16, 18);
    ctx.strokeStyle = '#c89058'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    const legSwing = Math.sin(player.walk) * 6;
    ctx.beginPath(); ctx.moveTo(-3, 10); ctx.lineTo(-3 + legSwing, 22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 3, 10); ctx.lineTo( 3 - legSwing, 22); ctx.stroke();
    ctx.restore();

    // NPC — robed mentor
    ctx.save();
    ctx.translate(npc.x, npc.y);
    ctx.fillStyle = '#3a2e1e';
    ctx.beginPath(); ctx.moveTo(-12, -10); ctx.lineTo(12, -10); ctx.lineTo(15, 18); ctx.lineTo(-15, 18); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#d4a060';
    ctx.beginPath(); ctx.arc(0, -18, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e8e2d2';
    ctx.beginPath(); ctx.arc(0, -8, 7, 0, Math.PI); ctx.fill();
    ctx.restore();

    // NPC speech bubble — uses the new dialogue.drawBubble helper.
    const npcLine = found
      ? 'You walked beyond the streams.'
      : 'A mark sleeps in the corner of dreams.';
    if (Engine.dialogue && Engine.dialogue.drawBubble) {
      Engine.dialogue.drawBubble(ctx, {
        x: npc.x - 80, y: npc.y - 90, w: 200, h: 44,
        anchorX: npc.x, anchorY: npc.y - 30,
        speaker: 'MENTOR', text: npcLine,
        color: '#aa66ff',
      });
    }

    // Cinematic on top of everything
    if (cinematic) cinematic.render(ctx, ARENA_W, ARENA_H);

    // Counter
    ctx.fillStyle = 'rgba(255, 213, 74, 0.6)';
    ctx.font = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(
      'marks found: ' + Engine.unlock.count('myth_marks_found') + '   (reload to confirm persistence)',
      14, ARENA_H - 14
    );
  },
});
</script>
</body>
</html>
