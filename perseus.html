<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perseus - God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#02070a; overflow:hidden; font-family:'Trebuchet MS', serif; color:#e8f6f8; }
canvas { display:block; }

.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.86);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #09202a 0%, #03070a 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow:0 0 50px rgba(61,176,198,0.32);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(220,240,244,0.72); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(3,9,12,0.78); border:1px solid rgba(212,175,55,0.5);
  color:#e8f6f8; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.35); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#102029;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE CHAMPION</h3>
    <p>Speak your name before entering the cave.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">RAISE THE SHIELD</button>
  </div>
</div>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="assets/manga/perseus/manifest.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
const NAME_KEY = 'godgames_playerName';
const HP_MAX = 4;
const PERSEUS_ACCENT = '#3db0c6';
const PERSEUS_MANGA_SHEET = 'godgames.perseus.gorgonSheet';
const LEVELS = [
  {
    title: 'CHAMBER I',
    name: 'THE POLISHED SHIELD',
    prompt: 'When the eye opens, face Medusa and hold Z.',
    hitsNeeded: 1,
    veil: 0,
    snakeEvery: [1.8, 2.3],
    snakeSpeed: 215,
    mirrorGain: 1.08,
    heatUseful: 0.15,
    heatIdle: 0.38,
    gaze: { watch: 1.35, windup: 0.82, open: 1.75, rest: 1.05 },
    hazards: 0,
  },
  {
    title: 'CHAMBER II',
    name: 'THE SERPENT GALLERY',
    prompt: 'Turn two serpents back before the mirror can bite.',
    hitsNeeded: 2,
    veil: 2,
    snakeEvery: [1.05, 1.45],
    snakeSpeed: 250,
    mirrorGain: 0.88,
    heatUseful: 0.19,
    heatIdle: 0.43,
    gaze: { watch: 1.05, windup: 0.70, open: 1.45, rest: 0.95 },
    hazards: 0,
  },
  {
    title: 'CHAMBER III',
    name: 'THE UNBLINKING CAVE',
    prompt: 'The final gaze breaks only after three clean reflections.',
    hitsNeeded: 3,
    veil: 1,
    snakeEvery: [0.82, 1.12],
    snakeSpeed: 285,
    mirrorGain: 0.76,
    heatUseful: 0.23,
    heatIdle: 0.48,
    gaze: { watch: 0.92, windup: 0.62, open: 1.28, rest: 0.82 },
    hazards: 2,
  },
];

let player, medusa;
let snakes = [];
let sparks = [];
let floaters = [];
let hazards = [];
let playTime = 0;
let mirrorHits = 0;
let levelHits = 0;
let levelIndex = 0;
let levelBannerT = 0;
let levelTransitionT = 0;
let pendingLevel = null;
let mirrorFocus = 0;
let mirrorHeat = 0;
let mirrorDullT = 0;
let mirrorFlashT = 0;
let reflectedSerpents = 0;
let sealProgress = 0;
let sealSolved = false;
let sealFlashT = 0;
let submittedThisRun = false;
let hallStatus = null;
let hallRank = null;
let canvas, ctx;

function groundY() { return Engine.H * 0.78; }
function caveLeft() { return Math.max(44, Engine.W * 0.06); }
function caveRight() { return Math.min(Engine.W - 44, Engine.W * 0.94); }
function levelCfg() { return LEVELS[levelIndex] || LEVELS[LEVELS.length - 1]; }
function sealX() { return Engine.W * 0.33; }

function beep(freq, dur, type, vol, slide) {
  const ac = Engine.audio._ctx;
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol == null ? 0.12 : vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sfx = {
  mirror() { beep(520, 0.12, 'triangle', 0.16, 420); beep(980, 0.18, 'sine', 0.10, -180); },
  reflect(){ beep(680, 0.08, 'triangle', 0.10, 260); },
  dull()   { beep(150, 0.22, 'sawtooth', 0.09, -70); },
  hit()    { beep(95, 0.24, 'sawtooth', 0.20, -20); },
  slash()  { beep(360, 0.07, 'square', 0.09, 300); },
  gaze()   { beep(190, 0.16, 'sawtooth', 0.07, -40); },
  win()    { beep(392, 0.18, 'triangle', 0.12, 210); beep(784, 0.24, 'sine', 0.10, 120); },
};

function resetGame() {
  player = {
    x: Engine.W * 0.24,
    y: groundY(),
    vx: 0,
    hp: HP_MAX,
    facing: 1,
    walkPhase: 0,
    shield: 0,
    slashT: 0,
    iframes: 0,
    hitFlash: 0,
    petrify: 0,
  };
  medusa = null;
  snakes = [];
  sparks = [];
  floaters = [];
  hazards = [];
  playTime = 0;
  mirrorHits = 0;
  levelHits = 0;
  levelIndex = 0;
  levelTransitionT = 0;
  pendingLevel = null;
  mirrorFocus = 0;
  mirrorHeat = 0;
  mirrorDullT = 0;
  mirrorFlashT = 0;
  reflectedSerpents = 0;
  sealProgress = 0;
  sealSolved = false;
  sealFlashT = 0;
  submittedThisRun = false;
  hallStatus = null;
  hallRank = null;
  setupLevel(0);
}

function setupLevel(idx) {
  levelIndex = Math.max(0, Math.min(LEVELS.length - 1, idx));
  const cfg = levelCfg();
  const gy = groundY();
  player.x = Engine.W * (0.19 + levelIndex * 0.025);
  player.y = gy;
  player.vx = 0;
  player.facing = 1;
  player.shield = 0;
  player.slashT = 0;
  player.petrify = 0;
  medusa = {
    x: Engine.W * (0.78 + levelIndex * 0.015),
    y: gy,
    hp: cfg.hitsNeeded,
    veil: cfg.veil,
    phase: 'watch',
    phaseT: cfg.gaze.watch,
    strikeReady: true,
    snakeT: 0.8,
    hurtFlash: 0,
  };
  snakes.length = 0;
  floaters.length = 0;
  hazards = makeHazards(cfg.hazards);
  levelHits = 0;
  mirrorFocus = 0;
  mirrorHeat = 0;
  mirrorDullT = 0;
  mirrorFlashT = 0;
  levelBannerT = 2.4;
}

function makeHazards(count) {
  const out = [];
  for (let i = 0; i < count; i++) {
    out.push({
      x: Engine.W * (0.43 + i * 0.14),
      baseY: groundY() - 22,
      phase: i * Math.PI,
      r: 22,
    });
  }
  return out;
}

function finalScore() {
  const timeBonus = Math.max(0, 90000 - Math.floor(playTime * 1000));
  return Math.max(0, Math.floor(
    mirrorHits * 2500
    + levelIndex * 3500
    + reflectedSerpents * 650
    + (sealSolved ? 5000 : 0)
    + player.hp * 900
    + timeBonus
  ));
}

async function submitToHall(score) {
  if (submittedThisRun) return;
  submittedThisRun = true;
  const name = localStorage.getItem(NAME_KEY) || 'NAMELESS MORTAL';
  const game = Engine.manga ? 'perseus-manga' : 'perseus';
  hallStatus = 'pending';
  try {
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, name, score }),
    });
    if (!res.ok) { hallStatus = 'fail'; return; }
    const json = await res.json();
    hallRank = json.rank;
    hallStatus = 'ok';
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('first_score');
      if (hallRank && hallRank <= 10) GodGames.Mysteries.tally('olympus_top10_count');
    }
  } catch (_e) {
    hallStatus = 'fail';
  }
}

window.GodGames = window.GodGames || {};
window.GodGames.submitNow = () => submitToHall(finalScore());

function burst(x, y, color, count, power) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (50 + Math.random() * 170) * (power || 1);
    sparks.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 35,
      r: 1.4 + Math.random() * 3.8,
      t: 0.75 + Math.random() * 0.35,
      color,
    });
  }
}
function floater(x, y, text, color) {
  floaters.push({ x, y, text, color, t: 1.1, vy: -42 });
}

function setGazePhase(next) {
  const cfg = levelCfg();
  medusa.phase = next;
  if (next === 'watch') { medusa.phaseT = cfg.gaze.watch + Math.random() * 0.22; medusa.strikeReady = true; }
  if (next === 'windup') { medusa.phaseT = cfg.gaze.windup; medusa.strikeReady = true; sfx.gaze(); }
  if (next === 'gaze') { medusa.phaseT = cfg.gaze.open; medusa.strikeReady = true; mirrorFocus = Math.max(0, mirrorFocus - 0.08); }
  if (next === 'rest') { medusa.phaseT = cfg.gaze.rest; medusa.strikeReady = false; }
}

function mirrorAlignment() {
  if (!player || !medusa) return 0;
  const distance = Math.abs(medusa.x - player.x);
  const ideal = Math.max(360, Math.min(560, Engine.W * 0.34));
  const tolerance = Math.max(260, Engine.W * 0.25);
  return Math.max(0, 1 - Math.abs(distance - ideal) / tolerance);
}

function dullMirror() {
  if (mirrorDullT > 0) return;
  mirrorDullT = 1.2;
  mirrorHeat = 0.82;
  mirrorFocus = Math.max(0, mirrorFocus - 0.35);
  floater(player.x, player.y - 96, 'MIRROR DULLED', '#9fb2b8');
  burst(player.x + player.facing * 24, player.y - 48, '#9fb2b8', 10, 0.65);
  sfx.dull();
}

function spawnSnake() {
  const cfg = levelCfg();
  const y = groundY() - 18 - Math.random() * 34;
  snakes.push({
    x: medusa.x - 30,
    y,
    vx: -cfg.snakeSpeed - Math.random() * 70 - levelIndex * 18,
    wobble: Math.random() * Math.PI * 2,
    returning: false,
    alive: true,
  });
}

function slash() {
  if (!player || player.slashT > 0) return;
  player.slashT = 0.22;
  sfx.slash();
  const reachX = player.x + player.facing * 42;
  for (const s of snakes) {
    if (!s.alive) continue;
    if (Math.abs(s.x - reachX) < 48 && Math.abs(s.y - (player.y - 28)) < 54) {
      s.alive = false;
      burst(s.x, s.y, '#b8f28f', 9, 0.8);
      floater(s.x, s.y - 22, 'CUT', '#b8f28f');
    }
  }
}

function recordMirrorStrike(source = 'gaze') {
  if (!player || !medusa || levelTransitionT > 0 || Engine.state !== 'playing') return;
  if (medusa.veil > 0) {
    mirrorFocus = 0;
    mirrorFlashT = 0.18;
    floater(medusa.x - 20, medusa.y - 120, 'THE VEIL HOLDS', '#9fb2b8');
    burst(medusa.x - 34, medusa.y - 82, '#9fb2b8', 12, 0.8);
    Engine.shake(4);
    return;
  }
  mirrorHits++;
  levelHits++;
  medusa.hp = Math.max(0, levelCfg().hitsNeeded - levelHits);
  medusa.hurtFlash = 0.35;
  medusa.strikeReady = false;
  mirrorFocus = 0;
  mirrorHeat = Math.max(0, mirrorHeat - 0.18);
  mirrorFlashT = 0.38;
  player.petrify = Math.max(0, player.petrify - 0.35);
  burst(medusa.x - 38, medusa.y - 84, '#d6fbff', 24, 1.15);
  floater(medusa.x - 20, medusa.y - 112, source === 'serpent' ? 'SERPENT OMEN' : 'MIRROR STRIKE', '#d6fbff');
  Engine.shake(8);
  sfx.mirror();

  if (levelHits >= levelCfg().hitsNeeded) {
    completeLevel();
  }
}

function crackVeil(x, y) {
  if (!medusa || medusa.veil <= 0) return;
  medusa.veil--;
  medusa.hurtFlash = 0.22;
  burst(x, y, '#d6fbff', 20, 1.0);
  floater(medusa.x - 22, medusa.y - 116, medusa.veil > 0 ? 'VEIL CRACKED' : 'VEIL BROKEN', '#d6fbff');
  Engine.shake(5);
}

function completeLevel() {
  sfx.win();
  if (levelIndex >= LEVELS.length - 1) {
    submitToHall(finalScore());
    Engine.setState('victory');
    return;
  }
  levelTransitionT = 1.9;
  pendingLevel = levelIndex + 1;
  mirrorFocus = 0;
  mirrorHeat = 0;
  snakes.length = 0;
  floater(Engine.W / 2, Engine.H * 0.24, 'CHAMBER CLEARED', '#ffd54a');
}

function triggerSerpentSeal() {
  if (sealSolved) return false;
  sealSolved = true;
  sealFlashT = 1.0;
  burst(sealX(), groundY() - 10, '#ff88cc', 34, 1.2);
  floater(sealX(), groundY() - 70, 'THE HIDDEN SIGMA ANSWERS', '#ff88cc');
  Engine.shake(8);
  if (window.GodGames && GodGames.Mysteries) {
    GodGames.Mysteries.unlockAndDepart({
      hintId: 's',
      placeId: 'tartarus',
      fromGame: 'perseus',
    });
  }
  return true;
}

if (new URLSearchParams(location.search).get('testHooks') === '1') {
  window.GodGames = window.GodGames || {};
  window.GodGames.PerseusTest = {
    recordMirrorStrike,
    crackVeil,
    triggerSerpentSeal,
    canReflectInNormalMode() {
      return !!(window.Engine && Engine.state === 'playing' && !Engine.manga
        && medusa && levelIndex === 0 && levelHits === 0);
    },
    completeRun() {
      while (Engine.state === 'playing') {
        medusa.veil = 0;
        recordMirrorStrike('test');
        if (levelTransitionT > 0 && pendingLevel != null) {
          setupLevel(pendingLevel);
          levelTransitionT = 0;
          pendingLevel = null;
        }
      }
      return Engine.state;
    },
    solveHiddenSeal() {
      return triggerSerpentSeal();
    },
    enterFinalChamber() {
      setupLevel(LEVELS.length - 1);
      return this.state();
    },
    state() {
      return {
        levelIndex,
        levelHits,
        mirrorHits,
        veil: medusa && medusa.veil,
        sealSolved,
        engineState: Engine.state,
      };
    },
  };
}

function damagePlayer(amount) {
  if (!player || player.iframes > 0 || Engine.state !== 'playing') return;
  player.hp = Math.max(0, player.hp - amount);
  player.iframes = 1.0;
  player.hitFlash = 0.35;
  player.petrify = Math.max(0, player.petrify - 0.25);
  Engine.shake(7);
  burst(player.x, player.y - 44, '#88d7dd', 12, 0.8);
  sfx.hit();
  if (player.hp <= 0) {
    submitToHall(finalScore());
    Engine.setState('dead');
  }
}

function update(dt) {
  if (!player || !medusa) return;
  playTime += dt;
  if (levelBannerT > 0) levelBannerT = Math.max(0, levelBannerT - dt);
  if (sealFlashT > 0) sealFlashT = Math.max(0, sealFlashT - dt);

  if (levelTransitionT > 0) {
    levelTransitionT -= dt;
    updateParticles(dt);
    if (levelTransitionT <= 0 && pendingLevel != null) {
      const next = pendingLevel;
      pendingLevel = null;
      setupLevel(next);
    }
    return;
  }

  const cfg = levelCfg();
  const left = Engine.keys.ArrowLeft || Engine.keys.a || Engine.keys.A;
  const right = Engine.keys.ArrowRight || Engine.keys.d || Engine.keys.D;
  const shieldHeld = Engine.keys.z || Engine.keys.Z;
  const shieldUsable = shieldHeld && mirrorDullT <= 0;

  player.vx = 0;
  if (left) player.vx -= 310;
  if (right) player.vx += 310;
  player.x += player.vx * dt;
  player.x = Math.max(caveLeft(), Math.min(caveRight(), player.x));
  if (player.vx) {
    player.facing = player.vx > 0 ? 1 : -1;
    player.walkPhase += dt * 9.5;
  }
  player.shield += ((shieldUsable ? 1 : 0) - player.shield) * Math.min(1, dt * 12);
  player.slashT = Math.max(0, player.slashT - dt);
  player.iframes = Math.max(0, player.iframes - dt);
  player.hitFlash = Math.max(0, player.hitFlash - dt);
  medusa.hurtFlash = Math.max(0, medusa.hurtFlash - dt);
  mirrorDullT = Math.max(0, mirrorDullT - dt);
  mirrorFlashT = Math.max(0, mirrorFlashT - dt);

  if (shieldHeld && mirrorDullT <= 0) {
    const usefulGaze = medusa.phase === 'gaze' && player.facing > 0 && player.x < medusa.x;
    mirrorHeat = Math.min(1.12, mirrorHeat + dt * (usefulGaze ? cfg.heatUseful : cfg.heatIdle));
    if (mirrorHeat >= 1) dullMirror();
  } else {
    mirrorHeat = Math.max(0, mirrorHeat - dt * (mirrorDullT > 0 ? 0.42 : 0.78));
  }

  medusa.phaseT -= dt;
  if (medusa.phaseT <= 0) {
    if (medusa.phase === 'watch') setGazePhase('windup');
    else if (medusa.phase === 'windup') setGazePhase('gaze');
    else if (medusa.phase === 'gaze') setGazePhase('rest');
    else setGazePhase('watch');
  }

  medusa.snakeT -= dt;
  const canSpit = medusa.phase !== 'gaze';
  if (canSpit && medusa.snakeT <= 0) {
    medusa.snakeT = cfg.snakeEvery[0] + Math.random() * Math.max(0.05, cfg.snakeEvery[1] - cfg.snakeEvery[0]);
    spawnSnake();
  }

  const playerFacingMedusa = player.facing > 0 && player.x < medusa.x;
  if (medusa.phase === 'gaze' && playerFacingMedusa) {
    if (shieldUsable && player.shield > 0.45) {
      const align = mirrorAlignment();
      player.petrify = Math.max(0, player.petrify - dt * 0.45);
      if (medusa.strikeReady && player.shield > 0.72) {
        mirrorFocus = Math.min(1.02, mirrorFocus + dt * (0.34 + align * cfg.mirrorGain));
        if (mirrorFocus >= 1 && medusa.phaseT < 1.04) {
          recordMirrorStrike('gaze');
        }
      }
    } else {
      mirrorFocus = Math.max(0, mirrorFocus - dt * 0.55);
      player.petrify = Math.min(1.12, player.petrify + dt * 0.68);
      if (player.petrify >= 1) damagePlayer(1);
    }
  } else {
    mirrorFocus = Math.max(0, mirrorFocus - dt * 0.48);
    player.petrify = Math.max(0, player.petrify - dt * 0.34);
  }

  for (const s of snakes) {
    if (!s.alive) continue;
    s.x += s.vx * dt;
    s.wobble += dt * 11;
    if (s.returning) {
      const hx = medusa.x - 16;
      const hy = medusa.y - 58;
      if (Math.abs(s.x - hx) < 44 && Math.abs(s.y - hy) < 82) {
        s.alive = false;
        reflectedSerpents++;
        crackVeil(s.x, s.y);
        medusa.hurtFlash = Math.max(medusa.hurtFlash, 0.24);
        medusa.phaseT = Math.min(medusa.phaseT, 0.58);
        mirrorFocus = Math.min(0.96, mirrorFocus + 0.34);
        burst(s.x, s.y, '#d6fbff', 14, 0.9);
        floater(s.x, s.y - 22, 'OMEN', '#d6fbff');
        Engine.shake(4);
        if (medusa.phase === 'gaze' && medusa.strikeReady && mirrorFocus >= 0.92) {
          recordMirrorStrike('serpent');
        }
      }
      if (s.x > Engine.W + 90) s.alive = false;
      continue;
    }
    const dx = s.x - player.x;
    const dy = s.y - (player.y - 30);
    const shieldBlock = shieldUsable && player.facing > 0 && player.shield > 0.55
      && s.x > player.x - 18 && s.x < player.x + 58
      && Math.abs(dy) < 62;
    if (shieldBlock) {
      s.returning = true;
      s.vx = 330 + mirrorHits * 44 + Math.random() * 42;
      mirrorFocus = Math.min(0.92, mirrorFocus + 0.12);
      burst(s.x, s.y, '#d6fbff', 9, 0.8);
      floater(s.x, s.y - 18, 'REFLECT', '#d6fbff');
      sfx.reflect();
      continue;
    }
    if (Math.hypot(dx, dy) < 28) {
      s.alive = false;
      damagePlayer(1);
    }
    if (s.x < -80) s.alive = false;
  }
  snakes = snakes.filter(s => s.alive);

  updateHazards(dt);
  updateSerpentSeal(dt, shieldHeld);
  updateParticles(dt);
}

function updateHazards(dt) {
  for (const h of hazards) {
    h.phase += dt * (1.6 + levelIndex * 0.25);
    const hx = h.x + Math.sin(h.phase * 0.7) * 34;
    const hy = h.baseY - Math.abs(Math.sin(h.phase)) * 74;
    h.drawX = hx;
    h.drawY = hy;
    if (Math.hypot(player.x - hx, (player.y - 34) - hy) < h.r + 18) {
      damagePlayer(1);
      h.phase += Math.PI * 0.7;
    }
  }
}

function updateSerpentSeal(dt, shieldHeld) {
  if (sealSolved || levelIndex < LEVELS.length - 1 || Engine.state !== 'playing') {
    sealProgress = Math.max(0, sealProgress - dt * 0.8);
    return;
  }
  const onSeal = Math.abs(player.x - sealX()) < 42;
  const facingAway = player.facing < 0;
  const timedWithGaze = medusa.phase === 'gaze';
  if (onSeal && shieldHeld && facingAway && timedWithGaze && mirrorDullT <= 0) {
    sealProgress = Math.min(1.05, sealProgress + dt * 0.85);
    if (sealProgress >= 1) triggerSerpentSeal();
  } else {
    sealProgress = Math.max(0, sealProgress - dt * 0.55);
  }
}

function updateParticles(dt) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const p = sparks[i];
    p.t -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 240 * dt;
    if (p.t <= 0) sparks.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.t -= dt;
    f.y += f.vy * dt;
    if (f.t <= 0) floaters.splice(i, 1);
  }
}

function drawBackground(t) {

    ctx.moveTo(0, gy);

  ctx.lineTo(W * 0.61, gy - 116);

  ctx.lineTo(W, gy - 20);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#091419';
  ctx.fillRect(0, gy, W, H - gy);
  ctx.strokeStyle = 'rgba(61,176,198,0.20)';
  ctx.lineWidth = 1;
  for (let x = -40; x < W + 80; x += 72) {
    ctx.beginPath();
    ctx.moveTo(x, gy);

    ctx.stroke();
  }

function drawGazeCone(t) {
  if (medusa.phase !== 'windup' && medusa.phase !== 'gaze') return;
  const a = medusa.phase === 'gaze' ? 0.22 + 0.06 * Math.sin(t * 24) : 0.08;
  const x0 = medusa.x - 35, y0 = medusa.y - 92;
  ctx.save();

  ctx.beginPath();

function drawMirrorBeam(t) {
  const active = mirrorFocus > 0.02 || mirrorFlashT > 0 || sealProgress > 0.02;
  if (!active || !player || !medusa) return;
  const flash = mirrorFlashT > 0 ? Math.min(1, mirrorFlashT / 0.18) : 0;
  const a = Math.min(0.85, 0.14 + mirrorFocus * 0.42 + flash * 0.45);
  const sx = player.x + player.facing * (22 + player.shield * 16);
  const sy = player.y - 44;
  const ex = medusa.x - 30;
  const ey = medusa.y - 92;
  if (mirrorFocus > 0.02 || mirrorFlashT > 0) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = 12 + flash * 18;
    ctx.strokeStyle = '#d6fbff';
    ctx.lineWidth = 3 + flash * 5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + ex) / 2, sy - 18 - Math.sin(t * 12) * 8, ex, ey);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.92)';
    ctx.lineWidth = 1.2 + flash * 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + ex) / 2, sy - 18, ex, ey);
    ctx.stroke();
    ctx.restore();
  }

  if (sealProgress > 0.02) {
    ctx.save();
    ctx.globalAlpha = 0.18 + sealProgress * 0.58;
    ctx.strokeStyle = '#ff88cc';
    ctx.shadowColor = '#ff88cc';
    ctx.shadowBlur = 18;
    ctx.lineWidth = 3 + sealProgress * 3;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + sealX()) / 2, sy + 40, sealX(), groundY() + 35);
    ctx.stroke();
    ctx.restore();
  }
}

function currentPerseusMangaFrame() {
  if (Engine.state === 'victory') return 'perseusVictory';
  if (player.petrify > 0.55 || Engine.state === 'dead') return 'perseusStone';
  if (player.slashT > 0) return 'perseusSlash';
  if (player.shield > 0.45 || mirrorFocus > 0.02 || mirrorFlashT > 0) return 'perseusMirror';
  if (Math.abs(player.vx) > 12) return 'perseusRun';

  if (!perseusMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const scale = Math.max(0.27, Math.min(0.36, compact / 2100));
  const frame = currentPerseusMangaFrame();

  ctx.save();
  if (player.hitFlash > 0) {
    ctx.filter = 'brightness(2.5)';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = 16;

  const drew = Manga.assets.drawFrame(ctx, PERSEUS_MANGA_SHEET, frame, player.x, player.y + 5, {
    scale,
    flipX: player.facing < 0,

  ctx.restore();

}

  ctx.restore();
}

function drawMedusa(t) {
  if (Engine.manga && drawMedusaMangaSprite()) return;
  if (Engine.manga && window.Manga && Manga.effects && typeof Manga.effects.inkStroke === 'function') {
    drawMangaMedusa(t);
    return;
  }
  ctx.save();
  ctx.translate(medusa.x, medusa.y);
  const flash = medusa.hurtFlash > 0;
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath(); ctx.ellipse(0, 0, 38, 8, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = flash ? '#ffffff' : '#657c53';
  ctx.beginPath();
  ctx.moveTo(-22, -18); ctx.lineTo(-16, -74); ctx.quadraticCurveTo(0, -92, 18, -74); ctx.lineTo(24, -18);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#25351f'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = flash ? '#ffffff' : '#8bc88d';
  ctx.beginPath(); ctx.arc(0, -98, 17, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111810';
  for (let i = -4; i <= 4; i++) {
    const a = i * 0.34 + Math.sin(t * 2 + i) * 0.11;
    const len = 28 + (i % 2) * 7;
    ctx.save();
    ctx.translate(0, -108);
    ctx.rotate(a);
    ctx.strokeStyle = i % 2 ? '#315c35' : '#20442a';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(8, -12, 0, -len);
    ctx.stroke();
    ctx.fillStyle = '#6bd070';
    ctx.beginPath(); ctx.arc(0, -len, 3.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = medusa.phase === 'gaze' ? '#dcff9b' : '#142010';
  ctx.beginPath(); ctx.arc(-6, -99, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -99, 2.5, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = '#314b2c'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.quadraticCurveTo(18, 2, 2, 18);
  ctx.quadraticCurveTo(-18, 36, 12, 50);
  ctx.stroke();
  ctx.restore();
}

function currentMedusaMangaFrame() {
  if (medusa.hurtFlash > 0 || sealFlashT > 0) return 'medusaHurt';
  if (medusa.phase === 'gaze' || medusa.phase === 'windup') return 'medusaGaze';
  return 'medusaIdle';
}

function drawMedusaMangaSprite() {
  if (!perseusMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const scale = Math.max(0.34, Math.min(0.46, compact / 1650));
  const frame = currentMedusaMangaFrame();

  ctx.save();
  if (medusa.phase === 'gaze') {
    ctx.shadowColor = '#dcff9b';
    ctx.shadowBlur = 22;
  }
  if (medusa.hurtFlash > 0) ctx.filter = 'brightness(2.8) saturate(0.2)';
  const drew = Manga.assets.drawFrame(ctx, PERSEUS_MANGA_SHEET, frame, medusa.x, medusa.y + 8, {
    scale,
    flipX: true,
  });
  ctx.restore();
  return drew;
}

function drawSnakes(t) {
  for (const s of snakes) {
    if (Engine.manga && perseusMangaAssetsReady()) {
      const compact = Math.min(Engine.W, Engine.H);
      const scale = Math.max(0.13, Math.min(0.19, compact / 3900));
      const frame = s.returning ? 'snakeReflect' : 'snake';
      if (Manga.assets.drawFrame(ctx, PERSEUS_MANGA_SHEET, frame, s.x, s.y + Math.sin(s.wobble) * 5, {
        scale,
        flipX: s.returning,
        rotate: Math.sin(s.wobble) * 0.08,
      })) continue;
    }
    ctx.save();
    ctx.translate(s.x, s.y + Math.sin(s.wobble) * 5);
    if (s.returning) ctx.scale(-1, 1);
    ctx.strokeStyle = s.returning ? '#d6fbff' : '#76c96c';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-18, 0);
    ctx.quadraticCurveTo(-8, -8, 0, 0);
    ctx.quadraticCurveTo(8, 8, 18, 0);
    ctx.stroke();
    ctx.fillStyle = s.returning ? '#ffffff' : '#b9f69c';
    ctx.beginPath(); ctx.arc(-20, 0, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-22, -1, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawHazards(t) {
  for (const h of hazards) {
    const x = h.drawX || h.x;
    const y = h.drawY || h.baseY;
    if (Engine.manga && perseusMangaAssetsReady()) {
      const compact = Math.min(Engine.W, Engine.H);
      const scale = Math.max(0.16, Math.min(0.22, compact / 3500));
      if (Manga.assets.drawFrame(ctx, PERSEUS_MANGA_SHEET, 'hazard', x, y + 2, {
        scale,
        rotate: Math.sin(h.phase + t) * 0.12,
      })) continue;
    }
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(h.phase + t) * 0.18);
    ctx.fillStyle = '#6c7472';
    ctx.beginPath();
    ctx.moveTo(0, -26);
    ctx.lineTo(20, -6);
    ctx.lineTo(13, 24);
    ctx.lineTo(-15, 22);
    ctx.lineTo(-22, -5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#202828';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = 'rgba(214,251,255,0.35)';
    ctx.fillRect(-7, -11, 14, 3);
    ctx.restore();
  }
}

function drawSerpentSeal(t) {
  if (levelIndex < LEVELS.length - 1 && sealProgress <= 0 && sealFlashT <= 0) return;
  const x = sealX();
  const y = groundY() + 35;
  const pulse = 0.5 + Math.sin(t * 4.4) * 0.5;
  const nearSeal = Engine.state === 'playing' && Math.abs(player.x - x) < 56;
  const charge = Math.min(1, sealProgress);
  const flash = Math.min(1, sealFlashT);
  const reveal = Math.max(charge, flash, nearSeal ? 0.16 + pulse * 0.05 : 0);
  ctx.save();
  ctx.translate(x, y);

  const floorGlow = Math.max(nearSeal ? 0.12 : 0, charge * 0.55, flash * 0.75);
  if (floorGlow > 0) {
    const g = ctx.createRadialGradient(0, 4, 4, 0, 4, 74 + charge * 26);
    g.addColorStop(0, `rgba(255,136,204,${0.16 * floorGlow})`);
    g.addColorStop(0.42, `rgba(214,251,255,${0.12 * floorGlow})`);
    g.addColorStop(1, 'rgba(214,251,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0, 4, 82 + charge * 18, 24 + charge * 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.scale(1.25, 0.42);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 31px serif';
  ctx.lineWidth = 3.5;
  ctx.strokeStyle = 'rgba(3,7,8,0.18)';
  ctx.strokeText('Σ', 0, 5);
  ctx.lineWidth = 1.3;
  ctx.strokeStyle = `rgba(100,143,148,${0.045 + reveal * 0.14})`;
  ctx.strokeText('Σ', 0, 3);
  ctx.fillStyle = `rgba(5,13,16,${0.12 + reveal * 0.06})`;
  ctx.fillText('Σ', 0, 4);
  ctx.restore();

  if (reveal > 0) {
    ctx.save();
    ctx.scale(1.25, 0.42);
    ctx.shadowColor = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.shadowBlur = 8 + charge * 24 + flash * 24;
    ctx.globalAlpha = Math.min(0.72, 0.10 + reveal * 0.62);
    ctx.font = 'bold 31px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.fillText('Σ', 0, 3);
    ctx.restore();
  }

  if (charge > 0 || flash > 0) {
    ctx.globalAlpha = 0.16 + charge * 0.62 + flash * 0.35;
    ctx.strokeStyle = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 10 + charge * 18;
    ctx.lineWidth = 2 + charge * 4;
    ctx.beginPath();
    ctx.ellipse(0, 4, 42 + charge * 18, 13 + charge * 5, 0, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.max(charge, flash * 0.7));
    ctx.stroke();
  }

  ctx.textAlign = 'center';
  ctx.restore();
}

function drawParticles() {
  for (const p of sparks) {
    ctx.globalAlpha = Math.max(0, p.t);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px monospace';
  for (const f of floaters) {
    ctx.globalAlpha = Math.max(0, f.t);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}

function drawWorld() {
  const t = Engine.time;
  drawBackground(t);
  drawSerpentSeal(t);
  drawGazeCone(t);
  drawMirrorBeam(t);
  drawSnakes(t);
  drawHazards(t);
  drawMedusa(t);
  drawPerseus(t);
  drawParticles();

  if (Engine.manga && window.Manga && Manga.effects) {
    Manga.effects.vignette(ctx, Engine.W, Engine.H, { strength: 0.50 });
    Manga.effects.scanlines(ctx, Engine.W, Engine.H, { spacing: 4, alpha: 0.11 });
    if (medusa.phase === 'gaze') {
      Manga.effects.speedLines(ctx, medusa.x - 48, medusa.y - 96, {
        count: 16, innerR: 42, outerR: 220, color: '#d6fbff', width: 2, jitter: 0.35,
      });
    }
  }
}

function drawHud() {
  Engine.hud.drawHearts(20, 28, player.hp, HP_MAX);
  const W = Engine.W;
  const cfg = levelCfg();
  const compactHud = Engine.H < 520;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${compactHud ? 12 : 15}px monospace`;
  ctx.fillStyle = '#d6fbff';
  ctx.shadowColor = '#3db0c6';
  ctx.shadowBlur = 8;
  ctx.fillText(cfg.title + ' / III', W / 2, 28);
  ctx.shadowBlur = 0;
  if (!(compactHud && levelBannerT > 0)) {
    ctx.font = `${compactHud ? 10 : 12}px monospace`;
    ctx.fillStyle = 'rgba(214,251,255,0.82)';
    ctx.fillText(cfg.prompt, W / 2, compactHud ? 43 : 48);
  }

  ctx.textAlign = 'right';
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#d6fbff';
  ctx.fillText('CHAMBER STRIKES ' + levelHits + '/' + cfg.hitsNeeded, W - 22, 28);
  ctx.fillStyle = 'rgba(214,251,255,0.20)';
  ctx.fillRect(W - 222, 38, 200, 7);
  ctx.fillStyle = '#d6fbff';
  ctx.fillRect(W - 222, 38, 200 * Math.min(1, mirrorFocus), 7);
  ctx.fillStyle = mirrorHeat > 0.78 ? '#ff9b5f' : 'rgba(212,175,55,0.85)';
  ctx.fillRect(W - 222, 49, 200 * Math.min(1, mirrorHeat), 6);
  ctx.fillStyle = 'rgba(214,251,255,0.24)';
  ctx.fillRect(W - 222, 60, 200, 6);
  ctx.fillStyle = mirrorDullT > 0 ? '#788b90' : '#d6fbff';
  ctx.fillRect(W - 222, 60, 200 * Math.min(1, player.shield), 6);
  if (player.petrify > 0.01) {
    ctx.fillStyle = 'rgba(170,178,176,0.32)';
    ctx.fillRect(W - 222, 70, 200, 8);
    ctx.fillStyle = '#c7d0cd';
    ctx.fillRect(W - 222, 70, 200 * Math.min(1, player.petrify), 8);
  }
  ctx.textAlign = 'left';
  ctx.fillStyle = medusa.phase === 'gaze' ? '#dcff9b' : '#8bc88d';
  ctx.fillText(medusa.phase.toUpperCase(), 20, 62);
  if (medusa.veil > 0) {
    ctx.fillStyle = '#d6fbff';
    ctx.fillText('SERPENT VEIL ' + medusa.veil, 20, 82);
  } else if (mirrorDullT > 0) {
    ctx.fillStyle = '#ff9b5f';
    ctx.fillText('MIRROR DULLED', 20, 82);
  } else if (medusa.phase === 'gaze') {
    ctx.fillStyle = '#d6fbff';
    ctx.fillText('ALIGN ' + Math.round(mirrorAlignment() * 100) + '%', 20, 82);
  } else if (reflectedSerpents > 0) {
    ctx.fillStyle = 'rgba(214,251,255,0.78)';
    ctx.fillText('SERPENTS TURNED ' + reflectedSerpents, 20, 82);
  }

  if (levelBannerT > 0) {
    const a = Math.min(1, levelBannerT / 0.5);
    const bannerY = compactHud ? Engine.H * 0.20 : Engine.H * 0.24;
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.font = `bold ${compactHud ? 24 : 34}px serif`;
    ctx.fillStyle = '#d6fbff';
    ctx.shadowColor = '#3db0c6';
    ctx.shadowBlur = 22;
    ctx.fillText(cfg.name, W / 2, bannerY);
    ctx.shadowBlur = 0;
    if (!compactHud) {
      ctx.font = 'bold 13px monospace';
      ctx.fillStyle = 'rgba(240,250,255,0.82)';
      ctx.fillText(cfg.prompt, W / 2, bannerY + 28);
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function hasName() { return !!localStorage.getItem(NAME_KEY); }
function modalOpen() { return document.getElementById('modalBg').classList.contains('open'); }
function showNameModal(after) {
  pendingStart = after || null;
  const mb = document.getElementById('modalBg');
  const inp = document.getElementById('nameInput');
  inp.value = localStorage.getItem(NAME_KEY) || '';
  mb.classList.add('open');
  setTimeout(() => inp.focus(), 50);
}
function hideNameModal() { document.getElementById('modalBg').classList.remove('open'); }
let pendingStart = null;
function saveNameFromModal() {
  const raw = document.getElementById('nameInput').value || '';
  const clean = raw.replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g, ' ').trim().slice(0, 20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  hideNameModal();
  if (pendingStart) { const fn = pendingStart; pendingStart = null; fn(); }
  return true;
}
document.getElementById('nameSave').addEventListener('click', saveNameFromModal);
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); saveNameFromModal(); }
  e.stopPropagation();
});

function beginRun() {
  Engine.audio.init();
  Engine.setState('playing');
}

function renderPerseusTitle(ctx2, eng) {
  const W = eng.W, H = eng.H;
  const art = window.GodGames && GodGames.MangaArt;
  if (!eng.manga || !art || typeof art.drawScene !== 'function'
      || !art.drawScene(ctx2, 'perseus', 0, 0, W, H, { focusX: 0.50, focusY: 0.48 })) {
    eng._defaultTitle();
    return;
  }

  if (art.overlay) art.overlay(ctx2, W, H, {
    top: 'rgba(0,0,0,0.16)',
    mid: 'rgba(0,20,24,0.10)',
    bottom: 'rgba(0,0,0,0.72)',
  });
  if (art.mangaAtmosphere) art.mangaAtmosphere(ctx2, W, H, { halftoneAlpha: 0.12, scanAlpha: 0.08, vignette: 0.52 });

  ctx2.save();
  ctx2.textAlign = 'center';
  ctx2.lineJoin = 'round';
  ctx2.font = 'bold 72px serif';
  ctx2.strokeStyle = '#0a0a0a';
  ctx2.lineWidth = 8;
  ctx2.strokeText('PERSEUS', W / 2, H * 0.25);
  ctx2.fillStyle = PERSEUS_ACCENT;
  ctx2.shadowColor = PERSEUS_ACCENT;
  ctx2.shadowBlur = 24;
  ctx2.fillText('PERSEUS', W / 2, H * 0.25);
  ctx2.shadowBlur = 0;
  ctx2.font = 'italic 22px serif';
  ctx2.fillStyle = 'rgba(240,250,255,0.86)';
  ctx2.fillText('The Gorgon\'s Mirror', W / 2, H * 0.25 + 42);
  ctx2.font = 'bold 17px monospace';
  ctx2.fillStyle = '#d6fbff';
  ctx2.fillText('FACE THE GAZE  ·  RAISE THE MIRROR  ·  CUT THE SERPENTS', W / 2, H * 0.57);
  if (Math.sin(eng.time * 3.4) > 0) {
    ctx2.font = 'bold 20px monospace';
    ctx2.fillStyle = '#D4AF37';
    ctx2.shadowColor = '#D4AF37';
    ctx2.shadowBlur = 10;
    ctx2.fillText('PRESS SPACE / ENTER', W / 2, H * 0.69);
  }
  ctx2.shadowBlur = 0;
  ctx2.font = '12px monospace';
  ctx2.fillStyle = 'rgba(220,240,244,0.58)';
  ctx2.fillText('ESC — Return to World    ·    H — Mount Olympus', W / 2, H * 0.83);
  ctx2.restore();
}

function renderPerseusGameOver(ctx2, eng) {
  const W = eng.W, H = eng.H;
  const isVictory = eng.state === 'victory';
  const art = window.GodGames && GodGames.MangaArt;
  if (!eng.manga || !art || typeof art.drawScene !== 'function'
      || !art.drawScene(ctx2, isVictory ? 'olympus' : 'perseus', 0, 0, W, H, { focusX: 0.50, focusY: 0.50 })) {
    eng._defaultGameOver();
    return;
  }

  if (art.overlay) art.overlay(ctx2, W, H, {
    top: 'rgba(0,0,0,0.22)',
    mid: isVictory ? 'rgba(16,10,0,0.18)' : 'rgba(0,14,18,0.22)',
    bottom: 'rgba(0,0,0,0.78)',
  });
  if (window.Manga && Manga.effects && Manga.effects.panelSplit) {
    if (this._perseusOverState !== eng.state) {
      this._perseusOverState = eng.state;
      this._perseusOverT0 = eng.time;
    }
    Manga.effects.panelSplit(ctx2, W, H, Math.min(1, (eng.time - this._perseusOverT0) / 0.85));
  }
  if (art.mangaAtmosphere) art.mangaAtmosphere(ctx2, W, H, { halftoneAlpha: 0.10, scanAlpha: 0.08, vignette: 0.58 });

  ctx2.save();
  ctx2.textAlign = 'center';
  const title = isVictory ? 'THE GAZE IS BROKEN' : 'PERSEUS IS STONE';
  const sub = isVictory ? 'Medusa falls. The cave still keeps one quiet mark.' : 'The cave keeps another statue.';
  const color = isVictory ? '#D4AF37' : PERSEUS_ACCENT;
  ctx2.font = 'bold 52px serif';
  ctx2.lineJoin = 'round';
  ctx2.strokeStyle = '#0a0a0a';
  ctx2.lineWidth = 7;
  ctx2.strokeText(title, W / 2, H * 0.32);
  ctx2.fillStyle = color;
  ctx2.shadowColor = color;
  ctx2.shadowBlur = 20;
  ctx2.fillText(title, W / 2, H * 0.32);
  ctx2.shadowBlur = 0;
  ctx2.font = 'italic 16px serif';
  ctx2.fillStyle = 'rgba(230,245,246,0.78)';
  ctx2.fillText(sub, W / 2, H * 0.40);
  ctx2.font = 'bold 18px monospace';
  ctx2.fillStyle = isVictory ? '#D4AF37' : '#d6fbff';
  if (Math.sin(eng.time * 3.2) > 0) ctx2.fillText(`PRESS SPACE / ENTER TO ${isVictory ? 'PLAY AGAIN' : 'TRY AGAIN'}`, W / 2, H * 0.70);
  ctx2.font = '12px monospace';
  ctx2.fillStyle = 'rgba(220,240,244,0.52)';
  ctx2.fillText('ESC — Return to World    ·    H — Mount Olympus', W / 2, H * 0.81);
  ctx2.restore();
}

Engine.boot({
  title: 'PERSEUS',
  subtitle: 'The Gorgon\'s Mirror',
  instructions: [
    'Left / Right: move through the chambers',
    'When Medusa\'s eye opens, face her and hold Z',
    'Release between gazes or the mirror overheats',
    'X cuts serpents; Z turns them back into the veil',
  ],
  deadTitle: 'PERSEUS IS STONE',
  deadSubtitle: 'The cave keeps another statue.',
  victoryTitle: 'THE GAZE IS BROKEN',
  victorySubtitle: 'Medusa falls. The cave still keeps one quiet mark.',
  hubHref: 'index.html',
  theme: {
    bg: (c, W, H) => { c.fillStyle = '#02070a'; c.fillRect(0, 0, W, H); },
    accent: PERSEUS_ACCENT,
    danger: '#2a4b48',
    shakeDecay: 'exp',
    restartKey: [' ', 'Enter'],
  },
  mobile: {
    movement: 'horizontal',
    actions: [
      { label: 'MIRROR', key: 'z', mode: 'hold' },
      { label: 'SWORD', key: 'x' },
    ],
  },
  onTitleRender: renderPerseusTitle,
  onGameOverRender: renderPerseusGameOver,
  onInit(e) {
    canvas = e.canvas;
    ctx = e.ctx;
    resetGame();
  },
  onUpdate(dt) {
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.update(dt);
    update(dt);
  },
  onRender() {
    drawWorld();
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, Engine.W, Engine.H);
  },
  onHud() {
    drawHud();
  },
  onTryStart() {
    if (modalOpen()) return false;
    if (!hasName()) { showNameModal(beginRun); return false; }
    return true;
  },
  onKeyDown(ev, e) {
    if (modalOpen()) return;
    if (e.state === 'title' && ev.key === 'Enter') {
      if (!hasName()) { showNameModal(beginRun); return; }
      beginRun();
      return;
    }
    if ((e.state === 'dead' || e.state === 'victory') && (ev.key === 'h' || ev.key === 'H')) {
      window.location.href = 'mount-olympus.html';
      return;
    }
    if (e.state === 'playing' && (ev.key === 'x' || ev.key === 'X')) slash();
  },
});
</script>
