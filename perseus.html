}

function drawMangaImpactEffects(t) {
  const art = perseusMangaArt();
  if (!art || !perseusMangaAssetReady(PERSEUS_FXHUD_SHEET)) return;
  if (medusa && (mirrorFlashT > 0 || medusa.hurtFlash > 0 || sealFlashT > 0)) {
    const eye = mangaMedusaEyePoint();
    const alpha = Math.min(0.90, mirrorFlashT * 2.8 + medusa.hurtFlash * 2.2 + sealFlashT * 1.4);
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, mirrorFlashT > 0 ? 'mirrorImpact' : 'veilCrack', eye.x - 6, eye.y + 10, {
      scale: 0.18 + alpha * 0.08,
      alpha,
      rotate: Math.sin(t * 8) * 0.06,
    });
  }
  if (player && mirrorDullT > 0) {
    const shield = mangaPlayerShieldPoint();
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'mirrorDull', shield.x, shield.y, {
      scale: 0.17,
      alpha: Math.min(0.62, mirrorDullT * 0.75),
      flipX: player.facing < 0,
    });
  }
  if (player && player.hitFlash > 0) {
    const head = mangaPlayerHeadPoint();
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'hitBurst', head.x, head.y + 28, {
      scale: 0.18,
      alpha: Math.min(0.72, player.hitFlash * 2.0),
    });
  }
  if (sealFlashT > 0 || sealProgress > 0.02) {
    drawMangaFloorSeal(t, { alpha: Math.min(1, sealProgress + sealFlashT) });
  }
}

function drawMangaChamberCuts(t) {
  const cfg = levelCfg();
  const W = Engine.W;
  const H = Engine.H;
  const art = perseusMangaArt();
  const heavy = perseusMangaHeavy();

  if (levelTransitionT > 0) {
    const p = clamp01(1 - levelTransitionT / 1.9);
    ctx.save();
    if (pendingLevel != null && art && typeof art.drawFrameCover === 'function') {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(W * (0.66 - 0.30 * p), 0);
      ctx.lineTo(W, 0);
      ctx.lineTo(W, H);
      ctx.lineTo(W * (0.38 + 0.18 * p), H);
      ctx.closePath();
      ctx.clip();
      art.drawFrameCover(ctx, PERSEUS_CHAMBER_ATLAS, `chamber${pendingLevel + 1}`, 0, 0, W, H, {
        focusY: 0.54,
        alpha: 0.86,
      });
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
    ctx.fillStyle = `rgba(0,0,0,${0.42 + p * 0.18})`;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W * (0.62 - 0.22 * p), 0);
    ctx.lineTo(W * (0.34 + 0.10 * p), H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#d6fbff';
    ctx.lineWidth = 4;
    ctx.globalAlpha = 0.62;
    ctx.beginPath();
    ctx.moveTo(W * (0.60 - 0.22 * p), 0);
    ctx.lineTo(W * (0.33 + 0.10 * p), H);
    ctx.stroke();
    ctx.globalAlpha = 1;
    if (window.Manga && Manga.effects && Manga.effects.sfxText) {
      Manga.effects.sfxText(ctx, W * 0.50, H * 0.28, 'PANEL CUT', {
        size: Math.max(28, Math.min(56, W / 16)),
        color: '#d6fbff',
        outline: '#0a0a0a',
        tilt: -8,
        alpha: 0.70 + 0.30 * Math.sin(t * 10) ** 2,
      });
    }
    ctx.restore();
  }

  if (levelBannerT > 0) {
    const a = Math.min(1, levelBannerT / 0.5);
    const compactHud = H < 520 || W < 720;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    ctx.lineJoin = 'round';
    let titleSize = compactHud ? 24 : 34;
    ctx.font = `900 ${titleSize}px serif`;
    while (ctx.measureText(cfg.name).width > W * 0.86 && titleSize > 18) {
      titleSize -= 1;
      ctx.font = `900 ${titleSize}px serif`;
    }
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 6;
    ctx.strokeText(cfg.name, W / 2, compactHud ? H * 0.20 : H * 0.24);
    ctx.fillStyle = '#d6fbff';
    ctx.shadowColor = '#3db0c6';
    ctx.shadowBlur = heavy ? 20 : 0;
    ctx.fillText(cfg.name, W / 2, compactHud ? H * 0.20 : H * 0.24);
    ctx.shadowBlur = 0;
    if (!compactHud) {
      ctx.font = 'bold 13px monospace';
      ctx.lineWidth = 4;
      ctx.strokeText(cfg.prompt, W / 2, H * 0.24 + 30);
      ctx.fillStyle = 'rgba(240,250,255,0.90)';
      ctx.fillText(cfg.prompt, W / 2, H * 0.24 + 30);
    }
    ctx.restore();
  }
}

function drawMangaWorld(t) {
  if (!drawMangaCaveStage(t)) return false;
  drawMangaFloorSeal(t);
  drawMangaGazeCone(t);
  drawMangaMirrorBeam(t);
  drawMangaActorShadows();
  drawSnakes(t);
  drawHazards(t);
  drawMedusa(t);
  drawPerseus(t);
  drawMangaForegroundOcclusion();
  drawMangaImpactEffects(t);
  drawParticles();

  if (window.Manga && Manga.effects) {
    const art = perseusMangaArt();
    const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
    if (heavy) {
      if (typeof art.vignette === 'function') art.vignette(ctx, 0, 0, Engine.W, Engine.H, { strength: 0.52 });
      else Manga.effects.vignette(ctx, Engine.W, Engine.H, { strength: 0.52 });
      if (typeof art.scanlines === 'function') art.scanlines(ctx, 0, 0, Engine.W, Engine.H, { spacing: 4, alpha: 0.08 });
      else Manga.effects.scanlines(ctx, Engine.W, Engine.H, { spacing: 4, alpha: 0.08 });
    }
    if (medusa && medusa.phase === 'gaze' && Manga.effects.speedLines) {
      const eye = mangaMedusaEyePoint();
      Manga.effects.speedLines(ctx, eye.x, eye.y, {
        count: heavy ? 16 : 8,
        innerR: 42,
        outerR: heavy ? 210 : 170,
        color: '#dcff9b',
        width: heavy ? 2 : 1.4,
        jitter: 0.35,
      });
    }
  }
  drawMangaChamberCuts(t);
  return true;
}

function drawMangaHudBar(x, y, w, h, pct, color, back = 'rgba(8,14,16,0.72)') {
  ctx.fillStyle = back;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, h / 2);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w * clamp01(pct), h, h / 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(10,10,10,0.82)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, h / 2);
  ctx.stroke();
}

function drawMangaAbilityIcon(cx, cy, key, frame, active, alpha = 1) {
  const art = perseusMangaArt();
  const heavy = perseusMangaHeavy();
  const r = 22;
  ctx.save();
  ctx.fillStyle = active ? 'rgba(214,251,255,0.32)' : 'rgba(0,0,0,0.50)';
  ctx.strokeStyle = active ? '#d6fbff' : 'rgba(212,175,55,0.54)';
  ctx.lineWidth = 2.5;
  if (active && heavy) {
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = 12;
  }
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  if (art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET)) {
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, frame, cx, cy, {
      scale: 0.082,
      alpha: active ? 0.96 : 0.58,
    });
  }
  ctx.font = '900 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(key, cx, cy + r + 13);
  ctx.fillStyle = active ? '#d6fbff' : 'rgba(230,240,240,0.62)';
  ctx.fillText(key, cx, cy + r + 13);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawMangaHud() {
  const art = perseusMangaArt();
  const heavy = perseusMangaHeavy();
  const W = Engine.W;
  const H = Engine.H;
  const cfg = levelCfg();
  const compact = H < 520 || W < 720;
  const panelAlpha = compact ? 0.40 : 0.48;

  ctx.save();
  ctx.fillStyle = `rgba(0,0,0,${panelAlpha})`;
  ctx.strokeStyle = 'rgba(212,175,55,0.46)';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.roundRect(14, 14, compact ? 148 : 176, compact ? 42 : 54, 6);
  ctx.fill();
  ctx.stroke();

  if (art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET)) {
    const step = compact ? 28 : 33;
    for (let i = 0; i < HP_MAX; i++) {
      art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, i < player.hp ? 'heartFull' : 'heartEmpty', 36 + i * step, compact ? 36 : 42, {
        scale: compact ? 0.060 : 0.073,
        alpha: i < player.hp ? 0.98 : 0.56,
      });
    }
  } else {
    Engine.hud.drawHearts(20, 28, player.hp, HP_MAX);
  }

  ctx.textAlign = 'center';
  ctx.lineJoin = 'round';
  ctx.font = `900 ${compact ? 13 : 16}px monospace`;
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(cfg.title + ' / III', W / 2, compact ? 25 : 29);
  ctx.fillStyle = '#d6fbff';
  ctx.shadowColor = '#3db0c6';
  ctx.shadowBlur = heavy ? 8 : 0;
  ctx.fillText(cfg.title + ' / III', W / 2, compact ? 25 : 29);
  ctx.shadowBlur = 0;
  if (!compact && levelBannerT <= 0.2) {
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = 'rgba(214,251,255,0.72)';
    ctx.fillText(cfg.prompt, W / 2, 49);
  }

  const boxW = compact ? 184 : 226;
  const boxH = player.petrify > 0.01 ? (compact ? 68 : 82) : (compact ? 56 : 70);
  const boxX = W - boxW - 14;
  ctx.fillStyle = `rgba(0,0,0,${panelAlpha})`;
  ctx.strokeStyle = 'rgba(212,175,55,0.46)';
  ctx.beginPath();
  ctx.roundRect(boxX, 14, boxW, boxH, 6);
  ctx.fill();
  ctx.stroke();

  ctx.textAlign = 'right';
  ctx.font = `900 ${compact ? 11 : 13}px monospace`;
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#0a0a0a';
  ctx.fillStyle = '#d6fbff';
  ctx.strokeText('STRIKES ' + levelHits + '/' + cfg.hitsNeeded, W - 24, compact ? 29 : 31);
  ctx.fillText('STRIKES ' + levelHits + '/' + cfg.hitsNeeded, W - 24, compact ? 29 : 31);
  const barX = boxX + 12;
  const barW = boxW - 24;
  const y0 = compact ? 38 : 42;
  drawMangaHudBar(barX, y0, barW, 7, mirrorFocus, '#d6fbff');
  drawMangaHudBar(barX, y0 + 11, barW, 6, mirrorHeat, mirrorHeat > 0.78 ? '#ff9b5f' : '#D4AF37');
  drawMangaHudBar(barX, y0 + 21, barW, 6, player.shield, mirrorDullT > 0 ? '#788b90' : '#bdf7ff');
  if (player.petrify > 0.01) {
    drawMangaHudBar(barX, y0 + 32, barW, 7, player.petrify, '#c7d0cd', 'rgba(170,178,176,0.22)');
  }

  ctx.textAlign = 'left';
  ctx.font = `900 ${compact ? 10 : 12}px monospace`;
  ctx.lineWidth = 3;
  const phaseText = medusa.phase === 'gaze' ? 'GAZE' : medusa.phase.toUpperCase();
  const phaseColor = medusa.phase === 'gaze' ? '#dcff9b' : '#8bc88d';
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(phaseText, 22, compact ? 84 : 92);
  ctx.fillStyle = phaseColor;
  ctx.fillText(phaseText, 22, compact ? 84 : 92);
  if (!compact) {
    const status = medusa.veil > 0
      ? 'VEIL ' + medusa.veil
      : mirrorDullT > 0
        ? 'MIRROR DULLED'
        : medusa.phase === 'gaze'
          ? 'ALIGN ' + Math.round(mirrorAlignment() * 100) + '%'
          : reflectedSerpents > 0
            ? 'SERPENTS ' + reflectedSerpents
            : '';
    if (status) {
      ctx.strokeText(status, 22, 110);
      ctx.fillStyle = mirrorDullT > 0 ? '#ff9b5f' : '#d6fbff';
      ctx.fillText(status, 22, 110);
    }
  }

  if (sealProgress > 0.02) {
    const sw = compact ? 112 : 150;
    const sx = W / 2 - sw / 2;
    const sy = H - (compact ? 30 : 42);
    drawMangaHudBar(sx, sy, sw, 8, sealProgress, '#ff88cc', 'rgba(255,136,204,0.18)');
  }

  if (!compact) {
    drawMangaAbilityIcon(W - 92, H - 76, 'Z', 'mirrorIcon', player.shield > 0.45 || mirrorFocus > 0.02, 0.96);
    drawMangaAbilityIcon(W - 36, H - 76, 'X', 'swordIcon', player.slashT > 0, 0.96);
  }
  ctx.restore();
  return true;
}

function drawWorld() {
  const t = Engine.time;
  if (Engine.manga && drawMangaWorld(t)) return;
  drawBackground(t);
  drawSerpentSeal(t);
  drawGazeCone(t);
  drawMirrorBeam(t);
  drawSnakes(t);
  drawHazards(t);
  drawMedusa(t);
  drawPerseus(t);
  drawParticles();

  if (Engine.manga && window.Manga && Manga.effects) {
    const art = perseusMangaArt();
    if (art && typeof art.vignette === 'function') art.vignette(ctx, 0, 0, Engine.W, Engine.H, { strength: 0.50 });
    else Manga.effects.vignette(ctx, Engine.W, Engine.H, { strength: 0.50 });
    if (art && typeof art.scanlines === 'function') art.scanlines(ctx, 0, 0, Engine.W, Engine.H, { spacing: 4, alpha: 0.11 });
    else Manga.effects.scanlines(ctx, Engine.W, Engine.H, { spacing: 4, alpha: 0.11 });
    if (medusa.phase === 'gaze') {
      Manga.effects.speedLines(ctx, medusa.x - 48, medusa.y - 96, {

    }
  }
}

      items.push({

    items.push({ role: 'danger', x: s.x, y: s.y, r: 28, label: s.returning ? 'serpent return' : 'serpent hit' });
    items.push({ role: 'visual', x: sx, y: sy, w: 58, h: 34, label: 'serpent sprite' });
    drifts.push({
      label: 'serpent',
      x: s.x,
      y: s.y,
      visualX: vx,
      visualY: vy,
      radius: 28,
      maxDrift: 9,
    });
  }
  for (const h of hazards) {
    const hx = h.drawX ?? h.x;
    const hy = h.drawY ?? h.baseY;
    const vx = typeof h.visualX === 'number' ? h.visualX : hx;
    const vy = typeof h.visualY === 'number' ? h.visualY : hy;
    const sx = Engine.manga ? mangaProjectX(vx, vy) : vx;
    const hitR = h.r + 18;
    items.push({ role: 'danger', x: hx, y: hy, r: hitR, label: 'floor hazard' });
    items.push({ role: 'visual', x: sx, y: vy, w: 64, h: 74, label: 'hazard sprite' });
    drifts.push({
      label: 'hazard',
      x: hx,
      y: hy,
      visualX: vx,
      visualY: vy,
      radius: hitR,
      maxDrift: hitR * 0.32,
    });
  }
  debug.draw(ctx, { game: 'perseus', items, drifts });
}

function drawHud() {
  if (Engine.manga && drawMangaHud()) return;
  Engine.hud.drawHearts(20, 28, player.hp, HP_MAX);
  const W = Engine.W;
  const cfg = levelCfg();
  const compactHud = Engine.H < 520 || W < 720;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${compactHud ? 12 : 15}px monospace`;
  ctx.fillStyle = '#d6fbff';
  ctx.shadowColor = '#3db0c6';
  ctx.shadowBlur = 8;
  ctx.fillText(cfg.title + ' / III', W / 2, 28);
  ctx.shadowBlur = 0;
  if (!(compactHud && levelBannerT > 0)) {
    ctx.font = `${compactHud ? 10 : 12}px monospace`;
    ctx.fillStyle = 'rgba(214,251,255,0.82)';
    ctx.fillText(cfg.prompt, W / 2, compactHud ? 43 : 48);
  }

  ctx.textAlign = 'right';
  ctx.font = 'bold 14px monospace';
  ctx.fillStyle = '#d6fbff';
  ctx.fillText('CHAMBER STRIKES ' + levelHits + '/' + cfg.hitsNeeded, W - 22, 28);
  ctx.fillStyle = 'rgba(214,251,255,0.20)';
  ctx.fillRect(W - 222, 38, 200, 7);
  ctx.fillStyle = '#d6fbff';
  ctx.fillRect(W - 222, 38, 200 * Math.min(1, mirrorFocus), 7);
  ctx.fillStyle = mirrorHeat > 0.78 ? '#ff9b5f' : 'rgba(212,175,55,0.85)';
  ctx.fillRect(W - 222, 49, 200 * Math.min(1, mirrorHeat), 6);
  ctx.fillStyle = 'rgba(214,251,255,0.24)';
  ctx.fillRect(W - 222, 60, 200, 6);
  ctx.fillStyle = mirrorDullT > 0 ? '#788b90' : '#d6fbff';
  ctx.fillRect(W - 222, 60, 200 * Math.min(1, player.shield), 6);
  if (player.petrify > 0.01) {
    ctx.fillStyle = 'rgba(170,178,176,0.32)';
    ctx.fillRect(W - 222, 70, 200, 8);
    ctx.fillStyle = '#c7d0cd';
    ctx.fillRect(W - 222, 70, 200 * Math.min(1, player.petrify), 8);
  }
  ctx.textAlign = 'left';
  ctx.fillStyle = medusa.phase === 'gaze' ? '#dcff9b' : '#8bc88d';
  ctx.fillText(medusa.phase.toUpperCase(), 20, 62);
  if (medusa.veil > 0) {
    ctx.fillStyle = '#d6fbff';
    ctx.fillText('SERPENT VEIL ' + medusa.veil, 20, 82);
  } else if (mirrorDullT > 0) {
    ctx.fillStyle = '#ff9b5f';
    ctx.fillText('MIRROR DULLED', 20, 82);
  } else if (medusa.phase === 'gaze') {
    ctx.fillStyle = '#d6fbff';
    ctx.fillText('ALIGN ' + Math.round(mirrorAlignment() * 100) + '%', 20, 82);
  } else if (reflectedSerpents > 0) {
    ctx.fillStyle = 'rgba(214,251,255,0.78)';
    ctx.fillText('SERPENTS TURNED ' + reflectedSerpents, 20, 82);
  }

  if (levelBannerT > 0) {
    const a = Math.min(1, levelBannerT / 0.5);
    const bannerY = compactHud ? Engine.H * 0.20 : Engine.H * 0.24;
    ctx.globalAlpha = a;
    ctx.textAlign = 'center';
    let titleSize = compactHud ? 24 : 34;
    ctx.font = `bold ${titleSize}px serif`;
    while (ctx.measureText(cfg.name).width > W * 0.86 && titleSize > 18) {
      titleSize -= 1;
      ctx.font = `bold ${titleSize}px serif`;
    }
    ctx.fillStyle = '#d6fbff';
    ctx.shadowColor = '#3db0c6';
    ctx.shadowBlur = 22;
    ctx.fillText(cfg.name, W / 2, bannerY);
    ctx.shadowBlur = 0;
    if (!compactHud) {
      ctx.font = 'bold 13px monospace';
      ctx.fillStyle = 'rgba(240,250,255,0.82)';
      ctx.fillText(cfg.prompt, W / 2, bannerY + 28);
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function hasName() { return !!localStorage.getItem(NAME_KEY); }
function modalOpen() { return document.getElementById('modalBg').classList.contains('open'); }
function showNameModal(after) {
  pendingStart = after || null;
  const mb = document.getElementById('modalBg');
  const inp = document.getElementById('nameInput');
  inp.value = localStorage.getItem(NAME_KEY) || '';
  mb.classList.add('open');
  setTimeout(() => inp.focus(), 50);
}
function hideNameModal() { document.getElementById('modalBg').classList.remove('open'); }
let pendingStart = null;
function saveNameFromModal() {
  const raw = document.getElementById('nameInput').value || '';
  const clean = raw.replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g, ' ').trim().slice(0, 20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  hideNameModal();
  if (pendingStart) { const fn = pendingStart; pendingStart = null; fn(); }
  return true;
}
document.getElementById('nameSave').addEventListener('click', saveNameFromModal);
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); saveNameFromModal(); }
  e.stopPropagation();
});

function beginRun() {
  Engine.audio.init();
  Engine.setState('playing');
}

function renderPerseusTitle(ctx2, eng) {
  const W = eng.W, H = eng.H;
  const art = window.GodGames && GodGames.MangaArt;
  if (!eng.manga || !art || typeof art.drawFrameCover !== 'function'
      || !art.drawFrameCover(ctx2, PERSEUS_CHAMBER_ATLAS, 'title', 0, 0, W, H, { focusX: 0.50, focusY: 0.54 })) {
    eng._defaultTitle();
    return;
  }

  if (art.overlay) art.overlay(ctx2, W, H, {
    top: 'rgba(0,0,0,0.16)',
    mid: 'rgba(0,20,24,0.10)',
    bottom: 'rgba(0,0,0,0.72)',
  });
  if (art.mangaAtmosphere) art.mangaAtmosphere(ctx2, W, H, { halftoneAlpha: 0.12, scanAlpha: 0.08, vignette: 0.52 });

  ctx2.save();
  if (typeof art.drawAnimation === 'function' && art.ready && art.ready(PERSEUS_MANGA_SHEET)) {
    const actorScale = Math.max(0.34, Math.min(0.54, Math.min(W, H) / 1320));
    ctx2.globalAlpha = 0.88;
    ctx2.shadowColor = '#d6fbff';
    ctx2.shadowBlur = 12;
    art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'perseusMirror', eng.time, W * 0.20, H * 0.88, {
      scale: actorScale,
      phase: eng.time * 0.11,
      amount: 0.32,
      bob: 3.5,
      sway: 0.018,
      squash: 0.018,
      smearAlpha: 0.025,
    });
    ctx2.shadowColor = '#dcff9b';
    ctx2.shadowBlur = 18;
    art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'medusaWatch', eng.time, W * 0.78, H * 0.88, {
      scale: actorScale * 1.10,
      flipX: true,
      alpha: 0.82,
      phase: eng.time * 0.16,
      amount: 0.42,
      bob: 4.0,
      sway: 0.030,
      squash: 0.020,
      smearAlpha: 0.035,
    });
    ctx2.shadowBlur = 0;
  }
  ctx2.textAlign = 'center';
  ctx2.lineJoin = 'round';
  ctx2.font = 'bold 72px serif';
  ctx2.strokeStyle = '#0a0a0a';
  ctx2.lineWidth = 8;
  ctx2.strokeText('PERSEUS', W / 2, H * 0.25);
  ctx2.fillStyle = PERSEUS_ACCENT;
  ctx2.shadowColor = PERSEUS_ACCENT;
  ctx2.shadowBlur = 24;
  ctx2.fillText('PERSEUS', W / 2, H * 0.25);
  ctx2.shadowBlur = 0;
  ctx2.font = 'italic 22px serif';
  ctx2.fillStyle = 'rgba(240,250,255,0.86)';
  ctx2.fillText('The Gorgon\'s Mirror', W / 2, H * 0.25 + 42);
  ctx2.font = 'bold 17px monospace';
  ctx2.fillStyle = '#d6fbff';
  ctx2.fillText('FACE THE GAZE  ·  RAISE THE MIRROR  ·  CUT THE SERPENTS', W / 2, H * 0.57);
  if (Math.sin(eng.time * 3.4) > 0) {
    ctx2.font = 'bold 20px monospace';
    ctx2.fillStyle = '#D4AF37';
    ctx2.shadowColor = '#D4AF37';
    ctx2.shadowBlur = 10;
    ctx2.fillText('PRESS SPACE / ENTER', W / 2, H * 0.69);
  }
  ctx2.shadowBlur = 0;
  ctx2.font = '12px monospace';
  ctx2.fillStyle = 'rgba(220,240,244,0.58)';
  ctx2.fillText('ESC — Return to World    ·    H — Mount Olympus', W / 2, H * 0.83);
  ctx2.restore();
}

function renderPerseusGameOver(ctx2, eng) {
  const W = eng.W, H = eng.H;
  const isVictory = eng.state === 'victory';
  const art = window.GodGames && GodGames.MangaArt;
  if (!eng.manga || !art || typeof art.drawFrameCover !== 'function'
      || !art.drawFrameCover(ctx2, PERSEUS_CHAMBER_ATLAS, isVictory ? 'victory' : 'death', 0, 0, W, H, { focusX: isVictory ? 0.54 : 0.50, focusY: 0.54 })) {
    eng._defaultGameOver();
    return;
  }

  if (art.overlay) art.overlay(ctx2, W, H, {
    top: 'rgba(0,0,0,0.22)',
    mid: isVictory ? 'rgba(22,18,0,0.14)' : 'rgba(0,14,18,0.28)',
    bottom: 'rgba(0,0,0,0.78)',
  });
  if (art.mangaAtmosphere) art.mangaAtmosphere(ctx2, W, H, { halftoneAlpha: 0.10, scanAlpha: 0.08, vignette: 0.58 });

  ctx2.save();
  if (typeof art.drawAnimation === 'function' && art.ready && art.ready(PERSEUS_MANGA_SHEET)) {
    const actorScale = Math.max(0.34, Math.min(0.54, Math.min(W, H) / 1320));
    if (isVictory) {
      const glow = ctx2.createRadialGradient(W * 0.52, H * 0.38, 20, W * 0.52, H * 0.38, W * 0.42);
      glow.addColorStop(0, 'rgba(214,251,255,0.30)');
      glow.addColorStop(1, 'rgba(214,251,255,0)');
      ctx2.fillStyle = glow;
      ctx2.fillRect(0, 0, W, H);
      art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'medusaHurt', eng.time, W * 0.72, H * 0.90, {
        scale: actorScale,
        flipX: true,
        alpha: 0.58,
        phase: eng.time * 0.14,
        amount: 0.26,
        bob: 2.6,
        sway: 0.018,
        squash: 0.018,
      });
      ctx2.shadowColor = '#D4AF37';
      ctx2.shadowBlur = 14;
      art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'perseusVictory', eng.time, W * 0.27, H * 0.88, {
        scale: actorScale,
        phase: eng.time * 0.10,
        amount: 0.24,
        bob: 2.8,
        sway: 0.016,
        squash: 0.014,
      });
      ctx2.shadowBlur = 0;
    } else {
      ctx2.globalCompositeOperation = 'screen';
      const gaze = ctx2.createLinearGradient(W * 0.72, H * 0.38, W * 0.28, H * 0.56);
      gaze.addColorStop(0, 'rgba(188,255,124,0.28)');
      gaze.addColorStop(1, 'rgba(188,255,124,0)');
      ctx2.fillStyle = gaze;
      ctx2.beginPath();
      ctx2.moveTo(W * 0.72, H * 0.36);
      ctx2.lineTo(W * 0.18, H * 0.42);
      ctx2.lineTo(W * 0.24, H * 0.72);
      ctx2.closePath();
      ctx2.fill();
      ctx2.globalCompositeOperation = 'source-over';
      ctx2.shadowColor = '#dcff9b';
      ctx2.shadowBlur = 20;
      art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'medusaGaze', eng.time, W * 0.75, H * 0.90, {
        scale: actorScale * 1.08,
        flipX: true,
        phase: eng.time * 0.20,
        amount: 0.56,
        bob: 4.6,
        sway: 0.040,
        squash: 0.032,
        smearAlpha: 0.085,
      });
      ctx2.shadowColor = '#c7d0cd';
      ctx2.shadowBlur = 10;
      art.drawAnimation(ctx2, PERSEUS_MANGA_SHEET, 'perseusStone', eng.time, W * 0.27, H * 0.90, {
        scale: actorScale,
        phase: eng.time * 0.05,
        amount: 0.04,
        bob: 1.0,
        sway: 0.004,
        squash: 0.004,
      });
      ctx2.shadowBlur = 0;
    }
  }
  ctx2.textAlign = 'center';
  const title = isVictory ? 'THE GAZE IS BROKEN' : 'PERSEUS IS STONE';
  const sub = isVictory ? 'Medusa falls. The cave still keeps one quiet mark.' : 'The cave keeps another statue.';
  const color = isVictory ? '#D4AF37' : PERSEUS_ACCENT;
  ctx2.font = 'bold 52px serif';
  ctx2.lineJoin = 'round';
  ctx2.strokeStyle = '#0a0a0a';
  ctx2.lineWidth = 7;
  ctx2.strokeText(title, W / 2, H * 0.32);
  ctx2.fillStyle = color;
  ctx2.shadowColor = color;
  ctx2.shadowBlur = 20;
  ctx2.fillText(title, W / 2, H * 0.32);
  ctx2.shadowBlur = 0;
  ctx2.font = 'italic 16px serif';
  ctx2.fillStyle = 'rgba(230,245,246,0.78)';
  ctx2.fillText(sub, W / 2, H * 0.40);
  ctx2.font = 'bold 18px monospace';
  ctx2.fillStyle = isVictory ? '#D4AF37' : '#d6fbff';
  if (Math.sin(eng.time * 3.2) > 0) ctx2.fillText(`PRESS SPACE / ENTER TO ${isVictory ? 'PLAY AGAIN' : 'TRY AGAIN'}`, W / 2, H * 0.70);
  ctx2.font = '12px monospace';
  ctx2.fillStyle = 'rgba(220,240,244,0.52)';
  ctx2.fillText('ESC — Return to World    ·    H — Mount Olympus', W / 2, H * 0.81);
  ctx2.restore();
}

Engine.boot({
  title: 'PERSEUS',
  subtitle: 'The Gorgon\'s Mirror',
  instructions: [
    'Left / Right: move through the chambers',
    'When Medusa\'s eye opens, face her and hold Z',
    'Release between gazes or the mirror overheats',
    'X cuts serpents; Z turns them back into the veil',
  ],
  deadTitle: 'PERSEUS IS STONE',
  deadSubtitle: 'The cave keeps another statue.',
  victoryTitle: 'THE GAZE IS BROKEN',
  victorySubtitle: 'Medusa falls. The cave still keeps one quiet mark.',
  hubHref: 'index.html',
  theme: {
    bg: (c, W, H) => { c.fillStyle = '#02070a'; c.fillRect(0, 0, W, H); },
    accent: PERSEUS_ACCENT,
    danger: '#2a4b48',
    shakeDecay: 'exp',
    restartKey: [' ', 'Enter'],
  },
  mobile: {
    movement: 'horizontal',
    actions: [
      { label: 'MIRROR', key: 'z', mode: 'hold' },
      { label: 'SWORD', key: 'x' },
    ],
  },
  onTitleRender: renderPerseusTitle,
  onGameOverRender: renderPerseusGameOver,
  onInit(e) {
    canvas = e.canvas;
    ctx = e.ctx;
    resetGame();
  },
  onUpdate(dt) {
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.update(dt);
    update(dt);
  },
  onRender() {
    drawWorld();
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, Engine.W, Engine.H);
  },
  onHud() {
    drawHud();
    drawPerseusDebugOverlay();
  },
  onTryStart() {
    if (modalOpen()) return false;
    if (!hasName()) { showNameModal(beginRun); return false; }
    return true;
  },
  onKeyDown(ev, e) {
    if (modalOpen()) return;
    if (e.state === 'title' && ev.key === 'Enter') {
      if (!hasName()) { showNameModal(beginRun); return; }
      beginRun();
      return;
    }
    if ((e.state === 'dead' || e.state === 'victory') && (ev.key === 'h' || ev.key === 'H')) {
      window.location.href = 'mount-olympus.html';
      return;
    }
    if (e.state === 'playing' && (ev.key === 'x' || ev.key === 'X')) slash();
  },
});
</script>
