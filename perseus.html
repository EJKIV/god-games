<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Perseus - God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#02070a; overflow:hidden; font-family:'Trebuchet MS', serif; color:#e8f6f8; }
canvas { display:block; }

.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.86);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #09202a 0%, #03070a 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow:0 0 50px rgba(61,176,198,0.32);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(220,240,244,0.72); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(3,9,12,0.78); border:1px solid rgba(212,175,55,0.5);
  color:#e8f6f8; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.35); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#102029;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE CHAMPION</h3>
    <p>Speak your name before entering the cave.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">RAISE THE SHIELD</button>
  </div>
</div>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>

<script>
const NAME_KEY = 'godgames_playerName';
const HP_MAX = 4;
const PERSEUS_ACCENT = '#3db0c6';
const PERSEUS_MANGA_SHEET = 'godgames.perseus.gorgonSheet';
const PERSEUS_CHAMBER_ATLAS = 'godgames.perseus.chambers';
const PERSEUS_FXHUD_SHEET = 'godgames.perseus.fxHudSheet';
const SIGMA_SEAL_SECONDS = 2.0;
const LEVELS = [
  {
    title: 'CHAMBER I',
    name: 'THE POLISHED SHIELD',
    prompt: 'When the eye opens, face Medusa and hold Z.',
    hitsNeeded: 1,
    veil: 0,
    snakeEvery: [1.8, 2.3],
    snakeSpeed: 215,
    mirrorGain: 1.08,
    heatUseful: 0.15,
    heatIdle: 0.38,
    gaze: { watch: 1.35, windup: 0.82, open: 1.75, rest: 1.05 },
    hazards: 0,
  },
  {
    title: 'CHAMBER II',
    name: 'THE SERPENT GALLERY',
    prompt: 'Turn two serpents back before the mirror can bite.',
    hitsNeeded: 2,
    veil: 2,
    snakeEvery: [1.05, 1.45],
    snakeSpeed: 250,
    mirrorGain: 0.88,
    heatUseful: 0.19,
    heatIdle: 0.43,
    gaze: { watch: 1.05, windup: 0.70, open: 1.45, rest: 0.95 },
    hazards: 0,
  },
  {
    title: 'CHAMBER III',
    name: 'THE UNBLINKING CAVE',
    prompt: 'The final gaze breaks only after three clean reflections.',
    hitsNeeded: 3,
    veil: 1,
    snakeEvery: [0.82, 1.12],
    snakeSpeed: 285,
    mirrorGain: 0.76,
    heatUseful: 0.23,
    heatIdle: 0.48,
    gaze: { watch: 0.92, windup: 0.62, open: 1.28, rest: 0.82 },
    hazards: 2,
  },
];

let player, medusa;
let snakes = [];
let sparks = [];
let floaters = [];
let hazards = [];
let playTime = 0;
let mirrorHits = 0;
let levelHits = 0;
let levelIndex = 0;
let levelBannerT = 0;
let levelTransitionT = 0;
let pendingLevel = null;
let mirrorFocus = 0;
let mirrorHeat = 0;
let mirrorDullT = 0;
let mirrorFlashT = 0;
let reflectedSerpents = 0;
let sealProgress = 0;
let sealSolved = false;
let sealFlashT = 0;
let submittedThisRun = false;
let hallStatus = null;
let hallRank = null;
let canvas, ctx;
let perseusMangaStageCache = null;

function groundY() { return Engine.H * 0.78; }
function caveLeft() { return Math.max(44, Engine.W * 0.06); }
function caveRight() { return Math.min(Engine.W - 44, Engine.W * 0.94); }
function levelCfg() { return LEVELS[levelIndex] || LEVELS[LEVELS.length - 1]; }
function sealX() { return Engine.W * 0.33; }
function clamp01(v) { return Math.max(0, Math.min(1, v)); }
function smoothToward(current, target, dt, rate) {
  return current + (target - current) * (1 - Math.exp(-rate * dt));
}
function easeInOutSine(v) { v = clamp01(v); return 0.5 - Math.cos(v * Math.PI) * 0.5; }
function easeOutBack(v) {
  v = clamp01(v);
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(v - 1, 3) + c1 * Math.pow(v - 1, 2);
}

function perseusMangaArt() {
  return window.GodGames && GodGames.MangaArt ? GodGames.MangaArt : null;
}

function perseusMangaHeavy() {
  const art = perseusMangaArt();
  return !!(art && typeof art.heavyEffects === 'function' && art.heavyEffects());
}

function perseusMangaAssetReady(id) {
  const art = perseusMangaArt();
  return !!(Engine.manga && art && typeof art.ready === 'function' && art.ready(id));
}

function perseusMangaStage(opts = {}) {
  const W = opts.W || Engine.W;
  const H = opts.H || Engine.H;
  const gy = H * 0.78;
  return {
    W,
    H,
    groundY: gy,
    caveLeft: Math.max(44, W * 0.06),
    caveRight: Math.min(W - 44, W * 0.94),
    vanishX: W * (0.50 + (opts.level || levelIndex) * 0.015),
    horizonY: H * 0.47,
    wallY: H * 0.55,
    nearY: H,
  };
}

function mangaDepth(y, opts = {}) {
  const s = perseusMangaStage(opts);
  return clamp01((y - s.wallY) / Math.max(1, s.groundY - s.wallY));
}

function mangaProjectX(x, y, opts = {}) {
  const s = perseusMangaStage(opts);
  const d = Math.pow(mangaDepth(y, opts), opts.curve ?? 0.82);
  const backPull = opts.backPull ?? 0.58;
  const pull = backPull + (1 - backPull) * d;
  return s.vanishX + (x - s.vanishX) * pull;
}

function mangaScaleForY(y, farScale, nearScale, opts = {}) {
  const d = Math.pow(mangaDepth(y, opts), opts.curve ?? 0.72);
  return farScale + (nearScale - farScale) * d;
}

function mangaActorX(actor, opts = {}) {
  const x = typeof actor.visualX === 'number' ? actor.visualX : actor.x;
  const y = typeof actor.visualY === 'number' ? actor.visualY : (actor.y || groundY());
  return mangaProjectX(x, y, opts);
}

function mangaPlayerShieldPoint(opts = {}) {
  if (!player) return { x: 0, y: 0 };
  const shield = typeof player.visualShield === 'number' ? player.visualShield : player.shield;
  const y = typeof player.visualY === 'number' ? player.visualY : player.y;
  const x = mangaActorX(player, opts) + player.facing * (25 + shield * 18);
  return { x, y: y - 58 - shield * 6 };
}

function mangaPlayerHeadPoint(opts = {}) {
  return player
    ? { x: mangaActorX(player, opts) + player.facing * 4, y: (typeof player.visualY === 'number' ? player.visualY : player.y) - 88 }
    : { x: 0, y: 0 };
}

function mangaMedusaEyePoint(opts = {}) {
  if (!medusa) return { x: 0, y: 0 };
  return { x: mangaActorX(medusa, opts) - 34, y: (medusa.visualY ?? medusa.y) - 100 };
}

function mangaMedusaHairPoint(opts = {}) {
  if (!medusa) return { x: 0, y: 0 };
  return { x: mangaActorX(medusa, opts) - 28, y: (medusa.visualY ?? medusa.y) - 78 };
}

function drawMangaFrameTransformed(art, id, frame, x, y, opts = {}) {
  if (!art || typeof art.drawFrame !== 'function') return false;
  const drawOpts = Object.assign({}, opts);
  delete drawOpts.rotate;
  delete drawOpts.scaleX;
  delete drawOpts.scaleY;
  ctx.save();
  ctx.translate(x, y);
  if (opts.rotate) ctx.rotate(opts.rotate);
  ctx.scale(opts.scaleX ?? 1, opts.scaleY ?? 1);
  const drew = art.drawFrame(ctx, id, frame, 0, 0, drawOpts);
  ctx.restore();
  return drew;
}

function drawMangaAnimationTransformed(art, id, anim, t, x, y, opts = {}) {
  if (!art || typeof art.drawAnimation !== 'function') return false;
  const drawAnim = art.drawActedAnimation || art.drawAnimation;
  const drawOpts = Object.assign({}, opts);
  delete drawOpts.rotate;
  delete drawOpts.scaleX;
  delete drawOpts.scaleY;
  ctx.save();
  ctx.translate(x, y);
  if (opts.rotate) ctx.rotate(opts.rotate);
  ctx.scale(opts.scaleX ?? 1, opts.scaleY ?? 1);
  const drew = drawAnim(ctx, id, anim, t, 0, 0, drawOpts);
  ctx.restore();
  return drew;
}

function beep(freq, dur, type, vol, slide) {
  const ac = Engine.audio._ctx;
  if (!ac) return;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(20, freq + slide), ac.currentTime + dur);
  g.gain.setValueAtTime(vol == null ? 0.12 : vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sfx = {
  mirror() { beep(520, 0.12, 'triangle', 0.16, 420); beep(980, 0.18, 'sine', 0.10, -180); },
  reflect(){ beep(680, 0.08, 'triangle', 0.10, 260); },
  dull()   { beep(150, 0.22, 'sawtooth', 0.09, -70); },
  hit()    { beep(95, 0.24, 'sawtooth', 0.20, -20); },
  slash()  { beep(360, 0.07, 'square', 0.09, 300); },
  gaze()   { beep(190, 0.16, 'sawtooth', 0.07, -40); },
  win()    { beep(392, 0.18, 'triangle', 0.12, 210); beep(784, 0.24, 'sine', 0.10, 120); },
};

function resetGame() {
  player = {
    x: Engine.W * 0.24,
    y: groundY(),
    visualX: Engine.W * 0.24,
    visualY: groundY(),
    vx: 0,
    visualVx: 0,
    visualLean: 0,
    visualShield: 0,
    visualPetrify: 0,
    hp: HP_MAX,
    facing: 1,
    slashFacing: 1,
    hurtFacing: 1,
    walkPhase: 0,
    shield: 0,
    slashT: 0,
    iframes: 0,
    hitFlash: 0,
    petrify: 0,
  };
  medusa = null;
  snakes = [];
  sparks = [];
  floaters = [];
  hazards = [];
  playTime = 0;
  mirrorHits = 0;
  levelHits = 0;
  levelIndex = 0;
  levelTransitionT = 0;
  pendingLevel = null;
  mirrorFocus = 0;
  mirrorHeat = 0;
  mirrorDullT = 0;
  mirrorFlashT = 0;
  reflectedSerpents = 0;
  sealProgress = 0;
  sealSolved = false;
  sealFlashT = 0;
  submittedThisRun = false;
  hallStatus = null;
  hallRank = null;
  setupLevel(0);
}

function setupLevel(idx) {
  levelIndex = Math.max(0, Math.min(LEVELS.length - 1, idx));
  const cfg = levelCfg();
  const gy = groundY();
  player.x = Engine.W * (0.19 + levelIndex * 0.025);
  player.y = gy;
  player.vx = 0;
  player.visualX = player.x;
  player.visualY = player.y;
  player.visualVx = 0;
  player.visualLean = 0;
  player.visualShield = 0;
  player.visualPetrify = 0;
  player.facing = 1;
  player.slashFacing = 1;
  player.hurtFacing = 1;
  player.shield = 0;
  player.slashT = 0;
  player.petrify = 0;
  medusa = {
    x: Engine.W * (0.78 + levelIndex * 0.015),
    y: gy,
    visualX: Engine.W * (0.78 + levelIndex * 0.015),
    visualY: gy,
    visualLean: 0,
    gazeEase: 0,
    visualGaze: 0,
    visualHurt: 0,
    hp: cfg.hitsNeeded,
    veil: cfg.veil,
    phase: 'watch',
    phaseT: cfg.gaze.watch,
    strikeReady: true,
    snakeT: 0.8,
    hurtFlash: 0,
  };
  snakes.length = 0;
  floaters.length = 0;
  hazards = makeHazards(cfg.hazards);
  levelHits = 0;
  mirrorFocus = 0;
  mirrorHeat = 0;
  mirrorDullT = 0;
  mirrorFlashT = 0;
  levelBannerT = 2.4;
}

function makeHazards(count) {
  const out = [];
  for (let i = 0; i < count; i++) {
    const x = Engine.W * (0.43 + i * 0.14);
    const baseY = groundY() - 22;
    out.push({
      x,
      baseY,
      drawX: x,
      drawY: baseY,
      visualX: x,
      visualY: baseY,
      visualEmerge: 0,
      phase: i * Math.PI,
      r: 22,
    });
  }
  return out;
}

function finalScore() {
  const timeBonus = Math.max(0, 90000 - Math.floor(playTime * 1000));
  return Math.max(0, Math.floor(
    mirrorHits * 2500
    + levelIndex * 3500
    + reflectedSerpents * 650
    + (sealSolved ? 5000 : 0)
    + player.hp * 900
    + timeBonus
  ));
}

async function submitToHall(score) {
  if (submittedThisRun) return;
  submittedThisRun = true;
  const name = localStorage.getItem(NAME_KEY) || 'NAMELESS MORTAL';
  const game = Engine.manga ? 'perseus-manga' : 'perseus';
  hallStatus = 'pending';
  try {
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, name, score }),
    });
    if (!res.ok) { hallStatus = 'fail'; return; }
    const json = await res.json();
    hallRank = json.rank;
    hallStatus = 'ok';
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('first_score');
      if (hallRank && hallRank <= 10) GodGames.Mysteries.tally('olympus_top10_count');
    }
  } catch (_e) {
    hallStatus = 'fail';
  }
}

window.GodGames = window.GodGames || {};
window.GodGames.submitNow = () => submitToHall(finalScore());

function burst(x, y, color, count, power) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = (50 + Math.random() * 170) * (power || 1);
    sparks.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 35,
      r: 1.4 + Math.random() * 3.8,
      t: 0.75 + Math.random() * 0.35,
      color,
    });
  }
}
function floater(x, y, text, color) {
  floaters.push({ x, y, text, color, t: 1.1, vy: -42 });
}

function setGazePhase(next) {
  const cfg = levelCfg();
  medusa.phase = next;
  if (next === 'watch') { medusa.phaseT = cfg.gaze.watch + Math.random() * 0.22; medusa.strikeReady = true; }
  if (next === 'windup') { medusa.phaseT = cfg.gaze.windup; medusa.strikeReady = true; sfx.gaze(); }
  if (next === 'gaze') { medusa.phaseT = cfg.gaze.open; medusa.strikeReady = true; mirrorFocus = Math.max(0, mirrorFocus - 0.08); }
  if (next === 'rest') { medusa.phaseT = cfg.gaze.rest; medusa.strikeReady = false; }
}

function mirrorAlignment() {
  if (!player || !medusa) return 0;
  const distance = Math.abs(medusa.x - player.x);
  const ideal = Math.max(360, Math.min(560, Engine.W * 0.34));
  const tolerance = Math.max(260, Engine.W * 0.25);
  return Math.max(0, 1 - Math.abs(distance - ideal) / tolerance);
}

function dullMirror() {
  if (mirrorDullT > 0) return;
  mirrorDullT = 1.2;
  mirrorHeat = 0.82;
  mirrorFocus = Math.max(0, mirrorFocus - 0.35);
  floater(player.x, player.y - 96, 'MIRROR DULLED', '#9fb2b8');
  burst(player.x + player.facing * 24, player.y - 48, '#9fb2b8', 10, 0.65);
  sfx.dull();
}

function spawnSnake() {
  const cfg = levelCfg();
  const y = groundY() - 18 - Math.random() * 34;
  snakes.push({
    x: medusa.x - 30,
    y,
    visualX: medusa.x - 30,
    visualY: y,
    prevVisualX: medusa.x - 30,
    prevVisualY: y,
    vx: -cfg.snakeSpeed - Math.random() * 70 - levelIndex * 18,
    wobble: Math.random() * Math.PI * 2,
    age: 0,
    reflectT: 0,
    returning: false,
    alive: true,
  });
}

function slash() {
  if (!player || player.slashT > 0) return;
  const f = player.facing;
  player.slashFacing = f;
  player.slashT = 0.22;
  sfx.slash();
  const reachX = player.x + f * 42;
  for (const s of snakes) {
    if (!s.alive) continue;
    if (Math.abs(s.x - reachX) < 48 && Math.abs(s.y - (player.y - 28)) < 54) {
      s.alive = false;
      burst(s.x, s.y, '#b8f28f', 9, 0.8);
      floater(s.x, s.y - 22, 'CUT', '#b8f28f');
    }
  }
}

function recordMirrorStrike(source = 'gaze') {
  if (!player || !medusa || levelTransitionT > 0 || Engine.state !== 'playing') return;
  if (medusa.veil > 0) {
    mirrorFocus = 0;
    mirrorFlashT = 0.18;
    floater(medusa.x - 20, medusa.y - 120, 'THE VEIL HOLDS', '#9fb2b8');
    burst(medusa.x - 34, medusa.y - 82, '#9fb2b8', 12, 0.8);
    Engine.shake(4);
    return;
  }
  mirrorHits++;
  levelHits++;
  medusa.hp = Math.max(0, levelCfg().hitsNeeded - levelHits);
  medusa.hurtFlash = 0.35;
  medusa.strikeReady = false;
  mirrorFocus = 0;
  mirrorHeat = Math.max(0, mirrorHeat - 0.18);
  mirrorFlashT = 0.38;
  player.petrify = Math.max(0, player.petrify - 0.35);
  burst(medusa.x - 38, medusa.y - 84, '#d6fbff', 24, 1.15);
  floater(medusa.x - 20, medusa.y - 112, source === 'serpent' ? 'SERPENT OMEN' : 'MIRROR STRIKE', '#d6fbff');
  Engine.shake(8);
  sfx.mirror();

  if (levelHits >= levelCfg().hitsNeeded) {
    completeLevel();
  }
}

function crackVeil(x, y) {
  if (!medusa || medusa.veil <= 0) return;
  medusa.veil--;
  medusa.hurtFlash = 0.22;
  burst(x, y, '#d6fbff', 20, 1.0);
  floater(medusa.x - 22, medusa.y - 116, medusa.veil > 0 ? 'VEIL CRACKED' : 'VEIL BROKEN', '#d6fbff');
  Engine.shake(5);
}

function completeLevel() {
  sfx.win();
  if (levelIndex >= LEVELS.length - 1) {
    submitToHall(finalScore());
    Engine.setState('victory');
    return;
  }
  levelTransitionT = 1.9;
  pendingLevel = levelIndex + 1;
  mirrorFocus = 0;
  mirrorHeat = 0;
  snakes.length = 0;
  floater(Engine.W / 2, Engine.H * 0.24, 'CHAMBER CLEARED', '#ffd54a');
}

function triggerSerpentSeal() {
  if (sealSolved) return false;
  sealSolved = true;
  sealFlashT = 1.0;
  burst(sealX(), groundY() - 10, '#ff88cc', 34, 1.2);
  floater(sealX(), groundY() - 70, 'THE HIDDEN SIGMA ANSWERS', '#ff88cc');
  Engine.shake(8);
  if (window.GodGames && GodGames.Mysteries) {
    GodGames.Mysteries.unlockAndDepart({
      hintId: 's',
      placeId: 'tartarus',
      fromGame: 'perseus',
    });
  }
  return true;
}

if (new URLSearchParams(location.search).get('testHooks') === '1') {
  window.GodGames = window.GodGames || {};
  window.GodGames.PerseusTest = {
    recordMirrorStrike,
    crackVeil,
    triggerSerpentSeal,
    canReflectInNormalMode() {
      return !!(window.Engine && Engine.state === 'playing' && !Engine.manga
        && medusa && levelIndex === 0 && levelHits === 0);
    },
    completeRun() {
      while (Engine.state === 'playing') {
        medusa.veil = 0;
        recordMirrorStrike('test');
        if (levelTransitionT > 0 && pendingLevel != null) {
          setupLevel(pendingLevel);
          levelTransitionT = 0;
          pendingLevel = null;
        }
      }
      return Engine.state;
    },
    solveHiddenSeal() {
      return triggerSerpentSeal();
    },
    enterFinalChamber() {
      setupLevel(LEVELS.length - 1);
      return this.state();
    },
    state() {
      return {
        levelIndex,
        levelHits,
        mirrorHits,
        veil: medusa && medusa.veil,
        sealSolved,
        engineState: Engine.state,
      };
    },
  };
}

function damagePlayer(amount) {
  if (!player || player.iframes > 0 || Engine.state !== 'playing') return;
  player.hurtFacing = medusa && player.x < medusa.x ? 1 : player.facing;
  player.facing = player.hurtFacing;
  player.hp = Math.max(0, player.hp - amount);
  player.iframes = 1.0;
  player.hitFlash = 0.35;
  player.petrify = Math.max(0, player.petrify - 0.25);
  Engine.shake(7);
  burst(player.x, player.y - 44, '#88d7dd', 12, 0.8);
  sfx.hit();
  if (player.hp <= 0) {
    submitToHall(finalScore());
    Engine.setState('dead');
  }
}

function updatePerseusActorVisual(actor, dt, opts = {}) {
  if (!actor) return;
  if (typeof actor.visualX !== 'number') actor.visualX = actor.x;
  if (typeof actor.visualY !== 'number') actor.visualY = actor.y || actor.baseY || groundY();
  const targetY = opts.y ?? actor.y ?? actor.baseY ?? groundY();
  actor.visualX = smoothToward(actor.visualX, actor.x, dt, opts.xEase || 11);
  actor.visualY = smoothToward(actor.visualY, targetY, dt, opts.yEase || 11);
  if (typeof opts.maxDrift === 'number' && window.GodGames && GodGames.Debug && typeof GodGames.Debug.clampVisualDrift === 'function') {
    const originalY = actor.y;
    if (!Number.isFinite(originalY) && Number.isFinite(targetY)) actor.y = targetY;
    GodGames.Debug.clampVisualDrift(actor, opts.hitRadius || opts.maxDrift / 0.32, {
      maxDrift: opts.maxDrift,
      label: opts.label,
    });
    if (!Number.isFinite(originalY)) delete actor.y;
  }
}

function updateMedusaVisual(dt) {
  if (!medusa) return;
  const gazeTarget = medusa.phase === 'gaze' ? 1 : (medusa.phase === 'windup' ? 0.58 : 0);
  const hurtTarget = medusa.hurtFlash > 0 || sealFlashT > 0 ? 1 : 0;
  medusa.gazeEase = smoothToward(medusa.gazeEase || 0, gazeTarget, dt, 9);
  medusa.visualGaze = smoothToward(medusa.visualGaze || 0, gazeTarget, dt, 11);
  medusa.visualHurt = smoothToward(medusa.visualHurt || 0, hurtTarget, dt, 16);
  const bob = Math.sin(Engine.time * (medusa.phase === 'gaze' ? 2.8 : 1.4)) * (0.8 + medusa.gazeEase * 1.1);
  updatePerseusActorVisual(medusa, dt, { xEase: 7, yEase: 7, y: medusa.y + bob });
  const hurt = Math.max(medusa.visualHurt || 0, Math.min(1, Math.max(medusa.hurtFlash, sealFlashT) * 3));
  const targetLean = -0.018 - medusa.gazeEase * 0.052 + hurt * 0.072;
  medusa.visualLean = smoothToward(medusa.visualLean || 0, targetLean, dt, 10);
}

function update(dt) {
  if (!player || !medusa) return;
  playTime += dt;
  if (levelBannerT > 0) levelBannerT = Math.max(0, levelBannerT - dt);
  if (sealFlashT > 0) sealFlashT = Math.max(0, sealFlashT - dt);

  if (levelTransitionT > 0) {
    levelTransitionT -= dt;
    updateParticles(dt);
    if (levelTransitionT <= 0 && pendingLevel != null) {
      const next = pendingLevel;
      pendingLevel = null;
      setupLevel(next);
    }
    return;
  }

  const cfg = levelCfg();
  const left = Engine.keys.ArrowLeft || Engine.keys.a || Engine.keys.A;
  const right = Engine.keys.ArrowRight || Engine.keys.d || Engine.keys.D;
  const shieldHeld = Engine.keys.z || Engine.keys.Z;
  const shieldUsable = shieldHeld && mirrorDullT <= 0;

  player.vx = 0;
  if (left) player.vx -= 310;
  if (right) player.vx += 310;
  player.x += player.vx * dt;
  player.x = Math.max(caveLeft(), Math.min(caveRight(), player.x));
  if (player.vx) {
    player.facing = player.vx > 0 ? 1 : -1;
    player.walkPhase += dt * 9.5;
  }
  player.visualVx = smoothToward(player.visualVx, player.vx, dt, 13);
  player.visualLean = smoothToward(player.visualLean, (player.visualVx / 310) * 0.045, dt, 11);
  player.shield = smoothToward(player.shield, shieldUsable ? 1 : 0, dt, 12);
  if (typeof player.visualX !== 'number') player.visualX = player.x;
  if (typeof player.visualY !== 'number') player.visualY = player.y;
  if (typeof player.visualShield !== 'number') player.visualShield = player.shield;
  if (typeof player.visualPetrify !== 'number') player.visualPetrify = player.petrify;
  player.visualX = smoothToward(player.visualX, player.x, dt, Math.abs(player.vx) > 12 ? 21 : 13);
  player.visualY = smoothToward(player.visualY, player.y, dt, 15);
  player.visualShield = smoothToward(player.visualShield, player.shield, dt, 16);
  player.visualPetrify = smoothToward(player.visualPetrify, player.petrify, dt, 10);
  player.slashT = Math.max(0, player.slashT - dt);
  player.iframes = Math.max(0, player.iframes - dt);
  player.hitFlash = Math.max(0, player.hitFlash - dt);
  medusa.hurtFlash = Math.max(0, medusa.hurtFlash - dt);
  mirrorDullT = Math.max(0, mirrorDullT - dt);
  mirrorFlashT = Math.max(0, mirrorFlashT - dt);
  updateMedusaVisual(dt);

  if (shieldHeld && mirrorDullT <= 0) {
    const usefulGaze = medusa.phase === 'gaze' && player.facing > 0 && player.x < medusa.x;
    mirrorHeat = Math.min(1.12, mirrorHeat + dt * (usefulGaze ? cfg.heatUseful : cfg.heatIdle));
    if (mirrorHeat >= 1) dullMirror();
  } else {
    mirrorHeat = Math.max(0, mirrorHeat - dt * (mirrorDullT > 0 ? 0.42 : 0.78));
  }

  medusa.phaseT -= dt;
  if (medusa.phaseT <= 0) {
    if (medusa.phase === 'watch') setGazePhase('windup');
    else if (medusa.phase === 'windup') setGazePhase('gaze');
    else if (medusa.phase === 'gaze') setGazePhase('rest');
    else setGazePhase('watch');
  }

  medusa.snakeT -= dt;
  const canSpit = medusa.phase !== 'gaze';
  if (canSpit && medusa.snakeT <= 0) {
    medusa.snakeT = cfg.snakeEvery[0] + Math.random() * Math.max(0.05, cfg.snakeEvery[1] - cfg.snakeEvery[0]);
    spawnSnake();
  }

  const playerFacingMedusa = player.facing > 0 && player.x < medusa.x;
  if (medusa.phase === 'gaze' && playerFacingMedusa) {
    if (shieldUsable && player.shield > 0.45) {
      const align = mirrorAlignment();
      player.petrify = Math.max(0, player.petrify - dt * 0.45);
      if (medusa.strikeReady && player.shield > 0.72) {
        mirrorFocus = Math.min(1.02, mirrorFocus + dt * (0.34 + align * cfg.mirrorGain));
        if (mirrorFocus >= 1 && medusa.phaseT < 1.04) {
          recordMirrorStrike('gaze');
        }
      }
    } else {
      mirrorFocus = Math.max(0, mirrorFocus - dt * 0.55);
      player.petrify = Math.min(1.12, player.petrify + dt * 0.68);
      if (player.petrify >= 1) damagePlayer(1);
    }
  } else {
    mirrorFocus = Math.max(0, mirrorFocus - dt * 0.48);
    player.petrify = Math.max(0, player.petrify - dt * 0.34);
  }

  for (const s of snakes) {
    if (!s.alive) continue;
    s.age = (s.age || 0) + dt;
    s.x += s.vx * dt;
    s.wobble += dt * 11;
    s.reflectT = Math.max(0, (s.reflectT || 0) - dt);
    s.prevVisualX = typeof s.visualX === 'number' ? s.visualX : s.x;
    s.prevVisualY = typeof s.visualY === 'number' ? s.visualY : s.y;
    updatePerseusActorVisual(s, dt, {
      xEase: s.returning ? 24 : 16,
      yEase: 13,
      hitRadius: 28,
      maxDrift: 9,
      label: 'serpent',
    });
    if (s.returning) {
      const hx = medusa.x - 16;
      const hy = medusa.y - 58;
      if (Math.abs(s.x - hx) < 44 && Math.abs(s.y - hy) < 82) {
        s.alive = false;
        reflectedSerpents++;
        crackVeil(s.x, s.y);
        medusa.hurtFlash = Math.max(medusa.hurtFlash, 0.24);
        medusa.phaseT = Math.min(medusa.phaseT, 0.58);
        mirrorFocus = Math.min(0.96, mirrorFocus + 0.34);
        burst(s.x, s.y, '#d6fbff', 14, 0.9);
        floater(s.x, s.y - 22, 'OMEN', '#d6fbff');
        Engine.shake(4);
        if (medusa.phase === 'gaze' && medusa.strikeReady && mirrorFocus >= 0.92) {
          recordMirrorStrike('serpent');
        }
      }
      if (s.x > Engine.W + 90) s.alive = false;
      continue;
    }
    const dx = s.x - player.x;
    const dy = s.y - (player.y - 30);
    const shieldBlock = shieldUsable && player.facing > 0 && player.shield > 0.55
      && s.x > player.x - 18 && s.x < player.x + 58
      && Math.abs(dy) < 62;
    if (shieldBlock) {
      s.returning = true;
      s.reflectT = 0.34;
      s.vx = 330 + mirrorHits * 44 + Math.random() * 42;
      mirrorFocus = Math.min(0.92, mirrorFocus + 0.12);
      burst(s.x, s.y, '#d6fbff', 9, 0.8);
      floater(s.x, s.y - 18, 'REFLECT', '#d6fbff');
      sfx.reflect();
      continue;
    }
    if (Math.hypot(dx, dy) < 28) {
      s.alive = false;
      damagePlayer(1);
    }
    if (s.x < -80) s.alive = false;
  }
  snakes = snakes.filter(s => s.alive);

  updateHazards(dt);
  updateSerpentSeal(dt, shieldHeld);
  updateParticles(dt);
}

function updateHazards(dt) {
  for (const h of hazards) {
    h.phase += dt * (1.6 + levelIndex * 0.25);
    const hx = h.x + Math.sin(h.phase * 0.7) * 34;
    const hy = h.baseY - Math.abs(Math.sin(h.phase)) * 74;
    h.drawX = hx;
    h.drawY = hy;
    if (typeof h.visualX !== 'number') h.visualX = hx;
    if (typeof h.visualY !== 'number') h.visualY = hy;
    const lift = clamp01((h.baseY - hy) / 74);
    h.visualX = smoothToward(h.visualX, hx, dt, 18);
    h.visualY = smoothToward(h.visualY, hy, dt, 18);
    if (window.GodGames && GodGames.Debug && typeof GodGames.Debug.clampVisualDrift === 'function') {
      const debugActor = { x: hx, y: hy, visualX: h.visualX, visualY: h.visualY };
      GodGames.Debug.clampVisualDrift(debugActor, h.r + 18, {
        maxDrift: (h.r + 18) * 0.32,
        label: 'hazard',
      });
      h.visualX = debugActor.visualX;
      h.visualY = debugActor.visualY;
    }
    h.visualEmerge = smoothToward(h.visualEmerge || 0, lift, dt, 14);
    if (Math.hypot(player.x - hx, (player.y - 34) - hy) < h.r + 18) {
      damagePlayer(1);
      h.phase += Math.PI * 0.7;
    }
  }
}

function updateSerpentSeal(dt, shieldHeld) {
  if (sealSolved || levelIndex < LEVELS.length - 1 || Engine.state !== 'playing') {
    return;
  }
  const onSeal = Math.abs(player.x - sealX()) < 42;
  const facingAway = player.facing < 0;
  if (onSeal && shieldHeld && facingAway) {
    sealProgress = Math.min(1.05, sealProgress + dt / SIGMA_SEAL_SECONDS);
    if (sealProgress >= 1) triggerSerpentSeal();
  }
}

function updateParticles(dt) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const p = sparks[i];
    p.t -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 240 * dt;
    if (p.t <= 0) sparks.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.t -= dt;
    f.y += f.vy * dt;
    if (f.t <= 0) floaters.splice(i, 1);
  }
}

function drawMangaContactShadow(x, y, opts = {}) {
  const s = perseusMangaStage();
  const d = mangaDepth(y);
  const heavy = perseusMangaHeavy();
  const w = opts.w ?? (24 + d * 58);
  const h = opts.h ?? (5 + d * 12);
  const alpha = opts.alpha ?? (0.18 + d * 0.30);
  const rot = ((x - s.vanishX) / Math.max(1, s.W)) * 0.18;

  ctx.save();
  ctx.globalAlpha *= alpha;
  ctx.fillStyle = opts.color || 'rgba(0,0,0,0.82)';
  ctx.beginPath();
  ctx.ellipse(x, y + (opts.offsetY ?? 8), w, h, rot, 0, Math.PI * 2);
  ctx.fill();
  if (heavy || opts.rim === true) {
    ctx.globalAlpha *= 0.34;
    ctx.strokeStyle = opts.rim || 'rgba(214,251,255,0.42)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(x, y + (opts.offsetY ?? 8), w * 0.70, h * 0.52, rot, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMangaStageFloorUnderlay(t, opts = {}, targetCtx = ctx) {
  const level = opts.level ?? levelIndex;
  const s = perseusMangaStage({ level });
  const c = targetCtx;
  c.save();

  const wall = c.createLinearGradient(0, s.horizonY, 0, s.groundY + 26);
  wall.addColorStop(0, level === 2 ? 'rgba(4,0,8,0.16)' : 'rgba(0,16,22,0.10)');
  wall.addColorStop(0.60, 'rgba(0,0,0,0.02)');
  wall.addColorStop(1, 'rgba(0,0,0,0.30)');
  c.fillStyle = wall;
  c.fillRect(0, s.horizonY, s.W, s.groundY - s.horizonY + 28);

  const light = c.createRadialGradient(
    s.vanishX,
    s.wallY + 20,
    s.W * 0.04,
    s.vanishX,
    s.groundY + 18,
    s.W * (level === 2 ? 0.50 : 0.42),
  );
  light.addColorStop(0, level === 2 ? 'rgba(255,136,204,0.11)' : 'rgba(214,251,255,0.14)');
  light.addColorStop(0.48, 'rgba(61,176,198,0.07)');
  light.addColorStop(1, 'rgba(61,176,198,0.00)');
  c.fillStyle = light;
  c.fillRect(0, s.horizonY, s.W, s.H - s.horizonY);

  c.strokeStyle = 'rgba(214,251,255,0.15)';
  c.lineWidth = 1.1;
  for (let i = 0; i <= 8; i++) {
    const tLine = i / 8;
    const x = s.caveLeft + (s.caveRight - s.caveLeft) * tLine;
    const hx = s.vanishX + (x - s.vanishX) * 0.12;
    c.beginPath();
    c.moveTo(hx, s.wallY + 4);
    c.lineTo(x, s.H);
    c.stroke();
  }

  c.strokeStyle = level === 2 ? 'rgba(255,136,204,0.15)' : 'rgba(212,175,55,0.12)';
  c.lineWidth = 1.4;
  for (let i = 0; i < 5; i++) {
    const y = s.wallY + 26 + i * ((s.groundY - s.wallY) / 4);
    const inset = (1 - mangaDepth(y, { level })) * s.W * 0.22;
    c.beginPath();
    c.moveTo(inset, y);
    c.lineTo(s.W - inset, y);
    c.stroke();
  }

  if (level === 0) {
    c.strokeStyle = 'rgba(214,251,255,0.18)';
    c.lineWidth = 2.2;
    c.beginPath();
    c.ellipse(s.vanishX, s.groundY + 20, s.W * 0.23, 22, 0, Math.PI, 0);
    c.stroke();
  } else if (level === 1) {
    c.strokeStyle = 'rgba(120,255,180,0.13)';
    c.lineWidth = 2.0;
    for (let i = 0; i < 4; i++) {
      const x = s.W * (0.24 + i * 0.17);
      c.beginPath();
      c.arc(x, s.wallY + 30, 42 + i * 5, Math.PI * 0.15, Math.PI * 0.92);
      c.stroke();
    }
  } else {
    c.strokeStyle = 'rgba(212,175,55,0.17)';
    c.lineWidth = 2;
    for (let i = -1; i <= 1; i++) {
      const x = s.vanishX + i * s.W * 0.11;
      c.beginPath();
      c.moveTo(x, s.wallY + 20);
      c.lineTo(x + i * 32, s.H);
      c.stroke();
    }
  }

  c.restore();
}

function drawMangaCaveStage(t, opts = {}) {
  const art = perseusMangaArt();
  const W = opts.W || Engine.W;
  const H = opts.H || Engine.H;
  const level = opts.level ?? levelIndex;
  const frame = opts.frame || `chamber${level + 1}`;
  if (!Engine.manga || !art || typeof art.drawFrameCover !== 'function') return false;
  const focusX = opts.focusX ?? (level === 2 ? 0.54 : 0.50);
  const focusY = opts.focusY ?? 0.54;
  const alpha = opts.alpha ?? 1;
  const perf = typeof art.basePerformanceTier === 'function' ? art.basePerformanceTier() : 'balanced';
  const key = [W, H, level, frame, focusX, focusY, alpha, opts.title ? 1 : 0, perf].join('|');
  if (!perseusMangaStageCache || perseusMangaStageCache.key !== key) {
    const layer = document.createElement('canvas');
    layer.width = W;
    layer.height = H;
    const layerCtx = layer.getContext('2d');
    if (!layerCtx) return false;
    if (!art.drawFrameCover(layerCtx, PERSEUS_CHAMBER_ATLAS, frame, 0, 0, W, H, {
      focusX,
      focusY,
      alpha,
    })) return false;

    layerCtx.save();
    const tint = layerCtx.createLinearGradient(0, 0, 0, H);
    tint.addColorStop(0, level === 2 ? 'rgba(8,0,14,0.24)' : 'rgba(0,18,24,0.08)');
    tint.addColorStop(0.52, 'rgba(0,0,0,0.00)');
    tint.addColorStop(1, 'rgba(0,0,0,0.38)');
    layerCtx.fillStyle = tint;
    layerCtx.fillRect(0, 0, W, H);
    drawMangaStageFloorUnderlay(t, { level }, layerCtx);
    if (art.mangaAtmosphere) {
      art.mangaAtmosphere(layerCtx, W, H, {
        density: 9,
        dotSize: 1.16,
        halftoneAlpha: opts.title ? 0.10 : 0.13,
        scanAlpha: opts.title ? 0.05 : 0.08,
        vignette: opts.title ? 0.45 : 0.55,
      });
    }
    layerCtx.restore();
    perseusMangaStageCache = { key, canvas: layer };
  }
  ctx.drawImage(perseusMangaStageCache.canvas, 0, 0, W, H);
  return true;
}

function drawMangaFloorSeal(t, opts = {}) {
  if (levelIndex < LEVELS.length - 1 && sealProgress <= 0 && sealFlashT <= 0 && !opts.force) return;
  const art = perseusMangaArt();
  const x = opts.x ?? sealX();
  const y = opts.y ?? (groundY() + 34);
  const pulse = 0.5 + Math.sin(t * 4.4) * 0.5;
  const nearSeal = Engine.state === 'playing' && player && Math.abs(player.x - x) < 58;
  const charge = Math.min(1, sealProgress);
  const flash = Math.min(1, sealFlashT);
  const alpha = Math.max(opts.alpha ?? 0, charge * 0.92, flash * 0.92, nearSeal ? 0.24 + pulse * 0.08 : 0.08);

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(1.42, 0.46);
  if (art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET)) {
    const heavy = perseusMangaHeavy();
    ctx.shadowColor = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.shadowBlur = heavy ? 12 + charge * 34 + flash * 28 : 0;
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'sigmaSeal', 0, 0, {
      scale: 0.34 + charge * 0.08 + flash * 0.07,
      alpha,
    });
  } else {
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(0, 0, 58, 18, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.font = 'bold 44px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Σ', 0, 0);
  }
  ctx.restore();
}

function drawMangaForegroundOcclusion() {
  const s = perseusMangaStage();
  ctx.save();
  const bottom = ctx.createLinearGradient(0, s.H * 0.76, 0, s.H);
  bottom.addColorStop(0, 'rgba(0,0,0,0.00)');
  bottom.addColorStop(0.60, 'rgba(0,10,12,0.16)');
  bottom.addColorStop(1, 'rgba(0,0,0,0.56)');
  ctx.fillStyle = bottom;
  ctx.fillRect(0, s.H * 0.76, s.W, s.H * 0.24);

  ctx.fillStyle = 'rgba(0,0,0,0.34)';
  ctx.beginPath();
  ctx.moveTo(0, s.H);
  ctx.lineTo(0, s.H * 0.68);
  ctx.quadraticCurveTo(s.W * 0.08, s.H * 0.84, s.W * 0.19, s.H);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(s.W, s.H);
  ctx.lineTo(s.W, s.H * 0.69);
  ctx.quadraticCurveTo(s.W * 0.92, s.H * 0.85, s.W * 0.80, s.H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBackground(t) {
  const W = Engine.W, H = Engine.H, gy = groundY();
  const cfg = levelCfg();

  if (Engine.manga && drawMangaCaveStage(t)) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = 'rgba(214,251,255,0.42)';
    ctx.fillText(cfg.title + ' · ' + cfg.name, W / 2, gy + 34);
    ctx.restore();
    return;
  }

  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, levelIndex === 2 ? '#09020a' : '#02070a');
  sky.addColorStop(0.5, levelIndex === 1 ? '#0d1628' : '#071923');
  sky.addColorStop(1, levelIndex === 2 ? '#13040c' : '#041013');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = 0.55;
  for (let i = 0; i < 80; i++) {
    const x = (i * 157) % W;
    const y = ((i * 91) % Math.floor(H * 0.48));
    const a = 0.35 + 0.35 * Math.sin(t * 1.2 + i);
    ctx.fillStyle = `rgba(190,245,255,${a})`;
    ctx.fillRect(x, y, 1.4, 1.4);
  }
  ctx.restore();

  ctx.fillStyle = 'rgba(4,8,10,0.82)';
  ctx.beginPath();
  ctx.moveTo(0, gy + 30);
  ctx.lineTo(W * 0.09, gy - 95);
  ctx.lineTo(W * 0.17, gy - 38);
  ctx.lineTo(W * 0.30, gy - 128);
  ctx.lineTo(W * 0.45, gy - 56);
  ctx.lineTo(W * 0.61, gy - 116);
  ctx.lineTo(W * 0.78, gy - 48);
  ctx.lineTo(W * 0.91, gy - 104);
  ctx.lineTo(W, gy - 20);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#091419';
  ctx.fillRect(0, gy, W, H - gy);
  ctx.strokeStyle = 'rgba(61,176,198,0.20)';
  ctx.lineWidth = 1;
  for (let x = -40; x < W + 80; x += 72) {
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.lineTo(x + 42, H);
    ctx.stroke();
  }
  ctx.fillStyle = 'rgba(0,0,0,0.34)';
  ctx.fillRect(0, gy, W, 10);

  for (let i = 0; i < 6; i++) {
    const x = W * (0.12 + i * 0.155);
    ctx.fillStyle = 'rgba(30,48,55,0.38)';
    ctx.fillRect(x - 10, H * 0.18, 20, gy - H * 0.18);
    ctx.fillStyle = 'rgba(120,190,198,0.09)';
    ctx.fillRect(x - 6, H * 0.18, 4, gy - H * 0.18);
  }

  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = 'rgba(214,251,255,0.22)';
  ctx.fillText(cfg.title + ' · ' + cfg.name, W / 2, gy + 34);
  ctx.restore();
}

function drawGazeCone(t) {
  if (medusa.phase !== 'windup' && medusa.phase !== 'gaze') return;
  const a = medusa.phase === 'gaze' ? 0.22 + 0.06 * Math.sin(t * 24) : 0.08;
  const x0 = medusa.x - 35, y0 = medusa.y - 92;
  ctx.save();
  const g = ctx.createLinearGradient(x0, y0, player.x, player.y - 38);
  g.addColorStop(0, `rgba(125,255,160,${a})`);
  g.addColorStop(1, 'rgba(125,255,160,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(caveLeft() - 20, y0 - 76);
  ctx.lineTo(caveLeft() - 20, y0 + 116);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawMirrorBeam(t) {
  const active = mirrorFocus > 0.02 || mirrorFlashT > 0 || sealProgress > 0.02;
  if (!active || !player || !medusa) return;
  const flash = mirrorFlashT > 0 ? Math.min(1, mirrorFlashT / 0.18) : 0;
  const a = Math.min(0.85, 0.14 + mirrorFocus * 0.42 + flash * 0.45);
  const sx = player.x + player.facing * (22 + player.shield * 16);
  const sy = player.y - 44;
  const ex = medusa.x - 30;
  const ey = medusa.y - 92;
  if (mirrorFocus > 0.02 || mirrorFlashT > 0) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = 12 + flash * 18;
    ctx.strokeStyle = '#d6fbff';
    ctx.lineWidth = 3 + flash * 5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + ex) / 2, sy - 18 - Math.sin(t * 12) * 8, ex, ey);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.92)';
    ctx.lineWidth = 1.2 + flash * 1.5;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + ex) / 2, sy - 18, ex, ey);
    ctx.stroke();
    ctx.restore();
  }

  if (sealProgress > 0.02) {
    ctx.save();
    ctx.globalAlpha = 0.18 + sealProgress * 0.58;
    ctx.strokeStyle = '#ff88cc';
    ctx.shadowColor = '#ff88cc';
    ctx.shadowBlur = 18;
    ctx.lineWidth = 3 + sealProgress * 3;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo((sx + sealX()) / 2, sy + 40, sealX(), groundY() + 35);
    ctx.stroke();
    ctx.restore();
  }
}

function drawMangaGazeCone(t) {
  if (!player || !medusa) return;
  const heavy = perseusMangaHeavy();
  const lingeringGaze = (medusa.visualGaze || 0) > 0.04;
  if (medusa.phase !== 'windup' && medusa.phase !== 'gaze' && !lingeringGaze) return;
  const eye = mangaMedusaEyePoint();
  const shieldPoint = mangaPlayerShieldPoint();
  const headPoint = mangaPlayerHeadPoint();
  const playerFacingMedusa = player.facing > 0 && player.x < medusa.x;
  const shielded = playerFacingMedusa && player.shield > 0.45 && mirrorDullT <= 0;
  const target = shielded ? shieldPoint : headPoint;
  const active = medusa.phase === 'gaze';
  const gaze = easeInOutSine(medusa.visualGaze || (active ? 1 : 0.44));
  const strength = 0.08 + gaze * (0.20 + 0.05 * Math.sin(t * 24));
  const endX = player && player.x < medusa.x ? target.x : caveLeft() - 30;
  const endY = player && player.x < medusa.x ? target.y : eye.y + 24;
  const spread = 42 + gaze * 42;

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const g = ctx.createLinearGradient(eye.x, eye.y, endX, endY);
  g.addColorStop(0, `rgba(188,255,124,${strength * 1.25})`);
  g.addColorStop(0.45, `rgba(132,255,168,${strength * 0.74})`);
  g.addColorStop(1, 'rgba(132,255,168,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(eye.x, eye.y);
  ctx.quadraticCurveTo((eye.x + endX) * 0.55, eye.y - 32, endX, endY - spread);
  ctx.lineTo(endX, endY + spread);
  ctx.quadraticCurveTo((eye.x + endX) * 0.55, eye.y + 24, eye.x, eye.y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = `rgba(220,255,170,${0.16 + gaze * 0.30})`;
  ctx.lineWidth = 1.8 + gaze * 1.8;
  ctx.shadowColor = '#dcff9b';
  ctx.shadowBlur = heavy ? 8 + gaze * 13 : 0;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(eye.x, eye.y);
    ctx.quadraticCurveTo((eye.x + endX) * 0.52, eye.y + i * 22, endX, endY + i * spread * 0.55);
    ctx.stroke();
  }
  ctx.restore();

  const art = perseusMangaArt();
  if (art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET)) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.shadowColor = '#dcff9b';
    ctx.shadowBlur = heavy ? 9 + gaze * 14 : 0;
    drawMangaFrameTransformed(art, PERSEUS_FXHUD_SHEET, 'gazeFlare', eye.x + 3, eye.y + 1, {
      scale: 0.09 + gaze * 0.05,
      alpha: 0.38 + gaze * 0.42,
      flipX: true,
      rotate: Math.sin(t * 2.4) * 0.05,
      scaleX: 1 + gaze * 0.10,
      scaleY: 1 - gaze * 0.04,
    });
    ctx.restore();
  }
}

function drawMangaMirrorBeam(t) {
  const active = mirrorFocus > 0.02 || mirrorFlashT > 0 || sealProgress > 0.02;
  if (!active || !player || !medusa) return;
  const heavy = perseusMangaHeavy();
  const shield = mangaPlayerShieldPoint();
  const eye = mangaMedusaEyePoint();
  const flash = mirrorFlashT > 0 ? Math.min(1, mirrorFlashT / 0.18) : 0;
  const beamAlpha = Math.min(0.90, 0.16 + mirrorFocus * 0.46 + flash * 0.42);

  if (mirrorFocus > 0.02 || mirrorFlashT > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.lineCap = 'round';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = heavy ? 14 + flash * 24 : 0;
    const passes = heavy ? 3 : 2;
    for (let i = 0; i < passes; i++) {
      ctx.globalAlpha = beamAlpha * (i === 0 ? 0.36 : i === 1 ? 0.58 : 0.96);
      ctx.strokeStyle = i === 2 ? '#ffffff' : '#d6fbff';
      ctx.lineWidth = (9 - i * 3) + flash * 4;
      ctx.beginPath();
      ctx.moveTo(shield.x, shield.y);
      ctx.quadraticCurveTo((shield.x + eye.x) * 0.50, shield.y - 26 - Math.sin(t * 12) * 7, eye.x, eye.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  if (sealProgress > 0.02) {
    const sx = sealX();
    const sy = groundY() + 28;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.20 + sealProgress * 0.62;
    ctx.strokeStyle = '#ff88cc';
    ctx.shadowColor = '#ff88cc';
    ctx.shadowBlur = heavy ? 16 + sealProgress * 20 : 0;
    ctx.lineWidth = 3 + sealProgress * 4;
    ctx.beginPath();
    ctx.moveTo(shield.x, shield.y);
    ctx.quadraticCurveTo((shield.x + sx) * 0.5, shield.y + 54, sx, sy);
    ctx.stroke();
    ctx.restore();
  }
}

function drawPerseus(t) {
  if (Engine.manga && drawPerseusMangaSprite()) return;
  if (Engine.manga && window.Manga && Manga.effects && typeof Manga.effects.inkStroke === 'function') {
    drawMangaPerseus(t);
    return;
  }
  const f = player.facing;
  const walk = Math.sin(player.walkPhase) * (Math.abs(player.vx) > 0 ? 1 : 0);
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(f, 1);

  ctx.fillStyle = 'rgba(0,0,0,0.36)';
  ctx.beginPath(); ctx.ellipse(0, 0, 30, 7, 0, 0, Math.PI * 2); ctx.fill();

  ctx.lineCap = 'round';
  ctx.strokeStyle = '#c0a16a'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-13 + walk * 8, -1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -22); ctx.lineTo(13 - walk * 8, -1); ctx.stroke();

  ctx.fillStyle = player.hitFlash > 0 ? '#ffffff' : '#d8d2bd';
  ctx.beginPath();
  ctx.moveTo(-16, -20); ctx.lineTo(-12, -58); ctx.lineTo(12, -58); ctx.lineTo(16, -20);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#7c6038'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = '#c0a16a';
  ctx.fillRect(-5, -66, 10, 10);
  ctx.beginPath(); ctx.arc(0, -74, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1208';
  ctx.beginPath(); ctx.arc(0, -78, 12, Math.PI, 0); ctx.fill();

  ctx.strokeStyle = '#c0a16a'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(10, -50); ctx.lineTo(22, -36); ctx.stroke();
  const bladeOut = player.slashT > 0 ? 48 : 32;
  ctx.strokeStyle = player.slashT > 0 ? '#e8ffff' : '#cdd7d8';
  ctx.lineWidth = player.slashT > 0 ? 5 : 3;
  ctx.beginPath(); ctx.moveTo(21, -37); ctx.lineTo(bladeOut, -60 - Math.sin(t * 8) * player.slashT * 12); ctx.stroke();

  ctx.strokeStyle = '#c0a16a'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(-11, -50); ctx.lineTo(-26, -38); ctx.stroke();
  ctx.save();
  const shieldSide = -31 + player.shield * 58;
  ctx.translate(shieldSide, -42);
  ctx.rotate(-0.18 + player.shield * 0.28);
  ctx.globalAlpha = (mirrorDullT > 0 ? 0.48 : 0.78) + player.shield * 0.22;
  const shieldG = ctx.createRadialGradient(-6, -4, 2, 0, 0, 24);
  shieldG.addColorStop(0, mirrorDullT > 0 ? '#9fb2b8' : '#ffffff');
  shieldG.addColorStop(0.35, mirrorDullT > 0 ? '#5f7378' : '#d6fbff');
  shieldG.addColorStop(1, mirrorDullT > 0 ? '#30464c' : '#4a8896');
  ctx.fillStyle = shieldG;
  ctx.strokeStyle = mirrorDullT > 0 ? '#435a60' : (player.shield > 0.7 ? '#e8ffff' : '#819da6');
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.ellipse(0, 0, 19, 24, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  if (player.shield > 0.55) {
    ctx.strokeStyle = `rgba(220,255,255,${player.shield})`;
    ctx.beginPath(); ctx.moveTo(-13, -7); ctx.lineTo(13, -12); ctx.stroke();
  }
  ctx.restore();

  if (player.petrify > 0.02) {
    ctx.globalAlpha = Math.min(0.72, player.petrify);
    ctx.fillStyle = '#a7b2b0';
    ctx.beginPath();
    ctx.moveTo(-18, -20); ctx.lineTo(-12, -62); ctx.lineTo(12, -62); ctx.lineTo(18, -20);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function perseusMangaAssetsReady() {
  return perseusMangaAssetReady(PERSEUS_MANGA_SHEET);
}

function currentPerseusMangaMotion() {
  if (Engine.state === 'victory') return { anim: 'perseusVictory', t: Engine.time, flipX: false };
  if (player.petrify > 0.55 || Engine.state === 'dead') return { anim: 'perseusStone', t: Engine.time, flipX: player.hurtFacing < 0, rotate: player.hurtFacing * 0.025 };
  if (player.hitFlash > 0) return { anim: 'perseusHit', t: 0.35 - player.hitFlash, flipX: player.hurtFacing < 0, rotate: -player.hurtFacing * 0.035 };
  if (player.slashT > 0) return { anim: 'perseusSlash', t: 0.22 - player.slashT, flipX: player.slashFacing < 0, rotate: player.slashFacing * 0.035 };
  if (player.shield > 0.45 || mirrorFocus > 0.02 || mirrorFlashT > 0) return { anim: 'perseusMirror', t: Engine.time, flipX: player.facing < 0 };
  const runVx = Math.abs(player.vx) > 12 ? player.vx : player.visualVx;
  if (Math.abs(runVx) > 12) return { anim: 'perseusRun', t: player.walkPhase / 9.5, flipX: runVx < 0, rotate: player.visualLean };
  return { anim: 'perseusIdle', t: Engine.time, flipX: player.facing < 0, rotate: player.visualLean * 0.35 };
}

function drawPerseusMangaSprite() {
  if (!perseusMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const nearScale = Math.max(0.29, Math.min(0.39, compact / 1900));
  const drawY = typeof player.visualY === 'number' ? player.visualY : player.y;
  const scale = mangaScaleForY(drawY, nearScale * 0.82, nearScale);
  const x = mangaActorX(player);
  const y = drawY + 8;
  const motion = currentPerseusMangaMotion();
  const art = perseusMangaArt();
  const fxReady = art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET);
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  const shield = mangaPlayerShieldPoint();
  const runAmount = Math.min(1, Math.abs(player.visualVx || player.vx) / 310);
  const stride = Math.sin(player.walkPhase);
  const spriteY = y - Math.abs(stride) * 4.5 * runAmount;
  const moveFacing = Math.abs(player.vx) > 8 ? (player.vx > 0 ? 1 : -1) : player.facing;
  const visualShield = typeof player.visualShield === 'number' ? player.visualShield : player.shield;
  const slashP = player.slashT > 0 ? clamp01(1 - player.slashT / 0.22) : 0;
  const slashArc = player.slashT > 0 ? Math.sin(easeInOutSine(slashP) * Math.PI) : 0;
  const hitP = player.hitFlash > 0 ? clamp01(1 - player.hitFlash / 0.35) : 0;
  const hitArc = player.hitFlash > 0 ? Math.sin(hitP * Math.PI) : 0;
  const shieldPop = visualShield > 0.04 ? Math.max(0, easeOutBack(visualShield) - visualShield) : 0;
  const breath = Math.sin(Engine.time * 2.45) * (1 - runAmount) * 0.010;
  const stepSquash = Math.cos(player.walkPhase * 2) * runAmount;
  const bodyScaleX = 1 + stepSquash * 0.024 + slashArc * 0.060 + hitArc * 0.028 + shieldPop * 0.018;
  const bodyScaleY = 1 + breath - stepSquash * 0.018 - slashArc * 0.032 - hitArc * 0.040;
  const actionOffsetX = (player.slashT > 0 ? player.slashFacing * 10 * slashArc : 0)
    + (visualShield > 0.16 ? player.facing * shieldPop * 9 : 0)
    - (player.hitFlash > 0 ? player.hurtFacing * 5 * hitArc : 0);
  const actionOffsetY = -slashArc * 4 + hitArc * 4;
  const motionRotate = (motion.rotate || 0)
    + (player.slashT > 0 ? player.slashFacing * 0.035 * slashArc : 0)
    - (player.hitFlash > 0 ? player.hurtFacing * 0.025 * hitArc : 0);
  const filmAmount = Math.max(0.16, Math.min(1, runAmount * 0.86 + visualShield * 0.18 + slashArc * 0.42 + hitArc * 0.36));

  ctx.save();
  if (fxReady && Math.abs(player.vx) > 18) {
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'dustPuff', x - moveFacing * 30, drawY + 14, {
      scale: 0.13 + scale * 0.16,
      alpha: 0.26 + Math.abs(Math.sin(player.walkPhase)) * 0.18,
      flipX: moveFacing < 0,
    });
  }
  if (fxReady && mirrorDullT > 0) {
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'mirrorDull', shield.x, shield.y + 3, {
      scale: 0.105 + scale * 0.08,
      alpha: Math.min(0.72, mirrorDullT),
      flipX: player.facing < 0,
    });
  } else if (visualShield > 0.48) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.18 + visualShield * 0.20 + mirrorFocus * 0.25;
    ctx.fillStyle = '#d6fbff';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = heavy ? 18 : 0;
    ctx.beginPath();
    ctx.ellipse(shield.x, shield.y, 34, 46, -0.10, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }
  ctx.restore();

  ctx.save();
  if (player.hitFlash > 0) {
    if (heavy) ctx.filter = 'brightness(2.5)';
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = heavy ? 16 : 0;
  } else if (player.shield > 0.55 || mirrorFocus > 0.02) {
    ctx.shadowColor = '#d6fbff';
    ctx.shadowBlur = heavy ? 12 + mirrorFocus * 12 : 0;
  }
  if (heavy && (runAmount > 0.42 || slashArc > 0.12)) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const stridePhase = ((player.walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
    drawMangaAnimationTransformed(art, PERSEUS_MANGA_SHEET, motion.anim, motion.t, x - moveFacing * (10 + runAmount * 14), spriteY + 2, {
      scale,
      flipX: motion.flipX,
      rotate: motionRotate * 0.42,
      alpha: Math.min(0.26, 0.06 + runAmount * 0.11 + slashArc * 0.16),
      phase: stridePhase,
      phaseTime: motion.anim === 'perseusRun' ? stridePhase : undefined,
      amount: filmAmount * 0.65,
      bob: 2.5,
      sway: 0.018,
      squash: 0.018,
      smear: false,
      filmScaleX: bodyScaleX * 1.04,
      filmScaleY: bodyScaleY * 0.99,
    });
    ctx.restore();
  }
  const stridePhase = ((player.walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
  const drawHeroAnim = art.drawActedAnimation || art.drawAnimation;
  const drew = drawHeroAnim(ctx, PERSEUS_MANGA_SHEET, motion.anim, motion.t, x + actionOffsetX, spriteY + actionOffsetY, {
    scale,
    flipX: motion.flipX,
    rotate: motionRotate,
    phase: runAmount > 0.05 ? stridePhase : Engine.time * 0.11,
    phaseTime: motion.anim === 'perseusRun' ? stridePhase : undefined,
    amount: filmAmount,
    bob: 5.2,
    sway: 0.030,
    squash: 0.032,
    smear: heavy ? 7 + slashArc * 13 : 4 + slashArc * 6,
    smearAlpha: heavy
      ? Math.min(0.16, 0.025 + runAmount * 0.055 + slashArc * 0.09)
      : Math.min(0.07, 0.012 + runAmount * 0.025 + slashArc * 0.03),
    filmScaleX: bodyScaleX,
    filmScaleY: bodyScaleY,
    frameBlendStrength: motion.anim === 'perseusRun' ? 0.26 : 0.20,
    hero: true,
  });
  ctx.restore();

  if (drew && fxReady && player.hitFlash > 0) {
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, player.petrify > 0.45 ? 'stoneShard' : 'hitBurst', x, drawY - 54, {
      scale: 0.13 + scale * 0.20,
      alpha: Math.min(0.78, player.hitFlash * 1.9),
    });
  }
  return drew;
}

function drawMangaPerseus(t) {
  const f = player.facing;
  const walk = Math.sin(player.walkPhase) * (Math.abs(player.vx) > 0 ? 1 : 0);
  const ink = Manga.INK || '#0a0a0a';
  const heavy = perseusMangaHeavy();
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.scale(f, 1);

  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.beginPath(); ctx.ellipse(0, 7, 34, 9, 0, 0, Math.PI * 2); ctx.fill();

  ctx.lineCap = 'round';
  ctx.strokeStyle = '#c49b62'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-14 + walk * 9, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -22); ctx.lineTo(14 - walk * 9, 2); ctx.stroke();
  Manga.effects.inkStroke(ctx, 2);
  ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-14 + walk * 9, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8, -22); ctx.lineTo(14 - walk * 9, 2); ctx.stroke();

  ctx.fillStyle = player.hitFlash > 0 ? '#ffffff' : '#f0e3bf';
  ctx.beginPath();
  ctx.moveTo(-20, -20); ctx.lineTo(-15, -62); ctx.lineTo(15, -62); ctx.lineTo(20, -20);
  ctx.closePath(); ctx.fill();
  Manga.effects.inkStroke(ctx, 4); ctx.stroke();
  ctx.fillStyle = '#d4af37';
  ctx.beginPath(); ctx.ellipse(0, -43, 16, 21, 0, 0, Math.PI * 2); ctx.fill();
  Manga.effects.inkStroke(ctx, 2); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0, -43, 16, 21, 0, 0, Math.PI * 2); ctx.clip();
  Manga.effects.halftone(ctx, 0, -65, 22, 46, { density: 5, dotSize: 1.5, alpha: 0.42, color: ink });
  ctx.restore();

  ctx.strokeStyle = '#c49b62'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(14, -55); ctx.lineTo(30, -42); ctx.stroke();
  ctx.shadowColor = '#d6fbff'; ctx.shadowBlur = heavy ? (player.slashT > 0 ? 18 : 6) : 0;
  ctx.strokeStyle = player.slashT > 0 ? '#ffffff' : '#edf8ff';
  ctx.lineWidth = player.slashT > 0 ? 5 : 3;
  ctx.beginPath(); ctx.moveTo(29, -42); ctx.lineTo(58, -72 - Math.sin(t * 9) * player.slashT * 12); ctx.stroke();
  ctx.shadowBlur = 0;
  Manga.effects.inkStroke(ctx, 1.7);
  ctx.beginPath(); ctx.moveTo(29, -42); ctx.lineTo(58, -72); ctx.stroke();

  ctx.strokeStyle = '#c49b62'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(-13, -55); ctx.lineTo(-27, -42); ctx.stroke();
  ctx.save();
  const shieldSide = -30 + player.shield * 60;
  ctx.translate(shieldSide, -43);
  ctx.rotate(-0.18 + player.shield * 0.28);
  ctx.globalAlpha = mirrorDullT > 0 ? 0.50 : 1;
  ctx.shadowColor = player.shield > 0.55 ? '#d6fbff' : '#000';
  ctx.shadowBlur = heavy && player.shield > 0.55 ? 18 : 0;
  ctx.fillStyle = mirrorDullT > 0 ? '#7d8b8d' : '#d6fbff';
  ctx.beginPath(); ctx.ellipse(0, 0, 21, 27, 0, 0, Math.PI * 2); ctx.fill();
  Manga.effects.inkStroke(ctx, 4); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-13, -8); ctx.lineTo(13, -14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10, 6); ctx.lineTo(11, 1); ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#c49b62';
  ctx.fillRect(-5, -71, 10, 9);
  ctx.beginPath(); ctx.ellipse(1, -84, 13.5, 15, 0, 0, Math.PI * 2); ctx.fill();
  Manga.effects.inkStroke(ctx, 2.5); ctx.stroke();
  ctx.save();

  ctx.beginPath();
  ctx.moveTo(-10, -87); ctx.lineTo(-3, -74); ctx.lineTo(-11, -78);

  ctx.beginPath();
  ctx.moveTo(8, -88); ctx.lineTo(15, -78); ctx.lineTo(8, -77);

function drawMangaMedusa(t) {
  const ink = Manga.INK || '#0a0a0a';
  const heavy = perseusMangaHeavy();
  ctx.save();
  ctx.translate(medusa.x, medusa.y);
  const flash = medusa.hurtFlash > 0;
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.beginPath(); ctx.ellipse(0, 4, 42, 10, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = flash ? '#ffffff' : '#60784f';
  ctx.beginPath();
  ctx.moveTo(-25, -17); ctx.lineTo(-17, -76); ctx.quadraticCurveTo(0, -96, 20, -76); ctx.lineTo(27, -17);
  ctx.closePath(); ctx.fill();
  Manga.effects.inkStroke(ctx, 4); ctx.stroke();
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0, -96); ctx.lineTo(20, -76); ctx.lineTo(27, -17); ctx.lineTo(0, -6); ctx.closePath(); ctx.clip();
  Manga.effects.halftone(ctx, 0, -100, 34, 100, { density: 5, dotSize: 1.8, alpha: 0.46, color: ink });
  ctx.restore();

  ctx.fillStyle = flash ? '#ffffff' : '#8bc88d';
  ctx.beginPath(); ctx.ellipse(0, -101, 19, 21, 0, 0, Math.PI * 2); ctx.fill();
  Manga.effects.inkStroke(ctx, 3); ctx.stroke();
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0, -101, 19, 21, 0, 0, Math.PI * 2); ctx.clip();
  Manga.effects.halftone(ctx, 2, -120, 18, 38, { density: 4, dotSize: 1.3, alpha: 0.38, color: ink });
  ctx.restore();
  for (let i = -5; i <= 5; i++) {
    const a = i * 0.30 + Math.sin(t * 2.2 + i) * 0.16;
    const len = 28 + (Math.abs(i) % 3) * 6;
    ctx.save();
    ctx.translate(0, -112);
    ctx.rotate(a);
    ctx.strokeStyle = i % 2 ? '#315c35' : '#20442a';
    ctx.lineWidth = 7; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(9, -13, 0, -len); ctx.stroke();
    Manga.effects.inkStroke(ctx, 1.8);
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(9, -13, 0, -len); ctx.stroke();
    ctx.fillStyle = '#7ee078';
    ctx.beginPath(); ctx.arc(0, -len, 3.8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Framing snake-bangs and oversized glowing eyes move her out of "mask" art.
  ctx.fillStyle = '#1f3d24';
  ctx.beginPath();
  ctx.moveTo(-12, -116); ctx.lineTo(-5, -101); ctx.lineTo(-16, -105);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(12, -116); ctx.lineTo(4, -101); ctx.lineTo(17, -105);
  ctx.closePath(); ctx.fill();
  ctx.shadowColor = medusa.phase === 'gaze' ? '#dcff9b' : 'transparent';
  ctx.shadowBlur = heavy && medusa.phase === 'gaze' ? 18 : 0;
  Manga.effects.animeEye(ctx, -7.2, -101.5, {
    sx: 0.74, sy: 0.78,
    white: medusa.phase === 'gaze' ? '#f2ffd0' : '#eaffdc',
    iris: medusa.phase === 'gaze' ? '#dcff9b' : '#315c35',
    mood: medusa.phase === 'gaze' ? 'wide' : 'focus',
    outline: 1.35,
  });
  Manga.effects.animeEye(ctx, 7.2, -101.5, {
    sx: 0.74, sy: 0.78,
    white: medusa.phase === 'gaze' ? '#f2ffd0' : '#eaffdc',
    iris: medusa.phase === 'gaze' ? '#dcff9b' : '#315c35',
    mood: medusa.phase === 'gaze' ? 'wide' : 'focus',
    outline: 1.35,
  });
  ctx.shadowBlur = 0;
  Manga.effects.inkStroke(ctx, 1.4);
  ctx.beginPath(); ctx.moveTo(-4, -95); ctx.quadraticCurveTo(0, -93, 4, -95); ctx.stroke();

  if (medusa.veil > 0) {
    ctx.strokeStyle = '#d6fbff';
    ctx.lineWidth = 2.5;
    ctx.globalAlpha = 0.62;
    for (let i = 0; i < medusa.veil; i++) {
      ctx.beginPath();
      ctx.arc(0, -65, 44 + i * 13 + Math.sin(t * 3 + i) * 2, -0.7, Math.PI + 0.7);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.strokeStyle = '#314b2c'; ctx.lineWidth = 11; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.quadraticCurveTo(20, 3, 2, 20);
  ctx.quadraticCurveTo(-19, 39, 14, 52);
  ctx.stroke();
  Manga.effects.inkStroke(ctx, 2.2);
  ctx.stroke();
  ctx.restore();
}

function drawMedusa(t) {
  if (Engine.manga && drawMedusaMangaSprite(t)) return;
  if (Engine.manga && window.Manga && Manga.effects && typeof Manga.effects.inkStroke === 'function') {
    drawMangaMedusa(t);
    return;
  }
  ctx.save();
  ctx.translate(medusa.x, medusa.y);
  const flash = medusa.hurtFlash > 0;
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.beginPath(); ctx.ellipse(0, 0, 38, 8, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = flash ? '#ffffff' : '#657c53';
  ctx.beginPath();
  ctx.moveTo(-22, -18); ctx.lineTo(-16, -74); ctx.quadraticCurveTo(0, -92, 18, -74); ctx.lineTo(24, -18);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#25351f'; ctx.lineWidth = 2; ctx.stroke();

  ctx.fillStyle = flash ? '#ffffff' : '#8bc88d';
  ctx.beginPath(); ctx.arc(0, -98, 17, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111810';
  for (let i = -4; i <= 4; i++) {
    const a = i * 0.34 + Math.sin(t * 2 + i) * 0.11;
    const len = 28 + (i % 2) * 7;
    ctx.save();
    ctx.translate(0, -108);
    ctx.rotate(a);
    ctx.strokeStyle = i % 2 ? '#315c35' : '#20442a';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(8, -12, 0, -len);
    ctx.stroke();
    ctx.fillStyle = '#6bd070';
    ctx.beginPath(); ctx.arc(0, -len, 3.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = medusa.phase === 'gaze' ? '#dcff9b' : '#142010';
  ctx.beginPath(); ctx.arc(-6, -99, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -99, 2.5, 0, Math.PI * 2); ctx.fill();

  ctx.strokeStyle = '#314b2c'; ctx.lineWidth = 10; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.quadraticCurveTo(18, 2, 2, 18);
  ctx.quadraticCurveTo(-18, 36, 12, 50);
  ctx.stroke();
  ctx.restore();
}

function currentMedusaMangaFrame() {
  if (medusa.hurtFlash > 0 || sealFlashT > 0) return 'medusaHurt';
  if (medusa.phase === 'gaze' || medusa.phase === 'windup') return 'medusaGaze';
  return 'medusaIdle';
}

function currentMedusaMangaMotion() {
  const rotate = medusa.visualLean || 0;
  if (medusa.hurtFlash > 0 || sealFlashT > 0) return { anim: 'medusaHurt', t: Math.max(0, 0.35 - medusa.hurtFlash), flipX: true, rotate };
  if (medusa.phase === 'gaze') return { anim: 'medusaGaze', t: Engine.time, flipX: true, rotate };
  if (medusa.phase === 'windup') return { anim: 'medusaWatch', t: Engine.time, flipX: true, rotate };
  return { anim: 'medusaIdle', t: Engine.time, flipX: true, rotate };
}

function drawMangaVeil(t) {
  if (!medusa || medusa.veil <= 0) return;
  const art = perseusMangaArt();
  const heavy = perseusMangaHeavy();
  const eye = mangaMedusaEyePoint();
  const centerX = eye.x + 22;
  const centerY = (medusa.visualY ?? medusa.y) - 68;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.strokeStyle = '#d6fbff';
  ctx.lineWidth = 2.2;
  ctx.shadowColor = '#d6fbff';
  ctx.shadowBlur = heavy ? 10 : 0;
  ctx.globalAlpha = 0.34 + medusa.veil * 0.13;
  for (let i = 0; i < medusa.veil; i++) {
    const r = 58 + i * 17 + Math.sin(t * 3.2 + i) * 3;
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, -0.82, Math.PI + 0.64);
    ctx.stroke();
  }
  ctx.restore();

  if (art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET) && medusa.hurtFlash > 0) {
    art.drawFrame(ctx, PERSEUS_FXHUD_SHEET, 'veilCrack', centerX - 12, centerY + 2, {
      scale: 0.20,
      alpha: Math.min(0.85, medusa.hurtFlash * 2.5),
    });
  }
}

function drawMangaMedusaSecondaryMotion(t, x, y, scale, gaze, hurt) {
  const rootY = y - 110 * scale / 0.40;
  const bodyScale = Math.max(0.78, scale / 0.40);
  ctx.save();
  ctx.lineCap = 'round';
  ctx.globalCompositeOperation = 'screen';
  for (let i = -4; i <= 4; i++) {
    const side = i / 4;
    const phase = t * (1.7 + Math.abs(i) * 0.15) + i * 0.82;
    const wave = Math.sin(phase) * (8 + gaze * 9) * bodyScale;
    const rootX = x + side * 30 * bodyScale;
    const tipX = rootX + side * 18 * bodyScale + wave;
    const tipY = rootY - (28 + (Math.abs(i) % 3) * 8 + gaze * 12) * bodyScale;
    ctx.globalAlpha = 0.16 + gaze * 0.16 + hurt * 0.10;
    ctx.strokeStyle = i % 2 ? '#8bc88d' : '#d6fbff';
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 8 + gaze * 12;
    ctx.lineWidth = (2.2 + gaze * 1.4 + hurt * 0.8) * bodyScale;
    ctx.beginPath();
    ctx.moveTo(rootX, rootY + 12 * bodyScale);
    ctx.quadraticCurveTo(x + side * 42 * bodyScale + wave * 0.5, rootY - 18 * bodyScale, tipX, tipY);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMedusaMangaSprite(t) {
  if (!perseusMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const nearScale = Math.max(0.35, Math.min(0.48, compact / 1550));
  const drawY = medusa.visualY ?? medusa.y;
  const scale = mangaScaleForY(drawY, nearScale * 0.86, nearScale);
  const motion = currentMedusaMangaMotion();
  const x = mangaActorX(medusa);
  const y = drawY + 8;
  const art = perseusMangaArt();
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  const gaze = medusa.visualGaze || 0;
  const hurt = medusa.visualHurt || 0;
  const idleBob = Math.sin(t * 1.35 + levelIndex * 0.7) * (2.2 + gaze * 1.4);
  const gazePulse = Math.sin(t * 5.4) * gaze;
  const bodyScaleX = 1 + gaze * 0.028 + hurt * 0.042 + gazePulse * 0.010;
  const bodyScaleY = 1 - gaze * 0.020 - hurt * 0.032 - gazePulse * 0.006;

  if (heavy) drawMangaMedusaSecondaryMotion(t, x, y, scale, gaze, hurt);

  ctx.save();
  if (medusa.phase === 'gaze') {
    ctx.shadowColor = '#dcff9b';
    ctx.shadowBlur = heavy ? 22 : 0;
  }
  if (medusa.hurtFlash > 0 && heavy) ctx.filter = 'brightness(2.8) saturate(0.2)';
  if (heavy && gaze > 0.48) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    drawMangaAnimationTransformed(art, PERSEUS_MANGA_SHEET, motion.anim, motion.t, x + 5 * gaze, y + idleBob - 1, {
      scale,
      flipX: motion.flipX,
      rotate: (motion.rotate || 0) * 0.55,
      alpha: 0.10 + gaze * 0.12,
      phase: t * 0.18,
      amount: 0.24 + gaze * 0.22,
      bob: 1.4,
      sway: 0.012,
      squash: 0.014,
      smear: false,
      filmScaleX: bodyScaleX * 1.03,
      filmScaleY: bodyScaleY,
    });
    ctx.restore();
  }
  const drawMedusaAnim = art.drawActedAnimation || art.drawAnimation;
  const drew = drawMedusaAnim(ctx, PERSEUS_MANGA_SHEET, motion.anim, motion.t, x - gaze * 3 + hurt * 5, y + idleBob, {
    scale,
    flipX: motion.flipX,
    rotate: motion.rotate || 0,
    phase: t * (medusa.phase === 'gaze' ? 0.22 : 0.13),
    amount: Math.min(0.75, 0.20 + gaze * 0.36 + hurt * 0.24),
    bob: 3.4,
    sway: 0.024 + gaze * 0.014,
    squash: 0.022 + gaze * 0.012,
    smear: heavy ? 5 + gaze * 8 : 3 + gaze * 3,
    smearAlpha: heavy
      ? Math.min(0.13, 0.026 + gaze * 0.070 + hurt * 0.035)
      : Math.min(0.055, 0.012 + gaze * 0.020 + hurt * 0.018),
    filmScaleX: bodyScaleX,
    filmScaleY: bodyScaleY,
    frameBlendStrength: 0.20,
    hero: true,
  });
  ctx.restore();

  if (drew && medusa.veil > 0) {
    drawMangaVeil(t);
  }
  return drew;
}

function drawSnakes(t) {
  for (const s of snakes) {
    if (Engine.manga && perseusMangaAssetsReady()) {
      const art = perseusMangaArt();
      const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
      const compact = Math.min(Engine.W, Engine.H);
      const vx = typeof s.visualX === 'number' ? s.visualX : s.x;
      const vy = typeof s.visualY === 'number' ? s.visualY : s.y;
      const sx = mangaProjectX(vx, vy);
      const sy = vy + Math.sin(s.wobble) * 5;
      const prevX = mangaProjectX(typeof s.prevVisualX === 'number' ? s.prevVisualX : vx, typeof s.prevVisualY === 'number' ? s.prevVisualY : vy);
      const prevY = (typeof s.prevVisualY === 'number' ? s.prevVisualY : vy) + Math.sin(s.wobble - 0.45) * 5;
      const scale = mangaScaleForY(s.y, Math.max(0.10, compact / 5200), Math.max(0.14, Math.min(0.20, compact / 3600)));
      const hair = mangaMedusaHairPoint();
      const fxReady = art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET);
      const reflect = clamp01((s.reflectT || 0) / 0.34);
      const speedStretch = clamp01(Math.abs(s.vx) / 560) * 0.20;
      const travelDir = s.vx >= 0 ? 1 : -1;
      const snakeScaleX = 1 + speedStretch + reflect * 0.16;
      const snakeScaleY = 1 - speedStretch * 0.36 + reflect * 0.04;
      const snakeRotate = Math.sin(s.wobble) * (0.10 + reflect * 0.06);

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      if (s.returning || (s.age || 0) < 0.42) {
        const trailAlpha = s.returning ? 0.44 : Math.max(0, 0.38 * (1 - (s.age || 0) / 0.42));
        ctx.globalAlpha = trailAlpha;
        ctx.strokeStyle = s.returning ? '#d6fbff' : '#b8f28f';
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = heavy ? (s.returning ? 14 : 8) : 0;
        ctx.lineWidth = s.returning ? 3 : 2;
        ctx.beginPath();
        ctx.moveTo(hair.x, hair.y);
        ctx.quadraticCurveTo((hair.x + sx) * 0.50, Math.min(hair.y, sy) - 34, sx, sy);
        ctx.stroke();
      }
      if (Math.abs(prevX - sx) > 2 || reflect > 0.05) {
        ctx.globalAlpha = Math.min(0.42, 0.12 + speedStretch * 1.2 + reflect * 0.22);
        ctx.strokeStyle = s.returning ? '#d6fbff' : '#b8f28f';
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur = heavy ? (s.returning ? 18 : 9) : 0;
        ctx.lineWidth = 1.8 + reflect * 2;
        ctx.beginPath();
        ctx.moveTo(prevX, prevY);
        ctx.quadraticCurveTo((prevX + sx) / 2, Math.min(prevY, sy) - 12 - reflect * 18, sx, sy);
        ctx.stroke();
      }
      ctx.restore();

      let drew = false;
      ctx.save();
      if (s.returning) {
        ctx.shadowColor = '#d6fbff';
        ctx.shadowBlur = heavy ? 16 : 0;
      }
      if (fxReady) {
        if (heavy && (Math.abs(s.vx) > 250 || reflect > 0.05)) {
          drawMangaFrameTransformed(art, PERSEUS_FXHUD_SHEET, s.returning ? 'serpentReflect' : 'serpentFly', sx - travelDir * (16 + reflect * 12), sy + 2, {
            scale: scale * 1.28,
            flipX: s.returning,
            rotate: snakeRotate * 0.65,
            alpha: Math.min(0.30, 0.08 + speedStretch * 0.7 + reflect * 0.18),
            scaleX: snakeScaleX * 1.10,
            scaleY: snakeScaleY * 0.96,
          });
        }
        drew = drawMangaFrameTransformed(art, PERSEUS_FXHUD_SHEET, s.returning ? 'serpentReflect' : 'serpentFly', sx, sy, {
          scale: scale * 1.34,
          flipX: s.returning,
          rotate: snakeRotate,
          scaleX: snakeScaleX,
          scaleY: snakeScaleY,
        });
      }
      if (!drew && art && typeof art.drawAnimation === 'function') {
        drew = drawMangaAnimationTransformed(art, PERSEUS_MANGA_SHEET, s.returning ? 'snakeReflect' : 'snakeFly', t + s.wobble, sx, sy, {
          scale,
          flipX: s.returning,
          rotate: snakeRotate,
          amount: 0.32 + speedStretch + reflect * 0.25,
          phase: t * 0.55 + s.wobble / (Math.PI * 2),
          bob: 2.8,
          sway: 0.032,
          squash: 0.024,
          smear: heavy ? 8 : 4,
          smearAlpha: heavy ? 0.08 + reflect * 0.05 : 0.028 + reflect * 0.018,
          filmScaleX: snakeScaleX,
          filmScaleY: snakeScaleY,
        });
      }
      ctx.restore();
      if (drew) continue;
    }
    ctx.save();
    ctx.translate(s.visualX ?? s.x, (s.visualY ?? s.y) + Math.sin(s.wobble) * 5);
    if (s.returning) ctx.scale(-1, 1);
    ctx.strokeStyle = s.returning ? '#d6fbff' : '#76c96c';
    ctx.lineWidth = 7;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-18, 0);
    ctx.quadraticCurveTo(-8, -8, 0, 0);
    ctx.quadraticCurveTo(8, 8, 18, 0);
    ctx.stroke();
    ctx.fillStyle = s.returning ? '#ffffff' : '#b9f69c';
    ctx.beginPath(); ctx.arc(-20, 0, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-22, -1, 1.2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawHazards(t) {
  for (const h of hazards) {
    const x = h.visualX || h.drawX || h.x;
    const y = h.visualY || h.drawY || h.baseY;
    if (Engine.manga && perseusMangaAssetsReady()) {
      const art = perseusMangaArt();
      const heavy = perseusMangaHeavy();
      const compact = Math.min(Engine.W, Engine.H);
      const baseX = mangaProjectX(h.x, h.baseY);
      const sx = mangaProjectX(x, y);
      const sy = y + 2;
      const scale = mangaScaleForY(h.baseY, Math.max(0.13, compact / 4600), Math.max(0.17, Math.min(0.24, compact / 3200)));
      const fxReady = art && perseusMangaAssetReady(PERSEUS_FXHUD_SHEET);
      const emerge = h.visualEmerge || 0;
      const pulse = 0.5 + Math.sin(t * 5.2 + h.phase) * 0.5;
      const hazardScaleX = 1.08 - emerge * 0.05 + pulse * 0.018;
      const hazardScaleY = 0.84 + emerge * 0.24 - pulse * 0.012;
      ctx.save();
      ctx.globalAlpha = 0.40 + emerge * 0.20;
      ctx.strokeStyle = 'rgba(212,175,55,0.45)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.ellipse(baseX, h.baseY + 9, 36 + emerge * 10, 9 + emerge * 4, ((baseX - Engine.W * 0.5) / Engine.W) * 0.2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(0,0,0,0.36)';
      ctx.beginPath();
      ctx.ellipse(baseX, h.baseY + 11, 28 + emerge * 8, 6 + emerge * 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.18 + emerge * 0.18;
      ctx.strokeStyle = '#d6fbff';
      ctx.beginPath();
      ctx.moveTo(baseX, h.baseY - 2);
      ctx.quadraticCurveTo((baseX + sx) / 2, h.baseY - 18 - emerge * 18, sx, sy + 26);
      ctx.stroke();
      ctx.restore();

      let drew = false;
      ctx.save();
      ctx.shadowColor = '#d6fbff';
      ctx.shadowBlur = heavy ? 8 + emerge * 14 : 0;
      if (fxReady) {
        drew = drawMangaFrameTransformed(art, PERSEUS_FXHUD_SHEET, 'floorHazard', sx, sy + (1 - emerge) * 6, {
          scale: scale * 1.25,
          rotate: Math.sin(h.phase + t) * 0.12,
          scaleX: hazardScaleX,
          scaleY: hazardScaleY,
        });
      }
      if (!drew && art && typeof art.drawAnimation === 'function') {
        const drawHazardAnim = art.drawActedAnimation || art.drawAnimation;
        drew = drawHazardAnim(ctx, PERSEUS_MANGA_SHEET, 'caveHazard', t + h.phase, sx, sy + (1 - emerge) * 6, {
          scale,
          rotate: Math.sin(h.phase + t) * 0.12,
          phase: t * 0.28 + h.phase,
          amount: 0.24 + emerge * 0.24,
          bob: 2.2,
          sway: 0.018,
          squash: 0.020,
          filmScaleX: hazardScaleX,
          filmScaleY: hazardScaleY,
        });
      }
      ctx.restore();
      if (drew) continue;
    }
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(Math.sin(h.phase + t) * 0.18);
    ctx.fillStyle = '#6c7472';
    ctx.beginPath();
    ctx.moveTo(0, -26);
    ctx.lineTo(20, -6);
    ctx.lineTo(13, 24);
    ctx.lineTo(-15, 22);
    ctx.lineTo(-22, -5);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#202828';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = 'rgba(214,251,255,0.35)';
    ctx.fillRect(-7, -11, 14, 3);
    ctx.restore();
  }
}

function drawSerpentSeal(t) {
  if (Engine.manga) {
    drawMangaFloorSeal(t);
    return;
  }
  if (levelIndex < LEVELS.length - 1 && sealProgress <= 0 && sealFlashT <= 0) return;
  const x = sealX();
  const y = groundY() + 35;
  const pulse = 0.5 + Math.sin(t * 4.4) * 0.5;
  const nearSeal = Engine.state === 'playing' && Math.abs(player.x - x) < 56;
  const charge = Math.min(1, sealProgress);
  const flash = Math.min(1, sealFlashT);
  const reveal = Math.max(charge, flash, nearSeal ? 0.16 + pulse * 0.05 : 0);
  ctx.save();
  ctx.translate(x, y);

  const floorGlow = Math.max(nearSeal ? 0.12 : 0, charge * 0.55, flash * 0.75);
  if (floorGlow > 0) {
    const g = ctx.createRadialGradient(0, 4, 4, 0, 4, 74 + charge * 26);
    g.addColorStop(0, `rgba(255,136,204,${0.16 * floorGlow})`);
    g.addColorStop(0.42, `rgba(214,251,255,${0.12 * floorGlow})`);
    g.addColorStop(1, 'rgba(214,251,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(0, 4, 82 + charge * 18, 24 + charge * 7, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.save();
  ctx.scale(1.25, 0.42);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 31px serif';
  ctx.lineWidth = 3.5;
  ctx.strokeStyle = 'rgba(3,7,8,0.18)';
  ctx.strokeText('Σ', 0, 5);
  ctx.lineWidth = 1.3;
  ctx.strokeStyle = `rgba(100,143,148,${0.045 + reveal * 0.14})`;
  ctx.strokeText('Σ', 0, 3);
  ctx.fillStyle = `rgba(5,13,16,${0.12 + reveal * 0.06})`;
  ctx.fillText('Σ', 0, 4);
  ctx.restore();

  if (reveal > 0) {
    ctx.save();
    ctx.scale(1.25, 0.42);
    ctx.shadowColor = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.shadowBlur = 8 + charge * 24 + flash * 24;
    ctx.globalAlpha = Math.min(0.72, 0.10 + reveal * 0.62);
    ctx.font = 'bold 31px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.fillText('Σ', 0, 3);
    ctx.restore();
  }

  if (charge > 0 || flash > 0) {
    ctx.globalAlpha = 0.16 + charge * 0.62 + flash * 0.35;
    ctx.strokeStyle = charge > 0 ? '#ff88cc' : '#d6fbff';
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur = 10 + charge * 18;
    ctx.lineWidth = 2 + charge * 4;
    ctx.beginPath();
    ctx.ellipse(0, 4, 42 + charge * 18, 13 + charge * 5, 0, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.max(charge, flash * 0.7));
    ctx.stroke();
  }

  ctx.textAlign = 'center';
  ctx.restore();
}

function drawParticles() {
  const heavy = perseusMangaHeavy();
  for (const p of sparks) {
    ctx.globalAlpha = Math.max(0, p.t);
    ctx.fillStyle = p.color;
    if (Engine.manga && heavy) {
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
    }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px monospace';
  for (const f of floaters) {
    ctx.globalAlpha = Math.max(0, f.t);
    if (Engine.manga && window.Manga && Manga.effects && Manga.effects.sfxText) {
      Manga.effects.sfxText(ctx, f.x, f.y, f.text, {
        size: f.text.length > 12 ? 24 : 34,
        color: f.color || '#d6fbff',
        outline: '#0a0a0a',
        tilt: -7,
        alpha: Math.max(0, f.t),
      });
      continue;
    }
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
}
