<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Games — A place revealed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #04020a; overflow: hidden; font-family: 'Trebuchet MS', serif; color: #f0e8d0; }
  canvas { display: block; }
  #returnBtn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 12px 28px; background: rgba(212,175,55,0.10); border: 1px solid #D4AF37;
    color: #f0e8d0; font-family: monospace; font-size: 14px;
    letter-spacing: 0.15em; cursor: pointer; border-radius: 4px;
    transition: background 0.2s, transform 0.1s; opacity: 0;
    pointer-events: none;
  }
  #returnBtn.visible { opacity: 1; pointer-events: auto; }
  #returnBtn:hover { background: rgba(212,175,55,0.22); transform: translateX(-50%) translateY(-1px); }
  body.manga-mode #returnBtn {
    background:#D4AF37;
    border:3px solid #0a0a0a;
    color:#0a0a0a;
    border-radius:4px;
    box-shadow:6px 6px 0 rgba(0,0,0,0.48);
    font-weight:bold;
  }
  body.manga-mode #returnBtn:hover {
    background:#fff1b8;
    transform:translateX(-50%) translateY(-1px);
    box-shadow:7px 8px 0 rgba(0,0,0,0.48);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="returnBtn">RETURN TO OLYMPUS  ↵</button>

<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="assets/manga/icarus/manifest.js"></script>
<script src="assets/manga/achilles/manifest.js"></script>
<script src="assets/manga/orion/manifest.js"></script>
<script src="assets/manga/perseus/manifest.js"></script>
<script src="places.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// place.html — the cinematic destination players land on after solving a
// mystery. URL params: ?id=<placeId>&from=<gameId>&clue=<clueId>
//
// The page is intentionally still — a tableau, not a level. The character
// stands in the location, the title fades in, then the clue banner does,
// then the player can return.

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

const params  = new URLSearchParams(location.search);
const placeId = params.get('id')   || 'oceanus';
const fromGame= params.get('from') || 'icarus';
const clueId  = params.get('clue') || null;
const hintId  = params.get('hint') || null;

const place = (window.GodGames && window.GodGames.places && window.GodGames.places[placeId]) || null;
const Mystery = window.GodGames && window.GodGames.Mysteries;
const clue  = Mystery
  ? ((Mystery.findClue && Mystery.findClue(clueId))
    || (Mystery.clueForHint && hintId && Mystery.decorateClue && Mystery.decorateClue(Mystery.clueForHint(hintId))))
  : null;

// Fallback if the place isn't registered (defensive — shouldn't happen).
const SAFE_PLACE = {
  name: 'AN UNKNOWN PLACE',
  flavor: 'somewhere beyond the streams of Oceanus',
  palette: { accent: '#D4AF37' },
  silhouette: (c, W, H) => { c.fillStyle = '#0a0e1c'; c.fillRect(0, 0, W, H); },
  characterTransform: (_c, W, H) => ({ x: W / 2, y: H * 0.7, scale: 1 }),
};
const P = place || SAFE_PLACE;
const MANGA_ON = localStorage.getItem('godgames_manga') === '1';
document.body.classList.toggle('manga-mode', MANGA_ON);
let normalPlaceLayer = null;
let normalPlaceKey = '';

function drawNormalPlaceScene(W, H, t) {
  if (!window.document || !P || typeof P.silhouette !== 'function') {
    P.silhouette(ctx, W, H, t);
    return;
  }
  const ambienceTick = Math.floor(t * 2) / 2;
  const key = `${placeId}|${W}|${H}|${ambienceTick.toFixed(2)}`;
  if (!normalPlaceLayer || normalPlaceKey !== key) {
    const layer = document.createElement('canvas');
    layer.width = W;
    layer.height = H;
    const layerCtx = layer.getContext('2d');
    if (!layerCtx) {
      P.silhouette(ctx, W, H, t);
      return;
    }
    P.silhouette(layerCtx, W, H, ambienceTick);
    normalPlaceLayer = layer;
    normalPlaceKey = key;
  }
  ctx.drawImage(normalPlaceLayer, 0, 0, W, H);
}

// Route the character draw call to the correct manga character. Perseus is
// local for now because the shared manga package does not yet ship him.
const CHARACTER_MAP = { icarus: 'icarus', orion: 'orion', achilles: 'achilles', perseus: 'perseus' };

if (params.get('testHooks') === '1') {
  window.GodGames.PlaceTest = {
    fromGame,
    clueId,
    hintId,
    clue: clue ? clue.id : null,
    character: CHARACTER_MAP[fromGame] || null,
    hasPerseusTraveler: typeof drawPerseusTraveler === 'function',
  };
}

// Slow walk drift: the character traces a long sine across the scene at
// gentle speed, never running, never still. They reach the edge, fade,
// then re-enter from the other side. The whole point is contemplation.
function characterDriftX(t, baseX, ampX) {
  const period = 14; // seconds per full pass — slow
  const phase  = (t % period) / period;
  // Triangle wave so motion is linear, not eased — feels like walking.
  const tri = phase < 0.5 ? phase * 2 : 2 - phase * 2;  // 0..1..0
  return baseX + (tri - 0.5) * 2 * ampX;
}
function characterFacing(t) {
  const period = 14;
  const phase  = (t % period) / period;
  return phase < 0.5 ? 1 : -1;
}
function characterWalkPhase(t) { return t * 4.2; }       // gait speed
function characterVx(t)        { return characterFacing(t) * 80; } // for hubWalker-style anims

function drawCharacterAt(baseX, baseY, scale) {
  const char = CHARACTER_MAP[fromGame];
  const W = canvas.width;
  const t = performance.now() / 1000;
  const driftX = characterDriftX(t, baseX, W * 0.18);
  const facing = characterFacing(t);
  const walkPhase = characterWalkPhase(t);

  const art = window.GodGames && GodGames.MangaArt;
  if (MANGA_ON && art && typeof art.drawGameTraveler === 'function'
      && art.drawGameTraveler(ctx, char, driftX, baseY, {
        scale,
        facing,
        walkPhase,
        t,
        vx: characterVx(t),
        accent: P.palette.accent || '#D4AF37',
        preferPrimaryOnly: true,
      })) return;
  if (MANGA_ON && drawAssetTraveler(char, driftX, baseY, scale, facing, walkPhase, t, { preferPrimaryOnly: true })) return;

  if (!char || (char !== 'perseus' && (!window.Manga || !Manga.characters || !Manga.characters[char]))) {
    // Tiny fallback figure
    ctx.save();
    ctx.translate(driftX, baseY);
    ctx.scale(facing, 1);
    ctx.fillStyle = '#e8d8b8';
    ctx.fillRect(-8, -32, 16, 32);
    ctx.beginPath(); ctx.arc(0, -38, 8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.translate(driftX, baseY);
  ctx.scale(scale, scale);
  if (char === 'perseus') {
    drawPerseusTraveler(ctx, { facing, walkPhase, t });
  } else if (char === 'icarus') {
    // Icarus floats — walk-equivalent is gentle wing flap + horizontal drift
    Manga.characters.icarus.draw(ctx, {
      x: 0, y: 0, facingRight: facing > 0 ? 1 : 0,
      vx: facing * 60, vy: 0, flapPhase: t * 0.9,
      wingHealth: 50, burnDmg: 0, wetDmg: 0,
      thrusting: false, dying: false, angle: 0, diving: false,
    });
  } else if (char === 'orion') {
    Manga.characters.orion.draw(ctx, {
      x: 0, y: 0, facing, walkPhase,
      vx: characterVx(t), vy: 0, onGround: true,
      hp: 3, hurtFlash: 0, invincible: 0,
      proneT: 0, proneDmg: 0,
      spearCount: 7, stabFlash: 0, dodgeT: 0,
      constellationCharging: false, t,
    });
  } else if (char === 'achilles') {
    Manga.characters.achilles.draw(ctx, {
      x: 0, y: 0, facing, walkPhase,
      vx: characterVx(t), hp: 5, hitFlash: 0, iframes: 0, t,
    });
  }
  ctx.restore();
}

function drawAssetTraveler(char, x, y, scale, facing, walkPhase, t, options = {}) {
  if (!char || !window.Manga || !Manga.assets || typeof Manga.assets.ready !== 'function') return false;
  const A = Manga.assets;
  const vx = characterVx(t);
  const phase = ((walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
  const art = window.GodGames && GodGames.MangaArt;
  const canAnimate = art && typeof art.drawAnimation === 'function';
  let id = null, frame = null, anim = null, animT = t, animFps, spriteScale = scale;
  if (char === 'icarus') {
    id = 'godgames.icarus.flightSheet';
    const wing = ((t * 0.76) % 1 + 1) % 1;
    frame = wing < 0.24 ? 'flapUp' : (wing < 0.50 ? 'glide' : (wing < 0.74 ? 'flapDown' : 'glide'));
    anim = 'flap';
    spriteScale *= 0.34;
    y -= 22;
  } else if (char === 'achilles') {
    const primaryReady = canAnimate && A.ready('godgames.achilles.animSheet');
    if (options.preferPrimaryOnly && canAnimate && !primaryReady) return false;
    id = primaryReady ? 'godgames.achilles.animSheet' : 'godgames.achilles.actionSheet';
    anim = Math.abs(vx) > 1 ? (facing < 0 ? 'runLeft' : 'runRight') : 'idle';
    frame = Math.abs(vx) > 1 ? (facing < 0 ? 'runLeft' : 'runRight') : 'idle';
    animT = t;
    animFps = undefined;
    spriteScale *= id === 'godgames.achilles.animSheet' ? 0.36 : 0.30;
    y += 4;
  } else if (char === 'orion') {
    const primaryReady = canAnimate && A.ready('godgames.orion.orionAnimV1');
    if (options.preferPrimaryOnly && canAnimate && !primaryReady) return false;
    id = primaryReady ? 'godgames.orion.orionAnimV1' : 'godgames.orion.scorpionSheet';
    anim = Math.abs(vx) > 1 ? 'run' : 'idle';
    frame = id === 'godgames.orion.orionAnimV1'
      ? (Math.abs(vx) > 1 ? 'run1' : 'idle1')
      : (Math.abs(vx) > 1 ? 'orionRun' : 'orionIdle');
    animT = t;
    animFps = undefined;
    spriteScale *= id === 'godgames.orion.orionAnimV1' ? 0.34 : 0.31;
    y += 2;
  } else if (char === 'perseus') {
    id = 'godgames.perseus.gorgonSheet';
    anim = Math.abs(Math.sin(walkPhase)) > 0.18 ? 'perseusRun' : 'perseusIdle';
    frame = anim;
    animT = t;
    animFps = undefined;
    spriteScale *= 0.32;
    y += 3;
  }
  if (!id || !frame || !A.ready(id) || typeof A.drawFrame !== 'function') return false;

  ctx.save();
  ctx.shadowColor = P.palette.accent || '#D4AF37';
  ctx.shadowBlur = 12;
  const drawOpts = {
        scale: spriteScale,
        flipX: char === 'achilles' ? false : facing < 0,
        phase: char === 'icarus' ? ((t * 0.76) % 1 + 1) % 1 : phase,
        amount: char === 'icarus' ? 0.44 : Math.min(1, Math.abs(vx) / 80),
        bob: char === 'icarus' ? 5.5 * scale : 5 * scale,
        floatBob: char === 'icarus' ? 3.6 * scale : 0,
        sway: char === 'icarus' ? 0.040 : 0.028,
        squash: char === 'icarus' ? 0.018 : 0.032,
        animName: anim || frame,
        hero: true,
        cinematic: true,
        film: true,
        fps: animFps,
        phaseTime: char === 'icarus' ? (((t * 0.76) % 1 + 1) % 1) : (/run|walk/.test(anim || '') ? phase : undefined),
        frameBlendStrength: 0.22,
      };
  const drawAnim = art && (art.drawActedAnimation || art.drawAnimation);
  const drew = canAnimate && anim
    ? drawAnim(ctx, id, anim, animT, x, y, drawOpts)
    : (art && typeof art.drawFilmFrame === 'function'
      ? art.drawFilmFrame(ctx, id, frame, x, y, drawOpts)
    : A.drawFrame(ctx, id, frame, x, y, {
        scale: spriteScale,
        flipX: char === 'achilles' ? false : facing < 0,
      }));
  ctx.restore();
  return drew;
}

function drawPerseusTraveler(ctx, state) {
  const f = state.facing || 1;
  const walk = Math.sin(state.walkPhase || 0);
  const t = state.t || 0;
  const ink = '#0a0a0a';
  function stroke(width, color = ink) {
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
  }

  ctx.save();
  ctx.scale(f, 1);

  // Hard manga shadow.
  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 34, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Winged sandals and legs.
  const step = Math.abs(characterVx(t)) > 0 ? walk : 0;
  stroke(7, '#c49b62');
  ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-14 + step * 8, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 8, -22); ctx.lineTo( 14 - step * 8, 8); ctx.stroke();
  stroke(2.2);
  ctx.beginPath(); ctx.moveTo(-8, -22); ctx.lineTo(-14 + step * 8, 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 8, -22); ctx.lineTo( 14 - step * 8, 8); ctx.stroke();

  ctx.fillStyle = '#f7f2d8';
  for (const sx of [-18 + step * 8, 18 - step * 8]) {
    ctx.beginPath();
    ctx.moveTo(sx - 8, 4);
    ctx.quadraticCurveTo(sx - 22, -2, sx - 9, -10);
    ctx.quadraticCurveTo(sx + 2, -7, sx + 5, 3);
    ctx.closePath();
    ctx.fill();
    stroke(1.8);
    ctx.stroke();
  }

  // Tunic and bronze cuirass.
  ctx.fillStyle = '#f0e3bf';
  ctx.beginPath();
  ctx.moveTo(-22, -24);
  ctx.lineTo(-16, -68);
  ctx.lineTo(16, -68);
  ctx.lineTo(22, -24);
  ctx.closePath();
  ctx.fill();
  stroke(3.5);
  ctx.stroke();

  ctx.fillStyle = '#d4af37';
  ctx.beginPath();
  ctx.ellipse(0, -48, 18, 25, 0, 0, Math.PI * 2);
  ctx.fill();
  stroke(3);
  ctx.stroke();
  stroke(1.4, 'rgba(10,10,10,0.65)');
  ctx.beginPath(); ctx.moveTo(0, -70); ctx.lineTo(0, -26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-10, -52); ctx.quadraticCurveTo(0, -48, 10, -52); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9, -39); ctx.quadraticCurveTo(0, -35, 9, -39); ctx.stroke();

  if (window.Manga && Manga.effects && typeof Manga.effects.halftone === 'function') {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, -48, 18, 25, 0, 0, Math.PI * 2);
    ctx.clip();
    Manga.effects.halftone(ctx, 1, -72, 20, 52, { density: 5, dotSize: 1.5, alpha: 0.45, color: ink });
    ctx.restore();
  }

  // Mirror shield: the identifying object, bright even in dark places.
  ctx.save();
  ctx.translate(-26, -48);
  ctx.rotate(-0.18 + Math.sin(t * 1.8) * 0.04);
  ctx.shadowColor = '#d6fbff';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#d6fbff';
  ctx.beginPath(); ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  stroke(4);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-12, -8); ctx.lineTo(12, -13); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-9, 5); ctx.lineTo(10, 1); ctx.stroke();
  ctx.restore();

  // Sword arm.
  stroke(7, '#c49b62');
  ctx.beginPath(); ctx.moveTo(16, -60); ctx.lineTo(31, -43); ctx.stroke();
  stroke(3, '#edf8ff');
  ctx.shadowColor = '#d6fbff';
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(30, -44); ctx.lineTo(55, -78); ctx.stroke();
  ctx.shadowBlur = 0;
  stroke(2);
  ctx.beginPath(); ctx.moveTo(30, -44); ctx.lineTo(55, -78); ctx.stroke();

  // Head, hair, and winged cap.
  ctx.fillStyle = '#c99a68';
  ctx.fillRect(-5, -77, 10, 9);
  ctx.beginPath(); ctx.ellipse(1, -89, 13.5, 15, 0, 0, Math.PI * 2); ctx.fill();
  stroke(2.4);
  ctx.stroke();
  ctx.fillStyle = '#1a1008';
  ctx.beginPath(); ctx.arc(0, -93, 14, Math.PI * 0.88, Math.PI * 2.02); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-10, -92); ctx.lineTo(-3, -79); ctx.lineTo(-11, -83);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(8, -93); ctx.lineTo(15, -83); ctx.lineTo(8, -82);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#d4af37';
  ctx.beginPath(); ctx.arc(0, -97, 12, Math.PI, 0); ctx.fill();
  stroke(2);
  ctx.stroke();

  ctx.fillStyle = '#fff7d0';
  for (const dir of [-1, 1]) {
    ctx.save();
    ctx.translate(dir * 11, -97);
    ctx.scale(dir, 1);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(19, -10, 33, 1);
    ctx.quadraticCurveTo(16, 4, 0, 0);
    ctx.closePath();
    ctx.fill();
    stroke(1.8);
    ctx.stroke();
    ctx.restore();
  }

  if (window.Manga && Manga.effects && typeof Manga.effects.animeEye === 'function') {
    Manga.effects.animeEye(ctx, 6, -89.5, { sx: 0.86, sy: 0.86, iris: '#37606a', outline: 1.25 });
    Manga.effects.animeCheek(ctx, 1, -82.8, { scale: 0.44, rot: -0.1 });
  } else {
    ctx.fillStyle = ink;
    ctx.beginPath(); ctx.ellipse(5, -89, 1.8, 2.8, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

// Animation timing for fade-ins. After 1.0s the title is in; after 2.4s
// the clue banner fades up; after 3.0s the Return button appears.
const startedAt = performance.now();
function elapsed() { return (performance.now() - startedAt) / 1000; }

const returnBtn = document.getElementById('returnBtn');
function maybeShowReturn() {
  if (elapsed() >= 3.0 && !returnBtn.classList.contains('visible')) {
    returnBtn.classList.add('visible');
  }
}
returnBtn.addEventListener('click', () => { location.href = 'index.html'; });

// Ambient audio per place — kicks in on the first user gesture (key, click,
// pointer) per browser autoplay rules. Stops cleanly on departure.
let audioCtx = null;
let ambience = null;
function maybeStartAmbience() {
  if (audioCtx) return;
  if (!P.ambience) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    ambience = P.ambience(audioCtx);
  } catch (_e) { /* ignore — silent place is acceptable */ }
}
window.addEventListener('keydown', maybeStartAmbience, { once: true });
window.addEventListener('pointerdown', maybeStartAmbience, { once: true });
window.addEventListener('beforeunload', () => {
  try { ambience && ambience.stop(); } catch (_e) {}
});

// Esc / Space / Enter all also return.
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === ' ' || e.key === 'Enter') {
    location.href = 'index.html';
  }
});

function render() {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() / 1000;

  // Place silhouette = background.
  const art = window.GodGames && GodGames.MangaArt;
  if (MANGA_ON && art && typeof art.drawPlaceScene === 'function'
      && art.drawPlaceScene(ctx, placeId, 0, 0, W, H, { t })) {
    // complete manga scene drawn by shared runtime
  } else if (MANGA_ON) {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(244,235,210,0.08)';
    ctx.fillRect(0, H * 0.54, W, H * 0.46);
    if (art && art.mangaAtmosphere) art.mangaAtmosphere(ctx, W, H, { halftoneAlpha: 0.12, scanAlpha: 0.08, vignette: 0.60 });
  } else {
    drawNormalPlaceScene(W, H, t);
  }

  // Character — placed by the place's transform, drawn idle.
  const mangaStage = MANGA_ON && art && typeof art.placeStage === 'function'
    ? art.placeStage(placeId, W, H)
    : null;
  const tf = mangaStage
    ? { x: W * 0.50, y: mangaStage.groundY, scale: mangaStage.travelerScale }
    : (P.characterTransform || (() => ({ x: W/2, y: H*0.7, scale: 1 })))(ctx, W, H);
  drawCharacterAt(tf.x, tf.y, tf.scale);

  // Title — fades in over the first 1.0s.
  const titleAlpha = Math.min(1, elapsed() / 1.0);
  ctx.save();
  ctx.globalAlpha = titleAlpha;
  ctx.textAlign = 'center';
  if (MANGA_ON && art && art.inkText) {
    art.inkText(ctx, P.name, W / 2, H * 0.17, {
      font: `900 ${Math.max(42, Math.min(74, W / 13))}px "Impact", "Arial Black", sans-serif`,
      fill: P.palette.accent || '#D4AF37',
      shadow: P.palette.accent || '#D4AF37',
      shadowBlur: 12,
      strokeWidth: 7,
    });
    ctx.font = `bold ${Math.max(16, Math.min(22, W / 52))}px Georgia, serif`;
    ctx.fillStyle = '#fff1b8';
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 4;
    ctx.strokeText(P.flavor, W / 2, H * 0.17 + 38);
    ctx.fillText(P.flavor, W / 2, H * 0.17 + 38);
  } else {
    ctx.font = 'bold 64px serif';
    ctx.shadowColor = P.palette.accent || '#D4AF37';
    ctx.shadowBlur = 32;
    ctx.fillStyle = P.palette.accent || '#D4AF37';
    ctx.fillText(P.name, W / 2, H * 0.18);
    ctx.shadowBlur = 0;
    ctx.font = 'italic 22px serif';
    ctx.fillStyle = 'rgba(240,230,200,0.85)';
    ctx.fillText(P.flavor, W / 2, H * 0.18 + 36);
  }
  ctx.restore();

  // Decorative ink frame above + below the central tableau.
  ctx.save();
  ctx.globalAlpha = Math.min(1, Math.max(0, (elapsed() - 0.4) / 0.8));
  ctx.strokeStyle = P.palette.accent || '#D4AF37';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = P.palette.accent || '#D4AF37';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(W * 0.10, H * 0.27); ctx.lineTo(W * 0.90, H * 0.27);
  ctx.moveTo(W * 0.10, H * 0.86); ctx.lineTo(W * 0.90, H * 0.86);
  ctx.stroke();
  ctx.restore();

  // Clue banner — fades in starting at t=2.4s. It explains why this realm
  // appeared and how its myth points toward the next hidden action.
  if (clue && (clue.text || clue.realmUncoveringText)) {
    const a = Math.max(0, Math.min(1, (elapsed() - 2.4) / 1.0));
    if (a > 0) {
      ctx.save();
      ctx.globalAlpha = a;
      const banner = clueBannerRect(W, H);
      const accent = P.palette.accent || clue.color || '#D4AF37';
      const main = clue.realmUncoveringText || clue.text || '';
      const nudge = clue.journalNudge || clue.riddle || '';
      const mainLines = wrapText(main, banner.w - 54, MANGA_ON ? 'bold 16px Georgia, serif' : 'italic 16px serif', 3);
      const nudgeLines = wrapText(nudge, banner.w - 54, '12px monospace', 2);
      if (MANGA_ON && art && art.drawPanel) {
        art.drawPanel(ctx, banner.x, banner.y, banner.w, banner.h, {
          paper: 'rgba(244,235,210,0.94)',
          bottom: 'rgba(204,186,150,0.94)',
          accent,
          lineWidth: 4,
          toneAlpha: 0.12,
          shadow: 'rgba(0,0,0,0.48)',
        });
      } else {
        ctx.fillStyle = 'rgba(2, 0, 6, 0.55)';
        ctx.fillRect(banner.x, banner.y, banner.w, banner.h);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.4;
        ctx.strokeRect(banner.x, banner.y, banner.w, banner.h);
      }
      ctx.textAlign = 'center';
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = MANGA_ON ? '#0a0a0a' : '#D4AF37';
      ctx.shadowColor = '#D4AF37'; ctx.shadowBlur = MANGA_ON ? 0 : 6;
      const head = clue.letter
        ? `${clue.letter} UNCOVERED / ${String(clue.realm || P.name).toUpperCase()}`
        : 'A CLUE IS REVEALED';
      ctx.fillText(head, W / 2, banner.y + 25);
      ctx.shadowBlur = 0;
      ctx.font = MANGA_ON ? 'bold 16px Georgia, serif' : 'italic 16px serif';
      ctx.fillStyle = MANGA_ON ? '#21170d' : 'rgba(240,235,210,0.95)';
      mainLines.forEach((l, i) => ctx.fillText(l, W / 2, banner.y + 52 + i * 20));
      if (nudgeLines.length) {
        ctx.font = '12px monospace';
        ctx.fillStyle = MANGA_ON ? 'rgba(48,31,15,0.78)' : 'rgba(220,200,150,0.72)';
        nudgeLines.forEach((l, i) => ctx.fillText(l, W / 2, banner.y + 62 + mainLines.length * 20 + i * 15));
      }
      ctx.restore();
    }
  } else {
    // No clue yet — show a generic "you have learned something" line so
    // the screen never feels empty.
    const a = Math.max(0, Math.min(1, (elapsed() - 2.4) / 1.0));
    if (a > 0) {
      ctx.save();
      ctx.globalAlpha = a;
      ctx.textAlign = 'center';
      ctx.font = MANGA_ON ? 'bold 18px Georgia, serif' : 'italic 18px serif';
      ctx.fillStyle = MANGA_ON ? '#fff1b8' : 'rgba(240,235,210,0.85)';
      if (MANGA_ON) {
        ctx.strokeStyle = '#0a0a0a';
        ctx.lineWidth = 4;
        ctx.strokeText('You have learned something the gods do not give twice.', W / 2, H * 0.78);
      }
      ctx.fillText('You have learned something the gods do not give twice.', W / 2, H * 0.78);
      ctx.restore();
    }
  }

  maybeShowReturn();
  drawPlaceDebugOverlay(tf);
  requestAnimationFrame(render);
}

function domRectOnCanvas(el) {
  if (!el) return null;
  const cr = canvas.getBoundingClientRect();
  const br = el.getBoundingClientRect();
  if (!cr.width || !cr.height || !br.width || !br.height) return null;
  return {
    x: (br.left - cr.left) * canvas.width / cr.width,
    y: (br.top - cr.top) * canvas.height / cr.height,
    w: br.width * canvas.width / cr.width,
    h: br.height * canvas.height / cr.height,
  };
}

function drawPlaceDebugOverlay(tf) {
  const debug = window.GodGames && GodGames.Debug;
  if (!debug || typeof debug.draw !== 'function' || (typeof debug.collecting === 'function' && !debug.collecting())) return;
  const W = canvas.width, H = canvas.height;
  const items = [];
  if (tf) {
    items.push({
      role: 'player',
      x: tf.x,
      y: tf.y,
      r: Math.max(16, 30 * (tf.scale || 1)),
      label: 'traveler ground',
      alpha: 0.55,
    });
    items.push({
      role: 'player',
      x1: Math.max(0, tf.x - W * 0.18),
      y1: tf.y,
      x2: Math.min(W, tf.x + W * 0.18),
      y2: tf.y,
      label: 'traveler drift lane',
      dash: [8, 5],
      alpha: 0.48,
    });
  }
  const returnRect = domRectOnCanvas(returnBtn);
  if (returnRect) items.push(Object.assign({ role: 'hotspot', center: false, label: 'return button', alpha: 0.62 }, returnRect));
  const banner = clueBannerRect(W, H);
  items.push(Object.assign({ role: 'visual', center: false, label: 'clue banner', alpha: 0.34 }, banner));
  debug.draw(ctx, { game: `place:${placeId}`, items });
}

function clueBannerRect(W, H) {
  const w = Math.min(W * 0.82, 920);
  const h = Math.max(126, Math.min(148, H * 0.20));
  const y = Math.min(H * 0.72, H - h - 88);
  return { x: (W - w) / 2, y, w, h };
}

// Tiny text wrapper (we don't have wrapText globally on this page).
function wrapText(text, maxW, font, maxLines) {
  ctx.save(); ctx.font = font;
  const words = String(text).split(' ');
  const out = []; let line = '';
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW && line) {
      if (maxLines && out.length >= maxLines - 1) {
        out.push((line + ' ...').trim());
        line = '';
        break;
      }
      out.push(line); line = w;
    }
    else line = test;
  }
  if (line) out.push(line);
  ctx.restore();
  return out;
}

render();
</script>
</body>
