<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achilles — God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family: 'Trebuchet MS', serif; color:#f0e8d0; }
canvas { display:block; }

/* ── Name prompt modal ── */
.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #1a0a08 0%, #050200 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow: 0 0 50px rgba(212,175,55,0.4);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(240,215,122,0.7); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(10,4,2,0.7); border:1px solid rgba(212,175,55,0.5);
  color:#f0e8d0; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.4); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#1a0f00;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE WARRIOR</h3>
    <p>Speak your name before facing the gauntlet.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">TAKE THE FIELD</button>
  </div>
</div>
<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="assets/manga/achilles/manifest.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// ── Constants ─────────────────────────────────────────────────────────────
const PLAYER_R = 26;
const HP_MAX   = 5;
const SPD      = 400;
const WAVE_BASE= 1.4;
const WAVE_MIN = 0.32;
const RAMP     = 0.07;
const TILE     = 72;

// Layout — recomputed on boot + resize (depend on Engine.W/H).
let PLAYER_Y, LANE_L, LANE_R;
let archerXs, tileColors, stars;
let archers = []; // {x, downT, glow} per archer slot — manga state
const ACHILLES_MANGA_SHEET = 'godgames.achilles.actionSheet';
const ACHILLES_MANGA_ANIM_SHEET = 'godgames.achilles.animSheet';
const ACHILLES_MANGA_ARCHER_SHEET = 'godgames.achilles.archerSheet';
const ACHILLES_MANGA_FXHUD_SHEET = 'godgames.achilles.fxHudSheet';
const ACHILLES_MANGA_BATTLEFIELD = 'godgames.achilles.battlefield';
let achillesMangaStageCache = null;
function initLayout() {
  achillesMangaStageCache = null;
  const W = Engine.W, H = Engine.H;
  PLAYER_Y = H * 0.82;
  LANE_L   = W * 0.06;
  LANE_R   = W * 0.94;
  archerXs = Array.from({length:10}, (_,i) => LANE_L + (LANE_R - LANE_L) * ((i + 0.5) / 10));
  archers  = archerXs.map(x => ({ x, downT: 0, glow: 0, releaseT: 0, drawT: 0 }));
  tileColors = [];
  for (let ty = 0; ty * TILE < H; ty++) {
    const row = [];
    for (let tx = 0; tx * TILE < W; tx++) {
      const v = 38 + Math.floor(Math.random() * 14);
      row.push(`rgb(${v},${v-4},${v-10})`);
    }
    tileColors.push(row);
  }
  stars = Array.from({length:80}, () => ({
    x: Math.random()*W, y: Math.random()*H*0.14,
    r: Math.random()*1.4+0.2, phase: Math.random()*Math.PI*2,
  }));
}

// ── Game state ────────────────────────────────────────────────────────────
let player;
let arrows = [];
let particles = [];
let floaters = [];
let waveTimer = 1.8;
let playTime = 0;
let score = 0, xp = 0;
let time = 0;     // mirror of Engine.time
let canvas, ctx;

// ── Manga polish (lazy — sub-files in manga/ load async) ──────────────────
let mangaPunch = null;       // Manga.fx.cameraPunch instance
let mangaSlomo = null;       // Manga.fx.slomo instance
let mangaDeathT = 0;         // Engine.time when death entered (drives panel-split)

// ── Manga abilities (player) ──────────────────────────────────────────────
let bashT  = 0, bashCD  = 0;       // shield bash: deflect window + cooldown
let bowT   = 0, bowCD   = 0;       // counter shot: bow-pose anim + cooldown
let heelT  = 0, heelCD  = 0;       // Heel Strike: invuln + AoE downs all archers
const HEEL_DUR = 1.5, HEEL_CD = 30;
let heelOneHpAccumulator = 0;       // tenths-of-a-second accumulator for the
                                    // achilles_one_hp_seconds_x10 counter
const BASH_DUR = 0.4, BASH_CD = 5; // tunable
const BOW_POSE = 0.30, BOW_CD = 2.5;
let returnArrows = [];             // arrows player has fired UPWARD at archers
let bashFacing = 1, bowFacing = 1, heelFacing = 1, hurtFacing = 1;
let bowTargetX = null;

// ── Archer enemy specials (manga only) ────────────────────────────────────
let pendingSpecial = null;     // 'volley' | 'inferno' | 'echo' — pre-rolled before a wave
let mangaTexts = [];           // {text, x, y, t, color, size} — manga sfxText popups
function mangaReady() {
  return Engine.manga && window.Manga && Manga.fx && Manga.fx.cameraPunch && Manga.fx.slomo && Manga.characters && Manga.characters.achilles;
}
function ensureMangaFx() {
  if (!mangaReady()) return false;
  if (!mangaPunch) mangaPunch = Manga.fx.cameraPunch();
  if (!mangaSlomo) mangaSlomo = Manga.fx.slomo();
  return true;
}

function achillesMangaAssetReady(id) {
  return !!(Engine.manga
    && window.GodGames && GodGames.MangaArt
    && typeof GodGames.MangaArt.ready === 'function'
    && GodGames.MangaArt.ready(id));
}

function achillesMangaArt() {
  return window.GodGames && GodGames.MangaArt ? GodGames.MangaArt : null;
}

function archerLineY() {
  if (achillesMangaAssetReady(ACHILLES_MANGA_BATTLEFIELD)) return Engine.H * 0.46;
  return 28;
}

function archerArrowStartY() {
  return achillesMangaAssetReady(ACHILLES_MANGA_BATTLEFIELD) ? archerLineY() - 30 : 28;
}

// ── Hall of Mount Olympus ─────────────────────────────────────────────────
const NAME_KEY = 'godgames_playerName';
let hallRank = null;
let hallStatus = null;       // 'pending' | 'ok' | 'fail'
let submittedThisRun = false;

async function submitToHall(finalScore) {
  const name = localStorage.getItem(NAME_KEY) || 'NAMELESS MORTAL';
  const game = Engine.manga ? 'achilles-manga' : 'achilles';
  hallStatus = 'pending';
  try {
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, name, score: finalScore }),
    });
    if (!res.ok) { hallStatus = 'fail'; return; }
    const json = await res.json();
    hallRank = json.rank;
    hallStatus = 'ok';
    // Pantheon mystery hint + top-10 progress.
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('first_score');
      if (hallRank && hallRank <= 10) GodGames.Mysteries.tally('olympus_top10_count');
    }
  } catch {
    hallStatus = 'fail';
  }
}

// ── Audio (uses the engine's shared audio context) ────────────────────────
function beep(freq, dur, type = 'square', vol = 0.18, detune = 0) {
  const ac = Engine.audio._ctx;
  if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type;
  o.frequency.value = freq;
  o.detune.value = detune;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sfx = {
  hit:    () => { beep(100, 0.28, 'sawtooth', 0.24); beep(75, 0.20, 'square', 0.14); },
  death:  () => { beep(160, 0.6, 'sawtooth', 0.28); beep(70, 0.9, 'sawtooth', 0.18); },
  step:   () => { beep(180 + Math.random()*40, 0.04, 'sine', 0.05); },
  arrow:  () => { beep(700 + Math.random()*300, 0.04, 'square', 0.06); },
  xp:     () => { beep(660, 0.07, 'sine', 0.15); beep(990, 0.10, 'sine', 0.12); },
  impact: () => { beep(300, 0.10, 'square', 0.09); beep(200, 0.08, 'sawtooth', 0.07); },
};

// ── Helpers ───────────────────────────────────────────────────────────────
function burst(x, y, color, n = 14, speedMul = 1) {
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = (60 + Math.random() * 200) * speedMul;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 40,
      alpha: 1,
      r: 2 + Math.random() * 4,
      color,
    });
  }
}
function addFloater(x, y, text, color) {
  floaters.push({ x, y, vy: -55, alpha: 1, text, color, t: 0 });
}

// ── Init / reset ──────────────────────────────────────────────────────────
function resetGame() {
  player = {
    x: Engine.W * 0.5, visualX: Engine.W * 0.5, vx: 0, visualVx: 0, visualLean: 0,
    hp: HP_MAX, iframes: 0, hitFlash: 0,
    walkPhase: 0, stepT: 0, facing: 1,
  };
  arrows = []; particles = []; floaters = [];
  returnArrows = [];
  score = 0; xp = 0; playTime = 0; waveTimer = 1.8;
  hallRank = null; hallStatus = null; submittedThisRun = false;
  mangaDeathT = 0;
  bashT = 0; bashCD = 0;
  bowT = 0; bowCD = 0;
  heelT = 0; heelCD = 0;
  bashFacing = 1; bowFacing = 1; heelFacing = 1; hurtFacing = 1;
  bowTargetX = null;
  heelOneHpAccumulator = 0;
  pendingSpecial = null;
  mangaTexts.length = 0;
  if (archers) for (const a of archers) { a.downT = 0; a.glow = 0; a.releaseT = 0; a.drawT = 0; }
  patroclusKills.length = 0;
}

// Mystery: Shade of Patroclus — three counter-shot kills bunched together.
// The bow cooldown is 2.5s, so 3 shots take ≥5s minimum — window is wide
// enough to be reachable through deliberate play but tight enough that
// random play won't trigger it. Ring buffer of timestamps trimmed each call.
const PATROCLUS_WINDOW_MS = 6500;
const PATROCLUS_GOAL = 3;
const patroclusKills = [];
function recordPatroclusKill() {
  const now = performance.now();
  patroclusKills.push(now);
  while (patroclusKills.length && now - patroclusKills[0] > PATROCLUS_WINDOW_MS) {
    patroclusKills.shift();
  }
  if (patroclusKills.length >= PATROCLUS_GOAL) {
    patroclusKills.length = 0;
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.unlockAndDepart({
        hintId:   'u',
        placeId:  'erebus',
        fromGame: 'achilles',
      });
    }
  }
}

if (new URLSearchParams(location.search).get('testHooks') === '1') {
  window.GodGames = window.GodGames || {};
  window.GodGames.AchillesTest = {
    recordPatroclusKill,
    canCounterShotInNormalMode() {
      return !!(window.Engine && Engine.state === 'playing' && !Engine.manga
        && bowCD <= 0 && archers.some(a => a.downT <= 0));
    },
  };
}

// ── Wave builder ──────────────────────────────────────────────────────────
// `special` is null in normal mode, or 'volley'/'inferno'/'echo' in manga mode.
function pickArcherIndex() {
  if (!archers || archers.length === 0) return -1;
  const alive = [];
  for (let i = 0; i < archers.length; i++) if (archers[i].downT <= 0) alive.push(i);
  if (alive.length === 0) return Math.floor(Math.random() * archers.length);
  return alive[Math.floor(Math.random() * alive.length)];
}

function spawnWave(special) {
  const diff  = Math.min(1, playTime / 60);
  const speed = 380 + diff * 460 + Math.random() * 100;

  // Each spawned arrow starts at the firing archer's position so it visually
  // originates from them. We also fire releaseT on that archer so the bow flashes.
  function spawnArrowFromArcher(ai, props) {
    const a = archers[ai];
    if (a) a.releaseT = Math.max(a.releaseT, 0.18);
    const startY = a ? archerArrowStartY() + (Math.random() - 0.5) * 4 : -(15 + Math.random() * 40);
    const originX = a ? a.x : props.x;
    const targetX = props.x;
    const speedScale = Engine.manga && a
      ? Math.max(0.45, (PLAYER_Y - startY) / Math.max(120, PLAYER_Y - 28))
      : 1;
    arrows.push({
      x: originX,
      y: startY,
      visualX: originX,
      visualY: startY,
      visualTilt: 0,
      originX,
      originY: startY,
      targetX,
      targetY: PLAYER_Y,
      arcOffset: (targetX - originX) * 0.08 + (Math.random() - 0.5) * 18,
      speed: props.speed * speedScale,
      alive: true, landed: false,
      targeted: !!props.targeted,
      originIdx: ai,
      ...(props.extra || {}),
    });
  }

  // ── Volley special: 5-arrow fan converging on predicted player position ─
  if (special === 'volley') {
    const targetX = player.x + player.vx * 0.25;
    const ai = pickArcherIndex();
    for (let i = 0; i < 5; i++) {
      const tx = targetX + (i - 2) * 26;
      spawnArrowFromArcher(ai, {
        x: Math.max(LANE_L + 10, Math.min(LANE_R - 10, tx)),
        speed: speed * 0.95 + (Math.random() - 0.5) * 40,
        targeted: true,
      });
    }
    sfx.arrow();
    return;
  }

  // Build arrow specs first so we can apply specials post-hoc
  const specs = [];
  const numTargeted = 2 + Math.floor(diff * 3) + Math.floor(Math.random() * 2);
  const spread = Math.max(18, 45 - diff * 28);
  for (let i = 0; i < numTargeted; i++) {
    const x = player.x + (Math.random() - 0.5) * spread * 2;
    specs.push({
      ai: pickArcherIndex(),
      x: Math.max(LANE_L + 10, Math.min(LANE_R - 10, x)),
      speed: speed + (Math.random() - 0.5) * 80,
      targeted: true, extra: {},
    });
  }
  const numDecoy = 1 + Math.floor(Math.random() * (1 + Math.floor(diff * 1.5)));
  for (let i = 0; i < numDecoy; i++) {
    let x, attempts = 0;
    do {
      x = LANE_L + Math.random() * (LANE_R - LANE_L);
      attempts++;
    } while (Math.abs(x - player.x) < 90 && attempts < 20);
    specs.push({
      ai: pickArcherIndex(),
      x,
      speed: speed + (Math.random() - 0.5) * 80,
      targeted: false, extra: {},
    });
  }

  // Apply manga-only modifiers
  if (special === 'inferno') {
    const target = specs.find(s => s.targeted) || specs[0];
    if (target) {
      target.extra.inferno = true;
      target.speed *= 1.5;
    }
  } else if (special === 'echo') {
    for (const s of specs) s.extra.echoArmed = true;
  }

  for (const s of specs) spawnArrowFromArcher(s.ai, s);
  sfx.arrow();
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  // Manga polish: scale dt by slo-mo, decay camera-punch.
  if (ensureMangaFx()) {
    dt = mangaSlomo.scaleDt(dt);
    mangaPunch.update(dt);
  }

  // Manga ability cooldowns + archer state decay (cheap to always run)
  bashT  = Math.max(0, bashT  - dt);
  bashCD = Math.max(0, bashCD - dt);
  bowT   = Math.max(0, bowT   - dt);
  bowCD  = Math.max(0, bowCD  - dt);
  heelT  = Math.max(0, heelT  - dt);
  heelCD = Math.max(0, heelCD - dt);
  // Heel Strike grants invuln while active.
  if (heelT > 0) player.iframes = Math.max(player.iframes, heelT);
  if (archers) for (const a of archers) {
    a.downT    = Math.max(0, a.downT    - dt);
    a.glow     = Math.max(0, a.glow     - dt);
    a.releaseT = Math.max(0, a.releaseT - dt);
    a.drawT    = Math.max(0, a.drawT    - dt);
  }
  for (let i = mangaTexts.length - 1; i >= 0; i--) {
    mangaTexts[i].t -= dt;
    if (mangaTexts[i].t <= 0) mangaTexts.splice(i, 1);
  }

  // Player's return arrows — rise toward target archer; on contact, disable.
  for (let i = returnArrows.length - 1; i >= 0; i--) {
    const ra = returnArrows[i];
    ra.y += ra.vy * dt; // vy is negative
    ra.trailT += dt;
    const target = archers[ra.targetIdx];
    const targetY = archerLineY();
    const targetX = target ? target.x : (ra.targetX ?? ra.fromX);
    const travel = clamp01((ra.fromY - ra.y) / Math.max(1, ra.fromY - targetY));
    ra.x = ra.fromX + (targetX - ra.fromX) * travel;
    if (target && ra.y <= targetY + 8) {
      target.downT = 4;
      target.releaseT = 0;
      target.drawT = 0;
      const impactX = Engine.manga
        ? mangaStageProjectedX(target.x, targetY, { backPull: 0.90, curve: 0.95 })
        : target.x;
      // Manga particle burst at archer
      burst(impactX, targetY, '#fff5c0', 14, 1.0);
      burst(impactX, targetY, '#ffd54a', 8, 0.6);
      mangaTexts.push({ text: 'HIT!', x: impactX, y: targetY - 28, t: 0.4, color: '#fff5c0', size: 26 });
      // Mystery: Shade of Patroclus — archer downs that all land within 2
      // seconds of each other earn 'lay'. Kept as a small ring buffer of
      // recent kill timestamps; trim everything older than 2s, then check
      // length >= 3.
      if (window.GodGames && GodGames.Mysteries) {
        recordPatroclusKill();
        // Glyph: Heel Mark — counter-shooting the leftmost archer specifically.
        // Mythological: Achilles's vulnerable heel was on the left side of his
        // body; the leftmost archer carries the sigil.
        if (ra.targetIdx === 0 && window.Engine && Engine.unlock && !Engine.unlock.has('glyph_achilles_found')) {
          Engine.unlock.set('glyph_achilles_found');
          GodGames.Mysteries.earnHint('glyph_first');
          GodGames.Mysteries.tally('glyphs_found');
          mangaTexts.push({ text: 'A MARK!', x: impactX, y: targetY + 32, t: 1.0, color: '#ffd54a', size: 26 });
          burst(impactX, targetY, '#ffd54a', 22, 220);
        }
      }
      returnArrows.splice(i, 1);
    } else if (ra.y < -40) {
      returnArrows.splice(i, 1);
    }
  }

  playTime += dt;

  // Player movement
  const left  = Engine.keys['ArrowLeft']  || Engine.keys['a'];
  const right = Engine.keys['ArrowRight'] || Engine.keys['d'];
  player.vx = right ? SPD : left ? -SPD : 0;
  if (player.vx) {
    player.facing = player.vx > 0 ? 1 : -1;
    player.walkPhase += dt * 10;
    player.stepT -= dt;
    if (player.stepT <= 0) { sfx.step(); player.stepT = 0.16; }
  }
  player.visualVx += (player.vx - player.visualVx) * Math.min(1, dt * 12);
  player.visualLean += ((player.visualVx / SPD) * 0.035 - player.visualLean) * Math.min(1, dt * 10);
  player.x = Math.max(LANE_L + 20, Math.min(LANE_R - 20, player.x + player.vx * dt));
  if (typeof player.visualX !== 'number') player.visualX = player.x;
  player.visualX += (player.x - player.visualX) * Math.min(1, dt * (Math.abs(player.vx) > 20 ? 18 : 14));

  if (player.iframes  > 0) player.iframes  = Math.max(0, player.iframes  - dt);
  if (player.hitFlash > 0) player.hitFlash = Math.max(0, player.hitFlash - dt);

  // Mystery: Heel of Achilles — accumulate time spent at 1 HP across runs.
  // Tallies in tenths of a second so Engine.unlock's integer counter can
  // track sub-second progress. 50 ticks (= 5s cumulative) → 'heel_of_achilles' solves.
  if (player.hp === 1) {
    heelOneHpAccumulator += dt;
    while (heelOneHpAccumulator >= 0.1) {
      heelOneHpAccumulator -= 0.1;
      if (window.GodGames && GodGames.Mysteries) {
        GodGames.Mysteries.tally('achilles_one_hp_seconds_x10');
      }
    }
  }

  // Wave spawn
  const interval = Math.max(WAVE_MIN, WAVE_BASE - playTime * RAMP);
  waveTimer -= dt;

  // Manga-only: pre-roll a special when the wave is ~0.45s away so we can telegraph it.
  if (Engine.manga && pendingSpecial === null && waveTimer < 0.45 && waveTimer > 0) {
    const r = Math.random();
    if      (r < 0.18) pendingSpecial = 'volley';
    else if (r < 0.30) pendingSpecial = 'inferno';
    else if (r < 0.42) pendingSpecial = 'echo';
    if (pendingSpecial) {
      const labels = { volley: 'VOLLEY!', inferno: 'INFERNO!', echo: 'ECHO!' };
      const colors = { volley: '#ffaa44', inferno: '#ff2200', echo: '#aaccff' };
      mangaTexts.push({
        text: labels[pendingSpecial], x: Engine.W / 2, y: Engine.H * 0.30,
        t: 0.6, color: colors[pendingSpecial], size: 50,
      });
      // Glow archers as a second telegraph
      for (const a of archers) {
        a.glow = Math.max(a.glow, 0.45);
        a.drawT = Math.max(a.drawT, 0.35);
      }
    }
  }

  if (waveTimer <= 0) {
    spawnWave(pendingSpecial);
    pendingSpecial = null;
    waveTimer = interval + (Math.random() - 0.5) * 0.25;
  }

  // Arrows
  for (const a of arrows) {
    if (!a.alive) continue;
    a.y += a.speed * dt;
    updateArrowTrajectory(a);
    if (typeof a.visualX !== 'number') a.visualX = a.x;
    if (typeof a.visualY !== 'number') a.visualY = a.y;
    if (typeof a.visualTilt !== 'number') a.visualTilt = 0;
    a.visualX += (a.x - a.visualX) * Math.min(1, dt * 18);
    a.visualY += (a.y - a.visualY) * Math.min(1, dt * 18);
    if (window.GodGames && GodGames.Debug && typeof GodGames.Debug.clampVisualDrift === 'function') {
      GodGames.Debug.clampVisualDrift(a, PLAYER_R + 12, {
        maxDrift: (PLAYER_R + 12) * 0.32,
        label: 'arrow',
      });
    }
    const targetTilt = ((a.targetX ?? a.x) - (a.originX ?? a.x)) / Math.max(1, Engine.W) * 0.32
      + Math.sin(time * 13 + a.x * 0.02) * 0.025;
    a.visualTilt += (targetTilt - a.visualTilt) * Math.min(1, dt * 14);

    // Echo special: original arrow spawns a phantom mid-flight that lands later.
    if (a.echoArmed && !a.echoSpawned && a.y > PLAYER_Y * 0.5) {
      a.echoSpawned = true;
      const echoOriginX = a.x + (Math.random() - 0.5) * 28;
      const echoTargetX = (a.targetX ?? a.x) + (Math.random() - 0.5) * 28;
      arrows.push({
        x: echoOriginX,
        y: -10,
        visualX: echoOriginX,
        visualY: -10,
        visualTilt: 0,
        originX: echoOriginX,
        originY: -10,
        targetX: echoTargetX,
        targetY: PLAYER_Y,
        arcOffset: (Math.random() - 0.5) * 18,
        speed: a.speed,
        alive: true, landed: false,
        targeted: a.targeted,
        originIdx: a.originIdx,
        isEcho: true,
      });
    }

    if (a.y >= PLAYER_Y && !a.landed) {
      a.landed = true;
      const dist = Math.abs(a.x - player.x);
      const inHitbox = dist < PLAYER_R + 12;

      // SHIELD BASH: deflect any in-hitbox arrow during bash window.
      if (inHitbox && bashT > 0 && Engine.manga) {
        bashFacing = facingTowardX(a.x, bashFacing);
        // Down the originating archer for 5s.
        if (a.originIdx != null && archers[a.originIdx]) archers[a.originIdx].downT = 5;
        burst(a.x, PLAYER_Y, '#fff5c0', 16, 1.0);
        burst(a.x, PLAYER_Y - 10, '#ffd54a', 8, 0.7);
        addFloater(a.x, PLAYER_Y - 60, 'PARRY!', '#fff5c0');
        Engine.shake(5);
        setTimeout(() => { a.alive = false; }, 50);
        continue;
      }

      if (inHitbox && player.iframes <= 0) {
        // Hit
        hurtFacing = facingTowardX(a.x, player.facing);
        player.facing = hurtFacing;
        player.hp--;
        player.iframes = 0.85;
        player.hitFlash = 0.35;
        sfx.hit(); Engine.shake(9);
        burst(player.x, PLAYER_Y - 10, '#ff3300', 18);
        burst(a.x, PLAYER_Y, '#cc2200', 8, 0.6);
        addFloater(player.x, PLAYER_Y - 80, '-1 HP', '#ff4422');
        // Manga polish: camera punch + micro-stutter
        if (ensureMangaFx()) {
          const p = Manga.characters.achilles.polish.onHit;
          mangaPunch.trigger(
            (Math.random() - 0.5) * p.punchIntensity * 2,
            (Math.random() - 0.5) * p.punchIntensity * 2,
            p.punchDuration,
          );
          mangaSlomo.trigger(p.slomoFactor, p.slomoDuration);
        }
        if (player.hp <= 0) {
          burst(player.x, PLAYER_Y - 10, '#ff6600', 32);
          burst(player.x, PLAYER_Y - 10, '#ffcc00', 20);
          sfx.death();
          if (!submittedThisRun) {
            submittedThisRun = true;
            submitToHall(Math.floor(score));
          }
          // Manga polish: long slo-mo + layered death SFX + start panel-split
          if (ensureMangaFx()) {
            const p = Manga.characters.achilles.polish.onDeath;
            mangaSlomo.trigger(p.slomoFactor, p.slomoDuration);
            if (Engine.audio._ctx) Manga.fx.sfxLayered(Engine.audio._ctx, p.audioLayers);
            mangaDeathT = Engine.time;
          }
          Engine.setState('dead');
        }
      } else {
        // Dodge — award XP
        xp    += 10;
        score += 10 + Math.floor(playTime * 0.5);
        sfx.xp(); sfx.impact();
        burst(a.x, PLAYER_Y + 4, '#c8c840', 7, 0.5);
        addFloater(a.x, PLAYER_Y - 40, '+10 XP', Engine.GOLD);
      }
      setTimeout(() => { a.alive = false; }, 120);
    }
    if (a.y > Engine.H + 60) a.alive = false;
  }
  arrows = arrows.filter(a => a.alive);

  // Particles
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 320 * dt; p.alpha -= dt * 2.4;
  }
  particles = particles.filter(p => p.alpha > 0);

  // Floaters
  for (const f of floaters) {
    f.y += f.vy * dt; f.t += dt; f.alpha = Math.max(0, 1 - f.t * 1.7);
  }
  floaters = floaters.filter(f => f.alpha > 0);

  score += dt * 5;
}

// ── Draw: overhead stone battlefield ───────────────────────────────────────
function drawGround() {
  const W = Engine.W, H = Engine.H;
  ctx.fillStyle = '#2e2820';
  ctx.fillRect(0, 0, W, H);

  for (let ty = 0; ty * TILE < H; ty++) {
    for (let tx = 0; tx * TILE < W; tx++) {
      ctx.fillStyle = (tileColors[ty] && tileColors[ty][tx]) || '#363028';
      ctx.fillRect(tx * TILE, ty * TILE, TILE - 1, TILE - 1);
    }
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y <= H; y += TILE) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  ctx.fillStyle = 'rgba(255,240,180,0.04)';
  ctx.fillRect(W*0.25, 0, W*0.5, H);

  const edgeG = ctx.createLinearGradient(0, 0, LANE_L * 2, 0);
  edgeG.addColorStop(0, 'rgba(0,0,0,0.55)');
  edgeG.addColorStop(1, 'rgba(0,0,0,0.00)');
  ctx.fillStyle = edgeG; ctx.fillRect(0, 0, LANE_L * 2, H);
  const edgeGR = ctx.createLinearGradient(W, 0, W - LANE_L * 2, 0);
  edgeGR.addColorStop(0, 'rgba(0,0,0,0.55)');
  edgeGR.addColorStop(1, 'rgba(0,0,0,0.00)');
  ctx.fillStyle = edgeGR; ctx.fillRect(W - LANE_L * 2, 0, LANE_L * 2, H);

  const zoneG = ctx.createLinearGradient(0, PLAYER_Y - 60, 0, PLAYER_Y + 60);
  zoneG.addColorStop(0, 'rgba(212,175,55,0.00)');
  zoneG.addColorStop(0.5, 'rgba(212,175,55,0.07)');
  zoneG.addColorStop(1, 'rgba(212,175,55,0.00)');
  ctx.fillStyle = zoneG; ctx.fillRect(0, PLAYER_Y - 60, W, 120);
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function mangaStage() {
  const W = Engine.W, H = Engine.H;
  return {
    W, H,
    vanishX: W * 0.5,
    horizonY: H * 0.48,
    wallY: archerLineY(),
    playerY: PLAYER_Y,
    nearY: H,
  };
}

function mangaStageDepth(y) {
  const s = mangaStage();
  return clamp01((y - s.wallY) / Math.max(1, s.playerY - s.wallY));
}

function mangaStageProjectedX(x, y, opts = {}) {
  const s = mangaStage();
  const d = Math.pow(mangaStageDepth(y), opts.curve ?? 0.85);
  const backPull = opts.backPull ?? 0.62;
  const pull = backPull + (1 - backPull) * d;
  return s.vanishX + (x - s.vanishX) * pull;
}

function mangaStageScale(y, farScale, nearScale, opts = {}) {
  const d = Math.pow(mangaStageDepth(y), opts.curve ?? 0.72);
  return farScale + (nearScale - farScale) * d;
}

function arrowFlightProgress(a) {
  const originY = a.originY ?? 0;
  const targetY = a.targetY ?? PLAYER_Y;
  return clamp01((a.y - originY) / Math.max(1, targetY - originY));
}

function updateArrowTrajectory(a) {
  const p = arrowFlightProgress(a);
  if (typeof a.originX === 'number' && typeof a.targetX === 'number') {
    const eased = Math.pow(p, 0.92);
    const drift = Math.sin(p * Math.PI) * ((a.arcOffset ?? 0) * 0.18);
    a.x = a.originX + (a.targetX - a.originX) * eased + drift;
  }
  return p;
}

function facingTowardX(targetX, fallback = 1) {
  const fb = fallback < 0 ? -1 : 1;
  if (!player || typeof targetX !== 'number' || Math.abs(targetX - player.x) < 8) return fb;
  return targetX < player.x ? -1 : 1;
}

function achillesBowHandAnchor(facing = bowFacing) {
  const f = facing < 0 ? -1 : 1;
  return {
    x: player.x + f * 34,
    y: PLAYER_Y - 76,
  };
}

function incomingArrowThreat(opts = {}) {
  if (!player || !arrows || arrows.length === 0) return null;
  const minProgress = opts.minProgress ?? 0.64;
  const maxDist = opts.maxDist ?? (opts.includeWide ? PLAYER_R + 108 : PLAYER_R + 42);
  let best = null;
  let bestScore = -Infinity;

  for (const a of arrows) {
    if (!a.alive || a.landed) continue;
    const progress = arrowFlightProgress(a);
    if (progress < minProgress) continue;
    const targetX = a.targetX ?? a.x;
    const dist = Math.abs(targetX - player.x);
    if (dist > maxDist) continue;
    const closeness = 1 - Math.min(1, dist / Math.max(1, maxDist));
    const score = progress * 2 + closeness + (a.targeted ? 0.35 : 0);
    if (score > bestScore) {
      bestScore = score;
      best = { arrow: a, progress, targetX, dist };
    }
  }

  return best;
}

function drawMangaContactShadow(x, y, opts = {}) {
  const s = mangaStage();
  const d = mangaStageDepth(y);
  const art = achillesMangaArt();
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  const w = opts.w ?? (18 + d * 58);
  const h = opts.h ?? (4 + d * 15);
  const alpha = opts.alpha ?? (0.18 + d * 0.34);
  const rot = ((x - s.vanishX) / Math.max(1, s.W)) * 0.22;

  ctx.save();
  ctx.globalAlpha *= alpha;
  ctx.fillStyle = opts.color || 'rgba(0,0,0,0.82)';
  ctx.beginPath();
  ctx.ellipse(x, y + (opts.offsetY ?? 8), w, h, rot, 0, Math.PI * 2);
  ctx.fill();
  if (heavy || opts.rim === true) {
    ctx.globalAlpha *= 0.32;
    ctx.strokeStyle = 'rgba(255,210,120,0.55)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(x, y + (opts.offsetY ?? 8), w * 0.72, h * 0.56, rot, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMangaStageFloorUnderlay(opts = {}, targetCtx = ctx) {
  const s = mangaStage();

  const c = targetCtx;
  c.save();
  const wallBand = c.createLinearGradient(0, s.wallY - 74, 0, s.wallY + 58);
  wallBand.addColorStop(0, 'rgba(0,0,0,0.00)');
  wallBand.addColorStop(0.48, opts.title ? 'rgba(20,0,0,0.22)' : 'rgba(20,0,0,0.30)');
  wallBand.addColorStop(1, 'rgba(0,0,0,0.00)');
  c.fillStyle = wallBand;
  c.fillRect(0, s.wallY - 74, s.W, 132);

  c.strokeStyle = opts.title ? 'rgba(10,10,10,0.24)' : 'rgba(10,10,10,0.34)';
  c.lineWidth = 1.4;
  for (let i = 0; i <= 8; i++) {
    const t = i / 8;
    const x = LANE_L + (LANE_R - LANE_L) * t;
    const hx = s.vanishX + (x - s.vanishX) * 0.18;
    c.beginPath();
    c.moveTo(hx, s.horizonY);
    c.lineTo(x, s.H);
    c.stroke();
  }

  const depthWash = c.createLinearGradient(0, s.horizonY, 0, s.H);
  depthWash.addColorStop(0, 'rgba(255,190,90,0.00)');
  depthWash.addColorStop(0.58, opts.title ? 'rgba(255,210,130,0.08)' : 'rgba(255,210,130,0.12)');
  depthWash.addColorStop(1, 'rgba(0,0,0,0.18)');
  c.fillStyle = depthWash;
  c.fillRect(0, s.horizonY, s.W, s.H - s.horizonY);

  const laneG = c.createRadialGradient(s.vanishX, s.playerY - 38, s.W * 0.06, s.vanishX, s.playerY - 20, s.W * 0.42);
  laneG.addColorStop(0, 'rgba(255,235,160,0.13)');
  laneG.addColorStop(0.45, 'rgba(255,210,120,0.06)');
  laneG.addColorStop(1, 'rgba(255,235,160,0.00)');
  c.fillStyle = laneG;
  c.fillRect(0, s.horizonY, s.W, s.H - s.horizonY);
  c.restore();
}

function drawMangaWallLip() {
  const s = mangaStage();
  ctx.save();
  const g = ctx.createLinearGradient(0, s.wallY + 16, 0, s.wallY + 58);
  g.addColorStop(0, 'rgba(10,4,2,0.38)');
  g.addColorStop(0.44, 'rgba(10,4,2,0.20)');
  g.addColorStop(1, 'rgba(10,4,2,0.00)');
  ctx.fillStyle = g;
  ctx.fillRect(0, s.wallY + 14, s.W, 52);
  ctx.strokeStyle = 'rgba(8,8,8,0.46)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, s.wallY + 23);
  ctx.lineTo(s.W, s.wallY + 23);
  ctx.stroke();
  ctx.restore();
}

function drawMangaForegroundOcclusion() {
  const s = mangaStage();
  ctx.save();
  const bottom = ctx.createLinearGradient(0, s.H * 0.76, 0, s.H);
  bottom.addColorStop(0, 'rgba(0,0,0,0.00)');
  bottom.addColorStop(0.58, 'rgba(10,2,1,0.16)');
  bottom.addColorStop(1, 'rgba(0,0,0,0.48)');
  ctx.fillStyle = bottom;
  ctx.fillRect(0, s.H * 0.76, s.W, s.H * 0.24);

  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.beginPath();
  ctx.moveTo(0, s.H);
  ctx.lineTo(0, s.H * 0.70);
  ctx.quadraticCurveTo(s.W * 0.08, s.H * 0.84, s.W * 0.18, s.H);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(s.W, s.H);
  ctx.lineTo(s.W, s.H * 0.70);
  ctx.quadraticCurveTo(s.W * 0.92, s.H * 0.84, s.W * 0.82, s.H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawMangaBattlefield(opts = {}) {
  const art = achillesMangaArt();
  const W = Engine.W, H = Engine.H;
  if (!Engine.manga || !art || typeof art.drawImage !== 'function') return false;
  const focusX = opts.focusX ?? 0.50;
  const focusY = opts.focusY ?? 0.53;
  const alpha = opts.alpha ?? 1;
  const perf = typeof art.performanceTier === 'function' ? art.performanceTier() : 'balanced';
  const key = [W, H, focusX, focusY, alpha, opts.title ? 1 : 0, perf].join('|');
  if (!achillesMangaStageCache || achillesMangaStageCache.key !== key) {
    const layer = document.createElement('canvas');
    layer.width = W;
    layer.height = H;
    const layerCtx = layer.getContext('2d');
    if (!layerCtx) return false;
    if (!art.drawImage(layerCtx, ACHILLES_MANGA_BATTLEFIELD, 0, 0, W, H, {
      fit: 'cover',
      focusX,
      focusY,
      alpha,
    })) return false;

    layerCtx.save();
    const sky = layerCtx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, opts.title ? 'rgba(44,2,2,0.14)' : 'rgba(44,2,2,0.08)');
    sky.addColorStop(0.45, 'rgba(0,0,0,0.00)');
    sky.addColorStop(1, 'rgba(0,0,0,0.36)');
    layerCtx.fillStyle = sky;
    layerCtx.fillRect(0, 0, W, H);

    drawMangaStageFloorUnderlay(opts, layerCtx);

    if (art.mangaAtmosphere) {
      art.mangaAtmosphere(layerCtx, W, H, {
        density: 9,
        dotSize: 1.25,
        halftoneAlpha: opts.title ? 0.10 : 0.14,
        scanAlpha: opts.title ? 0.05 : 0.07,
        vignette: opts.title ? 0.45 : 0.52,
      });
    }
    layerCtx.restore();
    achillesMangaStageCache = { key, canvas: layer };
  }
  ctx.drawImage(achillesMangaStageCache.canvas, 0, 0, W, H);
  return true;
}

function drawMangaArcher(a, archerIdx) {
  const art = achillesMangaArt();
  if (!art || !achillesMangaAssetReady(ACHILLES_MANGA_ARCHER_SHEET)) return false;
  const heavy = typeof art.heavyEffects === 'function' && art.heavyEffects();

  const downed = a.downT > 0;
  const y = archerLineY() + Math.sin(time * 2.2 + a.x * 0.01) * 2;
  const screenX = mangaStageProjectedX(a.x, y, { backPull: 0.90, curve: 0.95 });
  const baseScale = Math.max(0.12, Math.min(0.22, Math.min(Engine.W, Engine.H) / 3600));
  const scale = baseScale * mangaStageScale(y, 0.86, 1.02);
  const releaseEase = a.releaseT > 0 ? (a.releaseT / 0.18) : 0;
  const drawEase = a.drawT > 0 ? (1 - a.drawT / 0.35) : 0;
  const downEase = a.downT > 0 ? Math.min(1, (4 - a.downT) / 0.4) : 0;
  const recoil = (releaseEase * -0.055) + (drawEase * 0.025) + (downEase * 0.10);
  let anim = 'idle';
  let animT = time + archerIdx * 0.13;
  let frame = null;

  if (downed) {
    anim = 'downed';
    animT = Math.max(0, 4 - a.downT);
  } else if (a.releaseT > 0) {
    anim = 'release';
    animT = 0.18 - a.releaseT;
    if (pendingSpecial === 'inferno') frame = 'eliteRelease';
  } else if (a.glow > 0) {
    anim = 'telegraph';
  } else if (a.drawT > 0) {
    anim = 'draw';
    animT = 0.35 - a.drawT;
  }

  ctx.save();
  if (heavy || downed || a.glow > 0 || a.drawT > 0 || a.releaseT > 0) {
    drawMangaContactShadow(screenX, y, {
      w: 24 * (scale / baseScale),
      h: 5 * (scale / baseScale),
      alpha: downed ? 0.12 : 0.20,
      offsetY: 7,
    });
  }
  if (a.glow > 0) {
    ctx.globalAlpha = Math.min(0.85, 0.24 + a.glow);
    ctx.shadowColor = pendingSpecial === 'inferno' ? '#ff2200' : '#ffd54a';
    ctx.shadowBlur = heavy ? 28 : 8;
    art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, pendingSpecial === 'inferno' ? 'damageBurst' : 'bowFlare', screenX, y - 72, {
      scale: scale * 1.9,
      alpha: Math.min(0.65, a.glow * 1.4),
    });
    ctx.shadowBlur = 0;
  }

  ctx.globalAlpha *= downed ? 0.62 : 0.96;
  if (heavy) ctx.filter = 'sepia(0.18) saturate(1.12) brightness(0.78) contrast(1.08)';
  if (heavy && !downed) {
    ctx.shadowColor = 'rgba(255,100,40,0.22)';
    ctx.shadowBlur = 7;
  }
  const actorOpts = {
    scale,
    rotate: recoil,
    smear: false,
    amount: downed ? 0.03 : (heavy ? 0.22 : 0.12),
    bob: heavy ? 1.8 : 1.1,
    sway: heavy ? 0.014 : 0.006,
    squash: heavy ? 0.014 : 0.006,
  };
  const drew = frame
    ? (typeof art.drawFilmFrame === 'function'
        ? art.drawFilmFrame(ctx, ACHILLES_MANGA_ARCHER_SHEET, frame, screenX, y, {
            ...actorOpts,
            phase: animT,
            animName: anim,
          })
        : art.drawFrame(ctx, ACHILLES_MANGA_ARCHER_SHEET, frame, screenX, y, { scale, rotate: recoil }))
    : art.drawAnimation(ctx, ACHILLES_MANGA_ARCHER_SHEET, anim, animT, screenX, y, actorOpts);
  if (heavy) ctx.filter = 'none';
  ctx.shadowBlur = 0;

  if (drew && archerIdx === 0) {
    const found = window.Engine && Engine.unlock && Engine.unlock.has('glyph_achilles_found');
    ctx.globalAlpha = found ? 0.98 : 0.45;
    ctx.strokeStyle = found ? '#ffd54a' : '#b7822f';
    ctx.fillStyle = found ? 'rgba(255,213,74,0.20)' : 'rgba(0,0,0,0.16)';
    ctx.lineWidth = 2;
    if (found) { ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 12; }
    const gx = screenX - 12 * scale * 10;
    const gy = y - 125 * scale;
    ctx.beginPath(); ctx.arc(gx, gy, 7 * scale * 2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx, gy - 7 * scale * 2);
    ctx.lineTo(gx + 6 * scale * 2, gy + 6 * scale * 2);
    ctx.lineTo(gx - 6 * scale * 2, gy + 6 * scale * 2);
    ctx.closePath(); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
  return drew;
}

function drawArchers() {
  const mangaOn = Engine.manga && window.Manga;
  const ink = mangaOn && Manga.effects && Manga.effects.inkStroke
    ? (w) => Manga.effects.inkStroke(ctx, w)
    : (w) => { ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = w; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; };

  for (let archerIdx = 0; archerIdx < archers.length; archerIdx++) {
    const a = archers[archerIdx];
    const ax = a.x;
    const bob = Math.sin(time * 2.2 + ax * 0.01) * 1.5;
    const downed = a.downT > 0;
    const isHeelArcher = archerIdx === 0;

    if (mangaOn && drawMangaArcher(a, archerIdx)) continue;

    ctx.save();
    ctx.translate(ax, 28 + bob);

    // Telegraph glow (manga only, before special waves)
    if (a.glow > 0 && mangaOn) {
      ctx.save();
      ctx.shadowColor = '#ff3322'; ctx.shadowBlur = 22 * a.glow;
      ctx.strokeStyle = `rgba(255, 60, 30, ${Math.min(1, a.glow * 1.6)})`;
      ctx.lineWidth = 2.4;
      ctx.beginPath(); ctx.arc(0, 0, 16, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    ctx.globalAlpha = downed ? 0.25 : 0.92;

    // Helmet base — small ellipse with bold ink
    ctx.fillStyle = '#3a2a14';
    ctx.beginPath(); ctx.arc(0, -10, 6.5, 0, Math.PI * 2); ctx.fill();
    ink(2);
    ctx.stroke();
    // Helmet top accent
    ctx.fillStyle = '#1a1408';
    ctx.beginPath(); ctx.arc(0, -10, 6.5, Math.PI, 0); ctx.fill();
    ink(1.4);
    ctx.beginPath(); ctx.moveTo(-6, -9); ctx.lineTo(6, -9); ctx.stroke();
    if (mangaOn && Manga.effects && typeof Manga.effects.animeEye === 'function') {
      const eyeColor = a.glow > 0 ? '#ff3322' : '#ffd54a';
      ctx.save();
      ctx.shadowColor = eyeColor;
      ctx.shadowBlur = a.glow > 0 ? 8 : 3;
      Manga.effects.animeEye(ctx, -2.8, -10.6, {
        sx: 0.22, sy: 0.20, rot: -0.12,
        white: '#fff8c8', iris: eyeColor,
        mood: 'focus', outline: 0.45,
      });
      Manga.effects.animeEye(ctx, 2.8, -10.6, {
        sx: 0.22, sy: 0.20, rot: 0.12,
        white: '#fff8c8', iris: eyeColor,
        mood: 'focus', outline: 0.45,
      });
      ctx.shadowBlur = 0;
      ctx.restore();
      ink(0.9);
      ctx.beginPath(); ctx.moveTo(-6.4, -13.5); ctx.lineTo(-1.4, -12.2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( 6.4, -13.5); ctx.lineTo( 1.4, -12.2); ctx.stroke();
    }

    // Shoulders / pauldron — wider ellipse below helmet
    ctx.fillStyle = '#1a1408';
    ctx.beginPath(); ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI * 2); ctx.fill();
    ink(2);
    ctx.stroke();
    // Pauldron rim (manga ink line)
    ink(1);
    ctx.beginPath(); ctx.ellipse(0, -1.5, 8, 5, 0, 0, Math.PI * 2); ctx.stroke();

    // Bow — curved arc with grip
    const drawBack = a.releaseT > 0 ? 0 : (a.drawT > 0 ? Math.min(8, (1 - a.drawT / 0.35) * 8) : 4);
    ctx.strokeStyle = '#6a4818'; ctx.lineWidth = 2.6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(0, 8, 12, -Math.PI * 0.55, Math.PI * 0.55);
    ctx.stroke();
    // Grip
    ctx.fillStyle = '#3a2810';
    ctx.fillRect(-1.5, 6, 3, 4);
    ink(1);
    ctx.strokeRect(-1.5, 6, 3, 4);

    // Bowstring — tightens/pulls back during draw, snaps on release
    ctx.strokeStyle = a.drawT > 0 ? 'rgba(245,220,140,0.95)' : 'rgba(190,170,100,0.7)';
    ctx.lineWidth = a.drawT > 0 ? 1.6 : 1.1;
    ctx.beginPath();
    ctx.moveTo(-10, 8);
    ctx.lineTo(0, 16 + drawBack);
    ctx.lineTo(10, 8);
    ctx.stroke();

    // Arrow nocked while drawing
    if (a.drawT > 0) {
      ctx.strokeStyle = '#fff5c0'; ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(0, 16 + drawBack); ctx.lineTo(0, -10 + drawBack); ctx.stroke();
      ctx.fillStyle = '#fff5c0';
      ctx.beginPath();
      ctx.moveTo(0, -12 + drawBack); ctx.lineTo(-2, -8 + drawBack); ctx.lineTo(2, -8 + drawBack);
      ctx.closePath(); ctx.fill();
    }

    // Release flash — speed lines from the bow when an arrow just left
    if (a.releaseT > 0 && mangaOn && Manga.effects && Manga.effects.speedLines) {
      const k = a.releaseT / 0.18;
      Manga.effects.speedLines(ctx, 0, 12, {
        count: 7, innerR: 8, outerR: 22 + (1 - k) * 12,
        color: `rgba(255, 245, 180, ${k})`, width: 1.8, jitter: 0.4,
      });
    }

    // Downed: X over the archer
    if (downed) {
      ctx.globalAlpha = 0.9;
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-10, -10); ctx.lineTo(10, 10);
      ctx.moveTo(10, -10); ctx.lineTo(-10, 10);
      ctx.stroke();
    }

    // Heel-mark glyph — etched on the leftmost archer's pauldron. Subtle
    // (low-alpha bronze sigil) until found, then bright gold once collected.
    if (isHeelArcher) {
      const found = window.Engine && Engine.unlock && Engine.unlock.has('glyph_achilles_found');
      ctx.globalAlpha = found ? 0.95 : 0.45;
      ctx.strokeStyle = found ? '#ffd54a' : '#a07028';
      ctx.lineWidth = 1.2;
      if (found) { ctx.shadowColor = '#ffd54a'; ctx.shadowBlur = 8; }
      // Tiny shield/heel sigil — small triangle inscribed in a circle on the
      // pauldron at (-7, 0). Mythological: Achilles's vulnerable heel.
      ctx.beginPath(); ctx.arc(-7, 0, 2.6, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-7, -2.4); ctx.lineTo(-5, 1.6); ctx.lineTo(-9, 1.6);
      ctx.closePath(); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawLandingShadows() {
  for (const a of arrows) {
    if (!a.alive) continue;
    const progress = arrowFlightProgress(a);
    const shadowX = a.targetX ?? a.x;

    if (Engine.manga && achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
      const warn = clamp01((progress - 0.60) / 0.40);
      drawMangaContactShadow(shadowX, PLAYER_Y, {
        w: 10 + progress * 34,
        h: 3 + progress * 10,
        alpha: progress * (a.targeted ? 0.46 : 0.28),
        color: a.targeted ? 'rgba(70,0,0,0.86)' : 'rgba(0,0,0,0.70)',
        offsetY: 8,
      });
      if (warn > 0) {
        const art = achillesMangaArt();
        art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'warningSlash', shadowX, PLAYER_Y + 10, {
          scale: 0.10 + warn * 0.13,
          alpha: warn * (a.targeted ? 0.78 : 0.42),
          rotate: ((shadowX - Engine.W * 0.5) / Math.max(1, Engine.W)) * 0.18 + Math.sin(time * 16 + shadowX) * 0.04,
        });
        ctx.save();
        ctx.globalAlpha = warn * (a.targeted ? 0.42 : 0.24);
        ctx.strokeStyle = a.targeted ? '#ff2200' : '#ff7700';
        ctx.lineWidth = a.targeted ? 2.2 : 1.4;
        ctx.beginPath();
        ctx.ellipse(shadowX, PLAYER_Y + 8, 32 + warn * 22, 8 + warn * 10, ((shadowX - Engine.W * 0.5) / Engine.W) * 0.16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      continue;
    }

    const alpha    = progress * 0.55;
    const rw = 6 + progress * 18;
    const rh = 3 + progress * 8;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = a.targeted ? 'rgba(180,0,0,0.7)' : 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.ellipse(shadowX, PLAYER_Y, rw, rh, 0, 0, Math.PI * 2);
    ctx.fill();
    if (progress > 0.65) {
      const warn = (progress - 0.65) / 0.35;
      if (Engine.manga && achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
        const art = achillesMangaArt();
        art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'warningSlash', shadowX, PLAYER_Y + 10, {
          scale: 0.10 + warn * 0.10,
          alpha: warn * (a.targeted ? 0.72 : 0.40),
          rotate: Math.sin(time * 16 + shadowX) * 0.05,
        });
      }
      ctx.globalAlpha = warn * (a.targeted ? 0.65 : 0.35);
      ctx.strokeStyle = a.targeted ? '#ff2200' : '#ff7700';
      ctx.lineWidth = a.targeted ? 2.5 : 1.5;
      ctx.beginPath();
      ctx.ellipse(shadowX, PLAYER_Y, rw * 1.7, rh * 1.7, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawMangaArrow(a, progress) {
  const art = achillesMangaArt();
  if (!art || !achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) return false;
  const frame = a.inferno ? 'arrowDown2' : 'arrowDown1';
  const drawX = typeof a.visualX === 'number' ? a.visualX : a.x;
  const drawY = typeof a.visualY === 'number' ? a.visualY : a.y;
  const depth = mangaStageDepth(drawY);
  const screenX = mangaStageProjectedX(drawX, drawY, { backPull: 0.58, curve: 0.80 });
  const originScreenX = mangaStageProjectedX(a.originX ?? a.x, a.originY ?? archerArrowStartY(), { backPull: 0.90, curve: 0.95 });
  const originScreenY = a.originY ?? archerArrowStartY();
  const scale = mangaStageScale(drawY, 0.055, 0.30) * (a.inferno ? 1.16 : 1);
  const alpha = (a.isEcho ? 0.50 : 1) * (0.56 + depth * 0.44);

  ctx.save();
  ctx.globalAlpha *= alpha;
  if (progress < 0.72) {
    const linkAlpha = (1 - progress / 0.72) * (a.targeted ? 0.46 : 0.28);
    ctx.save();
    ctx.globalAlpha *= linkAlpha;
    ctx.strokeStyle = a.inferno ? '#ff5533' : '#fff0a8';
    ctx.lineWidth = 1.2 + depth * 1.4;
    ctx.shadowColor = a.inferno ? '#ff2200' : '#ffd54a';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(originScreenX, originScreenY);
    ctx.quadraticCurveTo(
      (originScreenX + screenX) * 0.5,
      Math.min(originScreenY, a.y) - 26 - Math.abs(screenX - originScreenX) * 0.05,
      screenX,
      drawY,
    );
    ctx.stroke();
    ctx.restore();
  }
  const heavy = typeof art.heavyEffects === 'function' && art.heavyEffects();
  if (heavy) {
    ctx.filter = `sepia(0.10) saturate(1.10) brightness(${0.82 + depth * 0.24}) contrast(1.08) blur(${Math.max(0, (1 - depth) * 0.45)}px)`;
  }
  if (progress > 0.42 || a.inferno) {
    const g = a.inferno ? 1 : (progress - 0.42) / 0.58;
    ctx.shadowColor = a.inferno ? '#ff1100' : (a.targeted ? '#ff2200' : '#ff8800');
    ctx.shadowBlur = (a.inferno ? 28 : 18) * Math.max(0, g) * (heavy ? 1 : 0.45);
  }
  if (a.inferno && progress > 0.45) {
    art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'damageBurst', screenX, drawY + 8, {
      scale: scale * 0.95,
      alpha: Math.min(0.65, progress),
    });
  }
  const drew = art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, frame, screenX, drawY, {
    scale,
    rotate: (a.visualTilt || 0) + ((drawX - screenX) / Math.max(1, Engine.W)) * 0.45,
  });
  ctx.restore();
  return drew;
}

function drawArrow(a) {
  const progress = Math.max(0.05, arrowFlightProgress(a));
  const scale    = 0.11 + progress * 0.89;

  if (Engine.manga && drawMangaArrow(a, progress)) return;

  const tipLen   = 20 * scale;
  const shaftLen = 32 * scale;
  const hw       = 8  * scale;

  ctx.save();
  ctx.translate(a.x, a.y);
  if (a.isEcho) ctx.globalAlpha = 0.55; // phantom echo arrow is ghostly

  // Glow halo — targeted arrows glow red, decoys glow orange.
  // Inferno arrows burn brighter and pulse.
  if (progress > 0.45 || a.inferno) {
    const g = a.inferno ? 1 : (progress - 0.45) / 0.55;
    ctx.shadowColor = a.inferno ? '#ff1100' : (a.targeted ? '#ff2200' : '#ff8800');
    ctx.shadowBlur  = (a.inferno ? 36 : (a.targeted ? 24 : 16)) * g * scale;
  }

  ctx.strokeStyle = '#8a6030';
  ctx.lineWidth   = 2.5 * scale;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(0, tipLen * 0.5);
  ctx.lineTo(0, -shaftLen);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle   = '#d0d0e8';
  ctx.strokeStyle = '#808090';
  ctx.lineWidth   = 1 * scale;
  ctx.beginPath();
  ctx.moveTo(0, tipLen * 0.65);
  ctx.lineTo(-hw * 0.55, tipLen * 0.05);
  ctx.lineTo(0, -tipLen * 0.20);
  ctx.lineTo( hw * 0.55, tipLen * 0.05);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.moveTo(0, -shaftLen * 0.62);
  ctx.lineTo(-hw * 0.72, -shaftLen * 0.96);
  ctx.lineTo(0, -shaftLen * 0.80);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -shaftLen * 0.62);
  ctx.lineTo( hw * 0.72, -shaftLen * 0.96);
  ctx.lineTo(0, -shaftLen * 0.80);
  ctx.closePath(); ctx.fill();

  ctx.restore();
}

// Routes the player draw between the inline overhead-warrior and the
// portable manga library. The library is loaded by manga/manga.js and
// exposed as window.Manga; we no-op gracefully if it hasn't loaded yet.
function drawPlayerRouted() {
  if (Engine.manga && drawAchillesMangaSprite()) return;
  if (Engine.manga && window.Manga && window.Manga.characters && window.Manga.characters.achilles) {
    window.Manga.characters.achilles.draw(ctx, {
      x: player.x,
      y: PLAYER_Y,
      facing: player.facing,
      walkPhase: player.walkPhase,
      vx: player.vx,
      hp: player.hp,
      hitFlash: player.hitFlash,
      iframes: player.iframes,
      bashing: bashT > 0,
      drawingBow: bowT > 0,
    });
  } else {
    drawPlayer();
  }
}

function achillesMangaAssetsReady() {
  return achillesMangaAssetReady(ACHILLES_MANGA_ANIM_SHEET)
    || achillesMangaAssetReady(ACHILLES_MANGA_SHEET);
}

function currentAchillesMangaMotion() {
  if (Engine.state === 'victory') return { anim: 'victory', t: time, flipX: player.facing < 0, facing: player.facing };
  if (player.hp <= 0 || Engine.state === 'dead') {
    return { anim: 'fallen', t: mangaDeathT > 0 ? Math.max(0, time - mangaDeathT) : 1, flipX: hurtFacing < 0, facing: hurtFacing };
  }
  if (heelT > 0) return { anim: 'strike', t: HEEL_DUR - heelT, flipX: heelFacing < 0, facing: heelFacing };
  if (bashT > 0) return { anim: 'bash', t: BASH_DUR - bashT, flipX: bashFacing < 0, facing: bashFacing };
  if (bowT > 0) {
    const t = BOW_POSE - bowT;
    return { anim: t > BOW_POSE * 0.72 ? 'bowRelease' : 'bow', t, flipX: bowFacing < 0, facing: bowFacing };
  }
  if (player.hitFlash > 0) return { anim: 'hit', t: 0.35 - player.hitFlash, flipX: hurtFacing < 0, facing: hurtFacing };
  const threat = incomingArrowThreat({ minProgress: 0.70 });
  if (threat) {
    const threatFacing = facingTowardX(threat.targetX, player.facing);
    return { anim: 'guarded', t: threat.progress, flipX: threatFacing < 0, facing: threatFacing, threat };
  }
  if (player.iframes > 0) return { anim: 'guarded', t: time, flipX: hurtFacing < 0, facing: hurtFacing };
  const runVx = Math.abs(player.vx) > 20 ? player.vx : (player.visualVx || 0);
  if (Math.abs(runVx) > 20) return {
    anim: runVx < 0 ? 'runLeft' : 'runRight',
    t: player.walkPhase / 10,
    flipX: false,
    facing: runVx < 0 ? -1 : 1,
    rotate: player.visualLean || 0,
  };
  return { anim: 'idle', t: time, flipX: player.facing < 0, facing: player.facing, rotate: (player.visualLean || 0) * 0.35 };
}

function currentAchillesMangaFrame(motion = currentAchillesMangaMotion()) {
  if (motion.anim === 'runLeft') return 'runLeft';
  if (motion.anim === 'runRight') return 'runRight';
  if (motion.anim === 'strike') return 'strike';
  if (motion.anim === 'bash') return 'bash';
  if (motion.anim === 'bow' || motion.anim === 'bowRelease') return 'bow';
  if (motion.anim === 'hit' || motion.anim === 'guarded') return 'hit';
  return motion.anim === 'fallen' || motion.anim === 'victory' ? motion.anim : 'idle';
}

function drawAchillesMangaScene(frameName, opts = {}) {
  const art = window.GodGames && GodGames.MangaArt;
  if (!Engine.manga || !art || typeof art.drawScene !== 'function') return false;
  return art.drawScene(ctx, frameName, 0, 0, Engine.W, Engine.H, {
    focusX: opts.focusX ?? 0.5,
    focusY: opts.focusY ?? 0.5,
    alpha: opts.alpha ?? 1,
  });
}

function drawAchillesMangaSprite() {
  if (!achillesMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const nearScale = Math.max(0.32, Math.min(0.46, compact / 1600));
  const scale = mangaStageScale(PLAYER_Y, nearScale * 0.72, nearScale, { curve: 0.78 });
  const y = PLAYER_Y + 10;
  const drawX = typeof player.visualX === 'number' ? player.visualX : player.x;
  const jitter = player.hitFlash > 0 ? Math.sin(time * 80) * 2 : 0;
  const art = achillesMangaArt();
  const hasV2 = achillesMangaAssetReady(ACHILLES_MANGA_ANIM_SHEET)
    && art && typeof art.drawAnimation === 'function';
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  const motion = currentAchillesMangaMotion();

  drawMangaContactShadow(drawX, PLAYER_Y, {
    w: 48 * scale / 0.40,
    h: 12 * scale / 0.40,
    alpha: player.hp <= 0 ? 0.28 : 0.46,
    offsetY: 13,
  });

  if (hasV2 && achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
    const fxScale = Math.max(0.12, Math.min(0.24, compact / 3300));
    const dustVx = Math.abs(player.vx) > 20 ? player.vx : (player.visualVx || 0);
    if (Math.abs(dustVx) > 20) {
      const moveFacing = dustVx < 0 ? -1 : 1;
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'dustPuff', drawX - moveFacing * 34, PLAYER_Y + 18, {
        scale: fxScale,
        alpha: 0.30 + Math.abs(Math.sin(player.walkPhase)) * 0.24,
        flipX: moveFacing < 0,
      });
    }
    if (bashT > 0) {
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'shieldBurst', drawX + bashFacing * 22, PLAYER_Y - 48, {
        scale: fxScale * 1.18,
        alpha: Math.min(0.85, bashT / BASH_DUR + 0.15),
        flipX: bashFacing < 0,
      });
    }
    if (bowT > 0) {
      const hand = achillesBowHandAnchor(bowFacing);
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'bowFlare', hand.x, hand.y - 8, {
        scale: fxScale * 0.92,
        alpha: Math.min(0.70, bowT / BOW_POSE + 0.10),
        flipX: bowFacing < 0,
      });
    }
    if (heelT > 0) {
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'slashCrescent', drawX + heelFacing * 54, PLAYER_Y - 54, {
        scale: fxScale * 1.42,
        alpha: Math.min(0.78, heelT / HEEL_DUR + 0.08),
        flipX: heelFacing < 0,
      });
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'heelSpark', drawX + heelFacing * 20, PLAYER_Y + 7, {
        scale: fxScale * 0.86,
        alpha: Math.min(0.90, heelT / HEEL_DUR + 0.10),
        flipX: heelFacing < 0,
      });
    }
  }

  ctx.save();
  if (player.iframes > 0 && Math.floor(player.iframes * 14) % 2 === 0) ctx.globalAlpha *= 0.35;
  if (player.hitFlash > 0) {
    ctx.shadowColor = '#ff3322';
    ctx.shadowBlur = heavy ? 18 : 6;
  } else if (heavy) {
    ctx.shadowColor = 'rgba(255,115,45,0.24)';
    ctx.shadowBlur = 10;
  }
  if (heavy) ctx.filter = 'sepia(0.10) saturate(1.08) brightness(0.94) contrast(1.06)';
  let drew = false;
  if (hasV2) {
    drew = art.drawAnimation(ctx, ACHILLES_MANGA_ANIM_SHEET, motion.anim, motion.t, drawX + jitter, y, {
      scale,
      flipX: motion.flipX,
      rotate: motion.rotate || 0,
      phase: player.walkPhase / (Math.PI * 2),
      amount: Math.min(1, Math.abs(player.visualVx || player.vx) / SPD),
      bob: 4.8,
      sway: 0.026,
      squash: 0.026,
      smear: false,
    });
  } else {
    const frame = currentAchillesMangaFrame(motion);
    const drawOpts = {
      scale,
      flipX: motion.flipX,
      rotate: motion.rotate || 0,
      phase: player.walkPhase / (Math.PI * 2),
      amount: Math.min(1, Math.abs(player.visualVx || player.vx) / SPD),
      bob: 4.5,
      sway: 0.024,
      squash: 0.026,
      smear: false,
      animName: motion.anim || frame,
    };
    drew = art && typeof art.drawFilmFrame === 'function'
      ? art.drawFilmFrame(ctx, ACHILLES_MANGA_SHEET, frame, drawX + jitter, y, drawOpts)
      : Manga.assets.drawFrame(ctx, ACHILLES_MANGA_SHEET, frame, drawX + jitter, y, drawOpts);
  }
  ctx.restore();

  if (drew && player.hitFlash > 0) {
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = Math.min(0.32, player.hitFlash);
    ctx.fillStyle = '#ff3322';
    ctx.beginPath();
    ctx.ellipse(drawX, PLAYER_Y - 28, 54, 42, -0.12, 0, Math.PI * 2);
    ctx.fill();
    if (achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
      art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'damageBurst', drawX, PLAYER_Y - 54, {
        scale: Math.max(0.12, Math.min(0.24, compact / 3300)),
        alpha: Math.min(0.75, player.hitFlash * 1.8),
      });
    }
    ctx.restore();
  }
  return drew;
}

// Player's counter-shot arrow rising upward — bright gold + ink trail line.
function drawReturnArrow(ra) {
  const art = achillesMangaArt();
  if (Engine.manga && art && achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
    const target = archers[ra.targetIdx];
    const targetY = archerLineY();
    const targetX = target ? mangaStageProjectedX(target.x, targetY, { backPull: 0.90, curve: 0.95 }) : ra.x;
    const travel = clamp01((ra.fromY - ra.y) / Math.max(1, ra.fromY - targetY));
    const screenX = ra.fromX + (targetX - ra.fromX) * travel;
    const screenY = ra.y;
    const trailLen = Math.min(140, ra.trailT * 760);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,245,190,0.50)';
    ctx.lineWidth = 1.7; ctx.lineCap = 'round';
    for (let i = 0; i < 5; i++) {
      const off = (i - 2) * 3.2;
      ctx.beginPath();
      ctx.moveTo(screenX + off, screenY + trailLen);
      ctx.lineTo(screenX + off * 0.2, screenY + 12);
      ctx.stroke();
    }
    ctx.shadowColor = '#fff5c0';
    ctx.shadowBlur = 16;
    art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, 'returnArrow', screenX, screenY, {
      scale: mangaStageScale(screenY, 0.070, Math.max(0.12, Math.min(0.21, Math.min(Engine.W, Engine.H) / 3800))),
      alpha: 0.95,
      rotate: ((targetX - ra.fromX) / Math.max(1, Engine.W)) * 0.34 + Math.sin(time * 10) * 0.04,
    });
    ctx.restore();
    return;
  }

  const trailLen = Math.min(120, ra.trailT * 700);
  ctx.save();
  // Speed-line trail
  ctx.strokeStyle = 'rgba(255,235,140,0.55)';
  ctx.lineWidth = 1.4; ctx.lineCap = 'round';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    const off = (i - 1.5) * 3;
    ctx.moveTo(ra.x + off, ra.y + trailLen);
    ctx.lineTo(ra.x + off, ra.y + 6);
    ctx.stroke();
  }
  // Arrow shaft
  ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 14;
  ctx.strokeStyle = '#fff5c0'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(ra.x, ra.y + 12);
  ctx.lineTo(ra.x, ra.y - 10);
  ctx.stroke();
  // Hot core
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(ra.x, ra.y + 10); ctx.lineTo(ra.x, ra.y - 8);
  ctx.stroke();
  // Arrowhead
  ctx.fillStyle = '#fff5c0';
  ctx.beginPath();
  ctx.moveTo(ra.x, ra.y - 12); ctx.lineTo(ra.x - 3, ra.y - 6); ctx.lineTo(ra.x + 3, ra.y - 6);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1.5;
  ctx.stroke();
  // Fletching
  ctx.fillStyle = '#cc2222';
  ctx.beginPath();
  ctx.moveTo(ra.x, ra.y + 8); ctx.lineTo(ra.x - 3, ra.y + 14); ctx.lineTo(ra.x, ra.y + 11);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ra.x, ra.y + 8); ctx.lineTo(ra.x + 3, ra.y + 14); ctx.lineTo(ra.x, ra.y + 11);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  const x = player.x, y = PLAYER_Y;
  const walk = player.vx !== 0 ? Math.sin(player.walkPhase) : 0;

  if (player.iframes > 0 && Math.floor(player.iframes * 14) % 2 === 0) {
    ctx.globalAlpha = 0.30;
  }

  ctx.save();
  ctx.translate(x, y);

  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.ellipse(0, 8, 28, 10, 0, 0, Math.PI*2); ctx.fill();

  const footL = walk * 8;
  ctx.fillStyle = '#8a6030';
  ctx.beginPath(); ctx.ellipse(-8 - footL, 12, 5, 3.5, walk*0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 8 + footL,  8, 5, 3.5, -walk*0.3, 0, Math.PI*2); ctx.fill();

  const bodyG = ctx.createRadialGradient(-3, -4, 2, 0, 0, 22);
  bodyG.addColorStop(0, '#d8a840');
  bodyG.addColorStop(0.55, '#b08228');
  bodyG.addColorStop(1, '#7a5810');
  ctx.fillStyle = bodyG;
  ctx.beginPath(); ctx.ellipse(0, 2, 18, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c09030'; ctx.lineWidth = 1.5;
  ctx.stroke();

  const shOffX = -player.facing * 4 + walk * 3;
  const shG = ctx.createRadialGradient(shOffX - 4, -22, 2, shOffX, -20, 26);
  shG.addColorStop(0, '#f0c850');
  shG.addColorStop(0.45, '#c89030');
  shG.addColorStop(0.80, '#9a6c18');
  shG.addColorStop(1, '#6a4a08');
  ctx.fillStyle = shG;
  ctx.beginPath(); ctx.ellipse(shOffX, -22, 22, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#d4a030'; ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = '#ffe070';
  ctx.beginPath(); ctx.arc(shOffX, -22, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c89030'; ctx.lineWidth = 1; ctx.stroke();
  ctx.strokeStyle = 'rgba(255,220,80,0.4)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(shOffX, -22, 14, 0, Math.PI*2); ctx.stroke();

  const helmG = ctx.createRadialGradient(-2, -2, 1, 0, 0, 13);
  helmG.addColorStop(0, '#e0b040');
  helmG.addColorStop(0.6, '#b08828');
  helmG.addColorStop(1, '#7a6010');
  ctx.fillStyle = helmG;
  ctx.beginPath(); ctx.arc(0, -3, 12, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c8a030'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.strokeStyle = '#cc2222';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.shadowColor = '#ff2222'; ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(-player.facing * 14, -3); ctx.lineTo(player.facing * 14, -3);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
  ctx.globalAlpha = 1;

  if (player.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = player.hitFlash * 0.55;
    ctx.fillStyle = '#ff3300';
    ctx.beginPath(); ctx.ellipse(x, y - 8, 30, 32, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

  for (let i = 0; i < HP_MAX; i++) {

function drawHUD() {
  const W = Engine.W, H = Engine.H;

  // ── DEBUG: mystery state overlay. localStorage.godgames_debug='1' to enable.
  if (typeof localStorage !== 'undefined' && localStorage.getItem('godgames_debug') === '1') {
    const now = performance.now();
    const recent = patroclusKills.filter(t => now - t <= PATROCLUS_WINDOW_MS).length;
    const earnedU = window.Engine && Engine.unlock && Engine.unlock.has('hint.u');
    ctx.save();
    ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(8, 60, 320, 76);
    ctx.fillStyle = '#ffd54a';
    ctx.fillText('— DEBUG: Achilles —', 14, 64);
    ctx.fillStyle = '#fff';

  for (let i = 0; i < HP_MAX; i++) {
    ctx.fillStyle = i < player.hp ? '#ff3333' : '#333';
    ctx.fillText('♥', 22 + i * 34, 46);
  }
  ctx.shadowBlur = 0;

  ctx.textAlign = 'right';
  ctx.font = 'bold 20px monospace';
  ctx.fillStyle = Engine.GOLD; ctx.shadowColor = Engine.GOLD; ctx.shadowBlur = 10;
  ctx.fillText(`SCORE  ${Math.floor(score)}`, W - 22, 36);

  const xpW = 180, xpH = 10, xpX = W - 22 - xpW, xpY = 46;

  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.fillText(`${Math.floor(playTime)}s  survived`, W / 2, H - 12);
}

// ── Compose the world frame (used by both onRender and onGameOverRender) ──
function drawWorldFrame() {
  const W = Engine.W, H = Engine.H;

  const mangaField = Engine.manga && drawMangaBattlefield();
  if (!mangaField) {
    drawGround();
    if (Engine.manga && drawAchillesMangaScene('achilles', { alpha: 0.30, focusX: 0.54, focusY: 0.52 })) {
      ctx.fillStyle = 'rgba(34,8,4,0.36)';
      ctx.fillRect(0, 0, W, H);
    }
  }
  if (Engine.manga && window.Manga && !mangaField) {
    const art = achillesMangaArt();
    if (art && typeof art.halftone === 'function') {
      art.halftone(ctx, 0, 0, W, H, { density: 8, dotSize: 1.6, alpha: 0.12, color: '#000' });
    } else {
      window.Manga.effects.halftone(ctx, 0, 0, W, H, { density: 8, dotSize: 1.6, alpha: 0.12, color: '#000' });
    }
  }
  drawArchers();
  if (mangaField) drawMangaWallLip();
  drawLandingShadows();
  for (const a of arrows) drawArrow(a);
  // Player's counter-shot arrows rising at the archers (manga ability).
  for (const ra of returnArrows) drawReturnArrow(ra);
  drawPlayerRouted();
  if (mangaField) drawMangaForegroundOcclusion();

  // Speed lines radiating from Achilles when an arrow lands near (manga only)
  if (Engine.manga && window.Manga && player && player.hitFlash > 0) {
    const f = player.hitFlash / 0.35;
    window.Manga.effects.speedLines(ctx, player.x, PLAYER_Y - 8, {
      count: 16, innerR: 38, outerR: 90 + f * 60,
      color: '#ff2200', width: 3, jitter: 0.5,
    });
  }

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Floaters — manga-style SFX text in manga mode, regular in normal mode.
  for (const f of floaters) {
    if (Engine.manga && window.Manga) {
      const isHit = f.text.startsWith('-');
      window.Manga.effects.sfxText(ctx, f.x, f.y, isHit ? 'BAM!' : f.text, {
        size: isHit ? 44 : 28,
        color: isHit ? '#ffd54a' : f.color,
        outline: '#0a0a0a',
        tilt: isHit ? -10 : -4,
        alpha: f.alpha,
      });
    } else {
      ctx.globalAlpha = f.alpha;
      ctx.textAlign = 'center'; ctx.font = 'bold 16px monospace';
      ctx.fillStyle = f.color; ctx.shadowColor = f.color; ctx.shadowBlur = 8;
      ctx.fillText(f.text, f.x, f.y);
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;

  drawHUD();

  // Title bar
  ctx.textAlign = 'center';
  ctx.font = 'bold 22px serif';
  ctx.fillStyle = Engine.GOLD; ctx.shadowColor = Engine.GOLD; ctx.shadowBlur = 14;
  ctx.fillText('ACHILLES', W/2, 34);
  ctx.shadowBlur = 0;
  ctx.font = '11px monospace';
  ctx.fillStyle = 'rgba(255,200,100,0.38)';
  ctx.fillText('← → dodge the arrows', W/2, 54);

  // Manga ability HUD — bottom-right ring icons for X (shield) + Z (bow).
  if (Engine.manga) {
    drawAbilityIcon(W - 144, H - 76, 'X', '🛡', bashCD, BASH_CD, bashT > 0);
    drawAbilityIcon(W -  88, H - 76, 'Z', '🏹', bowCD,  BOW_CD,  bowT  > 0);
    // Heel Strike ring only appears once the heel_of_achilles mystery solves.
    if (window.GodGames && GodGames.Mysteries && GodGames.Mysteries.isSolved('heel_of_achilles')) {
      drawAbilityIcon(W - 32, H - 76, 'C', '⚔', heelCD, HEEL_CD, heelT > 0);
    }
  }

  // Manga texts — telegraph warnings and ability shouts (sfxText style)
  if (mangaTexts.length && window.Manga && Manga.effects && Manga.effects.sfxText) {
    for (const mt of mangaTexts) {
      const a = Math.min(1, mt.t * 1.6);
      Manga.effects.sfxText(ctx, mt.x, mt.y, mt.text, {
        size: mt.size || 38, color: mt.color || '#ffd54a',
        outline: '#0a0a0a', tilt: -8, alpha: a,
      });
    }
  }
}

function drawAchillesDebugOverlay() {
  const debug = window.GodGames && GodGames.Debug;
  if (!debug || typeof debug.draw !== 'function' || (typeof debug.enabled === 'function' && !debug.enabled())) return;
  const items = [];
  const drifts = [];
  if (player) {
    const px = typeof player.x === 'number' ? player.x : Engine.W * 0.5;
    const vx = typeof player.visualX === 'number' ? player.visualX : px;
    items.push({ role: 'player', x: px, y: PLAYER_Y, r: PLAYER_R, label: 'achilles hit' });
    items.push({ role: 'visual', x: vx, y: PLAYER_Y - 54, w: 74, h: 118, label: 'achilles sprite' });
  }
  if (Array.isArray(archers)) {
    const ay = archerLineY();
    for (const ar of archers) {
      const ax = Engine.manga ? mangaStageProjectedX(ar.x, ay, { backPull: 0.90, curve: 0.95 }) : ar.x;
      items.push({ role: 'visual', x: ax, y: ay - 42, w: 52, h: 88, label: 'archer sprite' });
    }
  }
  for (const a of arrows) {
    if (!a || !a.alive) continue;
    const hitR = PLAYER_R + 12;
    const progress = arrowFlightProgress(a);
    const drawX = typeof a.visualX === 'number' ? a.visualX : a.x;
    const drawY = typeof a.visualY === 'number' ? a.visualY : a.y;
    const sx = Engine.manga ? mangaStageProjectedX(drawX, drawY, { backPull: 0.58, curve: 0.80 }) : a.x;
    const sy = Engine.manga ? drawY : a.y;
    items.push({ role: 'danger', x: a.x, y: a.y, r: 12, label: a.targeted ? 'arrow hit' : 'arrow' });
    items.push({ role: 'hotspot', x: a.targetX ?? a.x, y: PLAYER_Y, r: hitR, alpha: 0.34, label: 'landing fair' });
    items.push({ role: 'visual', x: sx, y: sy, w: 24, h: 72, label: 'arrow sprite' });
    if (progress > 0.55) {
      drifts.push({
        label: 'arrow',
        x: a.x,
        y: a.y,
        visualX: drawX,
        visualY: drawY,
        radius: hitR,
        maxDrift: hitR * 0.32,
      });
    }
  }
  debug.draw(ctx, { game: 'achilles', items, drifts });
}

// Bottom-right manga ability indicator: ring with cooldown sweep + key label.
function drawAbilityIcon(cx, cy, key, glyph, cd, cdMax, active) {
  const r = 22;
  ctx.save();
  // Ring background
  ctx.fillStyle = active ? 'rgba(255,235,140,0.55)' : 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  // Cooldown sweep (top-clockwise, fills as ready)
  const ready = 1 - Math.min(1, cd / cdMax);
  if (cd > 0) {
    ctx.strokeStyle = 'rgba(212,175,55,0.85)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, -Math.PI / 2, -Math.PI / 2 + ready * Math.PI * 2); ctx.stroke();
  } else {
    ctx.shadowColor = '#fff5c0'; ctx.shadowBlur = 10;
    ctx.strokeStyle = '#fff5c0'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  const art = achillesMangaArt();
  const iconFrame = glyph === '🛡' ? 'shieldIcon' : (glyph === '🏹' ? 'bowIcon' : 'heelSpark');
  if (Engine.manga && art && achillesMangaAssetReady(ACHILLES_MANGA_FXHUD_SHEET)) {
    art.drawFrame(ctx, ACHILLES_MANGA_FXHUD_SHEET, iconFrame, cx, cy, {
      scale: iconFrame === 'heelSpark' ? 0.090 : 0.105,
      alpha: cd > 0 ? 0.42 : 0.96,
    });
    ctx.font = '900 11px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 3; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0a0a0a';
    ctx.strokeText(key, cx, cy + r + 13);
    ctx.fillStyle = cd > 0 ? '#aaa' : '#fff5c0';
    ctx.fillText(key, cx, cy + r + 13);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
    return;
  }
  // Key letter — manga-styled
  ctx.font = '900 18px "Impact", "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(key, cx, cy);
  ctx.fillStyle = cd > 0 ? '#888' : '#fff5c0';
  ctx.fillText(key, cx, cy);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── Title screen ──────────────────────────────────────────────────────────
function renderTitle() {
  const W = Engine.W, H = Engine.H;
  if (Engine.manga && drawMangaBattlefield({ title: true, focusY: 0.50 })) {
    const art = achillesMangaArt();
    if (art && achillesMangaAssetReady(ACHILLES_MANGA_ANIM_SHEET)) {
      ctx.save();
      ctx.globalAlpha = 0.86;
      art.drawFrame(ctx, ACHILLES_MANGA_ANIM_SHEET, 'victory', W * 0.18, H * 0.94, {
        scale: Math.max(0.36, Math.min(0.58, Math.min(W, H) / 1350)),
      });
      ctx.restore();
    }
  } else if (Engine.manga && drawAchillesMangaScene('achilles', { alpha: 1, focusX: 0.52, focusY: 0.48 })) {
    const art = window.GodGames && GodGames.MangaArt;
    if (art && typeof art.overlay === 'function') {
      art.overlay(ctx, W, H, {

        mid: 'rgba(0,0,0,0.12)',
        bottom: 'rgba(0,0,0,0.66)',
      });
    }
  } else {
    drawGround();
    drawArchers();
  }

  const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.72)');

  ctx.font = 'bold 76px serif';
  ctx.fillStyle = Engine.GOLD; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 50;
