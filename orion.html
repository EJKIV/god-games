  }
}

// ── HUD ───────────────────────────────────────────────────────────────────
function renderHUD() {
  if (Engine.manga) {
    renderMangaHUD();
    return;
  }
  const W = Engine.W, H = Engine.H, time = Engine.time;
  ctx.save();

  // ── DEBUG: mystery state overlay. localStorage.godgames_debug='1' to enable.
  if (typeof localStorage !== 'undefined' && localStorage.getItem('godgames_debug') === '1') {
    const beneath = orion.x > W * 0.04 && orion.x < W * 0.20;
    const still   = Math.abs(orion.vx) < 5;
    const alive   = boss.state !== 'dead';
    const earnedE = window.Engine && Engine.unlock && Engine.unlock.has('hint.e');
    ctx.save();
    ctx.font = '12px monospace'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(8, 60, 320, 110);
    ctx.fillStyle = '#aaddff';
    ctx.fillText('— DEBUG: Orion —', 14, 64);
    ctx.fillStyle = '#fff';
    ctx.fillText(`orion.x = ${orion.x.toFixed(0)}  band = ${(W*0.04).toFixed(0)}..${(W*0.20).toFixed(0)}`, 14, 80);
    ctx.fillStyle = beneath ? '#88ff88' : '#ff8888';
    ctx.fillText(`beneathConstellation = ${beneath}`, 14, 96);
    ctx.fillStyle = still ? '#88ff88' : '#ff8888';
    ctx.fillText(`stillEnough (|vx|<5) = ${still}  vx=${orion.vx.toFixed(1)}`, 14, 112);
    ctx.fillStyle = alive ? '#88ff88' : '#ff8888';
    ctx.fillText(`bossAlive = ${alive}  proneT = ${orion.proneT.toFixed(2)}`, 14, 128);
    ctx.fillStyle = '#ffd54a';
    ctx.fillText(`gazeT = ${gazeT.toFixed(2)} / ${GAZE_GOAL}s`, 14, 144);
    ctx.fillStyle = earnedE ? '#44dd66' : '#cc6666';
    ctx.fillText(`hint.e earned = ${!!earnedE}`, 14, 160);
    ctx.restore();
  }

  // Boss HP bar — manga route gets bold ink + halftone scrim on the empty
  // portion so the bar reads like a comic gauge rather than a UI rectangle.
  const bossMangaOn = !!Engine.manga;
  ctx.fillStyle = bossMangaOn ? '#0a0a0a' : 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.roundRect(W/2-155,14,310,26,4); ctx.fill();
  const bfrac = Math.max(0, boss.hp/BOSS_HP);
  const bc = bfrac>0.6?'#44dd44':bfrac>0.3?'#ffcc00':'#ff2200';
  ctx.fillStyle = bc;
  ctx.beginPath(); ctx.roundRect(W/2-155,14,310*bfrac,26,4); ctx.fill();
  if (bossMangaOn && window.Manga && Manga.effects && Manga.effects.halftone) {
    ctx.save();
    ctx.beginPath(); ctx.roundRect(W/2-155 + 310*bfrac, 14, 310 - 310*bfrac, 26, 4);
    ctx.clip();
    const art = orionMangaArt();
    const opts = { density: 4, dotSize: 1.4, alpha: 0.55, color: '#0a0a0a' };
    if (art && typeof art.halftone === 'function') art.halftone(ctx, W/2-155, 14, 310, 26, opts);
    else Manga.effects.halftone(ctx, W/2-155, 14, 310, 26, opts);
    ctx.restore();
  }
  ctx.strokeStyle = bossMangaOn ? '#0a0a0a' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = bossMangaOn ? 3 : 1.5;
  ctx.beginPath(); ctx.roundRect(W/2-155,14,310,26,4); ctx.stroke();
  ctx.font='bold 12px monospace'; ctx.textAlign='center';
  if (bossMangaOn) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 4;
    ctx.strokeText('GIANT SCORPION', W/2, 31);
  }
  ctx.fillStyle = bossMangaOn ? '#fff5c0' : '#fff';
  ctx.fillText('GIANT SCORPION', W/2, 31);

  if(boss.phase>1){
    ctx.font='bold 11px monospace';
    ctx.fillStyle = boss.phase===3?'#ff4400':'#ff9900';
    ctx.fillText(boss.phase===3?'⚡ ENRAGED':'⚡ FRENZIED', W/2, 50);
  }

  ctx.textAlign='left'; ctx.font='24px serif';
  for(let i=0;i<ORION_HP;i++){
    const alive = i<orion.hp;
    ctx.fillStyle = alive?'#ff2244':'rgba(80,30,30,0.4)';
    ctx.shadowColor = alive?'#ff2244':'transparent'; ctx.shadowBlur = alive?10:0;
    ctx.fillText('♥', 18+i*32, 44);
  }
  ctx.shadowBlur=0;

  if(time<9){
    ctx.globalAlpha = Math.min(1, (9-time)*0.5);
    ctx.fillStyle='rgba(255,255,200,0.7)'; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText('Z throw spear   X stab   Shift×2 dodge   (while dodging: double-tap to attack)', W/2, H-18);
    ctx.globalAlpha=1;
  }

  // Run timer (top-right) — frozen at runEndMs once boss is defeated
  const elapsed = (runEndMs != null ? runEndMs : performance.now()) - runStartMs;
  ctx.textAlign='right';
  ctx.font='bold 18px monospace';
  ctx.fillStyle = boss.state==='dead' ? Engine.GOLD : 'rgba(240,215,140,0.85)';
  ctx.shadowColor = Engine.GOLD;
  ctx.shadowBlur = boss.state==='dead' ? 10 : 0;
  ctx.fillText(fmtRunTime(elapsed), W-22, 36);
  ctx.shadowBlur = 0;
  ctx.font='10px monospace';
  ctx.fillStyle='rgba(220,200,150,0.55)';
  ctx.fillText('TIME', W-22, 50);

  // Manga ability HUD: Q = constellation strike (bottom-right ring icon)
  if (Engine.manga) {
    drawAbilityRing(W - 32, H - 76, 'Q', constellationCD, CONSTELLATION_CD, constellationT > 0);
  }

  // Manga telegraph + ability shouts
  if (Engine.manga && mangaTexts.length && window.Manga && Manga.effects && Manga.effects.sfxText) {
    for (const mt of mangaTexts) {
      const a = Math.min(1, mt.t * 1.6);
      Manga.effects.sfxText(ctx, mt.x, mt.y, mt.text, {
        size: mt.size || 38, color: mt.color || '#ffd54a',
        outline: '#0a0a0a', tilt: -8, alpha: a,
      });
    }
  }

  ctx.restore();
}

function renderMangaHUD() {
  const W = Engine.W, H = Engine.H, time = Engine.time;
  const art = orionMangaArt();
  const fxReady = art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET);
  ctx.save();

  const barW = Math.min(360, W * 0.46);
  const barH = 28;
  const bx = W / 2 - barW / 2;
  const by = 14;
  const bfrac = Math.max(0, boss.hp / BOSS_HP);
  const bc = bfrac>0.6?'#44dd44':bfrac>0.3?'#ffcc00':'#ff2200';
  ctx.fillStyle = 'rgba(5,5,5,0.82)';
  ctx.beginPath(); ctx.roundRect(bx - 8, by - 5, barW + 16, barH + 10, 5); ctx.fill();
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.roundRect(bx - 8, by - 5, barW + 16, barH + 10, 5); ctx.stroke();
  ctx.fillStyle = 'rgba(255,245,210,0.12)';
  ctx.beginPath(); ctx.roundRect(bx, by, barW, barH, 4); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.roundRect(bx, by, barW * bfrac, barH, 4); ctx.clip();
  const hpG = ctx.createLinearGradient(bx, by, bx + barW, by + barH);
  hpG.addColorStop(0, bc);
  hpG.addColorStop(1, boss.phase >= 3 ? '#ff3300' : '#fff5c0');
  ctx.fillStyle = hpG;
  ctx.fillRect(bx, by, barW, barH);
  if (window.Manga && Manga.effects && Manga.effects.halftone) {
    const opts = { density: 5, dotSize: 1.1, alpha: 0.18, color: '#0a0a0a' };
    if (art && typeof art.halftone === 'function') art.halftone(ctx, bx, by, barW, barH, opts);
    else Manga.effects.halftone(ctx, bx, by, barW, barH, opts);
  }
  ctx.restore();
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(bx, by, barW, barH, 4); ctx.stroke();
  ctx.font = '900 12px monospace';
  ctx.textAlign = 'center';
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText('GIANT SCORPION', W/2, by + 19);
  ctx.fillStyle = '#fff5c0';
  ctx.fillText('GIANT SCORPION', W/2, by + 19);

  if(boss.phase>1 && window.Manga && Manga.effects && Manga.effects.sfxText){
    Manga.effects.sfxText(ctx, W/2, by + 52, boss.phase===3?'ENRAGED':'FRENZIED', {
      size: boss.phase===3 ? 28 : 22,
      color: boss.phase===3 ? '#ff4422' : '#ff9900',
      outline: '#0a0a0a',
      tilt: -5,
      alpha: 0.70,
    });
  }

  for(let i=0;i<ORION_HP;i++){
    const alive = i<orion.hp;
    const hx = 28 + i * 34, hy = 34;
    if (fxReady) {
      art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, alive ? 'heartFull' : 'heartEmpty', hx, hy, {
        scale: 0.075,
        alpha: alive ? 0.98 : 0.42,
      });
    } else {
      ctx.font='24px serif';
      ctx.fillStyle = alive?'#ff2244':'rgba(80,30,30,0.4)';
      ctx.fillText('♥', 18+i*32, 44);
    }
  }

  const elapsed = (runEndMs != null ? runEndMs : performance.now()) - runStartMs;
  ctx.textAlign='right';
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.beginPath(); ctx.roundRect(W - 138, 16, 116, 42, 5); ctx.fill();
  ctx.strokeStyle = '#0a0a0a';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(W - 138, 16, 116, 42, 5); ctx.stroke();
  ctx.font='bold 17px monospace';
  ctx.fillStyle = boss.state==='dead' ? Engine.GOLD : '#fff5c0';
  ctx.fillText(fmtRunTime(elapsed), W-32, 36);
  ctx.font='10px monospace';
  ctx.fillStyle='rgba(220,220,220,0.62)';
  ctx.fillText('TIME', W-32, 51);

  if(time<9){
    ctx.globalAlpha = Math.min(1, (9-time)*0.5);
    ctx.font='bold 11px monospace';
    ctx.textAlign='center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#0a0a0a';
    ctx.strokeText('Z SPEAR   X AIR-STAB   SHIFT x2 DODGE   Q CONSTELLATION', W/2, H-18);
    ctx.fillStyle='#fff5c0';
    ctx.fillText('Z SPEAR   X AIR-STAB   SHIFT x2 DODGE   Q CONSTELLATION', W/2, H-18);
    ctx.globalAlpha=1;
  }

  drawAbilityRing(W - 34, H - 78, 'Q', constellationCD, CONSTELLATION_CD, constellationT > 0);

  if (mangaTexts.length && window.Manga && Manga.effects && Manga.effects.sfxText) {
    for (const mt of mangaTexts) {
      const a = Math.min(1, mt.t * 1.6);
      Manga.effects.sfxText(ctx, mt.x, mt.y, mt.text, {
        size: mt.size || 38, color: mt.color || '#ffd54a',
        outline: '#0a0a0a', tilt: -8, alpha: a,
      });
    }
  }

  ctx.restore();
}

// Bottom-right manga ability indicator: ring with cooldown sweep.
function drawAbilityRing(cx, cy, key, cd, cdMax, active) {
  const r = 22;
  ctx.save();
  ctx.fillStyle = active ? 'rgba(170,220,255,0.55)' : 'rgba(0,0,0,0.55)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  const ready = 1 - Math.min(1, cd / cdMax);
  if (cd > 0) {
    ctx.strokeStyle = 'rgba(170,220,255,0.95)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, -Math.PI / 2, -Math.PI / 2 + ready * Math.PI * 2); ctx.stroke();
  } else {
    ctx.shadowColor = '#aaddff'; ctx.shadowBlur = 10;
    ctx.strokeStyle = '#aaddff'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(cx, cy, r - 3, 0, Math.PI * 2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  const art = orionMangaArt();
  if (Engine.manga && art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET)) {
    art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, 'abilityIcon', cx, cy, {
      scale: 0.092,
      alpha: cd > 0 ? 0.42 : 0.96,
    });
    ctx.font = '900 11px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.lineWidth = 3; ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0a0a0a';
    ctx.strokeText(key, cx, cy + r + 13);
    ctx.fillStyle = cd > 0 ? '#aaa' : '#aaddff';
    ctx.fillText(key, cx, cy + r + 13);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
    return;
  }
  ctx.font = '900 18px "Impact", "Arial Black", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.lineWidth = 4; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#0a0a0a';
  ctx.strokeText(key, cx, cy);
  ctx.fillStyle = cd > 0 ? '#888' : '#aaddff';
  ctx.fillText(key, cx, cy);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ── Background ────────────────────────────────────────────────────────────
function drawBg(c, W, H, time) {
  if (Engine.manga && drawOrionMangaArena(c, W, H, time)) {
    return;
  }
  // Manga arena scene: bold flat fields, ink silhouettes, halftone shading.
  if (Engine.manga && window.Manga && typeof window.Manga.scenes?.orionArena === 'function') {
    Manga.scenes.orionArena(c, W, H, time);
    return;
  }
  if (drawOrionNormalArenaCached(c, W, H, time)) return;
  const GY = H * 0.76;
  // Sky
  const sky = c.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#06021a'); sky.addColorStop(0.55,'#130828'); sky.addColorStop(1,'#220e10');
  c.fillStyle=sky; c.fillRect(0,0,W,H);
  // Stars
  for(const s of stars){
    const b = Math.sin(time*1.7+s.ph)*0.3+0.7;
    c.globalAlpha = b*0.85; c.fillStyle='#fff';
    c.beginPath(); c.arc(s.rx*W, s.ry*H, s.r, 0, Math.PI*2); c.fill();
  }
  c.globalAlpha=1;
  // Orion constellation
  c.save();
  const cx=W*0.11, cy=H*0.32, cs=160;
  c.strokeStyle='rgba(140,190,255,0.22)'; c.lineWidth=1;
  for(const [a,b] of OL){
    c.beginPath();
    c.moveTo(cx+OC[a].x*cs, cy+OC[a].y*cs);
    c.lineTo(cx+OC[b].x*cs, cy+OC[b].y*cs);
    c.stroke();
  }
  for(let i = 0; i < OC.length; i++){
    const s = OC[i];
    c.fillStyle='rgba(170,215,255,0.9)'; c.shadowColor='rgba(140,200,255,0.7)'; c.shadowBlur=7;
    c.beginPath(); c.arc(cx+s.x*cs, cy+s.y*cs, 2.8, 0, Math.PI*2); c.fill();
  }
  // Glyph highlight on the middle belt star — subtle ring while undiscovered,
  // bright halo once collected.
  const glyphFound = window.Engine && Engine.unlock && Engine.unlock.has('glyph_orion_found');
  const bx = cx + OC[4].x * cs, by = cy + OC[4].y * cs;
  c.shadowBlur = 0;
  if (glyphFound) {
    c.strokeStyle = 'rgba(255, 213, 74, 0.85)';
    c.shadowColor = '#ffd54a'; c.shadowBlur = 12;
    c.lineWidth = 1.6;
    c.beginPath(); c.arc(bx, by, 6, 0, Math.PI * 2); c.stroke();
  } else {
    const pulse = 0.35 + Math.sin(time * 1.6) * 0.15;
    c.strokeStyle = `rgba(255, 213, 74, ${pulse})`;
    c.lineWidth = 1.2;
    c.beginPath(); c.arc(bx, by, 7, 0, Math.PI * 2); c.stroke();
  }
  c.shadowBlur=0; c.restore();
  // Moon
  c.save();
  c.shadowColor='rgba(255,200,80,0.35)'; c.shadowBlur=22;
  c.fillStyle='#f5e8c0'; c.beginPath(); c.arc(W*0.87,H*0.08,26,0,Math.PI*2); c.fill();
  c.fillStyle='#130828'; c.beginPath(); c.arc(W*0.87+8,H*0.08,22,0,Math.PI*2); c.fill();
  c.restore();
  // Distant dunes
  c.fillStyle='#1e0e06';
  c.beginPath(); c.moveTo(0,GY);
  const dx=[0,.10,.22,.35,.46,.58,.70,.82,.93,1];
  const dh=[.14,.09,.22,.10,.18,.07,.20,.11,.08,.12];
  for(let i=0;i<dx.length;i++) c.lineTo(dx[i]*W, GY-dh[i]*H*0.52);
  c.lineTo(W,GY); c.closePath(); c.fill();
  // Ground sand
  const gnd = c.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#c87820'); gnd.addColorStop(0.07,'#9a5c10'); gnd.addColorStop(1,'#2a1004');
  c.fillStyle=gnd; c.fillRect(0,GY,W,H-GY);
  // Ripples
  c.strokeStyle='rgba(255,180,70,0.10)'; c.lineWidth=1;
  for(let i=0;i<9;i++){
    const ry = GY+10+i*12;
    c.beginPath(); c.moveTo(0,ry);
    for(let x=0;x<=W;x+=18) c.lineTo(x, ry+Math.sin(x*0.045+i*1.2)*2.5);
    c.stroke();
  }
  c.strokeStyle='rgba(255,210,100,0.3)'; c.lineWidth=2;
  c.beginPath(); c.moveTo(0,GY); c.lineTo(W,GY); c.stroke();
  // Rocks
  const rockXs = [W*.07,W*.22,W*.45,W*.62,W*.80,W*.91];
  for(let i=0;i<rockXs.length;i++){
    const rx=rockXs[i], rw=14+i*5, rh=9+i*2;
    c.fillStyle='#3a2010';
    c.beginPath(); c.ellipse(rx,GY-3,rw,rh,0,0,Math.PI*2); c.fill();
    c.strokeStyle='rgba(255,180,60,0.15)'; c.lineWidth=1;
    c.beginPath(); c.ellipse(rx-2,GY-5,rw*0.6,rh*0.45,0,0,Math.PI*2); c.stroke();
  }
  // Torches
  drawTorch(c, W*0.04, GY-50, time);
  drawTorch(c, W*0.96, GY-50, time);
}

function drawTorch(c, x, y, time){
  c.save(); c.translate(x,y);
  c.strokeStyle='#5a3810'; c.lineWidth=4; c.lineCap='round';
  c.beginPath(); c.moveTo(0,0); c.lineTo(0,-30); c.stroke();
  c.fillStyle='#7a4820';
  c.beginPath(); c.moveTo(-7,-30); c.lineTo(7,-30); c.lineTo(5,-20); c.lineTo(-5,-20); c.closePath(); c.fill();
  const fl = 0.7 + Math.sin(time*8+x)*0.3;
  c.shadowColor='#ff8800'; c.shadowBlur = 20*fl;
  c.fillStyle = `rgba(255,${120+fl*80|0},20,${fl*0.95})`;
  c.beginPath(); c.arc(0,-36,7*fl,0,Math.PI*2); c.fill();
  c.fillStyle = `rgba(255,220,80,${fl*0.7})`;
  c.beginPath(); c.arc(0,-38,4*fl,0,Math.PI*2); c.fill();
  c.shadowBlur=0; c.restore();
}

function drawOrionNormalArenaBase(c, W, H) {
  const GY = H * 0.76;
  const sky = c.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#06021a'); sky.addColorStop(0.55,'#130828'); sky.addColorStop(1,'#220e10');
  c.fillStyle=sky; c.fillRect(0,0,W,H);
  c.fillStyle='#fff';
  c.globalAlpha = 0.62;
  for(const s of stars){
    c.beginPath(); c.arc(s.rx*W, s.ry*H, s.r, 0, Math.PI*2); c.fill();
  }
  c.globalAlpha=1;
  c.save();
  c.shadowColor='rgba(255,200,80,0.35)'; c.shadowBlur=22;
  c.fillStyle='#f5e8c0'; c.beginPath(); c.arc(W*0.87,H*0.08,26,0,Math.PI*2); c.fill();
  c.fillStyle='#130828'; c.beginPath(); c.arc(W*0.87+8,H*0.08,22,0,Math.PI*2); c.fill();
  c.restore();
  c.fillStyle='#1e0e06';
  c.beginPath(); c.moveTo(0,GY);
  const dx=[0,.10,.22,.35,.46,.58,.70,.82,.93,1];
  const dh=[.14,.09,.22,.10,.18,.07,.20,.11,.08,.12];
  for(let i=0;i<dx.length;i++) c.lineTo(dx[i]*W, GY-dh[i]*H*0.52);
  c.lineTo(W,GY); c.closePath(); c.fill();
  const gnd = c.createLinearGradient(0,GY,0,H);
  gnd.addColorStop(0,'#c87820'); gnd.addColorStop(0.07,'#9a5c10'); gnd.addColorStop(1,'#2a1004');
  c.fillStyle=gnd; c.fillRect(0,GY,W,H-GY);
  c.strokeStyle='rgba(255,180,70,0.10)'; c.lineWidth=1;
  for(let i=0;i<9;i++){
    const ry = GY+10+i*12;
    c.beginPath(); c.moveTo(0,ry);
    for(let x=0;x<=W;x+=18) c.lineTo(x, ry+Math.sin(x*0.045+i*1.2)*2.5);
    c.stroke();
  }
  c.strokeStyle='rgba(255,210,100,0.3)'; c.lineWidth=2;
  c.beginPath(); c.moveTo(0,GY); c.lineTo(W,GY); c.stroke();
  const rockXs = [W*.07,W*.22,W*.45,W*.62,W*.80,W*.91];
  for(let i=0;i<rockXs.length;i++){
    const rx=rockXs[i], rw=14+i*5, rh=9+i*2;
    c.fillStyle='#3a2010';
    c.beginPath(); c.ellipse(rx,GY-3,rw,rh,0,0,Math.PI*2); c.fill();
    c.strokeStyle='rgba(255,180,60,0.15)'; c.lineWidth=1;
    c.beginPath(); c.ellipse(rx-2,GY-5,rw*0.6,rh*0.45,0,0,Math.PI*2); c.stroke();
  }
}

function drawOrionNormalArenaCached(c, W, H, time) {
  if (!window.document) return false;
  const key = `${W}|${H}`;
  if (!orionNormalArenaCache || orionNormalArenaKey !== key) {
    const layer = document.createElement('canvas');
    layer.width = W;
    layer.height = H;
    const layerCtx = layer.getContext('2d');
    if (!layerCtx) return false;
    drawOrionNormalArenaBase(layerCtx, W, H);
    orionNormalArenaCache = layer;
    orionNormalArenaKey = key;
  }
  c.drawImage(orionNormalArenaCache, 0, 0, W, H);
  drawOrionConstellation(c, W, H, time);
  const GY = H * 0.76;
  drawTorch(c, W*0.04, GY-50, time);
  drawTorch(c, W*0.96, GY-50, time);
  return true;
}

function drawMangaOrionPose(anim, x, y, opts = {}) {
  const art = orionMangaArt();
  if (!art || !orionMangaAssetReady(ORION_MANGA_ORION_SHEET)) return false;
  const scale = opts.scale ?? orionMangaScale(y, 0.34, Math.max(0.42, Math.min(0.56, Math.min(Engine.W, Engine.H) / 1400)));
  drawMangaContactShadow(x, y, {
    w: (opts.shadowW ?? 48) * scale / 0.46,
    h: (opts.shadowH ?? 12) * scale / 0.46,
    alpha: opts.shadowAlpha ?? 0.40,
    offsetY: opts.shadowOffsetY ?? 12,
  });
  ctx.save();
  ctx.globalAlpha *= opts.alpha ?? 1;
  const heavy = typeof art.heavyEffects === 'function' && art.heavyEffects();
  if (opts.filter || heavy) ctx.filter = opts.filter || 'saturate(1.04) contrast(1.05)';
  ctx.shadowColor = opts.shadowColor || 'rgba(170,215,255,0.22)';
  ctx.shadowBlur = opts.shadowBlur ?? (heavy ? 10 : 3);
  const drawPoseAnim = art.drawActedAnimation || art.drawAnimation;
  const drew = drawPoseAnim(ctx, ORION_MANGA_ORION_SHEET, anim, opts.t ?? Engine.time, x, y + 8, {
    scale,
    flipX: !!opts.flipX,
    frameBlendStrength: 0.18,
  });
  ctx.restore();
  return drew;
}

function drawMangaScorpionPose(anim, x, y, opts = {}) {
  const art = orionMangaArt();
  if (!art || !orionMangaAssetReady(ORION_MANGA_SCORPION_SHEET)) return false;
  const scale = opts.scale ?? orionMangaScale(y, 0.46, Math.max(0.58, Math.min(0.84, Math.min(Engine.W, Engine.H) / 1080)));
  drawMangaContactShadow(x, y, {
    w: (opts.shadowW ?? 118) * scale / 0.70,
    h: (opts.shadowH ?? 22) * scale / 0.70,
    alpha: opts.shadowAlpha ?? 0.48,
    offsetY: opts.shadowOffsetY ?? 13,
  });
  ctx.save();
  ctx.globalAlpha *= opts.alpha ?? 1;
  const heavy = typeof art.heavyEffects === 'function' && art.heavyEffects();
  if (opts.filter || heavy) ctx.filter = opts.filter || 'saturate(1.06) contrast(1.06)';
  ctx.shadowColor = opts.shadowColor || (anim === 'enraged' ? '#ff3300' : 'rgba(255,120,30,0.24)');
  ctx.shadowBlur = opts.shadowBlur ?? (heavy ? (anim === 'enraged' ? 22 : 12) : (anim === 'enraged' ? 6 : 3));
  const drawPoseAnim = art.drawActedAnimation || art.drawAnimation;
  const drew = drawPoseAnim(ctx, ORION_MANGA_SCORPION_SHEET, anim, opts.t ?? Engine.time, x, y + 12, {
    scale,
    flipX: !!opts.flipX,
    frameBlendStrength: 0.18,
  });
  ctx.restore();
  return drew;
}

function drawOrionMangaWorldFrame() {
  const W = Engine.W, H = Engine.H;
  if (boss) {
    drawMangaContactShadow(boss.visualX ?? boss.x, boss.visualY ?? boss.y, { w:128, h:24, alpha:boss.state === 'dead' ? 0.32 : 0.50, offsetY:13 });
  }
  if (orion) {
    drawMangaContactShadow(orion.visualX ?? orion.x, orion.visualY ?? orion.y, { w:52, h:13, alpha:orion.proneT > 0 ? 0.30 : 0.45, offsetY:13 });
  }

  for(const s of spears) drawMangaSpearProjectile(s, false);
  for(const v of venoms) drawMangaVenomProjectile(v, false);
  for(const p of phantoms) if (p.trail && p.trail.length > 1) drawMangaRibbonTrail(p.trail, '#cc88ff', 5, 0.36);

  drawScorpion();
  drawOrion();
  drawOrionMangaForegroundOcclusion();

  for(const s of spears) drawMangaSpearProjectile(s, true);
  for(const v of venoms) drawMangaVenomProjectile(v, true);
  for(const p of phantoms) drawPhantomClaw(p);
  drawMangaStabFx();

  if (orion && orion.hurtFlash > 0 && window.Manga && Manga.effects && Manga.effects.speedLines) {
    const f = Math.min(1, orion.hurtFlash / 0.7);
    Manga.effects.speedLines(ctx, orion.visualX ?? orion.x, (orion.visualY ?? orion.y) - 32, {
      count:14, innerR:28, outerR:86 + f * 48,
      color:'#ff2200', width:2.4, jitter:0.5,
    });
  }

  renderHUD();
  if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, W, H);
}

function renderOrionMangaTitle(c, eng) {
  const W = eng.W, H = eng.H, time = eng.time;
  const compact = H < 520;
  drawOrionMangaArena(c, W, H, time, { title:true, focusY:0.52 });
  const gy = H * 0.76;
  drawMangaOrionPose('idle', W * (compact ? 0.24 : 0.26), gy, {
    t:time,
    scale:compact ? 0.34 : Math.max(0.44, Math.min(0.62, Math.min(W, H) / 1240)),
    alpha:compact ? 0.78 : 1,
  });
  drawMangaScorpionPose('idle', W * (compact ? 0.63 : 0.69), gy, {
    t:time,
    flipX:true,
    scale:compact ? 0.48 : Math.max(0.66, Math.min(0.92, Math.min(W, H) / 920)),
    alpha:compact ? 0.82 : 1,
  });
  drawOrionMangaForegroundOcclusion();

  const vig = c.createRadialGradient(W/2, H/2, H*0.18, W/2, H/2, H*0.90);
  vig.addColorStop(0, 'rgba(0,0,0,0.02)');
  vig.addColorStop(1, 'rgba(0,0,0,0.74)');
  c.fillStyle = vig; c.fillRect(0, 0, W, H);

  c.save();
  c.textAlign = 'center';
  c.lineJoin = 'round';
  c.font = `900 ${compact ? 58 : 82}px "Impact", "Arial Black", serif`;
  c.strokeStyle = '#0a0a0a';
  c.lineWidth = compact ? 7 : 10;
  const titleY = H * (compact ? 0.22 : 0.26);
  c.strokeText('ORION', W/2, titleY);
  c.fillStyle = eng.GOLD;
  c.shadowColor = '#aaddff';
  c.shadowBlur = compact ? 20 : 30;
  c.fillText('ORION', W/2, titleY);
  c.shadowBlur = 0;
  c.font = `italic ${compact ? 17 : 22}px serif`;
  c.fillStyle = 'rgba(255,235,185,0.88)';
  c.fillText('& The Giant Scorpion', W/2, titleY + (compact ? 32 : 42));
  c.font = `bold ${compact ? 10 : 14}px monospace`;
  c.fillStyle = 'rgba(235,225,200,0.78)';
  c.fillText(compact ? 'Z spear  ·  X stab  ·  Shift dodge  ·  Q strike' : 'Z throw spear  ·  X air-stab  ·  Shift x2 dodge  ·  Q constellation strike', W/2, H*(compact ? 0.43 : 0.49));

  const pulse = 0.86 + Math.sin(time * 4.2) * 0.14;
  const bw = compact ? 150 : 188, bh = compact ? 42 : 52, bx = W/2 - bw/2, by = H*(compact ? 0.56 : 0.61);
  c.shadowColor = eng.GOLD;
  c.shadowBlur = 24 * pulse;
  c.fillStyle = `rgba(212,175,55,${0.92*pulse})`;
  c.beginPath(); c.roundRect(bx, by, bw, bh, 8); c.fill();
  c.shadowBlur = 0;
  c.strokeStyle = '#0a0a0a'; c.lineWidth = 3;
  c.beginPath(); c.roundRect(bx, by, bw, bh, 8); c.stroke();
  c.fillStyle = '#1a0f00';
  c.font = `bold ${compact ? 18 : 21}px monospace`;
  c.textBaseline = 'middle';
  c.fillText('BEGIN', W/2, by + bh/2);
  c.textBaseline = 'alphabetic';
  c.fillStyle = 'rgba(220,220,220,0.44)';
  c.font = `${compact ? 9 : 11}px monospace`;
  c.fillText('SPACE / ENTER to start  ·  ESC for hub', W/2, by + bh + (compact ? 24 : 34));
  c.restore();
}

function renderOrionMangaGameOver(c, eng) {
  const W = eng.W, H = eng.H, time = eng.time;
  const isVictory = eng.state === 'victory';
  const gy = H * 0.76;
  drawOrionMangaArena(c, W, H, time, { title:true, focusY:0.52 });
  if (isVictory) {
    drawMangaScorpionPose('dead', W * 0.66, gy, {
      t:Math.max(0, boss ? boss.deadTimer : 1),
      flipX:true,
      scale:Math.max(0.62, Math.min(0.88, Math.min(W, H) / 940)),
      shadowAlpha:0.34,
    });
    drawMangaOrionPose('victory', W * 0.31, gy, {
      t:time,
      scale:Math.max(0.44, Math.min(0.62, Math.min(W, H) / 1240)),
      shadowAlpha:0.44,
      shadowColor:'#fff5c0',
      shadowBlur:16,
    });
  } else {
    drawMangaOrionPose('fallen', W * 0.34, gy, {
      t:time,
      scale:Math.max(0.43, Math.min(0.60, Math.min(W, H) / 1280)),
      shadowAlpha:0.28,
      alpha:0.92,
    });
    drawMangaScorpionPose('enraged', W * 0.67, gy, {
      t:time,
      flipX:true,
      scale:Math.max(0.70, Math.min(0.98, Math.min(W, H) / 880)),
      shadowAlpha:0.58,
      shadowColor:'#ff3300',
      shadowBlur:26,
    });
  }
  drawOrionMangaForegroundOcclusion();

  if (window.Manga && Manga.effects && Manga.effects.panelSplit) {
    const since = time - (eng.config._orionGameOverT0 || time);
    const split = Math.min(1, since / 0.45);
    if (split < 1) Manga.effects.panelSplit(c, W, H, split);
  }

  const panel = c.createLinearGradient(0, H*0.18, 0, H*0.82);
  panel.addColorStop(0, 'rgba(0,0,0,0.18)');
  panel.addColorStop(0.44, isVictory ? 'rgba(0,0,0,0.42)' : 'rgba(20,0,0,0.52)');
  panel.addColorStop(1, 'rgba(0,0,0,0.76)');
  c.fillStyle = panel;
  c.fillRect(0, 0, W, H);

  c.save();
  c.textAlign = 'center';
  c.lineJoin = 'round';
  const title = isVictory ? 'THE SCORPION IS SLAIN' : 'ORION HAS FALLEN';
  const titleColor = isVictory ? eng.GOLD : '#ff4422';
  c.font = '900 54px "Impact", "Arial Black", serif';
  c.strokeStyle = '#0a0a0a';
  c.lineWidth = 8;
  c.strokeText(title, W/2, H*0.30);
  c.fillStyle = titleColor;
  c.shadowColor = titleColor;
  c.shadowBlur = 22;
  c.fillText(title, W/2, H*0.30);
  c.shadowBlur = 0;
  c.font = 'italic 15px serif';
  c.fillStyle = 'rgba(235,220,178,0.78)';
  c.fillText(isVictory ? 'Orion stands victorious in the same moonlit arena.' : 'The scorpion towers over the broken hunt.', W/2, H*0.38);

  if (isVictory) {
    const finalMs = (runEndMs != null ? runEndMs : performance.now()) - runStartMs;
    c.font = '16px monospace';
    c.fillStyle = 'rgba(255,220,150,0.72)';
    c.fillText('FINAL TIME', W/2, H*0.49);
    c.font = 'bold 56px monospace';
    c.fillStyle = eng.GOLD;
    c.shadowColor = eng.GOLD;
    c.shadowBlur = 15;
    c.fillText(fmtRunTime(finalMs), W/2, H*0.58);
    c.shadowBlur = 0;
    c.font = '14px monospace';
    if (hallStatus === 'pending') {
      c.fillStyle = 'rgba(255,220,140,0.60)';
      c.fillText('inscribing your name on Olympus...', W/2, H*0.64);
    } else if (hallStatus === 'ok' && hallRank != null) {
      c.fillStyle = eng.GOLD;
      c.shadowColor = eng.GOLD; c.shadowBlur = 10;
      c.fillText('RANK #' + hallRank + ' ON MOUNT OLYMPUS', W/2, H*0.64);
      c.shadowBlur = 0;
    } else if (hallStatus === 'fail') {
      c.fillStyle = 'rgba(180,140,140,0.65)';
      c.fillText('the gods are silent (offline)', W/2, H*0.64);
    }
  }

  if (Math.sin(time * 3) > 0) {
    const promptColor = isVictory ? '#44ff88' : eng.GOLD;
    c.font = 'bold 19px monospace';
    c.fillStyle = promptColor;
    c.shadowColor = promptColor;
    c.shadowBlur = 9;
    c.fillText(`PRESS  1  TO ${isVictory ? 'PLAY AGAIN' : 'TRY AGAIN'}`, W/2, H*0.76);
  }
  c.shadowBlur = 0;
  c.font = '12px monospace';
  c.fillStyle = 'rgba(200,200,200,0.50)';
  c.fillText('ESC - Return to World    ·    H - Mount Olympus', W/2, H*0.84);
  c.restore();
}

// ── Boot ──────────────────────────────────────────────────────────────────
Engine.boot({
  title:    'ORION',
  subtitle: '& The Giant Scorpion',
  instructions: [
    '← → keys: move',
    '↑ to jump',
    'Z: throw spear   X: stab',
    'Shift × 2: dodge — then double-tap X or Space to attack',
    'Defeat the scorpion before it kills you',
  ],
  deadTitle:       'ORION HAS FALLEN',
  deadSubtitle:    'The scorpion claims another hunter.',
  victoryTitle:    'THE SCORPION IS SLAIN',
  victorySubtitle: 'Orion stands victorious — his name written in the stars forever.',

  theme: {
    bg:     drawBg,
    accent: '#c87030',
    danger: '#cc2200',
    shakeDecay: 'linear', // matches original orion feel
    restartKey: '1',
  },

  mobile: {
    movement: 'horizontal',
    actions: [
      { label: 'JUMP',  key: 'ArrowUp', mode: 'hold' },
      { label: 'SPEAR', key: 'z' },
      { label: 'STAB',  key: 'x' },
      { label: 'DODGE', key: 'Shift', mode: 'doubleTap' },
    ],
  },

  onTryStart() {
    if (!hasName()) { showNameModal(); return false; }
    return true;
  },

  onInit() { initGame(); },

  onUpdate(dt) {
    // dt is already scaled by Engine.timeScale, so any active slo-mo dip from
    // a perfect dodge slows cooldowns + manga telegraph decay alongside the
    // boss/projectile updates.
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.update(dt);
    constellationT  = Math.max(0, constellationT  - dt);
    constellationCD = Math.max(0, constellationCD - dt);
    for (let i = mangaTexts.length - 1; i >= 0; i--) {
      mangaTexts[i].t -= dt;
      if (mangaTexts[i].t <= 0) mangaTexts.splice(i, 1);
    }

    updateOrion(dt);
    updateBoss(dt);
    updateSpears(dt);
    updateVenoms(dt);
    updatePhantoms(dt);
    updateConstellationGaze(dt);

    // Submit on the first frame of victory. runEndMs was snapshotted the
    // moment the scorpion's HP hit 0 (see updateBoss).
    if (Engine.state === 'victory' && !submittedThisRun) {
      submittedThisRun = true;
      if (runEndMs == null) runEndMs = performance.now();
      submitToHall(Math.floor(runEndMs - runStartMs));
    }
  },

  onTitleRender(ctx2, eng) {
    if (eng.manga) {
      renderOrionMangaTitle(ctx2, eng);
      return;
    }
    eng._defaultTitle();
  },

  onGameOverRender(ctx2, eng) {
    const W = eng.W, H = eng.H, time = eng.time;
    const isVictory = eng.state === 'victory';
    // Capture transition time so the manga panel-split has a stable t0.
    if (this._gameOverState !== eng.state) {
      this._gameOverState = eng.state;
      this._gameOverT0    = eng.time;
      eng.config._orionGameOverT0 = eng.time;
    }
    if (eng.manga) {
      renderOrionMangaGameOver(ctx2, eng);
      return;
    }
    const since = eng.time - (this._gameOverT0 || eng.time);

    const art = window.GodGames && GodGames.MangaArt;
    if (eng.manga && art && typeof art.drawScene === 'function'
        && art.drawScene(ctx2, isVictory ? 'olympus' : 'orion', 0, 0, W, H, { focusX: 0.5, focusY: 0.5 })) {
      if (art.overlay) art.overlay(ctx2, W, H, {
        top: 'rgba(0,0,0,0.20)',
        mid: 'rgba(0,0,0,0.18)',
        bottom: 'rgba(0,0,0,0.70)',
      });
    }

    // Manga panel-split death/victory cinematic — slabs slide off-screen
    // before the dead screen settles into the gold/red title typography.
    if (eng.manga && window.Manga && Manga.effects && Manga.effects.panelSplit) {
      const splitProg = Math.min(1, since / 0.85);          // 0 → 1 over 0.85s
      Manga.effects.panelSplit(ctx2, W, H, splitProg);
    }

    ctx2.fillStyle = isVictory ? 'rgba(0,0,0,0.72)' : 'rgba(0,0,0,0.78)';
    ctx2.fillRect(0, 0, W, H);
    ctx2.save();
    ctx2.textAlign = 'center';
    const titleColor = isVictory ? eng.GOLD : '#cc2200';
    ctx2.font = 'bold 52px serif';
    // Manga: ink-stroke the title for that bold comic feel.
    if (eng.manga) {
      ctx2.lineJoin = 'round';
      ctx2.strokeStyle = '#0a0a0a';
      ctx2.lineWidth = 6;
      ctx2.strokeText(isVictory ? 'THE SCORPION IS SLAIN' : 'ORION HAS FALLEN', W/2, H*0.32);
    }
    ctx2.fillStyle = titleColor;
    ctx2.shadowColor = titleColor;
    ctx2.shadowBlur = 22;
    ctx2.fillText(isVictory ? 'THE SCORPION IS SLAIN' : 'ORION HAS FALLEN', W/2, H*0.32);
    ctx2.shadowBlur = 0;
    ctx2.font = 'italic 15px serif';
    ctx2.fillStyle = 'rgba(220,200,155,0.7)';
    ctx2.fillText(
      isVictory
        ? 'Orion stands victorious — his name written in the stars forever.'
        : 'The scorpion claims another hunter.',
      W/2, H*0.40
    );

    if (isVictory) {
      const finalMs = (runEndMs != null ? runEndMs : performance.now()) - runStartMs;
      ctx2.font = '16px monospace';
      ctx2.fillStyle = 'rgba(255,200,100,0.7)';
      ctx2.fillText('FINAL TIME', W/2, H*0.50);
      ctx2.font = 'bold 56px monospace';
      ctx2.fillStyle = eng.GOLD;
      ctx2.shadowColor = eng.GOLD;
      ctx2.shadowBlur = 16;
      ctx2.fillText(fmtRunTime(finalMs), W/2, H*0.60);
      ctx2.shadowBlur = 0;

      ctx2.font = '14px monospace';
      if (hallStatus === 'pending') {
        ctx2.fillStyle = 'rgba(255,220,140,0.55)';
        ctx2.fillText('inscribing your name on Olympus…', W/2, H*0.66);
      } else if (hallStatus === 'ok' && hallRank != null) {
        ctx2.fillStyle = eng.GOLD;
        ctx2.shadowColor = eng.GOLD; ctx2.shadowBlur = 10;
        ctx2.fillText('RANK #' + hallRank + ' ON MOUNT OLYMPUS', W/2, H*0.66);
        ctx2.shadowBlur = 0;
      } else if (hallStatus === 'fail') {
        ctx2.fillStyle = 'rgba(180,140,140,0.6)';
        ctx2.fillText('the gods are silent (offline)', W/2, H*0.66);
      }
    }

    if (Math.sin(time * 3) > 0) {
      const promptColor = isVictory ? '#44ff88' : eng.GOLD;
      ctx2.font = 'bold 19px monospace';
      ctx2.fillStyle = promptColor;
      ctx2.shadowColor = promptColor;
      ctx2.shadowBlur = 9;
      ctx2.fillText(`PRESS  1  TO ${isVictory ? 'PLAY AGAIN' : 'TRY AGAIN'}`, W/2, H*0.76);
    }
    ctx2.shadowBlur = 0;
    ctx2.font = '12px monospace';
    ctx2.fillStyle = 'rgba(170,170,170,0.5)';
    ctx2.fillText('ESC — Return to World    ·    H — Mount Olympus', W/2, H*0.84);
    ctx2.restore();
  },

  onRender() {
    if (Engine.manga) {
      drawOrionMangaWorldFrame();
      if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, Engine.W, Engine.H);
      drawOrionDebugOverlay();
      return;
    }
    // Spears
    for(const s of spears){
      ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(s.gravity?Math.atan2(s.vy,s.vx):(s.vx>0?0:Math.PI));
      ctx.strokeStyle='#7a5028'; ctx.lineWidth=3; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(14,0); ctx.stroke();
      ctx.fillStyle='#b8b8b8';
      ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(8,-4); ctx.lineTo(8,4); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    // Venom projectiles
    for(const v of venoms){
      ctx.save();
      ctx.shadowColor='#00ff44'; ctx.shadowBlur=18;
      ctx.fillStyle='#22ee44';
      ctx.beginPath(); ctx.arc(v.x,v.y,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(180,255,180,0.8)';
      ctx.beginPath(); ctx.arc(v.x-2,v.y-2,3,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.restore();
    }
    // Phantom Claw — spectral pincer streaking toward Orion (manga only)
    for(const p of phantoms) drawPhantomClaw(p);
    drawScorpion();
    drawOrion();
    renderHUD();   // inside shake transform — matches original orion feel
    if (window.GodGames && GodGames.MythCinematic) GodGames.MythCinematic.render(ctx, Engine.W, Engine.H);
    drawOrionDebugOverlay();
  },

  onKeyDown(ev) {
    // H jumps to Mount Olympus from any non-playing screen
    if((Engine.state === 'dead' || Engine.state === 'victory' || Engine.state === 'title') &&
       (ev.key === 'h' || ev.key === 'H')) {
      window.location.href = 'mount-olympus.html';
      return;
    }
    if(Engine.state !== 'playing') return;
    const now2 = performance.now();

    // Manga ability: Constellation Strike (Q) — three spears rain from the sky onto the boss.
    if (Engine.manga && (ev.key === 'q' || ev.key === 'Q') && constellationCD <= 0) {
      constellationT = CONSTELLATION_CHARGE;
      constellationCD = CONSTELLATION_CD;
      mangaTexts.push({ text: 'CONSTELLATION STRIKE!', x: Engine.W / 2, y: Engine.H * 0.30, t: 0.9, color: '#aaddff', size: 56 });
      // Three spears spawn above the boss with random spread, falling under gravity.
      const drop = (delay, off) => setTimeout(() => {
        if (boss.state === 'dead') return;
        const skyX = boss.x + off * 0.55 + (Math.random() - 0.5) * 12;
        const skyY = Engine.H * (0.13 + Math.random() * 0.04);
        spears.push({
          x: boss.x + off + (Math.random() - 0.5) * 20,
          y: -50,
          vx: 0, vy: 200,
          gravity: true, active: true, constellation: true,
          skyX, skyY,
          originX: skyX, originY: skyY,
          trail: [{ x: skyX, y: skyY }],
          age: 0,
        });
      }, delay);
      drop(0,   -60);
      drop(160,   0);
      drop(320,  60);
      Engine.shake(6);
      // Polish audio
      const polish = window.Manga && Manga.characters && Manga.characters.orion && Manga.characters.orion.polish;
      if (polish && polish.onConstellation && Engine.audio._ctx && Manga.fx && Manga.fx.sfxLayered) {
        Manga.fx.sfxLayered(Engine.audio._ctx, polish.onConstellation.audioLayers);
      }
    }

    if(ev.key==='z' || ev.key==='Z'){ orion.spearQueued = true; }
    if(ev.key===' '){
      if(orion.dodgeT>0){
        if(now2-lastSpaceTime<300){ orion.spearQueued = true; lastSpaceTime = -1; }
        else lastSpaceTime = now2;
      } else { orion.spearQueued = true; }
    }
    if(ev.key==='x' || ev.key==='X'){
      if(orion.dodgeT>0){
        if(now2-lastXTime<300){ orion.stabQueued = true; lastXTime = -1; }
        else lastXTime = now2;
      } else { orion.stabQueued = true; }
    }
    if(ev.key==='Shift'){
      const now = performance.now();
      if(now-lastShiftTime<300 && orion.dodgeT<=0){
        const DODGE_SPD=520, DODGE_DUR=0.28;
        orion.dodgeFacing = orion.facing;
        orion.dodgeVx = orion.dodgeFacing*DODGE_SPD;
        orion.dodgeT  = DODGE_DUR;
        orion.invincible = Math.max(orion.invincible, DODGE_DUR+0.05);
        burst(orion.x, orion.y-30, '#aaddff', 6, 80);
        Engine.audio.tone(320,'sine',0.15,0.18,280);
        lastShiftTime = -1;
        if (isPerfectDodge()) triggerPerfectDodge();
      } else {
        lastShiftTime = now;
      }
    }
  },
});
ctx = Engine.ctx;

// ── Hidden glyph: Orion's Belt ───────────────────────────────────────────
// The middle star of the belt (the fourth star in OC) gets a faint ring
// when not yet found. Clicking it during a fight collects the glyph.
function beltMidScreenPos() {
  const W = Engine.W, H = Engine.H;
  const { cx, cy, cs } = orionConstellationMetrics(W, H);
  return { x: cx + OC[4].x * cs, y: cy + OC[4].y * cs };
}
Engine.canvas.addEventListener('click', (ev) => {
  if (Engine.state !== 'playing') return;
  if (!window.Engine || !Engine.unlock || Engine.unlock.has('glyph_orion_found')) return;
  const r = Engine.canvas.getBoundingClientRect();
  const mx = ev.clientX - r.left, my = ev.clientY - r.top;
  const { x, y } = beltMidScreenPos();
  const dx = mx - x, dy = my - y;
  if (dx * dx + dy * dy < 14 * 14) {
    Engine.unlock.set('glyph_orion_found');
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('glyph_first');
      GodGames.Mysteries.tally('glyphs_found');
    }
    mangaTexts.push({
      text: 'A MARK!', x: x, y: y - 22,
      t: 1.0, color: '#ffd54a', size: 28,
    });
    burst(x, y, '#ffd54a', 18, 200);
    Engine.shake(4);
  }
});
</script>
