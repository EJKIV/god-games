<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Orion — God Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family: 'Trebuchet MS', serif; color:#f0e8d0; }
canvas { display:block; }

/* ── Name prompt modal ── */
.modal-bg {
  position:fixed; inset:0; z-index:10;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
}
.modal-bg.open { display:flex; }
.modal {
  background:linear-gradient(180deg, #1a0a14 0%, #04020a 100%);
  border:1px solid #D4AF37; border-radius:6px;
  padding:32px 40px;
  box-shadow: 0 0 50px rgba(212,175,55,0.4);
  text-align:center; min-width:340px;
}
.modal h3 {
  font-family:serif; font-size:26px; color:#D4AF37;
  letter-spacing:0.1em; margin-bottom:6px;
  text-shadow:0 0 14px rgba(212,175,55,0.5);
}
.modal p { font-style:italic; color:rgba(240,215,122,0.7); font-size:13px; margin-bottom:20px; }
.modal input {
  width:100%; padding:10px 14px;
  background:rgba(10,4,8,0.7); border:1px solid rgba(212,175,55,0.5);
  color:#f0e8d0; font-family:monospace; font-size:16px;
  text-align:center; letter-spacing:0.1em;
  border-radius:3px; outline:none;
}
.modal input:focus { border-color:#D4AF37; box-shadow:0 0 12px rgba(212,175,55,0.4); }
.modal button {
  margin-top:18px; padding:10px 28px;
  background:#D4AF37; border:none; color:#1a0f00;
  font-family:monospace; font-weight:bold; font-size:14px;
  letter-spacing:0.1em; cursor:pointer; border-radius:3px;
  transition:transform 0.1s, box-shadow 0.15s;
}
.modal button:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(212,175,55,0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>NAME OF THE HUNTER</h3>
    <p>Speak your name before you face the scorpion.</p>
    <input id="nameInput" maxlength="20" autocomplete="off" spellcheck="false" placeholder="Your name">
    <br><button id="nameSave">BEGIN THE HUNT</button>
  </div>
</div>
<script src="vendor/@tns/game-engine/core/engine.js"></script>
<script src="vendor/@tns/game-engine/unlock/index.js"></script>
<script src="vendor/@tns/game-engine/manga/manga.js"></script>
<script src="assets/manga/shared/manifest.js"></script>
<script src="assets/manga/shared/runtime.js"></script>
<script src="assets/manga/orion/manifest.js"></script>
<script src="mysteries.js"></script>
<script src="progress-sync.js"></script>
<script>
// ── Constants ─────────────────────────────────────────────────────────────
const GRAVITY   = 640;
const JUMP_V    = -440;
const P_SPEED   = 215;
const SPEAR_SPD = 540;
const SPEAR_DMG = 14;
const STAB_DMG  = 22;
const ORION_HP  = 3;
const BOSS_HP   = 200;
const MAX_SPEARS= 7;

// ── Game state ────────────────────────────────────────────────────────────
let orion, boss, spears, venoms, phantoms;
let lastShiftTime = -1, lastSpaceTime = -1, lastXTime = -1;
let ctx; // bound from Engine.ctx after boot
const ORION_MANGA_LEGACY_SHEET = 'godgames.orion.scorpionSheet';
const ORION_MANGA_ARENA = 'godgames.orion.arenaCleanV1';
const ORION_MANGA_ORION_SHEET = 'godgames.orion.orionAnimV1';
const ORION_MANGA_SCORPION_SHEET = 'godgames.orion.scorpionAnimV1';
const ORION_MANGA_FXHUD_SHEET = 'godgames.orion.fxHudV1';
let orionMangaArenaCache = null;
let orionMangaArenaCachePending = '';
let orionNormalArenaCache = null;
let orionNormalArenaKey = '';

// ── Manga abilities (player) ──────────────────────────────────────────────
let constellationT  = 0;          // charge animation duration remaining
let constellationCD = 0;          // cooldown
const CONSTELLATION_CHARGE = 0.35;
const CONSTELLATION_CD     = 8;
let mangaTexts = [];              // { text, x, y, t, color, size }
// Mystery: Constellation's Gaze — the hunter looks up at his own image.
// Cumulative seconds spent stationary beneath the rendered constellation
// while the boss is alive. The boss attacks every few seconds and forces
// motion, so this counter accumulates rather than reset on motion — the
// player just has to find quiet windows totalling 4s across a fight.
let gazeT = 0;
const GAZE_GOAL = 4;
// Scorpio Dodge — perfect-timing window grants Engine.setTimeScale slo-mo (manga only).

// ── Hall of Mount Olympus (leaderboard) ──────────────────────────────────
const NAME_KEY = 'godgames_playerName';
let runStartMs = 0;
let runEndMs = null;
let submittedThisRun = false;
let hallRank = null;
let hallStatus = null; // 'pending' | 'ok' | 'fail'

function fmtRunTime(ms) {
  const total = Math.max(0, Math.floor(ms));
  const m = Math.floor(total / 60000);
  const s = Math.floor((total % 60000) / 1000);
  const mmm = total % 1000;
  return `${m}:${String(s).padStart(2,'0')}.${String(mmm).padStart(3,'0')}`;
}

async function submitToHall(timeMs) {
  const name = localStorage.getItem(NAME_KEY) || 'NAMELESS MORTAL';
  const game = Engine.manga ? 'orion-manga' : 'orion';
  hallStatus = 'pending';
  try {
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ game, name, score: timeMs }),
    });
    if (!res.ok) { hallStatus = 'fail'; return; }
    const json = await res.json();
    hallRank = json.rank;
    hallStatus = 'ok';
    // Pantheon mystery hint + top-10 progress.
    if (window.GodGames && GodGames.Mysteries) {
      GodGames.Mysteries.earnHint('first_score');
      if (hallRank && hallRank <= 10) GodGames.Mysteries.tally('olympus_top10_count');
    }
  } catch {
    hallStatus = 'fail';
  }
}
window.GodGames = window.GodGames || {};
window.GodGames.submitNow = () => {
  if (submittedThisRun) return Promise.resolve();
  submittedThisRun = true;
  const endMs = runEndMs == null ? performance.now() : runEndMs;
  return submitToHall(Math.floor(endMs - runStartMs));
};

// ── Name gate ──────────────────────────────────────────────────────────────
function hasName() { return !!localStorage.getItem(NAME_KEY); }
function showNameModal() {
  const mb = document.getElementById('modalBg');
  const inp = document.getElementById('nameInput');
  inp.value = localStorage.getItem(NAME_KEY) || '';
  mb.classList.add('open');
  setTimeout(() => inp.focus(), 50);
}
function hideNameModal() { document.getElementById('modalBg').classList.remove('open'); }
function saveNameFromModal() {
  const raw = document.getElementById('nameInput').value || '';
  const clean = raw.replace(/[\x00-\x1f\x7f]/g, '').replace(/\s+/g,' ').trim().slice(0,20);
  if (!clean) return false;
  localStorage.setItem(NAME_KEY, clean);
  hideNameModal();
  // Auto-start once they've named themselves.
  if (Engine.state === 'title' || Engine.state === 'dead' || Engine.state === 'victory') {
    Engine.audio.init();
    Engine.setState('playing');
  }
  return true;
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('nameSave').addEventListener('click', saveNameFromModal);
  document.getElementById('nameInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveNameFromModal(); }
    e.stopPropagation();
  });
  if (!hasName()) showNameModal();
});

function groundY() { return Engine.H * 0.76; }

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function orionMangaArt() {
  return window.GodGames && GodGames.MangaArt ? GodGames.MangaArt : null;
}

function orionMangaAssetReady(id) {
  const art = orionMangaArt();
  return !!(Engine.manga && art && typeof art.ready === 'function' && art.ready(id));
}

function orionMangaStage() {
  const W = Engine.W, H = Engine.H;
  const GY = groundY();
  return {
    W, H,
    vanishX: W * 0.50,
    horizonY: H * 0.52,
    groundY: GY,
    laneLeft: W * 0.08,
    laneRight: W * 0.92,
  };
}

function orionMangaDepth(y) {
  const s = orionMangaStage();
  return clamp01((y - s.horizonY) / Math.max(1, s.groundY - s.horizonY));
}

function orionMangaProjectedX(x, y, opts = {}) {
  const s = orionMangaStage();
  const d = Math.pow(orionMangaDepth(y), opts.curve ?? 0.86);
  const backPull = opts.backPull ?? 0.60;
  const pull = backPull + (1 - backPull) * d;
  return s.vanishX + (x - s.vanishX) * pull;
}

function orionMangaScale(y, farScale, nearScale, opts = {}) {
  const d = Math.pow(orionMangaDepth(y), opts.curve ?? 0.76);
  return farScale + (nearScale - farScale) * d;
}

function drawMangaContactShadow(x, y, opts = {}) {
  const s = orionMangaStage();
  const d = orionMangaDepth(y);
  const w = opts.w ?? (26 + d * 74);
  const h = opts.h ?? (5 + d * 16);
  const alpha = opts.alpha ?? (0.20 + d * 0.32);
  const rot = ((x - s.vanishX) / Math.max(1, s.W)) * 0.18;

  ctx.save();
  ctx.globalAlpha *= alpha;
  ctx.fillStyle = opts.color || 'rgba(0,0,0,0.82)';
  ctx.beginPath();
  ctx.ellipse(x, y + (opts.offsetY ?? 9), w, h, rot, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha *= 0.32;
  ctx.strokeStyle = 'rgba(210,180,120,0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(x, y + (opts.offsetY ?? 9), w * 0.70, h * 0.55, rot, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ── Audio (thematic SFX wrap Engine.audio.tone — bit-identical to original) ─
const sfx = {
  spear:    () => Engine.audio.tone(300, 'sawtooth', 0.10, 0.25, 180),
  hitBoss:  () => Engine.audio.tone( 90, 'square',   0.22, 0.55,  60),
  hitOrion: () => Engine.audio.tone(230, 'triangle', 0.30, 0.50, 110),
  roar:     () => Engine.audio.tone( 55, 'sawtooth', 0.50, 0.70,  40),
  victory:  () => [440,550,660,880].forEach((f,i)=>setTimeout(()=>Engine.audio.tone(f,'sine',0.45,0.4), i*130)),
};

// ── Background data (resolution-independent — scaled at render time) ──────
const stars = Array.from({length:200}, () => ({
  rx: Math.random(),
  ry: Math.random()*0.72,
  r:  Math.random()*1.5+0.2,
  ph: Math.random()*Math.PI*2,
}));
const OC = [
  {x:0.50,y:0.22},
  {x:0.38,y:0.34},{x:0.62,y:0.32},
  {x:0.45,y:0.46},{x:0.50,y:0.45},{x:0.55,y:0.46},
  {x:0.36,y:0.62},{x:0.64,y:0.60},
];
const OL = [[0,1],[0,2],[1,3],[2,5],[3,4],[4,5],[3,6],[5,7]];

// ── Init ──────────────────────────────────────────────────────────────────
function initGame() {
  orionMangaArenaCache = null;
  const W = Engine.W, GY = groundY();
  orion = {
    x:W*0.18, y:GY, vx:0, vy:0,
    visualX:W*0.18, visualY:GY,
    hp:ORION_HP, facing:1,
    walkPhase:0, visualVx:0, visualLean:0, attackCD:0, invincible:0,
    hurtFlash:0, onGround:true,
    dodgeVx:0, dodgeT:0,
    spearCount:MAX_SPEARS, stabCD:0, stabFlash:0,
    throwT:0,
    throwFacing:1, stabFacing:1, dodgeFacing:1, hurtFacing:1,
    spearQueued:false, stabQueued:false,
    proneT:0, proneDmg:0,
  };
  boss = {
    x:W*0.74, y:GY, hp:BOSS_HP,
    visualX:W*0.74, visualY:GY, visualLean:0, lastX:W*0.74,
    facing:-1,
    state:'idle',
    stateTimer:0, attackTimer:2.8,
    phase:1,
    hurtFlash:0, deadTimer:0,
    tailCurl:0.38,
    clawOpen:0,
    stingT:0,
    stingTargetX:0, stingTargetY:0,
    stingFired:false,
    chargeVx:0,
  };
  spears=[]; venoms=[]; phantoms=[];
  gazeT = 0;
  runStartMs = performance.now();
  runEndMs = null;
  submittedThisRun = false;
  hallRank = null;
  hallStatus = null;
  // Manga abilities
  constellationT = 0; constellationCD = 0;
  mangaTexts.length = 0;
}

function burst(x, y, col, n=8, spd=120) {
  Engine.particles.emit({
    x, y,
    color: col,
    count: n,
    speed: [spd*0.5, spd*1.5],
    size:  [3, 7],
    upBias: 50,
    gravity: 420,
    lifetime: 0.5,
  });
}

// ── Update ────────────────────────────────────────────────────────────────
function updateOrion(dt) {
  const GY = groundY(), W = Engine.W;
  const keys = Engine.keys;

  // Prone recovery — locked for 2 seconds, can't do anything
  if(orion.proneT>0){
    const wasPositive = orion.proneT>0;
    orion.proneT = Math.max(0, orion.proneT-dt);
    orion.vx = 0;
    orion.visualVx += (0 - orion.visualVx) * Math.min(1, dt * 10);
    orion.visualLean += (0 - orion.visualLean) * Math.min(1, dt * 10);
    orion.vy += GRAVITY*dt;
    orion.y = Math.min(GY, orion.y+orion.vy*dt);
    if(orion.y>=GY){ orion.y=GY; orion.vy=0; orion.onGround=true; }
    orion.invincible = Math.max(orion.invincible, orion.proneT);
    orion.hurtFlash = Math.max(0, orion.hurtFlash-dt);
    orion.spearQueued = false; orion.stabQueued = false;
    updateOrionVisual(dt);
    if(wasPositive && orion.proneT===0 && boss.state!=='dead'){
      boss.state='backup'; boss.stateTimer=0;
    }
    return;
  }
  // Dodge decay
  if(orion.dodgeT>0){
    orion.dodgeT = Math.max(0, orion.dodgeT-dt);
    orion.dodgeVx *= Math.pow(0.04, dt);
  }
  // Move
  const isDodging = orion.dodgeT>0;
  const goLeft  = keys['ArrowLeft']  || keys['a'];
  const goRight = keys['ArrowRight'] || keys['d'];
  orion.vx = isDodging ? orion.dodgeVx : (goRight ? P_SPEED : goLeft ? -P_SPEED : 0);
  if(!isDodging && orion.vx!==0){ orion.facing = orion.vx>0?1:-1; orion.walkPhase += dt*7; }
  orion.visualVx += (orion.vx - orion.visualVx) * Math.min(1, dt * 12);
  orion.visualLean += ((orion.visualVx / P_SPEED) * 0.045 - orion.visualLean) * Math.min(1, dt * 10);
  // Jump
  if((keys['ArrowUp']||keys['w']) && orion.onGround){
    orion.vy = JUMP_V; orion.onGround = false;
  }
  // Physics
  orion.vy += GRAVITY*dt;
  orion.y  += orion.vy*dt;
  orion.x  += orion.vx*dt;
  orion.x   = Math.max(30, Math.min(W-30, orion.x));
  if(orion.y>=GY){ orion.y=GY; orion.vy=0; orion.onGround=true; }
  else orion.onGround=false;

  // Throw spear
  orion.attackCD = Math.max(0, orion.attackCD-dt);
  orion.throwT = Math.max(0, orion.throwT-dt);
  if(orion.spearQueued){
    if(orion.attackCD<=0 && orion.spearCount>0){
      orion.throwFacing = orion.facing;
      const hand = Engine.manga ? orionMangaHandPoint('throw', orion.throwFacing) : { x:orion.x+orion.throwFacing*22, y:orion.y-38 };
      spears.push({
        x:hand.x, y:hand.y,
        vx:orion.throwFacing*SPEAR_SPD,
        vy:orion.onGround?0:orion.vy*0.5,
        gravity:!orion.onGround,
        active:true,
        originX:hand.x,
        originY:hand.y,
        trail:Engine.manga ? [{ x:hand.x, y:hand.y }] : null,
        age:0,
      });
      orion.spearCount--;
      orion.throwT = 0.35;
      orion.attackCD = 0.62;
      sfx.spear();
      burst(hand.x, hand.y, '#e8d090', 3, 50);
    }
    orion.spearQueued = false;
  }
  // Stab
  orion.stabCD    = Math.max(0, orion.stabCD-dt);
  orion.stabFlash = Math.max(0, orion.stabFlash-dt);
  if(orion.stabQueued){
    if(orion.stabCD<=0 && !orion.onGround){
      orion.stabFacing = orion.facing;
      orion.stabFlash = 0.22; orion.stabCD = 0.5;
      const sx = orion.x+orion.stabFacing*65, sy = orion.y-35;
      burst(sx, sy, '#ffeeaa', 5, 75);
      if(boss.state!=='dead' && Math.abs(orion.x-boss.x)<115){
        boss.hp = Math.max(0, boss.hp-STAB_DMG);
        boss.hurtFlash = 0.14; Engine.shake(5); sfx.hitBoss();
        burst(sx, sy, '#ff8800', 8, 110);
        if(boss.state!=='hurt' && boss.state!=='claw' && boss.state!=='sting'){
          boss.state='hurt'; boss.stateTimer=0;
        }
      }
    }
    orion.stabQueued = false;
  }
  orion.invincible = Math.max(0, orion.invincible-dt);
  orion.hurtFlash  = Math.max(0, orion.hurtFlash -dt);
  updateOrionVisual(dt);
}

function updateOrionVisual(dt) {
  if (!orion) return;
  if (typeof orion.visualX !== 'number') orion.visualX = orion.x;
  if (typeof orion.visualY !== 'number') orion.visualY = orion.y;
  const moving = Math.abs(orion.vx) > 18 || Math.abs(orion.visualVx || 0) > 18;
  const xEase = orion.dodgeT > 0 ? 22 : (moving ? 16 : 12);
  const yEase = orion.onGround ? 16 : 12;
  orion.visualX += (orion.x - orion.visualX) * Math.min(1, dt * xEase);
  orion.visualY += (orion.y - orion.visualY) * Math.min(1, dt * yEase);
}

function updateBossVisual(dt) {
  if (!boss) return;
  if (typeof boss.visualX !== 'number') boss.visualX = boss.x;
  if (typeof boss.visualY !== 'number') boss.visualY = boss.y;
  if (typeof boss.visualLean !== 'number') boss.visualLean = 0;
  const prevX = typeof boss.lastX === 'number' ? boss.lastX : boss.x;
  const vx = (boss.x - prevX) / Math.max(dt, 1 / 60);
  boss.lastX = boss.x;
  const targetLean = boss.state === 'charge'
    ? Math.max(-0.11, Math.min(0.11, vx / 4200))
    : boss.state === 'claw'
      ? -boss.facing * 0.045
      : boss.state === 'sting'
        ? boss.facing * 0.035
        : Math.max(-0.055, Math.min(0.055, vx / 5200));
  boss.visualX += (boss.x - boss.visualX) * Math.min(1, dt * (boss.state === 'charge' ? 16 : 9));
  boss.visualY += (boss.y - boss.visualY) * Math.min(1, dt * 10);
  if (window.GodGames && GodGames.Debug && typeof GodGames.Debug.clampVisualDrift === 'function') {
    GodGames.Debug.clampVisualDrift(boss, 75, { maxDrift: 24, label: 'scorpion' });
  }
  boss.visualLean += (targetLean - boss.visualLean) * Math.min(1, dt * 9);
}

function updateBoss(dt) {
  const W = Engine.W;
  if(boss.state==='dead'){
    boss.deadTimer += dt;
    updateBossVisual(dt);
    if(boss.deadTimer>3.2) Engine.setState('victory');
    return;
  }
  if(boss.hp<=0){
    boss.state='dead'; boss.deadTimer=0;
    if(runEndMs == null) runEndMs = performance.now();
    Engine.shake(18);
    burst(boss.x, boss.y-55, '#ff7700', 28, 220);
    burst(boss.x, boss.y-55, '#ffcc00', 18, 160);
    sfx.victory();
    updateBossVisual(dt);
    return;
  }

  boss.hurtFlash = Math.max(0, boss.hurtFlash-dt);
  boss.phase = boss.hp>66?1:boss.hp>33?2:3;
  // Manga sting frenzy: at low HP, attack timer decays 2× faster.
  const frenzied = Engine.manga && boss.hp < BOSS_HP * 0.33;
  boss._frenzyAnnounced = boss._frenzyAnnounced || false;
  if (frenzied && !boss._frenzyAnnounced) {
    boss._frenzyAnnounced = true;
    mangaTexts.push({ text: 'FRENZY!', x: Engine.W / 2, y: Engine.H * 0.32, t: 1.0, color: '#ff2200', size: 64 });
    Engine.shake(8);
  }
  const sm = (boss.phase===3?1.9:boss.phase===2?1.35:1.0) * (frenzied ? 2 : 1);
  boss.facing = orion.x<boss.x ? -1 : 1;
  const dist = Math.abs(orion.x-boss.x);

  switch(boss.state){
    case 'idle':
      boss.tailCurl += (0.38-boss.tailCurl)*dt*3;
      boss.clawOpen += (0   -boss.clawOpen)*dt*6;
      boss.stingT   += (0   -boss.stingT  )*dt*6;
      boss.attackTimer -= dt*sm;
      boss.x += (orion.x<boss.x?-1:1)*90*dt;
      if(boss.attackTimer<=0){
        const r = Math.random();
        // Manga-only Phantom Claw — spectral projectile, gated to mid/low HP.
        if (Engine.manga && boss.hp < BOSS_HP * 0.55 && r > 0.88) {
          boss.state='phantom'; boss.stateTimer=0; boss.phantomSpawned=false; sfx.roar();
          if (!boss._phantomAnnounced) {
            boss._phantomAnnounced = true;
            mangaTexts.push({
              text: 'THE SCORPION SUMMONS A PHANTOM CLAW…',
              x: Engine.W / 2, y: Engine.H * 0.22,
              t: 1.2, color: '#cc88ff', size: 30,
            });
          }
        }
        else if(dist<220 && r<0.22){ boss.state='claw'; boss.stateTimer=0; sfx.roar(); }
        else if(r<0.60){ boss.state='sting'; boss.stateTimer=0; boss.stingFired=false; boss.stingTargetX=orion.x; boss.stingTargetY=orion.y-18; sfx.roar(); }
        else { boss.state='charge'; boss.stateTimer=0; boss.chargeVx=(orion.x<boss.x?-1:1)*(280+boss.phase*50); sfx.roar(); }
        boss.attackTimer = (1.8-boss.phase*0.3)+Math.random()*1.0;
      }
      break;

    case 'walk':
      boss.stateTimer += dt;
      boss.x += (orion.x<boss.x?-1:1) * (boss.phase===3 ? 160 : 110) * dt;
      if(boss.stateTimer>1.4 || dist<200) boss.state='idle';
      break;

    case 'claw':
      boss.stateTimer += dt;
      if(boss.stateTimer<0.35)        boss.clawOpen += (1-boss.clawOpen)*dt*12;
      else if(boss.stateTimer<0.55){ boss.clawOpen += (0-boss.clawOpen)*dt*22;
        if(boss.stateTimer>0.38 && boss.stateTimer<0.54 && orion.invincible<=0){
          const cx = boss.x+boss.facing*115, cy = groundY()-15;
          if(Math.abs(orion.x-cx)<90 && Math.abs(orion.y-cy)<65) hurtOrion();
        }
      } else {
        boss.clawOpen += (0-boss.clawOpen)*dt*5;
        if(boss.stateTimer>1.0) boss.state='idle';
      }
      break;

    case 'sting':
      boss.stateTimer += dt;
      boss.tailCurl += (1-boss.tailCurl)*dt*18;
      boss.stingT   += (1-boss.stingT  )*dt*18;
      if(!boss.stingFired){
        boss.stingFired = true;
        const tail = scorpionTailTip(1.0);
        const tx = tail.x, ty = tail.y;
        const dx = boss.stingTargetX-tx, dy = boss.stingTargetY-ty;
        const d  = Math.sqrt(dx*dx+dy*dy)||1;
        // Manga special: VENOM RAIN — fan of 4 venoms instead of one targeted.
        if (Engine.manga && Math.random() < 0.4) {
          mangaTexts.push({ text: 'VENOM RAIN!', x: Engine.W / 2, y: Engine.H * 0.34, t: 0.8, color: '#22ee44', size: 56 });
          const N = 4;
          const baseAng = Math.atan2(dy, dx);
          for (let i = 0; i < N; i++) {
            const off = (i - (N - 1) / 2) * 0.25;
            const a = baseAng + off;
            const sp = 380 + Math.random() * 60;
            venoms.push({ x: tx, y: ty, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, active: true, originX: tx, originY: ty, trail: [{ x: tx, y: ty }], age: 0 });
          }
        } else {
          venoms.push({x:tx, y:ty, vx:dx/d*420, vy:dy/d*420, active:true, originX: tx, originY: ty, trail: Engine.manga ? [{ x: tx, y: ty }] : null, age: 0});
        }
        sfx.roar();
      }
      if(boss.stateTimer>0.9){
        boss.stingT   += (0   -boss.stingT  )*dt*7;
        boss.tailCurl += (0.38-boss.tailCurl)*dt*5;
      }
      if(boss.stateTimer>1.2) boss.state='idle';
      break;

    case 'charge':
      boss.stateTimer += dt;
      boss.x += boss.chargeVx*dt;
      boss.x  = Math.max(80, Math.min(W-80, boss.x));
      if(orion.invincible<=0 && orion.proneT<=0 && Math.abs(orion.x-boss.x)<75 && Math.abs(orion.y-boss.y)<80) proneOrion();
      if(boss.stateTimer>1.2 || boss.x<=80 || boss.x>=W-80) boss.state='idle';
      break;

    case 'backup':
      boss.stateTimer += dt;
      boss.x += (orion.x<boss.x?1:-1)*140*dt;
      boss.x = Math.max(100, Math.min(W-100, boss.x));
      boss.tailCurl += (0.38-boss.tailCurl)*dt*4;
      boss.clawOpen += (0   -boss.clawOpen)*dt*5;
      if(boss.stateTimer>1.2){ boss.state='idle'; boss.attackTimer=1.2; }
      break;

    case 'phantom':
      boss.stateTimer += dt;
      // Wind-up: claw flares open, manga halftone glow on the head
      if (boss.stateTimer < 0.45) {
        boss.clawOpen += (1 - boss.clawOpen) * dt * 12;
      } else if (!boss.phantomSpawned) {
        boss.phantomSpawned = true;
        const claw = scorpionClawTip();
        const sx = claw.x, sy = claw.y;
        const dx = orion.x - sx, dy = (orion.y - 30) - sy;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        phantoms.push({
          x: sx, y: sy,
          vx: dx / d * 380, vy: dy / d * 380,
          angle: Math.atan2(dy, dx),
          life: 1.2, maxLife: 1.2, t: 0,
          originX: sx, originY: sy,
          trail: [{ x: sx, y: sy }],
        });
        sfx.roar();
        mangaTexts.push({ text: 'PHANTOM CLAW!', x: Engine.W / 2, y: Engine.H * 0.30, t: 0.9, color: '#cc88ff', size: 56 });
        Engine.shake(5);
      } else {
        boss.clawOpen += (0 - boss.clawOpen) * dt * 8;
      }
      if (boss.stateTimer > 1.3) boss.state = 'idle';
      break;

    case 'hurt':
      boss.stateTimer += dt;
      if(boss.stateTimer>0.32) boss.state='idle';
      break;
  }
  boss.x = Math.max(100, Math.min(W-100, boss.x));
  updateBossVisual(dt);
}

function hurtOrion(){
  const hitFacing = boss ? (orion.x < boss.x ? 1 : -1) : orion.facing;
  orion.hurtFacing = hitFacing;
  orion.facing = hitFacing;
  if(orion.proneT>0){
    orion.proneDmg += 0.25;
    orion.invincible = 0.45; orion.hurtFlash = 0.3;
    Engine.shake(4); sfx.hitOrion();
    burst(orion.x, orion.y-20, '#ff4400', 5, 70);
    if(orion.proneDmg>=1.0){ orion.hp--; orion.proneDmg -= 1.0; }
    if(orion.hp<=0) Engine.setState('dead');
    return;
  }
  orion.hp--; orion.invincible = 1.5; orion.hurtFlash = 0.7;
  orion.vy = -200; orion.vx = -hitFacing * 200;
  Engine.shake(9); sfx.hitOrion();
  burst(orion.x, orion.y-40, '#ff2200', 10, 150);
  if(orion.hp<=0) Engine.setState('dead');
}
function proneOrion(){
  const hitFacing = boss ? (orion.x < boss.x ? 1 : -1) : orion.facing;
  orion.hurtFacing = hitFacing;
  orion.facing = hitFacing;
  orion.hp--; orion.proneT = 2.0; orion.invincible = 2.1; orion.hurtFlash = 2.0;
  orion.vy = 0; orion.vx = 0;
  Engine.shake(14); sfx.hitOrion();
  burst(orion.x, orion.y-30, '#ff2200', 14, 180);
  if(orion.hp<=0) Engine.setState('dead');
}

function updateSpears(dt){
  const W = Engine.W;
  for(let i=spears.length-1; i>=0; i--){
    const s = spears[i];
    s.age = (s.age || 0) + dt;
    s.x += s.vx*dt;
    if(s.gravity){ s.vy += GRAVITY*dt; s.y += s.vy*dt; }
    if(s.trail){
      s.trail.push({ x:s.x, y:s.y });
      if(s.trail.length>10) s.trail.shift();
    }
    if(s.active && boss.state!=='dead'){
      if(Math.abs(s.x-boss.x)<95 && s.y>boss.y-140 && s.y<boss.y+5){
        boss.hp = Math.max(0, boss.hp-SPEAR_DMG);
        boss.hurtFlash = 0.14; Engine.shake(4); sfx.hitBoss();
        burst(s.x, s.y, '#ff8800', 7, 100);
        if(boss.state!=='hurt' && boss.state!=='claw' && boss.state!=='sting'){
          boss.state='hurt'; boss.stateTimer=0;
        }
        spears.splice(i,1); continue;
      }
    }
    if(s.x<-60 || s.x>W+60 || s.y>groundY()+20) spears.splice(i,1);
  }
}

function updateVenoms(dt){
  const W = Engine.W, GY = groundY();
  for(let i=venoms.length-1; i>=0; i--){
    const v = venoms[i];
    v.age = (v.age || 0) + dt;
    v.x += v.vx*dt; v.y += v.vy*dt;
    if(v.trail){
      v.trail.push({ x:v.x, y:v.y });
      if(v.trail.length>12) v.trail.shift();
    }
    if(v.active && orion.invincible<=0){
      if(Math.abs(v.x-orion.x)<22 && Math.abs(v.y-orion.y)<34){
        hurtOrion();
        burst(v.x, v.y, '#00ff44', 8, 90);
        venoms.splice(i,1); continue;
      }
    }
    if(v.x<-80 || v.x>W+80 || v.y>GY+60) venoms.splice(i,1);
  }
}

// Perfect-dodge window: a boss attack must be imminent or in flight when the
// player initiates the dodge. The window is generous because the boss telegraph
// is short; the reward is a free counter, extra invincibility, and slo-mo.
function isPerfectDodge(){
  if(boss.state === 'claw'    && boss.stateTimer < 0.6 && Math.abs(orion.x - boss.x) < 220) return true;
  if(boss.state === 'charge'  && Math.abs(orion.x - boss.x) < 240) return true;
  if(boss.state === 'sting'   && boss.stingFired && boss.stateTimer < 1.1) return true;
  if(boss.state === 'phantom' && boss.phantomSpawned) return true;
  for(const v of venoms)   if(Math.abs(v.x-orion.x)<150 && Math.abs(v.y-orion.y)<130) return true;
  for(const p of phantoms) if(Math.abs(p.x-orion.x)<160 && Math.abs(p.y-orion.y)<150) return true;
  return false;
}

function triggerPerfectDodge(){
  // Faster dodge + extended invincibility window
  orion.dodgeVx *= 1.30;
  orion.invincible = Math.max(orion.invincible, 0.6);
  // Mystery: each perfect dodge earns the hunter's hint + tallies toward
  // the 5-count goal. The 'kuh' syllable is gated behind a separate secret
  // (the Constellation's Gaze) — see updateConstellationGaze.
  if (window.GodGames && GodGames.Mysteries) {
    GodGames.Mysteries.earnHint('first_just');
    GodGames.Mysteries.tally('orion_perfect_dodges');
  }
  // Free counter — small chunk of damage to the boss. Kept low (5) so a
  // queued stab on the same frame can't compound into a 30-dmg burst.
  if(boss.state !== 'dead'){
    boss.hp = Math.max(0, boss.hp - 5);
    boss.hurtFlash = 0.18; Engine.shake(7);
    burst(orion.x, orion.y - 38, '#aaddff', 14, 170);
    if(boss.state !== 'hurt' && boss.state !== 'claw' && boss.state !== 'sting' && boss.state !== 'phantom'){
      boss.state = 'hurt'; boss.stateTimer = 0;
    }
  }
  // Manga flourish: "JUST!" text + slo-mo. Plain mode still gets the gameplay
  // bonus + the audio chime so the timing feedback is universal.
  Engine.audio.tone(660, 'sine', 0.15, 0.25, 880);
  if(Engine.manga){
    mangaTexts.push({ text: 'JUST!', x: orion.x, y: orion.y - 80, t: 0.55, color: '#aaddff', size: 64 });
    Engine.setTimeScale(0.35, 0.45);
  }
}

// Mystery detector — accumulates time spent stationary beneath the on-screen
// Orion constellation (top-left of the arena, cx ≈ W*0.11). 5s of holding still
// in this band while the boss lives earns the 'kuh' syllable.
function updateConstellationGaze(dt){
  const W = Engine.W;
  const beneathConstellation = orion.x > W * 0.04 && orion.x < W * 0.20;
  const stillEnough = Math.abs(orion.vx) < 5;
  const bossAlive = boss.state !== 'dead';
  if (beneathConstellation && stillEnough && bossAlive && orion.proneT <= 0) {
    gazeT += dt;
    if (gazeT >= GAZE_GOAL && window.GodGames && GodGames.Mysteries) {
      gazeT = 0;
      recordConstellationGaze();
    }
  }
  // No else-reset — gaze accumulates across the fight. Resets per run via initGame.
}

function recordConstellationGaze() {
  if (window.GodGames && GodGames.Mysteries && !GodGames.Mysteries.hasHint('e')) {
    GodGames.Mysteries.unlockAndDepart({
      hintId:   'e',
      placeId:  'asphodel',
      fromGame: 'orion',
    });
  }
}

if (new URLSearchParams(location.search).get('testHooks') === '1') {
  window.GodGames = window.GodGames || {};
  window.GodGames.OrionTest = {
    recordConstellationGaze,
    canGazeInNormalMode() {
      return !!(window.Engine && Engine.state === 'playing' && !Engine.manga
        && orion && boss && boss.state !== 'dead');
    },
  };
}

function updatePhantoms(dt){
  const W = Engine.W, GY = groundY();
  for(let i=phantoms.length-1; i>=0; i--){
    const p = phantoms[i];
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.t  += dt;
    p.life -= dt;
    if(p.trail){
      p.trail.push({ x:p.x, y:p.y });
      if(p.trail.length>10) p.trail.shift();
    }
    if(orion.invincible<=0 && Math.abs(p.x-orion.x)<32 && Math.abs(p.y-(orion.y-28))<42){
      hurtOrion();
      // Heavier hit feel than a venom — bigger violet burst, extra shake,
      // brief slo-mo dip via the engine's timeScale for a manga camera punch.
      burst(p.x, p.y, '#cc88ff', 18, 180);
      burst(p.x, p.y, '#16081e',  8, 110);
      Engine.shake(15);
      Engine.setTimeScale(0.45, 0.30);
      phantoms.splice(i,1); continue;
    }
    if(p.life<=0 || p.x<-100 || p.x>W+100 || p.y>GY+80 || p.y<-100) phantoms.splice(i,1);
  }
}

  const items = [];

    items.push({ role: 'player', x: ox, y: oy - 34, w: 44, h: 68, label: 'orion hit' });
    items.push({ role: 'visual', x: vx, y: vy - 54, w: orion.proneT > 0 ? 94 : 78, h: orion.proneT > 0 ? 42 : 112, label: 'orion sprite' });
  }
  if (boss) {
    const bx = boss.x;
    const by = boss.y;
    const vx = typeof boss.visualX === 'number' ? boss.visualX : bx;

    items.push({ role: 'danger', x: bx, y: by, w: 150, h: 160, label: boss.state === 'charge' ? 'charge hit' : 'charge body', alpha: boss.state === 'charge' ? 0.82 : 0.24 });
    const clawX = bx + boss.facing * 115;
    const clawY = groundY() - 15;
    items.push({ role: 'danger', x: clawX, y: clawY, w: 180, h: 130, label: boss.state === 'claw' ? 'claw hit' : 'claw reach', alpha: boss.state === 'claw' ? 0.82 : 0.22 });
    items.push({ role: 'visual', x: vx, y: vy - 68, w: 210, h: 156, label: 'scorpion sprite' });
    drifts.push({

      y: by,
      visualX: vx,
      visualY: vy,

}

function orionMangaHandPoint(kind = 'throw', facing = null) {
  const f = facing || (orion ? orion.facing : 1);
  if (!orion) return { x:0, y:0 };
  if (kind === 'stab') return { x: orion.x + f * 64, y: orion.y - 45 };
  if (orion.dodgeT > 0) return { x: orion.x + f * 36, y: orion.y - 44 };
  if (!orion.onGround) return { x: orion.x + f * 28, y: orion.y - 66 };
  return { x: orion.x + f * 34, y: orion.y - 58 };
}

function scorpionTailTip(curl = boss ? boss.tailCurl : 1) {
  if (!boss) return { x:0, y:0 };
  const segs = 5;
  const pts = [{ x:-42, y:-18 }];
  for(let i=0;i<segs;i++){
    const t = (i+1)/segs;
    const angle = -0.25 + curl*(Math.PI*1.05)*t - 0.08;
    const len = 28*(1-t*0.08);
    const prev = pts[pts.length-1];
    pts.push({ x:prev.x-Math.cos(angle)*len, y:prev.y-Math.sin(angle)*len });
  }
  const tip = pts[segs];
  return { x: boss.x + tip.x * boss.facing, y: boss.y + tip.y };
}

function scorpionClawTip() {
  if (!boss) return { x:0, y:0 };
  return { x: boss.x + boss.facing * 112, y: boss.y - 30 };
}

function orionConstellationMetrics(W = Engine.W, H = Engine.H) {
  if (Engine.manga) {
    const cs = Math.min(W, H) * 0.18;
    return { cx: W * 0.075, cy: H * 0.08, cs };
  }
  return { cx: W * 0.11, cy: H * 0.32, cs: 160 };
}

function drawOrionConstellation(c, W, H, time, opts = {}) {
  const { cx, cy, cs } = orionConstellationMetrics(W, H);
  c.save();
  c.strokeStyle = opts.line || (Engine.manga ? 'rgba(170,215,255,0.42)' : 'rgba(140,190,255,0.22)');
  c.lineWidth = opts.lineWidth || (Engine.manga ? 1.4 : 1);
  for(const [a,b] of OL){
    c.beginPath();
    c.moveTo(cx+OC[a].x*cs, cy+OC[a].y*cs);
    c.lineTo(cx+OC[b].x*cs, cy+OC[b].y*cs);
    c.stroke();
  }
  for(let i = 0; i < OC.length; i++){
    const s = OC[i];
    const pulse = 0.82 + Math.sin(time * 2.1 + i) * 0.18;
    c.fillStyle = opts.star || `rgba(180,225,255,${0.80 * pulse})`;
    c.shadowColor = 'rgba(140,200,255,0.78)';
    c.shadowBlur = Engine.manga ? 10 : 7;
    c.beginPath();
    c.arc(cx+s.x*cs, cy+s.y*cs, Engine.manga ? 2.4 : 2.8, 0, Math.PI*2);
    c.fill();
  }

  const glyphFound = window.Engine && Engine.unlock && Engine.unlock.has('glyph_orion_found');
  const bx = cx + OC[4].x * cs, by = cy + OC[4].y * cs;
  c.shadowBlur = 0;
  c.strokeStyle = glyphFound ? 'rgba(255, 213, 74, 0.88)' : `rgba(255, 213, 74, ${0.34 + Math.sin(time * 1.6) * 0.16})`;
  c.shadowColor = glyphFound ? '#ffd54a' : 'transparent';
  c.shadowBlur = glyphFound ? 12 : 0;
  c.lineWidth = glyphFound ? 1.8 : 1.2;
  c.beginPath();
  c.arc(bx, by, Engine.manga ? 7 : 6, 0, Math.PI * 2);
  c.stroke();
  c.restore();
}

function drawOrionMangaFloorUnderlay(opts = {}, targetCtx = ctx) {
  const s = orionMangaStage();
  const c = targetCtx;
  c.save();

  const horizon = c.createLinearGradient(0, s.horizonY - 70, 0, s.horizonY + 86);
  horizon.addColorStop(0, 'rgba(0,0,0,0.00)');
  horizon.addColorStop(0.52, opts.title ? 'rgba(20,8,2,0.16)' : 'rgba(20,8,2,0.24)');
  horizon.addColorStop(1, 'rgba(0,0,0,0.00)');
  c.fillStyle = horizon;
  c.fillRect(0, s.horizonY - 72, s.W, 160);

  c.strokeStyle = opts.title ? 'rgba(10,10,10,0.22)' : 'rgba(10,10,10,0.34)';
  c.lineWidth = 1.4;
  for (let i = 0; i <= 9; i++) {
    const t = i / 9;
    const x = s.laneLeft + (s.laneRight - s.laneLeft) * t;
    const hx = s.vanishX + (x - s.vanishX) * 0.10;
    c.beginPath();
    c.moveTo(hx, s.horizonY + 4);
    c.lineTo(x, s.H);
    c.stroke();
  }

  const lane = c.createRadialGradient(s.vanishX, s.groundY - 34, s.W * 0.05, s.vanishX, s.groundY - 4, s.W * 0.48);
  lane.addColorStop(0, opts.title ? 'rgba(255,235,170,0.16)' : 'rgba(255,235,170,0.18)');
  lane.addColorStop(0.48, 'rgba(255,210,120,0.07)');
  lane.addColorStop(1, 'rgba(255,235,160,0.00)');
  c.fillStyle = lane;
  c.fillRect(0, s.horizonY, s.W, s.H - s.horizonY);

  c.strokeStyle = 'rgba(255,225,155,0.36)';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(0, s.groundY);
  c.lineTo(s.W, s.groundY);
  c.stroke();

  c.restore();
}

function renderOrionMangaArenaLayer(layerCtx, W, H, time, opts, focusX, focusY, alpha, includeAtmosphere = true) {
  const art = orionMangaArt();
  if (!art || typeof art.drawImage !== 'function') return false;
  if (!art.drawImage(layerCtx, ORION_MANGA_ARENA, 0, 0, W, H, {
    fit: 'cover',
    focusX,
    focusY,
    alpha,
  })) return false;

  layerCtx.save();
  const sky = layerCtx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, opts.title ? 'rgba(10,16,44,0.18)' : 'rgba(10,16,44,0.10)');
  sky.addColorStop(0.48, 'rgba(0,0,0,0.00)');
  sky.addColorStop(1, 'rgba(0,0,0,0.28)');
  layerCtx.fillStyle = sky;
  layerCtx.fillRect(0, 0, W, H);
  drawOrionMangaFloorUnderlay(opts, layerCtx);
  drawOrionConstellation(layerCtx, W, H, time, { lineWidth: opts.title ? 1.2 : 1.5 });
  if (includeAtmosphere && art.mangaAtmosphere) {
    art.mangaAtmosphere(layerCtx, W, H, {
      density: 9,
      dotSize: 1.20,
      halftoneAlpha: opts.title ? 0.09 : 0.12,
      scanAlpha: opts.title ? 0.05 : 0.07,
      vignette: opts.title ? 0.42 : 0.50,
    });
  }
  layerCtx.restore();
  return true;
}

function warmOrionMangaArenaCache(key, W, H, time, opts, focusX, focusY, alpha) {
  if (orionMangaArenaCachePending === key) return;
  orionMangaArenaCachePending = key;
  const build = () => {
    try {
      const layer = document.createElement('canvas');
      layer.width = W;
      layer.height = H;
      const layerCtx = layer.getContext('2d');
      if (layerCtx && renderOrionMangaArenaLayer(layerCtx, W, H, time, opts, focusX, focusY, alpha, true)) {
        orionMangaArenaCache = { key, canvas: layer };
      }
    } finally {
      if (orionMangaArenaCachePending === key) orionMangaArenaCachePending = '';
    }
  };
  setTimeout(() => {
    if (typeof requestIdleCallback === 'function') requestIdleCallback(build, { timeout: 1200 });
    else setTimeout(build, 0);
  }, 2600);
}

function drawOrionMangaArena(c, W, H, time, opts = {}) {
  const art = orionMangaArt();
  if (!Engine.manga || !art || typeof art.drawImage !== 'function') return false;
  const focusX = opts.focusX ?? 0.50;
  const focusY = opts.focusY ?? 0.54;
  const alpha = opts.alpha ?? 1;
  const perf = typeof art.basePerformanceTier === 'function' ? art.basePerformanceTier() : 'balanced';
  const key = [W, H, focusX, focusY, alpha, opts.title ? 1 : 0, perf].join('|');
  if (!orionMangaArenaCache || orionMangaArenaCache.key !== key) {
    const drewDirect = renderOrionMangaArenaLayer(c, W, H, time, opts, focusX, focusY, alpha, false);
    if (drewDirect) warmOrionMangaArenaCache(key, W, H, time, opts, focusX, focusY, alpha);
    return drewDirect;
  }
  c.drawImage(orionMangaArenaCache.canvas, 0, 0, W, H);
  return true;
}

function drawOrionMangaForegroundOcclusion() {
  const s = orionMangaStage();
  ctx.save();
  const bottom = ctx.createLinearGradient(0, s.H * 0.78, 0, s.H);
  bottom.addColorStop(0, 'rgba(0,0,0,0.00)');
  bottom.addColorStop(0.60, 'rgba(18,8,3,0.15)');
  bottom.addColorStop(1, 'rgba(0,0,0,0.46)');
  ctx.fillStyle = bottom;
  ctx.fillRect(0, s.H * 0.78, s.W, s.H * 0.22);

  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.moveTo(0, s.H);
  ctx.lineTo(0, s.H * 0.82);
  ctx.quadraticCurveTo(s.W * 0.07, s.H * 0.91, s.W * 0.16, s.H);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(s.W, s.H);
  ctx.lineTo(s.W, s.H * 0.82);
  ctx.quadraticCurveTo(s.W * 0.93, s.H * 0.91, s.W * 0.84, s.H);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ── Draw: Orion ───────────────────────────────────────────────────────────
function drawOrion() {
  if (Engine.manga && drawOrionMangaSprite()) return;
  // Route through the manga library when manga mode is on.
  if (Engine.manga && window.Manga && typeof window.Manga.characters?.orion?.draw === 'function') {
    Manga.characters.orion.draw(ctx, {
      x: orion.x, y: orion.y, facing: orion.facing,
      walkPhase: orion.walkPhase, vx: orion.vx, vy: orion.vy, onGround: orion.onGround,
      hp: orion.hp, hurtFlash: orion.hurtFlash, invincible: orion.invincible,
      proneT: orion.proneT, proneDmg: orion.proneDmg,
      spearCount: orion.spearCount, stabFlash: orion.stabFlash, dodgeT: orion.dodgeT,
      constellationCharging: constellationT > 0,
      t: Engine.time,
    });
    return;
  }
  const x=orion.x, y=orion.y, f=orion.facing;
  const flash = orion.hurtFlash>0 && Math.sin(Engine.time*28)>0;

  if(orion.proneT>0){
    ctx.save();
    ctx.translate(x,y);
    if(flash) ctx.filter='brightness(3)';
    ctx.rotate(orion.facing*Math.PI/2);
    ctx.fillStyle='rgba(0,0,0,0.28)';
    ctx.beginPath(); ctx.ellipse(0,4,32,5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c09050'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(-18,-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 5,0); ctx.lineTo( 18,-4); ctx.stroke();
    ctx.fillStyle = flash?'#fff':'#d0c8a8';
    ctx.beginPath(); ctx.roundRect(-14,-12,28,16,4); ctx.fill();
    ctx.strokeStyle='#7a5020'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(-14,-4); ctx.lineTo(14,-4); ctx.stroke();
    ctx.strokeStyle='#c09050'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-8,-12); ctx.lineTo(-20,-22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 8,-12); ctx.lineTo( 20,-18); ctx.stroke();
    ctx.fillStyle='#c09050';
    ctx.beginPath(); ctx.arc(0,-22,11,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#8a7040';
    ctx.beginPath(); ctx.ellipse(0,-25,11,7,0,Math.PI,0); ctx.fill();
    const prog = 1 - orion.proneT/2.0;
    ctx.strokeStyle='rgba(255,220,80,0.7)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,-22,16,-Math.PI/2,-Math.PI/2+prog*Math.PI*2); ctx.stroke();
    ctx.filter='none';
    ctx.restore();
    return;
  }

  const walk = orion.onGround && orion.vx!==0 ? Math.sin(orion.walkPhase)*0.9 : 0;
  ctx.save();
  ctx.translate(x,y); ctx.scale(f,1);
  if(flash) ctx.filter='brightness(3)';

  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(0,0,20,5,0,0,Math.PI*2); ctx.fill();

  ctx.lineCap='round'; ctx.lineWidth=6; ctx.strokeStyle='#c09050';
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-9+walk*11,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 5,-18); ctx.lineTo( 9-walk*11,0); ctx.stroke();

  ctx.fillStyle = flash?'#fff':'#d0c8a8';
  ctx.beginPath();
  ctx.moveTo(-12,-18); ctx.lineTo(-14,-52); ctx.lineTo(14,-52); ctx.lineTo(12,-18);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-3,-52); ctx.lineTo(-4,-18); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 3,-52); ctx.lineTo( 4,-18); ctx.stroke();

  ctx.strokeStyle='#7a5020'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-12,-28); ctx.lineTo(12,-28); ctx.stroke();

  const beltSpears = Math.min(orion.spearCount, 7);
  for(let i=0;i<beltSpears;i++){
    const bx=-10+i*3, by=-28;
    ctx.save(); ctx.translate(bx,by); ctx.rotate(0.15);
    ctx.strokeStyle='#7a5028'; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-10); ctx.stroke();
    ctx.fillStyle='#b8b8b8';
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-1.5,-7); ctx.lineTo(1.5,-7); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  ctx.lineWidth=5; ctx.strokeStyle='#c09050';
  ctx.beginPath(); ctx.moveTo(12,-46); ctx.lineTo(18+walk*5,-30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12,-46); ctx.lineTo(-16-walk*4,-32); ctx.stroke();

  ctx.save(); ctx.translate(18+walk*5,-30); ctx.rotate(0.18-walk*0.12);
  if(orion.spearCount>0){
    ctx.strokeStyle='#7a5028'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,-32); ctx.lineTo(0,18); ctx.stroke();
    ctx.fillStyle='#b8b8b8';
    ctx.beginPath(); ctx.moveTo(0,-32); ctx.lineTo(-4,-20); ctx.lineTo(4,-20); ctx.closePath(); ctx.fill();
  } else {
    ctx.strokeStyle='#7a5028'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-16); ctx.stroke();
    ctx.fillStyle='#d0d0d0';
    ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-3,-8); ctx.lineTo(3,-11); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8;
    ctx.stroke();
    ctx.strokeStyle='#5a3010'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,6); ctx.stroke();
  }
  ctx.restore();

  ctx.fillStyle='#c09050';
  ctx.fillRect(-4,-58,8,8);
  ctx.beginPath(); ctx.arc(0,-66,12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8a7040';
  ctx.beginPath(); ctx.ellipse(0,-69,12,8,0,Math.PI,0); ctx.fill();
  ctx.fillStyle='#6a5020';
  ctx.beginPath(); ctx.arc(0,-66,4.5,Math.PI,0); ctx.fill();
  ctx.fillStyle='#cc1800';
  ctx.beginPath(); ctx.moveTo(-3,-77); ctx.lineTo(0,-94); ctx.lineTo(3,-77); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#1a1008';
  ctx.beginPath(); ctx.arc(5.5,-66,2.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(6.5,-67,0.9,0,Math.PI*2); ctx.fill();

  ctx.filter='none';
  ctx.restore();

  if(orion.stabFlash>0){
    const sf = orion.stabFlash/0.22;
    const f = orion.stabFacing || orion.facing;
    const reach = f*55*sf;
    const kx = orion.x+f*20+reach;
    const ky = orion.y-36;
    const ang = f===1?-0.5:Math.PI+0.5;
    ctx.save();
    ctx.translate(kx,ky); ctx.rotate(ang);
    ctx.globalAlpha = Math.min(1, sf*1.2);
    ctx.fillStyle='#d8d8d8';
    ctx.shadowColor='#ffffff'; ctx.shadowBlur=10*sf;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-4,18); ctx.lineTo(4,14); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.8; ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,255,${sf*0.9})`; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-1,4); ctx.lineTo(2,12); ctx.stroke();
    ctx.fillStyle='#5a3010';
    ctx.beginPath(); ctx.roundRect(-3,-8,6,10,1); ctx.fill();
    ctx.globalAlpha = sf*0.5;
    ctx.strokeStyle='rgba(255,240,200,0.8)'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.shadowColor='#ffee88'; ctx.shadowBlur=8*sf;
    ctx.beginPath(); ctx.arc(0,8,26,-1.1,0.1); ctx.stroke();
    ctx.restore();
  }
}

function orionMangaAssetsReady() {
  return orionMangaAssetReady(ORION_MANGA_ORION_SHEET)
    || orionMangaAssetReady(ORION_MANGA_LEGACY_SHEET);
}

function currentOrionMangaMotion() {
  if (Engine.state === 'victory') return { anim:'victory', t:Engine.time, flipX:false };
  if (Engine.state === 'dead' || orion.hp <= 0) return { anim:'fallen', t:Engine.time, flipX:orion.hurtFacing < 0, rotate:orion.hurtFacing * 0.04 };
  if (orion.proneT > 0) return { anim:'prone', t:2.0 - orion.proneT, flipX:orion.hurtFacing < 0, rotate:orion.hurtFacing * 0.05 };
  if (orion.hurtFlash > 0 && orion.invincible > 0.25) return { anim:'hit', t:0.7 - orion.hurtFlash, flipX:orion.hurtFacing < 0, rotate:-orion.hurtFacing * 0.035 };
  if (orion.stabFlash > 0) return { anim:'stab', t:0.22 - orion.stabFlash, flipX:orion.stabFacing < 0, rotate:orion.stabFacing * 0.035 };
  if (orion.throwT > 0) return { anim:'throw', t:0.35 - orion.throwT, flipX:orion.throwFacing < 0, rotate:orion.throwFacing * 0.025 };
  if (orion.dodgeT > 0) return { anim:'dodge', t:0.28 - orion.dodgeT, flipX:orion.dodgeFacing < 0, rotate:orion.dodgeFacing * 0.035 };
  if (!orion.onGround || Math.abs(orion.vy) > 80) return { anim:'jump', t:Engine.time, flipX:orion.facing < 0 };
  const runVx = Math.abs(orion.vx) > 18 ? orion.vx : orion.visualVx;
  if (Math.abs(runVx) > 18) return { anim:'run', t:orion.walkPhase / 7, flipX:runVx < 0, rotate:orion.visualLean };
  return { anim:'idle', t:Engine.time, flipX:orion.facing < 0, rotate:orion.visualLean * 0.35 };
}

function currentOrionMangaFrame() {
  const motion = currentOrionMangaMotion();
  if (motion.anim === 'throw') return 'orionThrow';
  if (motion.anim === 'stab') return 'orionStab';
  if (motion.anim === 'jump') return 'orionJump';
  if (motion.anim === 'dodge' || motion.anim === 'prone') return 'orionDodge';
  if (motion.anim === 'run') return 'orionRun';
  return 'orionIdle';
}

function drawOrionMangaSprite() {
  if (!orionMangaAssetsReady()) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const nearScale = Math.max(0.38, Math.min(0.52, compact / 1500));
  const drawX = typeof orion.visualX === 'number' ? orion.visualX : orion.x;
  const drawY = typeof orion.visualY === 'number' ? orion.visualY : orion.y;
  const scale = orionMangaScale(drawY, nearScale * 0.84, nearScale, { curve: 0.78 });
  const y = drawY;
  const jitter = orion.hurtFlash > 0 ? Math.sin(Engine.time * 78) * 2 : 0;
  const art = orionMangaArt();
  const hasAnim = orionMangaAssetReady(ORION_MANGA_ORION_SHEET)
    && art && typeof art.drawAnimation === 'function';
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();
  const runAmount = Math.min(1, Math.abs(orion.visualVx || orion.vx) / P_SPEED);

  ctx.save();
  const flash = orion.hurtFlash > 0 && Math.sin(Engine.time * 28) > 0;
  if (flash) {
    ctx.filter = heavy ? 'brightness(2.8) saturate(0.6) contrast(1.05)' : 'brightness(1.85)';
    ctx.shadowColor = '#ff5544';
    ctx.shadowBlur = heavy ? 18 : 6;
  } else if (heavy) {
    ctx.filter = 'saturate(1.05) contrast(1.05)';
  }
  let drew = false;
  if (hasAnim) {
    const motion = currentOrionMangaMotion();
    const stridePhase = ((orion.walkPhase / (Math.PI * 2)) % 1 + 1) % 1;
    const drawHeroAnim = art.drawActedAnimation || art.drawAnimation;
    const actionAmount = motion.anim === 'run'
      ? runAmount
      : (motion.anim === 'dodge' ? 0.62 : (/stab|throw|jump|hit|prone/.test(motion.anim) ? 0.36 : 0.20));
    drew = drawHeroAnim(ctx, ORION_MANGA_ORION_SHEET, motion.anim, motion.t, drawX + jitter, y, {
      scale,
      flipX: motion.flipX,
      rotate: motion.rotate || 0,
      phase: motion.anim === 'run' ? stridePhase : undefined,
      phaseTime: motion.anim === 'run' ? stridePhase : undefined,
      amount: actionAmount,
      bob: motion.anim === 'run' ? 5.4 : 3.4,
      sway: motion.anim === 'run' ? 0.030 : 0.020,
      squash: motion.anim === 'run' ? 0.030 : 0.018,
      frameBlendStrength: motion.anim === 'run' ? 0.26 : 0.20,
      hero: true,
    });
  } else {
    const frame = currentOrionMangaFrame();
    const motion = currentOrionMangaMotion();
    const drawOpts = {
      scale,
      flipX: motion.flipX,
      rotate: motion.rotate || (orion.proneT > 0 ? orion.hurtFacing * 0.10 : 0),
      phase: (orion.walkPhase || Engine.time) / (Math.PI * 2),
      amount: runAmount,
      bob: 4.5,
      sway: 0.024,
      squash: 0.026,
      animName: motion.anim || frame,
      hero: true,
    };
    drew = art && typeof art.drawFilmFrame === 'function'
      ? art.drawFilmFrame(ctx, ORION_MANGA_LEGACY_SHEET, frame, drawX + jitter, drawY, drawOpts)
      : Manga.assets.drawFrame(ctx, ORION_MANGA_LEGACY_SHEET, frame, drawX + jitter, drawY, drawOpts);
  }
  ctx.restore();
  return drew;
}

// ── Draw: Scorpion ────────────────────────────────────────────────────────
function drawScorpion() {
  if (Engine.manga && drawScorpionMangaSprite()) return;
  // Route through the manga library when manga mode is on.
  if (Engine.manga && window.Manga && typeof window.Manga.characters?.scorpion?.draw === 'function') {
    const frenzied = boss.hp < BOSS_HP * 0.33;
    Manga.characters.scorpion.draw(ctx, {
      x: boss.x, y: boss.y, facing: boss.facing,
      hp: boss.hp, hurtFlash: boss.hurtFlash,
      tailCurl: boss.tailCurl, clawOpen: boss.clawOpen, stingT: boss.stingT,
      phase: boss.phase, state: boss.state, stateTimer: boss.stateTimer,
      t: Engine.time, frenzied,
    });
    return;
  }
  const x=boss.x, y=boss.y, f=boss.facing;
  const flash = boss.hurtFlash>0 && Math.sin(Engine.time*32)>0;
  ctx.save();
  ctx.translate(x,y); ctx.scale(f,1);
  if(flash) ctx.filter='brightness(2.8) saturate(0)';

  ctx.fillStyle='rgba(0,0,0,0.38)';
  ctx.beginPath(); ctx.ellipse(0,2,92,12,0,0,Math.PI*2); ctx.fill();

  drawTail();

  for(const side of [-1,1]){
    for(let i=0;i<4;i++){
      const lx=-38+i*22, lBase=-22+i*3;
      const phase = Engine.time*4.5+i*0.9+(side<0?1.6:0);
      const sway = Math.sin(phase)*(boss.state==='walk'||boss.state==='charge'?1:0.2)*8;
      const kneeX = lx+side*(38+sway), kneeY = lBase-26;
      const footX = lx+side*(52+sway*0.5), footY = -2;
      ctx.strokeStyle = i%2===0?'#8a4e1a':'#a06028';
      ctx.lineWidth=6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(lx,lBase); ctx.lineTo(kneeX,kneeY); ctx.lineTo(footX,footY); ctx.stroke();
      ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(footX,footY); ctx.lineTo(footX+side*6,footY+4); ctx.stroke();
    }
  }

  const bodyG = ctx.createRadialGradient(8,-28,6,0,-20,65);
  bodyG.addColorStop(0,'#d08030'); bodyG.addColorStop(0.5,'#9a4e1a'); bodyG.addColorStop(1,'#5a1e04');
  ctx.fillStyle=bodyG;
  ctx.beginPath(); ctx.ellipse(0,-26,60,38,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.22)'; ctx.lineWidth=1.5;
  for(let i=-2;i<=2;i++){
    ctx.beginPath(); ctx.ellipse(i*11,-26,5,36,0,0,Math.PI*2); ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,180,60,0.18)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-50,-26); ctx.lineTo(50,-26); ctx.stroke();

  const hG = ctx.createRadialGradient(68,-20,4,68,-20,28);
  hG.addColorStop(0,'#d88840'); hG.addColorStop(1,'#6a2c08');
  ctx.fillStyle=hG;
  ctx.beginPath(); ctx.ellipse(66,-20,27,20,0.12,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#8a4020'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(88,-18); ctx.lineTo(98,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(88,-22); ctx.lineTo(98,-14); ctx.stroke();
  ctx.fillStyle='#0a0a0a';
  ctx.beginPath(); ctx.arc(78,-14,4.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(70,-11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,200,20,0.9)';
  ctx.beginPath(); ctx.arc(79,-15,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(71,-12,1.2,0,Math.PI*2); ctx.fill();

  drawClaw(boss.clawOpen);

  ctx.filter='none';
  ctx.restore();
}

function currentScorpionMangaFrame() {
  if (boss.state === 'dead' || boss.hp <= 0) return 'scorpionDead';
  if (boss.hurtFlash > 0) return 'scorpionHurt';
  if (boss.state === 'charge') return 'scorpionCharge';
  if (boss.stingT > 0.18 || boss.tailCurl > 0.72) return 'scorpionSting';
  if (boss.clawOpen > 0.45 || boss.state === 'claw') return 'scorpionClaw';
  return 'scorpionIdle';
}

function currentScorpionMangaMotion() {
  const lean = boss.visualLean || 0;
  if (boss.state === 'dead' || boss.hp <= 0) return { anim:'dead', t:boss.deadTimer || 0, rotate:lean * 0.25 };
  if (boss.hurtFlash > 0) return { anim:'hurt', t:0.14 - boss.hurtFlash, rotate:-boss.facing * 0.035 };
  if (boss.state === 'charge') return { anim:'charge', t:boss.stateTimer, rotate:lean };
  if (boss.state === 'claw' || boss.state === 'phantom' || boss.clawOpen > 0.45) return { anim:'claw', t:boss.stateTimer, rotate:lean };
  if (boss.state === 'sting' || boss.stingT > 0.18 || boss.tailCurl > 0.72) return { anim:'sting', t:boss.stateTimer, rotate:lean };
  if (boss.phase >= 3) return { anim:'enraged', t:Engine.time, rotate:lean * 0.45 };
  if (boss.state === 'walk' || boss.state === 'idle' || boss.state === 'backup') return { anim:'crawl', t:Engine.time * (boss.phase >= 2 ? 1.15 : 1), rotate:lean };
  return { anim:'idle', t:Engine.time, rotate:lean * 0.35 };
}

function drawScorpionMangaSprite() {
  if (!(orionMangaAssetReady(ORION_MANGA_SCORPION_SHEET) || orionMangaAssetReady(ORION_MANGA_LEGACY_SHEET))) return false;
  const compact = Math.min(Engine.W, Engine.H);
  const nearScale = Math.max(0.50, Math.min(0.78, compact / 1180));
  const scale = orionMangaScale(boss.y, nearScale * 0.84, nearScale, { curve: 0.74 });
  const drawX = typeof boss.visualX === 'number' ? boss.visualX : boss.x;
  const drawY = typeof boss.visualY === 'number' ? boss.visualY : boss.y;
  const art = orionMangaArt();
  const hasAnim = orionMangaAssetReady(ORION_MANGA_SCORPION_SHEET)
    && art && typeof art.drawAnimation === 'function';
  const heavy = art && typeof art.heavyEffects === 'function' && art.heavyEffects();

  ctx.save();
  if (boss.hurtFlash > 0 && Math.sin(Engine.time * 32) > 0) {
    ctx.filter = heavy ? 'brightness(2.8) saturate(0.1)' : 'brightness(1.9)';
    ctx.shadowColor = '#fff5c0';
    ctx.shadowBlur = heavy ? 18 : 6;
  } else if (heavy) {
    ctx.filter = 'saturate(1.06) contrast(1.06)';
    if (boss.phase >= 3) {
      ctx.shadowColor = '#ff3300';
      ctx.shadowBlur = 16;
    }
  } else if (boss.phase >= 3) {
    ctx.shadowColor = '#ff3300';
    ctx.shadowBlur = 5;
  }
  let drew = false;
  if (hasAnim) {
    const motion = currentScorpionMangaMotion();
    const drawBossAnim = art.drawActedAnimation || art.drawAnimation;
    drew = drawBossAnim(ctx, ORION_MANGA_SCORPION_SHEET, motion.anim, motion.t, drawX, drawY, {
      scale,
      flipX: boss.facing < 0,
      rotate: motion.rotate || 0,
      amount: motion.anim === 'crawl' ? 0.72 : (motion.anim === 'charge' ? 0.82 : (/claw|sting/.test(motion.anim) ? 0.34 : 0.20)),
      bob: motion.anim === 'charge' ? 7 : 5.6,
      sway: motion.anim === 'charge' ? 0.040 : 0.024,
      squash: motion.anim === 'charge' ? 0.036 : 0.026,
      frameBlendStrength: /crawl|charge/.test(motion.anim) ? 0.24 : 0.18,
      hero: true,
    });
  } else {
    const frame = currentScorpionMangaFrame();
    const drawOpts = {
      scale,
      flipX: boss.facing < 0,
      rotate: boss.visualLean || 0,
      phase: Engine.time * (boss.phase >= 2 ? 1.15 : 1),
      amount: boss.state === 'dead' ? 0.02 : (boss.state === 'idle' ? 0.20 : 0.68),
      bob: boss.state === 'charge' ? 6.5 : 4.8,
      sway: boss.state === 'charge' ? 0.034 : 0.022,
      squash: boss.state === 'charge' ? 0.032 : 0.022,
      animName: boss.state || frame,
      hero: true,
    };
    drew = art && typeof art.drawFilmFrame === 'function'
      ? art.drawFilmFrame(ctx, ORION_MANGA_LEGACY_SHEET, frame, drawX, drawY, drawOpts)
      : Manga.assets.drawFrame(ctx, ORION_MANGA_LEGACY_SHEET, frame, drawX, drawY, drawOpts);
  }
  ctx.restore();
  return drew;
}

function drawTail(){
  const segs=5;
  const curl=boss.tailCurl;
  const pts=[{x:-42,y:-18}];
  for(let i=0;i<segs;i++){
    const t = (i+1)/segs;
    const angle = -0.25 + curl*(Math.PI*1.05)*t - 0.08;
    const len = 28*(1-t*0.08);
    const prev = pts[pts.length-1];
    pts.push({x:prev.x-Math.cos(angle)*len, y:prev.y-Math.sin(angle)*len});
  }
  for(let i=0;i<segs;i++){
    const p1=pts[i], p2=pts[i+1];
    const w = 20-i*2.8;
    ctx.strokeStyle = i%2===0?'#9a5020':'#7a3810';
    ctx.lineWidth = Math.max(5,w); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
  const tip=pts[segs], pre=pts[segs-1];
  const ang = Math.atan2(tip.y-pre.y, tip.x-pre.x);
  ctx.save(); ctx.translate(tip.x,tip.y); ctx.rotate(ang-Math.PI/2);
  ctx.fillStyle='#c8a000';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.bezierCurveTo(7,-6,9,-18,2,-30);
  ctx.bezierCurveTo(-2,-18,-2,-6,0,0);
  ctx.fill();
  const vg = boss.stingT;
  if(vg>0.4){
    ctx.shadowColor='#00ff44'; ctx.shadowBlur=12*vg;
    ctx.fillStyle = `rgba(40,220,20,${vg*0.9})`;
    ctx.beginPath(); ctx.arc(2,-30,5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawClaw(open){
  ctx.save();

  ctx.strokeStyle='#8a4018'; ctx.lineWidth=12; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(34,2); ctx.stroke();
  ctx.fillStyle='#9a4c1c';
  ctx.beginPath(); ctx.ellipse(42,2,16,10,0.1,0,Math.PI*2); ctx.fill();
  const uf = open*22;
  ctx.strokeStyle='#b85c24'; ctx.lineWidth=7; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(50,-4);
  ctx.quadraticCurveTo(64,-10-uf,70,-3+uf*0.3);
  ctx.stroke();
  ctx.beginPath();

  ctx.quadraticCurveTo(64,14+uf*0.5,68,8);

  ctx.strokeStyle='#3a1808'; ctx.lineWidth=3;

}

// Manga-only Phantom Claw projectile — violet spectral pincer with bold ink
// silhouette and trailing speed lines. Caller passes one entry from the
// `phantoms` array; this draws it in screen space at p.x/p.y.
function drawPhantomClaw(p) {
  const a = Math.min(1, p.life / 0.4);
  const wobble = Math.sin(p.t * 18) * 0.05;
  if (p.trail && p.trail.length > 1) {
    drawMangaRibbonTrail(p.trail, '#cc88ff', 5, 0.55);
  }
  const art = orionMangaArt();
  if (Engine.manga && art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET)) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.angle + wobble);
    ctx.globalAlpha = 0.88 * a;
    ctx.shadowColor = '#cc88ff';
    ctx.shadowBlur = 20;
    art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, 'phantomClaw', 0, 0, {
      scale: Math.max(0.13, Math.min(0.23, Math.min(Engine.W, Engine.H) / 3200)),
    });
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle + wobble);
  ctx.globalAlpha = 0.85 * a;
  ctx.shadowColor = '#cc88ff'; ctx.shadowBlur = 22;
  // Filled silhouette of a curling claw
  ctx.fillStyle = '#16081e';
  ctx.beginPath();
  ctx.moveTo(-4, -16);
  ctx.bezierCurveTo(18, -22, 36, -10, 42, 0);
  ctx.bezierCurveTo(36, 10, 18, 22, -4, 16);
  ctx.bezierCurveTo(-2, 8, -2, -8, -4, -16);
  ctx.closePath(); ctx.fill();
  ctx.lineWidth = 3.5; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#cc88ff';
  ctx.stroke();
  // Inner pincer cleft + claw tips
  ctx.strokeStyle = '#7a3ad4'; ctx.lineWidth = 2.4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(34, 0); ctx.stroke();
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(40, -3); ctx.lineTo(48, -1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(40,  3); ctx.lineTo(48,  1); ctx.stroke();
  // Manga speed lines streaming behind the claw
  if (window.Manga && Manga.effects && Manga.effects.speedLines) {
    Manga.effects.speedLines(ctx, -10, 0, {
      count: 5, innerR: 16, outerR: 38,
      color: 'rgba(204,136,255,0.7)', width: 1.6, jitter: 0.6,
    });
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawMangaRibbonTrail(points, color, width = 4, alpha = 0.45) {
  if (!points || points.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (let i = 1; i < points.length; i++) {
    const p0 = points[i - 1], p1 = points[i];
    const t = i / points.length;
    ctx.globalAlpha = alpha * t;
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1, width * t);
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMangaSpearProjectile(s, headOnly = false) {
  const art = orionMangaArt();
  const ready = art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET);
  const angle = s.constellation ? 0 : (s.gravity ? Math.atan2(s.vy, s.vx) : (s.vx > 0 ? 0 : Math.PI));
  const scale = s.constellation
    ? Math.max(0.12, Math.min(0.23, Math.min(Engine.W, Engine.H) / 3100))
    : Math.max(0.065, Math.min(0.12, Math.min(Engine.W, Engine.H) / 5200));

  if (!headOnly && s.trail && s.trail.length > 1) {
    drawMangaRibbonTrail(s.trail, s.constellation ? '#aaddff' : '#fff5c0', s.constellation ? 5 : 3.5, s.constellation ? 0.42 : 0.34);
  }

  if (!headOnly && s.constellation) {
    const skyX = s.skyX ?? s.x;
    const skyY = s.skyY ?? Engine.H * 0.16;
    ctx.save();
    ctx.globalAlpha = 0.32 + Math.sin(Engine.time * 14 + s.x) * 0.08;
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 10]);
    ctx.beginPath();
    ctx.moveTo(skyX, skyY);
    ctx.lineTo(s.x, s.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowColor = '#aaddff';
    ctx.shadowBlur = 16;
    if (ready) {
      art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, 'constellationMark', skyX, skyY, {
        scale: Math.max(0.08, Math.min(0.16, Math.min(Engine.W, Engine.H) / 4300)),
        alpha: 0.72,
      });
    } else {
      ctx.fillStyle = '#aaddff';
      ctx.beginPath(); ctx.arc(skyX, skyY, 5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
  if (!headOnly) return;

  if (ready) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(angle);
    ctx.shadowColor = s.constellation ? '#aaddff' : '#fff5c0';
    ctx.shadowBlur = s.constellation ? 16 : 8;
    art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, s.constellation ? 'fallingSpear' : 'spearTrail1', 0, 0, {
      scale,
      flipX: !s.constellation && s.vx < 0,
    });
    ctx.restore();
    return;
  }

  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(angle);
  ctx.strokeStyle='#7a5028'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-18,0); ctx.lineTo(14,0); ctx.stroke();
  ctx.fillStyle='#b8b8b8';
  ctx.beginPath(); ctx.moveTo(14,0); ctx.lineTo(8,-4); ctx.lineTo(8,4); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawMangaVenomProjectile(v, headOnly = false) {
  const art = orionMangaArt();
  const ready = art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET);
  if (!headOnly && v.trail && v.trail.length > 1) {

    art.drawFrame(ctx, ORION_MANGA_FXHUD_SHEET, 'venomBlob', 0, 0, {

    });
    ctx.restore();
    return;
  }
  ctx.save();

function drawMangaStabFx() {
  if (orion.stabFlash <= 0) return;
  const art = orionMangaArt();
  const f = orion.stabFacing || orion.facing;
  const hand = orionMangaHandPoint('stab', f);

  if (art && orionMangaAssetReady(ORION_MANGA_FXHUD_SHEET)) {
